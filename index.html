<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>TeamPro 教練共同備課系統</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./共同備課logo.png">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  /* ---- design tokens ---- */
  --color-primary-900:#0B1F33; --color-primary-800:#12304A;
  --color-brand-600:#0EA5C6; --color-brand-500:#19B5D1; --color-accent-500:#F97316;
  --color-success:#16A36A; --color-warning:#F59E0B; --color-danger:#DC4C4C; --color-info:#2563EB;
  --color-bg:#F4F7FA; --color-surface:#FFFFFF; --color-surface-soft:#EDF3F7; --color-border:#DCE5EC;
  --color-text:#17212B; --color-text-secondary:#64748B; --color-text-disabled:#94A3B8;
  --radius-sm:8px; --radius-md:12px; --radius-lg:16px; --radius-xl:22px;
  --shadow-card:0 8px 28px rgba(11,31,51,.08); --shadow-floating:0 14px 40px rgba(11,31,51,.14);
  /* ---- aliases so existing components inherit the new system ---- */
  --bg:var(--color-bg); --bg2:var(--color-primary-800); --card:var(--color-surface); --ink:var(--color-text);
  --sub:var(--color-text-secondary); --line:var(--color-border); --brand:var(--color-brand-600); --brand2:var(--color-brand-500);
  --ok:var(--color-success); --warn:var(--color-warning); --bad:var(--color-danger); --amber:var(--color-warning);
  --green:var(--color-success); --red:var(--color-danger); --info:var(--color-info); --accent:var(--color-accent-500);
  --pagew:1440px; --sh:var(--shadow-card); --side-w:248px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--color-bg);color:var(--ink);font-size:15px;line-height:1.55;-webkit-text-size-adjust:100%;overflow-x:hidden}
svg{display:inline-block;vertical-align:middle}
button,input,select,textarea{font-family:inherit;font-size:15px}
button{cursor:pointer;border:none;background:none}
a{color:var(--brand);text-decoration:none}
.hide{display:none!important}
/* ---------- login ---------- */
#login{position:fixed;inset:0;background:radial-gradient(1100px 600px at 82% -12%,#12304A,#0B1F33 62%);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;overflow:auto}
#login .box{background:var(--color-surface);border-radius:var(--radius-xl);padding:26px 22px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:440px;box-shadow:var(--shadow-floating)}
#login .brand{display:flex;align-items:center;gap:12px}
#login .brand .mark{width:46px;height:46px;border-radius:13px;background:linear-gradient(140deg,var(--color-brand-600),var(--color-primary-800));display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto}
#login .brand .mark img,#side .side-brand .mark img{width:100%;height:100%;object-fit:contain;border-radius:inherit;display:block;background:#fff}
#login h1{margin:0;font-size:20px;letter-spacing:.3px}
#login .sub{color:var(--sub);margin:3px 0 16px;font-size:13px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#334155}
.field .req{color:var(--color-danger)}.field .opt{color:var(--color-text-disabled);font-weight:500;font-size:12px}
.field .help{font-size:12px;color:var(--sub);margin-top:5px}
.field .err{font-size:12px;color:var(--color-danger);margin-top:5px}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:#fff;outline:none;color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(14,165,198,.18)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:var(--radius-md);font-weight:600;background:var(--color-brand-600);color:#fff;transition:.15s;white-space:nowrap;min-height:44px;border:1px solid transparent}
.btn:hover{filter:brightness(1.05)}
.btn:active{transform:scale(.985)}
.btn.block{width:100%}
.btn.g,.btn.secondary{background:var(--color-surface-soft);color:var(--color-primary-800);border:1px solid var(--line)}
.btn.ghost{background:transparent;color:var(--color-brand-600);border:1px solid transparent}
.btn.ok{background:var(--ok)}.btn.bad,.btn.danger{background:var(--bad)}.btn.warn{background:var(--warn);color:#3a2a00}
.btn.lg{min-height:52px;font-size:16px}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:var(--radius-sm);min-height:36px}
.btn.xs{padding:4px 9px;font-size:12px;border-radius:8px;min-height:0}
.btn[disabled],.btn.disabled{opacity:.5;pointer-events:none}
.btn:focus-visible,.acct:focus-visible,.chip:focus-visible,.nav-item:focus-visible,#bnav button:focus-visible,.iconbtn:focus-visible{outline:3px solid #7DD3E8;outline-offset:2px}
.acct-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.acct{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:var(--radius-md);padding:10px 12px;text-align:left;background:#fff;width:100%;min-height:56px;transition:.15s;cursor:pointer}
.acct:hover{border-color:var(--color-brand-500)}
.acct .av{width:38px;height:38px;border-radius:10px;background:var(--color-surface-soft);color:var(--color-primary-800);font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:15px}
.acct .meta{flex:1;min-width:0}
.acct .meta b{display:block;font-size:15px}
.acct .meta span{font-size:12px;color:var(--sub)}
.acct .recent{font-size:11px;background:#E0F2FE;color:#0369A1;padding:2px 8px;border-radius:20px;white-space:nowrap;font-weight:600}
.acct.sel{border-color:var(--brand);box-shadow:0 0 0 3px rgba(14,165,198,.15)}
.acct.admin .av{background:linear-gradient(140deg,var(--color-brand-600),var(--color-primary-800));color:#fff}
.pin-input{width:100%;text-align:center;font-size:26px;letter-spacing:14px;font-weight:700;padding:12px;border:1px solid var(--line);border-radius:var(--radius-md)}
.login-status{display:flex;align-items:center;gap:8px;justify-content:center;font-size:12px;color:var(--sub);margin-top:14px}
/* ---------- app shell (desktop sidebar + mobile bottom nav) ---------- */
#shell{display:flex;min-height:100vh}
#side{width:var(--side-w);flex:0 0 var(--side-w);background:var(--color-primary-900);color:#cbd5e1;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:14px 12px;gap:8px}
#side .side-brand{display:flex;align-items:center;gap:10px;padding:6px 8px 10px}
#side .side-brand .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(140deg,var(--color-brand-600),var(--color-primary-800));display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto}
#side .side-brand b{color:#fff;font-size:15px;display:block;line-height:1.15}
#side .side-brand small{font-size:11px;color:#8aa0b6}
#sidenav{display:flex;flex-direction:column;gap:4px;overflow-y:auto;flex:1;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--radius-md);color:#cbd5e1;font-weight:600;font-size:14px;min-height:46px;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.on{background:var(--color-brand-600);color:#fff}
.nav-item svg{flex:0 0 auto;stroke:currentColor}
#side .side-foot{border-top:1px solid rgba(255,255,255,.08);padding-top:10px;display:flex;flex-direction:column;gap:10px}
#side .side-foot .who{display:flex;align-items:center;gap:10px;color:#e2e8f0;font-size:13px}
.av{width:34px;height:34px;border-radius:9px;background:var(--color-brand-600);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 auto}
.rolechip{display:inline-block;font-size:10px;background:rgba(255,255,255,.14);padding:1px 7px;border-radius:20px;margin-top:2px;color:#cbd5e1}
#main{flex:1;min-width:0;display:flex;flex-direction:column}
#ctxbar{position:sticky;top:0;z-index:40;background:rgba(11,31,51,.98);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 14px}
#ctxbar .ct-title{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#ctxbar .sp{flex:1}
#ctxbar .av{width:32px;height:32px}
#view{padding:16px 16px 96px;max-width:1440px;width:100%;margin:0 auto}
/* sync pill */
.sync-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;background:var(--color-surface-soft);color:var(--color-text-secondary);border:1px solid var(--line);cursor:pointer}
.sync-pill .d{width:8px;height:8px;border-radius:50%;background:currentColor;flex:0 0 auto}
.sync-pill.ok{background:#E6F6EE;color:#0F7A50;border-color:#B7E4CD}
.sync-pill.bad{background:#FCE9E9;color:#B23636;border-color:#F3C6C6}
.sync-pill.off{background:#EEF2F6;color:#64748B}
.sync-pill.busy{background:#E7F4F8;color:#0E7490}
#ctxbar .sync-pill,#side .sync-pill{background:rgba(255,255,255,.12);color:#cbd5e1;border-color:transparent}
/* bottom nav (mobile) */
#bnav{position:fixed;bottom:0;left:0;right:0;background:var(--color-surface);border-top:1px solid var(--line);display:flex;z-index:45;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 20px rgba(11,31,51,.06)}
#bnav button{flex:1;min-height:68px;padding:8px 2px;font-size:11px;color:var(--sub);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-weight:600}
#bnav button svg{stroke:var(--sub)}
#bnav button.on{color:var(--brand)}
#bnav button.on svg{stroke:var(--brand)}
@media(min-width:1024px){#bnav,#ctxbar{display:none!important}#view{padding:28px 32px 44px}}
@media(max-width:1023px){#side{display:none}#shell{display:block}}
@media(min-width:768px) and (max-width:1023px){#view{padding:22px 24px 96px}}
/* cards */
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--sh)}
.card h3{margin:0 0 10px;font-size:15px;display:flex;align-items:center;gap:8px}
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--sh);cursor:pointer;transition:.15s}
.stat:active{transform:scale(.98)}
.stat .n{font-size:26px;font-weight:800;line-height:1}
.stat .l{font-size:12px;color:var(--sub);margin-top:4px}
.stat .l b{color:var(--brand)}
.sect-title{font-size:13px;font-weight:700;color:var(--sub);margin:18px 2px 8px;text-transform:none}
.hero{background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;border-radius:16px;padding:16px;margin-bottom:14px}
.hero h2{margin:0 0 2px;font-size:18px}
.hero p{margin:0;opacity:.85;font-size:13px}
/* tiles */
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tile{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 12px;text-align:left;box-shadow:var(--sh);display:flex;gap:10px;align-items:center}
.tile .ic{font-size:22px}
.tile b{display:block;font-size:14px}
.tile span{font-size:11px;color:var(--sub)}
/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th,.tbl td{padding:8px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
.tbl th{color:var(--sub);font-weight:600;font-size:12px;background:#f8fafc;position:sticky;top:0}
.tbl tr:active{background:#f8fafc}
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.codebox{display:block;max-width:100%;max-height:280px;overflow:auto;background:#0f172a;color:#e2e8f0;border-radius:8px;padding:10px;font-size:12px;white-space:pre-wrap;word-break:break-word}
/* chips / tags */
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--line);background:#fff;color:#475569;cursor:pointer;user-select:none}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.tag{font-size:11px;padding:2px 8px;border-radius:6px;background:#eef2ff;color:#4338ca;font-weight:600}
.tag.age{background:#ecfeff;color:#0e7490}
.tag.belt{background:#fef3c7;color:#92400e}
.tag.spec{background:#f0fdf4;color:#15803d}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
.b-draft{background:#f1f5f9;color:#475569}.b-disc{background:#dbeafe;color:#1d4ed8}
.b-wait{background:#fef3c7;color:#92400e}.b-pub{background:#dcfce7;color:#15803d}
.b-done{background:#e0e7ff;color:#4338ca}.b-lock{background:#fee2e2;color:#991b1b}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.d-g{background:var(--green)}.d-y{background:var(--amber)}.d-r{background:var(--red)}
/* forms */
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.row>.grow{flex:1;min-width:120px}
label.sm{font-size:12px;color:var(--sub);font-weight:600;display:block;margin-bottom:4px}
textarea{resize:vertical;min-height:60px}
.muted{color:var(--sub);font-size:12px}
.empty{text-align:center;padding:30px 16px;color:var(--sub)}
.empty .ic{font-size:36px;opacity:.5}
/* toast */
#toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:90%;max-width:360px}
.tst{background:#0f172a;color:#fff;padding:11px 14px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:pop .2s}
.tst.ok{background:var(--ok)}.tst.bad{background:var(--bad)}.tst.warn{background:var(--warn)}
@keyframes pop{from{opacity:0;transform:translateY(8px)}}
/* modal */
#modal{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:150;display:flex;align-items:flex-end;justify-content:center;padding:0}
#modal .m{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:90vh;overflow:auto;padding:18px}
#modal .m h3{margin:0 0 12px;display:flex;align-items:center}
#modal .m h3 .x{margin-left:auto;font-size:22px;color:var(--sub);cursor:pointer;line-height:1}
/* lesson blocks */
.blk{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.blk .bh{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f8fafc;cursor:pointer}
.blk .bh .t{font-size:14px;font-weight:700}
.blk .bh .m{font-size:11px;color:var(--sub)}
.blk .bh .st{margin-left:auto;font-size:11px}
.blk .bd{padding:12px;border-top:1px solid var(--line)}
.blk.done .bh{background:#f0fdf4}
/* group cards */
.gcard{border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px;background:#fff}
.gcard.drop{border:2px dashed var(--brand);background:#eef2ff}
.gcard .gh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.gcard .gh b{font-size:14px}
.stu{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 9px;border:1px solid var(--line);border-radius:20px;margin:2px;background:#fff;cursor:pointer}
.stu.sel{background:var(--brand);color:#fff;border-color:var(--brand)}
.pool{border:1px dashed var(--line);border-radius:12px;padding:10px;background:#fafbff;min-height:44px}
/* discussion */
.msg{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;background:#fff}
.msg.reply{margin-left:22px;background:#f8fafc}
.msg .mh{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--sub);margin-bottom:4px}
.msg .mh b{color:var(--ink);font-size:13px}
.msg .mb{font-size:14px;white-space:pre-wrap;word-break:break-word}
/* week */
.wk{display:grid;gap:10px}
.wkday{border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px;box-shadow:var(--sh)}
.wkday .wd{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.wkday .wd b{font-size:15px}
.progress{height:6px;background:#eef2ff;border-radius:20px;overflow:hidden;margin-top:6px}
.progress i{display:block;height:100%;background:var(--brand)}
.divider{height:1px;background:var(--line);margin:12px 0}
.kv{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px dashed var(--line);font-size:13px}
.kv:last-child{border-bottom:none}
.kv b{color:var(--sub);font-weight:600}
.warnbox{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px;font-size:13px;color:#92400e;margin:8px 0}
.okbox{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px;font-size:13px;color:#166534;margin:8px 0}
.infobox{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px;font-size:13px;color:#1e40af;margin:8px 0}
.loading{text-align:center;padding:30px;color:var(--sub)}
.spin{width:24px;height:24px;border:3px solid #e2e8f0;border-top-color:var(--brand);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 8px}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:560px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
/* ---------- components v2 ---------- */
.iconbtn{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:var(--radius-md);background:var(--color-surface-soft);color:var(--color-text);flex:0 0 auto}
.iconbtn svg{stroke:currentColor}
.sect-head{display:flex;align-items:center;gap:8px;margin:18px 2px 8px}
.sect-head h3{margin:0;font-size:15px}
.sect-head .sp{flex:1}
/* context bar (in-page, for pickers) */
.ctxrow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;background:var(--color-surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:12px;box-shadow:var(--sh)}
/* stepper */
.stepper{display:none;gap:6px;background:var(--color-surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:10px;box-shadow:var(--sh);overflow-x:auto;margin-bottom:14px}
.stepper .stp{flex:1;min-width:92px;display:flex;flex-direction:column;gap:6px;align-items:center;text-align:center;padding:6px;border-radius:var(--radius-md);cursor:pointer}
.stepper .stp .num{width:30px;height:30px;border-radius:50%;background:var(--color-surface-soft);color:var(--sub);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.stepper .stp.on .num{background:var(--color-brand-600);color:#fff}
.stepper .stp.done .num{background:var(--color-success);color:#fff}
.stepper .stp.warn .num{background:var(--color-warning);color:#fff}
.stepper .stp .lbl{font-size:12px;font-weight:600;color:var(--sub)}
.stepper .stp.on .lbl{color:var(--ink)}
.stepper-m{display:flex;align-items:center;gap:12px;background:var(--color-surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:12px;box-shadow:var(--sh);margin-bottom:14px}
.ring{width:48px;height:48px;border-radius:50%;background:conic-gradient(var(--color-brand-600) calc(var(--p,0)*1%),var(--color-surface-soft) 0);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.ring i{width:37px;height:37px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-style:normal}
.stepper-m .now b{font-size:15px}.stepper-m .now span{font-size:12px;color:var(--sub)}
@media(min-width:768px){.stepper{display:flex}.stepper-m{display:none}}
/* sticky action bar */
.actionbar{position:sticky;bottom:calc(68px + env(safe-area-inset-bottom));background:var(--color-surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:10px 14px;display:flex;gap:8px;margin:16px 0 4px;box-shadow:var(--shadow-floating);z-index:44;align-items:center;flex-wrap:wrap}
.actionbar .sp{flex:1}
.actionbar .savehint{font-size:12px;color:var(--sub)}
.actionbar .btn{min-height:44px}
@media(min-width:1024px){.actionbar{margin:18px 0 0;bottom:0;box-shadow:var(--shadow-card)}}
/* today course card */
.course-card{background:linear-gradient(150deg,var(--color-primary-900),var(--color-primary-800));color:#fff;border-radius:var(--radius-xl);padding:18px;box-shadow:var(--shadow-card)}
.course-card .cc-top{display:flex;align-items:center;gap:14px}
.course-card .cc-top .info{flex:1;min-width:0}
.course-card .cc-top .info h2{margin:0;font-size:18px}

<script>
"use strict";
/* =========================================================================
   TeamPro 教練共同備課系統  —  單檔 HTML + IndexedDB
   ========================================================================= */
const APP_VERSION='1.9.0-internal';
const DB_NAME='teampro_planner', DB_VER=5;
/* ⬇⬇⬇ 部署 GAS 後把 /exec 網址貼在這裡，所有人打開同一個網址就會自動雲端同步。
   （也可以登入後在「設定」頁貼上，但要多裝置共用，建議直接寫在這裡再上架。） */
const DEFAULT_SYNC_URL='https://script.google.com/macros/s/AKfycbyPf7Qd2LuIsx-P0z-kdrAMxrsqpvonswGHXHnHrrLaT22EWjXXQYOQGUd29SlNc7Lt/exec';
const DATA_STORES=['settings','profiles','students','classes','weekly_plans','daily_plans',
  'training_groups','lesson_blocks','discussions','post_class_reports','course_templates','audit_logs','edit_locks','warmup_library','attendance_records'];
const LOCAL_STORES=['backups','sync_outbox','sync_conflicts'];
const STORES=[...DATA_STORES,...LOCAL_STORES];

const AGE_GROUPS=['幼兒','國小','國中','成人'];
const BELTS=['白帶','黃帶','黃藍帶','藍帶','藍紅帶','紅帶','紅一線','紅二線','黑頭','一段','兩段','三段','四段'];
const BELT_ALIASES={'紅黑帶':'黑頭','紅黑頭':'黑頭','紅1線':'紅一線','紅2線':'紅二線','二段':'兩段','四段以上':'四段'};
const SPECIALTIES=['基礎','品勢','對練','健身','黑帶','比賽選手','尚未分類'];
const WEEKDAYS=['星期一','星期二','星期三','星期四','星期五','星期六','星期日'];
const WD_SHORT=['一','二','三','四','五','六','日'];
const BLOCKS=[
  {key:'warmup',  name:'做操、慢跑',        s:0,  e:10},
  {key:'fitness', name:'熱身、基礎體能、遊戲',s:10, e:30},
  {key:'group',   name:'分組訓練、基本動作', s:30, e:60},
  {key:'apply',   name:'應用、組合、挑戰、比賽',s:60, e:85},
  {key:'review',  name:'課程講評',          s:85, e:90},
];
/* 每堂課教練/助教合計硬性上限（主教練+教練+助教都計入） */
const MAX_COACHES_PER_CLASS=4;
const CLASS_TYPES=['暑期訓練','一般健身','選手訓練','黑帶培訓','一般'];
/* 雄麒道館預設班別（weekdays 用 JS getDay：0=日,1=一…6=六，建立時轉為本系統 WEEKDAYS 字串） */
const HSIUNGCHI_PRESETS=[
  {name:'暑期班',    class_type:'暑期訓練',jsdays:[1,2,3,4,5],start_time:'08:00',end_time:'09:30',duration_minutes:90,seasonal:true,active_from:'2026-07-06',active_until:'2026-08-26'},
  {name:'健身班',    class_type:'一般健身',jsdays:[1,2,3,4,5],start_time:'18:00',end_time:'19:30',duration_minutes:90,seasonal:false},
  {name:'選手班',    class_type:'選手訓練',jsdays:[1,2,3,4,5],start_time:'19:30',end_time:'21:00',duration_minutes:90,seasonal:false},
  {name:'週六健身班',class_type:'一般健身',jsdays:[6],      start_time:'08:30',end_time:'10:30',duration_minutes:120,seasonal:false},
  {name:'黑帶培訓班',class_type:'黑帶培訓',jsdays:[0],      start_time:'10:30',end_time:'12:00',duration_minutes:90,seasonal:false},
];
const jsdayToWeekday=d=>WEEKDAYS[(d+6)%7]; // JS getDay(0=日) -> 本系統 WEEKDAYS
const ABILITY_TAGS=['敏捷','反應','協調','平衡','核心','柔軟度','爆發力','心肺','折返跑','體能遊戲','團隊遊戲','專項暖身'];
const APPLY_TYPES=['應用','組合','挑戰','闖關','小組競賽','品勢演練','踢靶','攻防反應','條件對練','模擬比賽'];
const STATUS=[['draft','草稿','b-draft'],['disc','討論中','b-disc'],['wait','待確認','b-wait'],
  ['pub','已發布','b-pub'],['done','已完成','b-done'],['lock','已鎖定','b-lock']];
const SYNC_DATA_STORES=DATA_STORES.filter(s=>s!=='audit_logs');
const DEVICE_ID=(()=>{let id=localStorage.getItem('tp_device_id');if(!id){id='dev_'+Date.now().toString(36)+Math.random().toString(36).slice(2,10);localStorage.setItem('tp_device_id',id);}return id;})();

/* ---------------- IndexedDB tiny layer ---------------- */
const DB={
  _db:null,_openPromise:null,
  open(){return new Promise((res,rej)=>{
    if(DB._db)return res(DB._db);
    if(DB._openPromise)return DB._openPromise.then(res,rej);
    DB._openPromise=new Promise((resolve,reject)=>{
    const rq=indexedDB.open(DB_NAME,DB_VER);
    rq.onupgradeneeded=e=>{const db=e.target.result;
      STORES.forEach(s=>{ if(!db.objectStoreNames.contains(s)) db.createObjectStore(s,{keyPath:'id'}); });};
    rq.onsuccess=e=>{DB._db=e.target.result;DB._db.onclose=()=>{DB._db=null;DB._openPromise=null;};DB._db.onversionchange=()=>{DB._db.close();DB._db=null;DB._openPromise=null;};resolve(DB._db);};
    rq.onerror=e=>{DB._openPromise=null;reject(e.target.error);};
    rq.onblocked=()=>{DB._openPromise=null;reject(new Error('資料庫升級被其他分頁阻擋，請關閉其他 TeamPro 分頁後重新整理。'));};
    });
    DB._openPromise.then(res,rej);
  });},
  _tx(store,mode){if(!DB._db)throw new Error('資料庫尚未就緒，請重新整理後再試。');return DB._db.transaction(store,mode).objectStore(store);},
  tx(stores,mode,fn){return new Promise((res,rej)=>{
    if(!DB._db)return rej(new Error('資料庫尚未就緒，請重新整理後再試。'));
    const tx=DB._db.transaction(stores,mode);
    const api={store:n=>tx.objectStore(n)};
    let out;
    tx.oncomplete=()=>res(out);
    tx.onerror=()=>rej(tx.error);
    tx.onabort=()=>rej(tx.error||new Error('IndexedDB transaction aborted'));
    try{out=fn(api,tx);}catch(e){tx.abort();rej(e);}
  });},
  all(store){return new Promise((res,rej)=>{const r=DB._tx(store,'readonly').getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});},
  get(store,id){return new Promise((res,rej)=>{const r=DB._tx(store,'readonly').get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
  put(store,obj){return new Promise((res,rej)=>{const r=DB._tx(store,'readwrite').put(obj);r.onsuccess=()=>res(obj);r.onerror=()=>rej(r.error);});},
  del(store,id){return new Promise((res,rej)=>{const r=DB._tx(store,'readwrite').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});},
  clear(store){return new Promise((res,rej)=>{const r=DB._tx(store,'readwrite').clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});},
  async bulk(store,arr){for(const o of arr) await DB.put(store,o);},
};

/* ---------------- utils ---------------- */
const uid=(p='')=>p+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const nl2=s=>esc(s).replace(/\n/g,'<br>');
function toast(msg,type=''){const t=document.createElement('div');t.className='tst '+type;t.textContent=msg;$('#toast').appendChild(t);setTimeout(()=>t.remove(),2600);}
function todayStr(d=new Date()){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekdayOf(dateStr){const d=new Date(dateStr+'T00:00:00');return (d.getDay()+6)%7;} // 0=Mon
function addDays(dateStr,n){const d=new Date(dateStr+'T00:00:00');d.setDate(d.getDate()+n);return todayStr(d);}
function mondayOf(dateStr){return addDays(dateStr,-weekdayOf(dateStr));}
function statusMeta(s){return STATUS.find(x=>x[0]===s)||STATUS[0];}
function badge(s){const m=statusMeta(s);return `<span class="badge ${m[2]}">${m[1]}</span>`;}
/* 行動式狀態說明（§八）：畫面顯示「要做什麼」，不只是狀態值 */
const STATUS_ACTION={draft:'尚未完成備課',disc:'等待教練團補充',wait:'等待主教練確認',pub:'已發布，教練團可以查看',done:'課程已完成，請填課後紀錄',lock:'課程已結案，不可修改'};
function statusAction(s){return STATUS_ACTION[s]||statusMeta(s)[1];}
// 標準化上課日字串 -> ["星期一",...]
function normWeekdays(raw){
  if(!raw) return [];
  const map={'一':0,'二':1,'三':2,'四':3,'五':4,'六':5,'日':6,'天':6,'1':0,'2':1,'3':2,'4':3,'5':4,'6':5,'7':6};
  const out=new Set();
  const parts=String(raw).split(/[、,，\/\s和及]+/).filter(Boolean);
  parts.forEach(p=>{p=p.replace(/星期|週|周|禮拜|拜/g,'').trim();
    for(const ch of p){ if(ch in map) out.add(map[ch]); }});
  return [...out].sort((a,b)=>a-b).map(i=>WEEKDAYS[i]);
}
function ageOK(a){return AGE_GROUPS.includes(a);}
function normBelt(b){b=String(b||'').trim();return BELT_ALIASES[b]||b;}
function beltOK(b){return BELTS.includes(normBelt(b));}

/* ---------------- global state ---------------- */
const State={user:null, cache:{}, ctx:{date:todayStr(),classId:null}};
async function reload(store){State.cache[store]=await DB.all(store);return State.cache[store];}
async function reloadAll(){for(const s of STORES) await reload(s);}
async function ensureDbReady(){
  if(!DB._db)await DB.open();
  for(const s of STORES){if(!State.cache[s])State.cache[s]=await DB.all(s);}
}
const C=store=>State.cache[store]||[];
function shouldSyncStore(store){return SYNC_DATA_STORES.includes(store);}
function outboxRecord(store,id,operation,payload,baseRev){
  const now=Date.now(),request_id=uid('rq_');
  return {id:request_id,request_id,store,record_id:id,operation,payload:payload?JSON.parse(JSON.stringify(payload)):null,
    base_rev:baseRev||0,created_at:now,updated_at:now,retry_count:0,last_error:'',status:'queued',next_retry_at:0};
}
function touchSyncMeta(obj,old){
  const now=Date.now(),prevRev=Number(old?old._rev:(obj._rev||0))||0;
  obj.base_rev=prevRev;
  obj._rev=prevRev+1;
  obj.updated_by=State.user?{id:State.user.id,name:State.user.name,role:State.user.role}:null;
  obj.updated_device=DEVICE_ID;
  obj.updated_at=now;
  obj._u=now;
  return obj;
}
async function save(store,obj){
  obj={...obj,id:obj.id||uid()};
  if(!shouldSyncStore(store)){
    obj._u=Date.now();await DB.put(store,obj);await reload(store);return obj;
  }
  let saved;
  await DB.tx([store,'sync_outbox'],'readwrite',api=>{
    const os=api.store(store),out=api.store('sync_outbox');
    const get=os.get(obj.id);
    get.onsuccess=()=>{
      const old=get.result||null;
      saved=touchSyncMeta({...obj},old);
      os.put(saved);
      out.put(outboxRecord(store,saved.id,old?'update':'create',saved,saved.base_rev));
    };
  });
  await reload(store);await reload('sync_outbox');

}

/* =========================================================================
   SYNC —— GAS 雲端同步層（多裝置各自手機共用同一份資料）
   push: 每次存檔即時上傳(佇列合批)  pull: 定時/切頁把雲端變更拉回  LWW by _u
   ========================================================================= */
const SYNC_REPLACE_TOKEN=Symbol('replaceAllSafeToken');
const SYNC={
  status:'—',
  lastSuccess:+(localStorage.getItem('tp_sync_success')||0),
  lastError:'',
  _replacing:false,
  url(){try{return (settings().syncUrl||DEFAULT_SYNC_URL||'').trim();}catch(e){return (DEFAULT_SYNC_URL||'').trim();}},
  enabled(){return !!SYNC.url();},
  pendingCount(){return C('sync_outbox').filter(x=>!['done','conflict'].includes(x.status)).length;},
  conflictCount(){return C('sync_conflicts').filter(x=>x.status!=='resolved').length;},
  lastPull(){return +(localStorage.getItem('tp_lastpull')||0);},
  setLastPull(v){localStorage.setItem('tp_lastpull',v);},
  async post(payload){
    const res=await fetch(SYNC.url(),{method:'POST',body:JSON.stringify(payload)});
    return await res.json();
  },
  _busy:false,
  push(){SYNC.kick();},
  pushDelete(){SYNC.kick();},
  kick(){App.updateSyncPill?.();if(SYNC.enabled())setTimeout(()=>SYNC._flush(),0);},
  async _markOutbox(item,patch){await DB.put('sync_outbox',{...item,...patch,updated_at:Date.now()});await reload('sync_outbox');},
  _wire(item){
    return {request_id:item.request_id,store:item.store,id:item.record_id,operation:item.operation,
      json:item.payload?JSON.stringify(item.payload):'',deleted:item.operation==='delete',
      base_rev:item.base_rev||0,client_updated_at:item.updated_at||item.created_at||Date.now(),updated_by:item.payload?.updated_by||null,updated_device:item.payload?.updated_device||DEVICE_ID};
  },
  _nextDelay(n){return Math.min(10*60*1000,Math.max(1000,Math.pow(2,Math.min(n,8))*1000));},
  async _flush(){
    if(SYNC._busy||!SYNC.enabled())return;
    if(navigator.onLine===false){SYNC.status='網路離線';App.updateSyncPill?.();return;}
    SYNC._busy=true;
    SYNC.status='同步中';
    App.updateSyncPill?.();
    let sent=0,failed=0,conflicted=0;
    try{
      const now=Date.now();
      const items=(await DB.all('sync_outbox'))
        .filter(x=>['queued','failed'].includes(x.status||'queued')&&Number(x.next_retry_at||0)<=now)
        .sort((a,b)=>(a.created_at||0)-(b.created_at||0))
        .slice(0,25);
      if(!items.length){SYNC.status=SYNC.pendingCount()?`待同步 ${SYNC.pendingCount()} 筆`:'已同步 '+(SYNC.lastSuccess?new Date(SYNC.lastSuccess).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}):'');SYNC._busy=false;App.updateSyncPill?.();return;}
      for(const item of items){
        await SYNC._markOutbox(item,{status:'sending',last_error:''});
        try{
          const r=await SYNC.post({action:'push',records:[SYNC._wire(item)]});
          const res=(r&&r.results&&r.results[0])||r||{};
          if(res.ok){
            await DB.del('sync_outbox',item.id);sent++;
          }else if(res.conflict||res.status===409){
            await SYNC._saveConflict(item,res);await DB.del('sync_outbox',item.id);conflicted++;
          }else{
            throw new Error(res.error||'同步失敗');
          }
        }catch(e){
          failed++;
          const retry=(item.retry_count||0)+1;
          await SYNC._markOutbox(item,{status:'failed',retry_count:retry,last_error:e.message||String(e),next_retry_at:Date.now()+SYNC._nextDelay(retry)});
        }
      }
      await reload('sync_outbox');await reload('sync_conflicts');
      if(sent){SYNC.lastSuccess=Date.now();localStorage.setItem('tp_sync_success',SYNC.lastSuccess);SYNC.lastError='';}
      if(conflicted){toast('偵測到同步衝突，請到系統設定處理','warn');}
      if(failed){SYNC.lastError='有 '+failed+' 筆同步失敗，已排程重試';SYNC.status='同步失敗';}
      else SYNC.status=SYNC.pendingCount()?`待同步 ${SYNC.pendingCount()} 筆`:'已同步 '+new Date(SYNC.lastSuccess||Date.now()).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    }catch(e){SYNC.lastError=e.message||String(e);SYNC.status='同步失敗';toast('同步失敗：'+SYNC.lastError,'warn');}
    SYNC._busy=false;
    App.updateSyncPill?.();
    if(SYNC.pendingCount())setTimeout(()=>SYNC._flush(),3000);
  },
  async _saveConflict(item,res){
    const id='cf_'+item.request_id;
    const cf={id,request_id:item.request_id,store:item.store,record_id:item.record_id,operation:item.operation,
      local_payload:item.payload||null,remote_payload:res.remote||null,local_rev:item.payload?item.payload._rev:item.base_rev,
      base_rev:item.base_rev||0,remote_rev:res.remote?res.remote._rev:res.remote_rev,updated_by:res.remote?.updated_by||res.updated_by||null,
      updated_at:res.remote?.updated_at||res.updated_at||Date.now(),created_at:Date.now(),status:'open',error:res.error||'conflict'};
    await DB.put('sync_conflicts',cf);await reload('sync_conflicts');
  },
  async pull(){
    if(!SYNC.enabled())return{changed:0};
    if(navigator.onLine===false){SYNC.status='網路離線';App.updateSyncPill?.();return{changed:0,err:'offline'};}
    let r;try{SYNC.status='同步中';App.updateSyncPill?.();r=await SYNC.post({action:'pull',since:SYNC.lastPull()});}
    catch(e){SYNC.lastError=e.message||String(e);SYNC.status='同步失敗';toast('同步失敗：'+SYNC.lastError,'warn');App.updateSyncPill?.();return{changed:0,err:e.message};}
    if(!r||!r.ok)return{changed:0};
    let changed=0;
    for(const rec of r.records){
      const local=(State.cache[rec.store]||[]).find(x=>x.id===rec.id);
      if(rec.deleted){if(local){await DB.del(rec.store,rec.id);changed++;}continue;}
      let obj;try{obj=JSON.parse(rec.json);}catch(e){continue;}
      if(!local || (obj._rev||obj._u||0)>(local._rev||local._u||0)){await DB.put(rec.store,obj);changed++;}
    }
    if(changed)await reloadAll();
    SYNC.setLastPull(r.maxSrv||r.srv||SYNC.lastPull());
    SYNC.lastSuccess=Date.now();localStorage.setItem('tp_sync_success',SYNC.lastSuccess);SYNC.lastError='';
    SYNC.status='已同步 '+new Date(SYNC.lastSuccess).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    App.updateSyncPill?.();
    return {changed};
  },
  // 主帳號第一次上傳 / 重置雲端：全量覆蓋（會清掉雲端舊資料再寫入目前本機）
  async _replaceAllUnsafe(token){
    if(token!==SYNC_REPLACE_TOKEN)throw new Error('未通過安全驗證');
    if(!SYNC.enabled())throw new Error('尚未設定同步網址');
    const recs=[];
    for(const s of DATA_STORES)for(const o of C(s))recs.push({store:s,id:o.id,json:JSON.stringify(o),deleted:false});
    const r=await SYNC.post({action:'replaceAll',records:recs});
    SYNC.setLastPull(0); // 之後 pull 會重新對齊
    SYNC.lastSuccess=Date.now();localStorage.setItem('tp_sync_success',SYNC.lastSuccess);SYNC.lastError='';
    return r;
  },
  async replaceAll(){
    if(!State.user)return toast('請先登入','warn');
    if(!requireAdminRole())return;
    if(SYNC._replacing)return;
    const {total}=dataCounts();
    await App.requireAdminPin({actionName:'本機資料覆蓋雲端',impact:`這會以本機資料覆蓋雲端，目前本機共有 ${total} 筆資料。`,confirmText:'確認覆蓋雲端',
      backupReason:'覆蓋雲端前自動備份',onConfirm:async()=>{
        SYNC._replacing=true;
        try{
          const r=await SYNC._replaceAllUnsafe(SYNC_REPLACE_TOKEN);
          const count=r.count??total;
          SYNC.status='已同步 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
          toast('雲端覆蓋完成：'+count+' 筆，'+new Date().toLocaleString('zh-TW'),'ok');
          Modal.close();
        }catch(e){SYNC.lastError=e.message||String(e);SYNC.status='同步失敗';toast('上傳失敗：'+SYNC.lastError,'bad');}
        finally{SYNC._replacing=false;App.updateSyncPill?.();}
      }});
  },
  _timer:null,
  startAuto(){
    if(SYNC._timer)clearInterval(SYNC._timer);
    if(!SYNC.enabled())return;
    SYNC._timer=setInterval(async()=>{
      if(!State.user)return;
      const {changed}=await SYNC.pull();
      if(changed)App.refresh();
    },15000);
  },
  async immediate(){
    if(SYNC._busy)return;
    await SYNC._flush();
    const r=await SYNC.pull();
    if(r.changed)App.refresh();
  },
  async retryFailed(){
    const items=C('sync_outbox').filter(x=>x.status==='failed');
    for(const it of items)await DB.put('sync_outbox',{...it,status:'queued',next_retry_at:0,updated_at:Date.now()});
    await reload('sync_outbox');toast('已重新排入 '+items.length+' 筆失敗項目','ok');SYNC.kick();
  },
  async resolveConflict(id,mode){
    if(!State.user)return toast('請先登入','warn');
    const cf=C('sync_conflicts').find(x=>x.id===id);if(!cf)return toast('找不到衝突紀錄','bad');
    if(mode==='cloud'){
      if(cf.remote_payload)await DB.put(cf.store,cf.remote_payload);
      await DB.del('sync_conflicts',id);await reload(cf.store);await reload('sync_conflicts');toast('已使用雲端版本','ok');App.go('settings','more');return;
    }
    if(mode==='mine'){
      const mine={...(cf.local_payload||{}),base_rev:cf.remote_payload?cf.remote_payload._rev||0:cf.remote_rev||0};
      await save(cf.store,mine);await DB.del('sync_conflicts',id);await reload('sync_conflicts');toast('已保留我的版本，將重新同步','ok');App.go('settings','more');return;
    }
    const txt=$('#mergeJson')?.value||'';
    try{const merged=JSON.parse(txt);merged.id=cf.record_id;merged.base_rev=cf.remote_payload?cf.remote_payload._rev||0:cf.remote_rev||0;await save(cf.store,merged);await DB.del('sync_conflicts',id);await reload('sync_conflicts');toast('已儲存合併版本','ok');App.go('settings','more');}
    catch(e){toast('合併內容不是有效 JSON','bad');$('#mergeJson')?.focus();}
  },
  showConflict(id){
    const cf=C('sync_conflicts').find(x=>x.id===id);if(!cf)return;
    Modal.open('同步衝突處理',`
      <div class="warnbox">同一筆資料已被其他教練修改，系統已停止自動覆蓋。</div>
      <div class="kv"><b>資料</b><span>${esc(cf.store)} / ${esc(cf.record_id)}</span></div>
      <div class="kv"><b>雲端修改者</b><span>${esc(cf.updated_by?.name||'—')}</span></div>
      <div class="row" style="align-items:stretch"><div class="grow"><label class="sm">我的內容</label><pre class="codebox">${esc(JSON.stringify(cf.local_payload,null,2))}</pre></div><div class="grow"><label class="sm">雲端內容</label><pre class="codebox">${esc(JSON.stringify(cf.remote_payload,null,2))}</pre></div></div>
      <div class="field"><label class="sm">合併後儲存 JSON</label><textarea id="mergeJson" style="min-height:160px">${esc(JSON.stringify(cf.remote_payload||cf.local_payload||{},null,2))}</textarea></div>
      <div class="row"><button class="btn secondary grow" onclick="SYNC.resolveConflict('${id}','cloud')">使用雲端版本</button><button class="btn secondary grow" onclick="SYNC.resolveConflict('${id}','mine')">使用我的版本</button><button class="btn grow" onclick="SYNC.resolveConflict('${id}','merge')">合併後儲存</button></div>`);
  },
  bindNetwork(){
    if(SYNC._netBound)return;SYNC._netBound=true;
    window.addEventListener('offline',()=>{SYNC.status='網路離線';App.updateSyncPill?.();});
    window.addEventListener('online',async()=>{SYNC.status='同步中';App.updateSyncPill?.();await SYNC._flush();const r=await SYNC.pull();if(r.changed)App.refresh();});
  }
};

<script>
/* =========================================================================
   STATS ENGINE
   ========================================================================= */
const Stats={
  // 某班別 某星期(0-6) 的學員
  studentsFor(classId,weekdayIdx){
    return C('students').filter(s=>{
      if(!s.active) return false;
      if(classId && s.class_id!==classId) return false;
      if(weekdayIdx!=null){
        const wds=(s.weekdays||[]);
        if(!wds.includes(WEEKDAYS[weekdayIdx])) return false;
      }
      return true;
    });
  },
  summary(list){
    const r={total:list.length,age:{},belt:{},spec:{},promo:0,comp:0};
    AGE_GROUPS.forEach(a=>r.age[a]=0); BELTS.forEach(b=>r.belt[b]=0); SPECIALTIES.forEach(s=>r.spec[s]=0);
    list.forEach(s=>{
      if(r.age[s.age_group]!=null)r.age[s.age_group]++;
      const belt=normBelt(s.belt_rank);if(r.belt[belt]!=null)r.belt[belt]++;
      if(r.spec[s.specialty]!=null)r.spec[s.specialty]++;
      if(s.promotion_status)r.promo++;
      if(s.competition_athlete)r.comp++;
    });
    return r;
  },
  coachesAvailable(weekdayIdx){
    return C('profiles').filter(p=>p.active&&(p.role==='head'||p.role==='assistant')&&
      (!p.available_weekdays||!p.available_weekdays.length||p.available_weekdays.includes(WEEKDAYS[weekdayIdx])));
  },
  // 實際用於分組的名單：已確認出席(confirmed)+臨時到課(walk_in)；若尚未點名則暫用預計名單
  attendingFor(date,classId){
    const roster=this.studentsFor(classId,weekdayOf(date));
    const recs=C('attendance_records').filter(a=>a.date===date&&a.class_id===classId);
    if(!recs.length)return roster; // 尚未確認出席 → 退回預計名單，讓系統仍可運作
    const map={};recs.forEach(a=>map[a.student_id]=a.status);
    const out=roster.filter(s=>map[s.id]==='confirmed'||map[s.id]==='walk_in');
    recs.forEach(a=>{if(a.status==='walk_in'&&!roster.some(s=>s.id===a.student_id)){const s=C('students').find(x=>x.id===a.student_id);if(s&&s.active)out.push(s);}});
    return out;
  },
  attendanceConfirmed(date,classId){return C('attendance_records').some(a=>a.date===date&&a.class_id===classId);}
};
/* ---- 多維度分類（年齡／程度／專項 各自獨立，不可相加）---- */
const AGE_DIMS=['幼兒','兒童青少年','成人'], LEVEL_DIMS=['低色帶','中色帶','高色帶','黑帶'], SPEC_DIMS=['一般基礎','品勢','對練','晉級加強','比賽選手'];
function ageDim(s){return s.age_group==='幼兒'?'幼兒':(s.age_group==='成人'?'成人':'兒童青少年');}
function levelDim(s){const i=BELTS.indexOf(normBelt(s.belt_rank));if(i<0||i<=2)return '低色帶';if(i<=5)return '中色帶';if(i<=8)return '高色帶';return '黑帶';}
function specDim(s){if(s.competition_athlete||s.specialty==='比賽選手')return '比賽選手';if(s.promotion_status)return '晉級加強';if(s.specialty==='品勢')return '品勢';if(s.specialty==='對練')return '對練';return '一般基礎';}
function dimBuckets(list){const r={age:{},level:{},spec:{}};AGE_DIMS.forEach(x=>r.age[x]=[]);LEVEL_DIMS.forEach(x=>r.level[x]=[]);SPEC_DIMS.forEach(x=>r.spec[x]=[]);
  list.forEach(s=>{r.age[ageDim(s)].push(s);r.level[levelDim(s)].push(s);r.spec[specDim(s)].push(s);});return r;}
/* ---- 出席 ---- */
const Attendance={
  LABEL:{expected:'預計',confirmed:'已確認',leave:'請假',walk_in:'臨時',unknown:'未確認',absent:'未到'},
  recId(date,classId,sid){return 'att_'+date+'_'+classId+'_'+sid;},
  get(date,classId,sid){const r=C('attendance_records').find(a=>a.id===Attendance.recId(date,classId,sid));return r?r.status:null;},
  async set(date,classId,sid,status){const id=Attendance.recId(date,classId,sid);const old=C('attendance_records').find(a=>a.id===id)||{};
    await save('attendance_records',{...old,id,date,class_id:classId,student_id:sid,status,created_at:old.created_at||Date.now(),updated_at:Date.now(),created_by:State.user?.id});},
  async allPresent(date,classId){const roster=Stats.studentsFor(classId,weekdayOf(date));
    for(const s of roster){const cur=Attendance.get(date,classId,s.id);if(cur!=='leave'&&cur!=='absent')await Attendance.set(date,classId,s.id,'confirmed');}},
  counts(date,classId){const roster=Stats.studentsFor(classId,weekdayOf(date));const recs=C('attendance_records').filter(a=>a.date===date&&a.class_id===classId);
    const map={};recs.forEach(a=>map[a.student_id]=a.status);let confirmed=0,leave=0,absent=0,unconfirmed=0,walkin=0;
    roster.forEach(s=>{const st=map[s.id]||'expected';if(st==='confirmed')confirmed++;else if(st==='leave')leave++;else if(st==='absent')absent++;else unconfirmed++;});
    recs.forEach(a=>{if(a.status==='walk_in'&&!roster.some(s=>s.id===a.student_id))walkin++;});
    return {roster:roster.length,confirmed,leave,absent,unconfirmed,walkin,attending:confirmed+walkin};}
};

/* =========================================================================
   GROUPING ENGINE  —  產生分組建議
   ========================================================================= */
const Grouping={
  limit(type){const l=settings().limits;return l[type]||l.default||12;},
  tierOf(belt){belt=normBelt(belt);const t=settings().tiers;for(const k in t){if(t[k].map(normBelt).includes(belt))return k;}return '初階';},
  suggest(list,mode,coachCount){
    // 回傳 {groups:[{name,type,students:[],reason,coachNeed}], notes:[]}
    const notes=[]; let groups=[];
    const mk=(name,type,students,reason)=>({id:uid('g'),name,group_type:type,students:students.map(s=>s.id),
      reason, coachNeed:Math.max(1,Math.ceil(students.length/this.limit(type)))});
    const byKey=(arr,fn)=>{const m={};arr.forEach(s=>{const k=fn(s);(m[k]=m[k]||[]).push(s);});return m;};
    if(mode==='age'){
      const m=byKey(list,s=>s.age_group);
      AGE_GROUPS.forEach(a=>{if(m[a]&&m[a].length)groups.push(mk(a+'組','基礎',m[a],`${a}共有 ${m[a].length} 人，依年齡層獨立成組。`));});
    }else if(mode==='belt'){
      const m=byKey(list,s=>normBelt(s.belt_rank));
      BELTS.forEach(b=>{if(m[b]&&m[b].length)groups.push(mk(b+'組','基礎',m[b],`${b}共有 ${m[b].length} 人。`));});
    }else if(mode==='poomsae_spar'){
      const p=list.filter(s=>['品勢','黑帶'].includes(s.specialty));
      const sp=list.filter(s=>['對練','比賽選手'].includes(s.specialty));
      const other=list.filter(s=>!['品勢','黑帶','對練','比賽選手'].includes(s.specialty));
      if(p.length)groups.push(mk('品勢組','品勢',p,`品勢／黑帶共 ${p.length} 人。`));
      if(sp.length)groups.push(mk('對練組','對練',sp,`對練／比賽選手共 ${sp.length} 人。`));
      if(other.length)groups.push(mk('基礎組','基礎',other,`其餘 ${other.length} 人歸基礎組。`));
    }else if(mode==='level'){
      const m=byKey(list,s=>this.tierOf(s.belt_rank));
      ['初階','中階','高階'].forEach(t=>{if(m[t]&&m[t].length)groups.push(mk(t+'組','基礎',m[t],`${t}（${settings().tiers[t].join('、')}）共 ${m[t].length} 人。`));});
    }else if(mode==='kids'){
      const kids=list.filter(s=>s.age_group==='幼兒');
      const rest=list.filter(s=>s.age_group!=='幼兒');
      if(kids.length)groups.push(mk('幼兒組','幼兒',kids,`幼兒共有 ${kids.length} 人，建議獨立成組，安排專責教練。`));
      if(rest.length)groups.push(mk('一般組','基礎',rest,`其餘 ${rest.length} 人。`));
    }else if(mode==='adult'){
      const ad=list.filter(s=>s.age_group==='成人');
      const rest=list.filter(s=>s.age_group!=='成人');
      if(ad.length)groups.push(mk('成人組','健身',ad,`成人共有 ${ad.length} 人，獨立成組。`));
      if(rest.length)groups.push(mk('青少年組','基礎',rest,`其餘 ${rest.length} 人。`));
    }else if(mode==='promo'){
      const pr=list.filter(s=>s.promotion_status);
      const rest=list.filter(s=>!s.promotion_status);
      if(pr.length)groups.push(mk('晉級加強組','基礎',pr,`準備晉級共 ${pr.length} 人，集中加強。`));
      if(rest.length)groups.push(mk('一般組','基礎',rest,`其餘 ${rest.length} 人。`));
    }else if(mode==='comp'){
      const cp=list.filter(s=>s.competition_athlete);
      const rest=list.filter(s=>!s.competition_athlete);
      if(cp.length)groups.push(mk('比賽選手組','比賽選手',cp,`比賽選手共 ${cp.length} 人，專項強化。`));
      if(rest.length)groups.push(mk('一般組','基礎',rest,`其餘 ${rest.length} 人。`));
    }else{ // smart 綜合建議：專項>年齡>級別
      const spec=byKey(list,s=>{
        if(['品勢','黑帶'].includes(s.specialty))return '品勢';
        if(['對練','比賽選手'].includes(s.specialty))return '對練';
        if(s.age_group==='幼兒')return '幼兒';
        if(s.age_group==='成人')return '成人';
        return '基礎';
      });
      ['幼兒','基礎','品勢','對練','成人'].forEach(k=>{
        const arr=spec[k]; if(!arr||!arr.length)return;
        const type=k==='幼兒'?'幼兒':(k==='成人'?'健身':k);
        const lim=this.limit(type);
        if(arr.length>lim && (k==='品勢'||k==='對練'||k==='基礎')){
          // 依級別拆初階/進階
          const lo=arr.filter(s=>this.tierOf(s.belt_rank)==='初階');
          const hi=arr.filter(s=>this.tierOf(s.belt_rank)!=='初階');
          if(lo.length)groups.push(mk(k+'（初階）',type,lo,`${k}共 ${arr.length} 人超過建議上限 ${lim}，依級別拆為初階 ${lo.length} 人。`));
          if(hi.length)groups.push(mk(k+'（進階）',type,hi,`${k}進階 ${hi.length} 人。`));
        }else{
          groups.push(mk(k+'組',type,arr,`${k}共 ${arr.length} 人${k==='幼兒'?'，建議獨立成組並安排 1 位教練':''}。`));
        }
      });
    }
    // 教練需求提醒
    const need=groups.reduce((a,g)=>a+g.coachNeed,0);
    if(coachCount!=null && need>coachCount) notes.push(`本次分組共需 ${need} 位教練／助教，但今日僅 ${coachCount} 位可出席，請調整分組或課程模式。`);
    groups.forEach(g=>{if(g.students.length>this.limit(g.group_type))notes.push(`「${g.name}」${g.students.length} 人超過建議上限 ${this.limit(g.group_type)}，建議再拆分。`);});
    return {groups,notes};
  },
  // 驗證目前分組
  // 計算一組人力：跨所有分組的教練+助教（含 daily_plan 的 lead/assigned）不重複人數
  coachTeam(groups,dp){
    const team=new Set();
    (groups||[]).forEach(g=>{if(g.coach_id)team.add(g.coach_id);if(g.assistant_id)team.add(g.assistant_id);});
    if(dp){(dp.assigned_coach_ids||[]).forEach(id=>id&&team.add(id));if(dp.lead_coach_id)team.add(dp.lead_coach_id);}
    return team;
  },
  validate(groups,list,dp){
    const issues=[]; const assigned={};
    const nm=id=>{const c=C('profiles').find(p=>p.id===id);return c?c.name:'';};
    const coachMap={}, asstMap={};
    groups.forEach(g=>{
      (g.students||[]).forEach(sid=>{
        if(assigned[sid])issues.push({t:'dup',msg:`學員重複出現在「${assigned[sid]}」與「${g.name}」`});
        assigned[sid]=g.name;
      });
      if(!g.coach_id)issues.push({t:'nocoach',msg:`「${g.name}」尚未指派教練`});
      if(g.coach_id&&g.assistant_id&&g.coach_id===g.assistant_id)issues.push({t:'sameperson',msg:`「${g.name}」的教練與助教是同一人（${nm(g.coach_id)}）`});
      if(g.coach_id)coachMap[g.coach_id]=(coachMap[g.coach_id]||0)+1;
      if(g.assistant_id)asstMap[g.assistant_id]=(asstMap[g.assistant_id]||0)+1;
      if((g.students||[]).length>this.limit(g.group_type))issues.push({t:'over',msg:`「${g.name}」人數 ${g.students.length} 超過上限 ${this.limit(g.group_type)}`});
    });
    const un=list.filter(s=>!assigned[s.id]);
    if(un.length)issues.push({t:'unassigned',msg:`有 ${un.length} 位學員尚未分組：${un.slice(0,6).map(s=>s.name).join('、')}${un.length>6?'…':''}`});
    // 同教練/助教同時段被指派到兩組
    Object.entries(coachMap).forEach(([cid,n])=>{if(n>1)issues.push({t:'conflict',msg:`教練「${nm(cid)}」同時被指派到 ${n} 組`});});
    Object.entries(asstMap).forEach(([aid,n])=>{if(n>1)issues.push({t:'conflict',msg:`助教「${nm(aid)}」同時被指派到 ${n} 組`});});
    // 同一人同時擔任教練與助教
    Object.keys(coachMap).forEach(id=>{if(asstMap[id])issues.push({t:'dualrole',msg:`「${nm(id)}」在不同組同時被安排為教練與助教`});});
    // 4 位教練硬性上限 + 停用/未安排任務教練
    const team=this.coachTeam(groups,dp);
    if(team.size>MAX_COACHES_PER_CLASS)issues.push({t:'toomany',msg:`本堂課共出現 ${team.size} 位教練／助教，超過每堂最多 ${MAX_COACHES_PER_CLASS} 位，請先移除或合併`});
    team.forEach(id=>{const p=C('profiles').find(x=>x.id===id);if(p&&p.active===false)issues.push({t:'inactive',msg:`「${p.name}」已停用，不應被指派`});});
    return {issues,unassigned:un,coachCount:team.size};
  }
};
/* 阻擋發布的重大錯誤類型（其餘為提醒） */
const BLOCKING_ISSUE_TYPES=['toomany','dup','nocoach','sameperson','dualrole','inactive'];
function hasBlockingIssues(val){return (val.issues||[]).some(i=>BLOCKING_ISSUE_TYPES.includes(i.t));}
</script>

async function wipeData(reloadAfter=true){
  for(const s of DATA_STORES) await DB.clear(s);
  if(reloadAfter)await reloadAll();
}
</script>

<script>
/* =========================================================================
   APP  —  router + views
   ========================================================================= */
/* ---------- inline SVG icon system ---------- */
const ICONS={
  brand:'<path d="M12 2 4 5v6c0 5 3.5 8.4 8 10.8C16.5 19.4 20 16 20 11V5z"/><path d="M7 12c2 1.6 3 1.6 5 0s3-1.6 5 0" stroke-width="1.6"/>',
  home:'<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.4V21h14V9.4"/>',
  clipboard:'<rect x="8" y="3" width="8" height="4" rx="1"/><path d="M9 5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3"/><path d="M8 12h8M8 16h6"/>',
  calendar:'<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',
  users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13A4 4 0 0 1 16 11"/>',
  grid:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
  play:'<circle cx="12" cy="12" r="9"/><polygon points="10 8 16 12 10 16 10 8"/>',
  layers:'<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
  chart:'<path d="M3 3v18h18"/><rect x="7" y="12" width="3" height="6"/><rect x="12" y="8" width="3" height="10"/><rect x="17" y="5" width="3" height="13"/>',
  user:'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>',
  school:'<path d="M3 21h18"/><path d="M5 21V8l7-4 7 4v13"/><path d="M9 21v-6h6v6"/>',
  book:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
  upload:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 9 12 4 17 9"/><line x1="12" y1="4" x2="12" y2="16"/>',
  printer:'<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>',
  settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.2A1.6 1.6 0 0 0 9 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H3a2 2 0 0 1 0-4h.2A1.6 1.6 0 0 0 4.6 9a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 9 4.6a1.6 1.6 0 0 0 1-1.4V3a2 2 0 0 1 4 0v.2a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.4 1H21a2 2 0 0 1 0 4h-.2a1.6 1.6 0 0 0-1.4 1z"/>',
  database:'<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/>',
  alert:'<path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h16.9a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  clock:'<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>',
  chevron:'<polyline points="9 18 15 12 9 6"/>',
  message:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  send:'<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
  edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/>',
};
function svg(name,size){size=size||22;return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICONS[name]||''}</svg>`;}
function initials(name){name=String(name||'').replace(/教練|助教|-/g,'').trim();return name.slice(-2)||name.slice(0,2)||'—';}

const App={
  view:'home', area:'today',
  AREAS:[
    {key:'today',label:'今日',icon:'home',roles:['admin','head','assistant']},
    {key:'week',label:'本週',icon:'calendar',roles:['admin','head']},
    {key:'mytasks',label:'我的任務',icon:'clipboard',roles:['admin','head','assistant']},
    {key:'library',label:'課程庫',icon:'book',roles:['admin','head']},
    {key:'more',label:'更多',icon:'grid',roles:['admin','head','assistant']},
  ],
  // 內部 area -> 底部/側邊要高亮的分頁（備課流程、討論歸「今日」；課後歸「我的任務」；模板/熱身/PDF 歸「課程庫」）
  navOf(area){return {plan:'today',team:'today',discuss:'today',report:'mytasks',pdf:'library',templates:'library',warmups:'library'}[area]||area;},
  VIEW_AREA:{home:'today',live:'today',quickplan:'plan',classinfo:'plan',stats:'plan',groups:'plan',plan:'plan',coachtasks:'plan',confirm:'plan',publish:'plan',
    week:'week',pdf:'library',library:'library',templates:'library',warmups:'library',
    mytasks:'mytasks',report:'mytasks',team:'today',discuss:'today',
    more:'more',students:'more',classes:'more',coaches:'more',import:'more',settings:'more'},
  areaDefault(key){
    if(key==='today')return State.user.role==='assistant'?'mytasks':'home';
    if(key==='week')return 'week'; if(key==='mytasks')return 'mytasks';
    if(key==='library')return 'library'; return 'more';
  },
  async boot(){
    this.brandMarks();
    try{await DB.open(); await reloadAll(); await ensureWarmupDefaults();}
    catch(e){
      $('#loginList').innerHTML='<div class="warnbox" style="text-align:left">資料庫啟動失敗：<br><b>'+esc(e.message||e)+'</b><br><br>請關閉其他分頁後重新整理。</div>';
      return;
    }
    SYNC.bindNetwork();
    if(SYNC.enabled()){$('#loginList')&&($('#loginList').innerHTML='<div class="loading" style="width:100%"><div class="spin"></div>連線雲端同步中…</div>');try{await SYNC.pull();}catch(e){SYNC.lastError=e.message||String(e);}}
    this.renderLogin();
    SYNC.startAuto();
  },
  brandMarks(){['loginMark','sideMark'].forEach(id=>{const e=document.getElementById(id);if(!e)return;
    const size=id==='loginMark'?46:38;
    e.innerHTML=`<img src="./共同備課logo.png" alt="" width="${size}" height="${size}" onerror="this.replaceWith(document.createRange().createContextualFragment('${svg('brand',id==='loginMark'?26:22).replace(/'/g,'&#39;')}'))">`;
  });},
  refresh(){
    if($('#modal'))return;
    const ae=document.activeElement;
    if(ae&&/INPUT|TEXTAREA|SELECT/.test(ae.tagName))return;
    if(State.user&&this.view)this.go(this.view,this.area);
  },
  /* ----- login ----- */
  renderLogin(){
    const ord={admin:0,head:1,assistant:2};
    const ps=C('profiles').filter(p=>p.active).sort((a,b)=>(ord[a.role]??9)-(ord[b.role]??9)||String(a.name).localeCompare(String(b.name),'zh-Hant'));
    const auth=$('#loginAuth');
    this.updateLoginSync();
    if(!ps.length){
      if(auth)auth.style.display='none';
      $('#loginList').innerHTML='<div style="text-align:center;padding:8px 0"><p class="muted" style="margin:0 0 12px">第一次使用？用設定精靈快速建立<br>道館、班別、教練與學員。</p><button class="btn ok block lg" onclick="Setup.start()">開始設定精靈</button><button class="btn ghost block sm" style="margin-top:8px" onclick="App.seedFromLogin()">或直接載入示範資料</button></div>';
      return;
    }
    if(auth)auth.style.display='';
    const last=localStorage.getItem('tp_last_user');
    const card=p=>{const a=p.role==='admin';const isLast=p.id===last;
      return `<button class="acct${a?' admin':''}" onclick="App.pick('${p.id}')" data-id="${p.id}">
        <div class="av">${esc(initials(p.name))}</div>
        <div class="meta"><b>${esc(p.name)}</b><span>${ROLE_LABEL[p.role]}</span></div>
        ${isLast?'<span class="recent">最近登入</span>':''}</button>`;};
    const recent=ps.filter(p=>p.id===last), rest=ps.filter(p=>p.id!==last);
    $('#loginList').innerHTML=`<div class="acct-list">${recent.map(card).join('')}${rest.map(card).join('')}</div>`;
    this._pick=recent[0]?recent[0].id:null;
    if(this._pick)setTimeout(()=>this.pick(this._pick),0);
  },
  updateLoginSync(){const e=$('#loginSync');if(!e)return;const on=SYNC.enabled();
    e.innerHTML=`<span class="sync-pill ${on?'ok':'off'}"><span class="d"></span>${on?'雲端同步已連線':'離線・單機模式'}</span>`;},
  pick(id){this._pick=id;document.querySelectorAll('#loginList .acct').forEach(b=>b.classList.toggle('sel',b.dataset.id===id));const pe=$('#pinErr');if(pe)pe.style.display='none';const pin=$('#pinInput');if(pin)pin.focus();},
  doLogin(){
    const pe=$('#pinErr');
    if(!this._pick){this.showPinErr('請先選擇教練帳號');return;}
    const u=C('profiles').find(p=>p.id===this._pick);
    const pin=$('#pinInput').value.trim();
    if(!pin){this.showPinErr('請輸入 PIN');return;}
    if((u.pin||'1234')!==pin){this.showPinErr('PIN 錯誤，請再試一次');$('#pinInput').value='';return;}
    localStorage.setItem('tp_last_user',u.id);
    $('#pinInput').value='';
    if(pe)pe.style.display='none';
    this.enter(u);
  },
  showPinErr(m){const pe=$('#pinErr');if(pe){pe.textContent=m;pe.style.display='block';}else toast(m,'warn');},
  loginMore(){
    Modal.open('首次使用 / 其他選項',`
      <p class="muted">如果這是新裝置，通常打開就會自動從雲端載入資料，直接選教練登入即可。</p>
      <button class="btn secondary block" style="margin-bottom:8px" onclick="Modal.close();App.seedFromLogin()">${svg('database',18)} 載入示範資料（會覆蓋現有資料）</button>
      <p class="muted">「清空全部資料」等危險操作已移至：登入後 → 更多 → 系統設定 → 資料管理。</p>`);
  },
  /* ----- enter / nav ----- */
  enter(u){
    State.user=u;
    $('#login').classList.add('hide');
    $('#shell').classList.remove('hide');$('#bnav').classList.remove('hide');
    $('#uName').textContent=u.name;$('#uRole').textContent=ROLE_LABEL[u.role];
    $('#sideAv').textContent=initials(u.name);$('#ctxAv').textContent=initials(u.name);
    this.buildNav();
    this.updateSyncPill();
    this.startIdleLock();
    if(this._syncTimer)clearInterval(this._syncTimer);
    this._syncTimer=setInterval(()=>this.updateSyncPill(),4000);
    this.goArea('today');
    toast('歡迎回來，'+u.name,'ok');
  },
  logout(msg){this.stopIdleLock();State.user=null;if(this._syncTimer)clearInterval(this._syncTimer);
    const pin=$('#pinInput');if(pin)pin.value='';
    $('#shell').classList.add('hide');$('#bnav').classList.add('hide');$('#fab')&&$('#fab').classList.add('hide');$('#login').classList.remove('hide');this.renderLogin();
    if(msg)toast(msg,'warn');},
  startIdleLock(){
    if(this._idleBound)return this.resetIdleLock();
    this._idleHandler=()=>this.resetIdleLock();
    ['click','touchstart','keydown','pointerdown'].forEach(ev=>window.addEventListener(ev,this._idleHandler,{passive:true}));
    this._idleBound=true;this.resetIdleLock();
  },
  resetIdleLock(){if(!State.user)return;if(this._idleTimer)clearTimeout(this._idleTimer);this._idleTimer=setTimeout(()=>this.lockForIdle(),30*60*1000);},
  stopIdleLock(){if(this._idleTimer)clearTimeout(this._idleTimer);this._idleTimer=null;
    if(this._idleBound&&this._idleHandler){['click','touchstart','keydown','pointerdown'].forEach(ev=>window.removeEventListener(ev,this._idleHandler));}
    this._idleBound=false;this._idleHandler=null;},
  lockForIdle(){this.logout('系統已因閒置30分鐘自動鎖定，請重新輸入 PIN。');},
  buildNav(){
    const r=State.user.role;
    const areas=this.AREAS.filter(a=>a.roles.includes(r));
    $('#sidenav').innerHTML=areas.map(a=>`<button class="nav-item" data-area="${a.key}" onclick="App.goArea('${a.key}')">${svg(a.icon,20)}<span>${a.label}</span></button>`).join('');
    $('#bnav').innerHTML=areas.map(a=>`<button data-area="${a.key}" onclick="App.goArea('${a.key}')" aria-label="${a.label}">${svg(a.icon,22)}<span>${a.label}</span></button>`).join('');
  },
  goArea(key){this.area=key;this.go(this.areaDefault(key),key);},
  go(v,area){
    if(this._liveTimer){clearInterval(this._liveTimer);this._liveTimer=null;}
    this.view=v;
    this.area=area||this.VIEW_AREA[v]||this.area;
    const navKey=this.navOf(this.area);
    document.querySelectorAll('#sidenav .nav-item,#bnav button').forEach(b=>b.classList.toggle('on',b.dataset.area===navKey));
    const a=this.AREAS.find(x=>x.key===navKey);
    const ct=$('#ctxTitle');if(ct&&a)ct.textContent=a.label;
    window.scrollTo(0,0);
    const el=$('#view');const fn='view_'+v;
    if(Views[fn]){el.innerHTML='';Views[fn](el);}else el.innerHTML='<div class="empty">頁面建置中</div>';
    if(['quickplan','classinfo','stats','groups','plan','coachtasks','confirm','publish','report'].includes(v))decoratePlan(v==='quickplan'?'stats':v);
    const fab=$('#fab');if(fab){const act=this.FAB_ACTIONS[v];if(act){fab.classList.remove('hide');fab.onclick=act;fab.setAttribute('aria-label',act.label||'新增');fab.title=act.label||'新增';}else fab.classList.add('hide');}
  },
  FAB_ACTIONS:{
    students:Object.assign(()=>Views.editStudent(),{label:'新增學員'}),
    classes:Object.assign(()=>Views.editClass(),{label:'新增班別'}),
    coaches:Object.assign(()=>Views.editCoach(),{label:'新增教練'}),
    templates:Object.assign(()=>Views.editTpl(),{label:'新增模板'}),
    warmups:Object.assign(()=>Views.wCustom('__manage__'),{label:'新增熱身'}),
  },
  /* ----- sync pill ----- */
  syncText(){if(navigator.onLine===false)return['bad','網路離線'];if(!SYNC.enabled())return['off','離線・單機模式'];
    const p=SYNC.pendingCount();if(p)return['busy','待同步 '+p+' 筆'];
    const s=SYNC.status||'';if(/失敗/.test(s))return['bad','同步失敗'];if(/中|上傳|下載/.test(s))return['busy','同步中'];
    if(SYNC.lastSuccess)return['ok','已同步 '+new Date(SYNC.lastSuccess).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})];
    return['ok','雲端已連線'];},
  updateSyncPill(){const [cls,txt]=this.syncText();['ctxPill','sidePill'].forEach(id=>{const e=document.getElementById(id);if(e){e.className='sync-pill '+cls;e.innerHTML='<span class="d"></span><span>'+esc(txt)+'</span>';}});},
  async applyPwaUpdate(){
    await reload('sync_outbox');
    if(!this._waitingWorker){Modal.close();return;}
    this._waitingWorker.postMessage({type:'SKIP_WAITING'});
    Modal.close();
  },
  hasFormalData(){return DATA_STORES.filter(s=>s!=='settings'&&s!=='audit_logs').some(s=>C(s).length>0);},
  async requireAdminPin(options){
    const opt=options||{};
    if(!State.user||State.user.role!=='admin'){adminOnlyWarn();return false;}
    const admin=C('profiles').find(p=>p.id===State.user.id&&p.role==='admin'&&p.active);
    if(!admin){adminOnlyWarn();return false;}
    return new Promise(resolve=>{
      const id=uid('pin');
      Modal.open('管理者安全驗證',`
        <div data-danger="1" class="warnbox" style="margin-top:0"><b>${esc(opt.actionName||'危險操作')}</b><br>${esc(opt.impact||'此操作可能覆蓋或刪除資料。')}</div>
        ${opt.confirmText?`<div class="field"><label>文字確認</label><input id="${id}_txt" autocomplete="off" placeholder="${esc(opt.confirmText)}"><div class="help">請輸入「${esc(opt.confirmText)}」</div></div>`:''}
        <div class="field"><label>管理者 PIN</label><input id="${id}_pin" type="password" inputmode="numeric" autocomplete="off"><div class="err" id="${id}_err" style="display:none">管理者 PIN 錯誤，未執行任何操作。</div></div>
        <div class="row"><button class="btn secondary grow" id="${id}_cancel">取消</button><button class="btn danger grow" id="${id}_ok">確認執行</button></div>`,()=>{
          const cancel=$('#'+id+'_cancel'), ok=$('#'+id+'_ok'), pinEl=$('#'+id+'_pin'), txtEl=$('#'+id+'_txt'), err=$('#'+id+'_err');
          const doCancel=()=>{if(pinEl)pinEl.value='';Modal.close();resolve(false);};
          cancel.onclick=doCancel;
          const m=$('#modal');if(m){m.onclick=e=>{if(e.target===m)doCancel();};const x=m.querySelector('.x');if(x)x.onclick=doCancel;}
          ok.onclick=async()=>{
            if(ok.disabled)return;err.style.display='none';
            if(opt.confirmText&&(!txtEl||txtEl.value.trim()!==opt.confirmText)){err.textContent='文字確認不一致，未執行任何操作。';err.style.display='block';return;}
            if(!pinEl||pinEl.value.trim()!==(admin.pin||'1234')){if(pinEl)pinEl.value='';err.textContent='管理者 PIN 錯誤，未執行任何操作。';err.style.display='block';return;}
            ok.disabled=true;
            try{if(opt.backupReason)await BackupManager.create(opt.backupReason);await opt.onConfirm?.();}
            finally{if(pinEl)pinEl.value='';ok.disabled=false;}
            resolve(true);
          };
          setTimeout(()=>pinEl&&pinEl.focus(),50);
        });
    });
  },
  /* ----- seed / wipe ----- */
  async seedFromLogin(){
    try{await ensureDbReady();}catch(e){toast('資料庫尚未就緒，請重新整理後再試','bad');return;}
    const hasData=this.hasFormalData();
    if(hasData&&!State.user){
      toast('系統已有資料，請由管理者登入後至系統設定操作。','warn');
      return;
    }
    if(hasData&&(!State.user||State.user.role!=='admin')){adminOnlyWarn();return;}
    if(hasData){
      try{await BackupManager.create('載入示範資料前自動備份');}catch(e){return;}
      return this.requireAdminPin({actionName:'載入示範資料',impact:'這會以示範帳號、班別、學員與課程覆蓋目前本機資料。',confirmText:'載入示範',
        onConfirm:async()=>{
          $('#loginList')&&($('#loginList').innerHTML='<div class="loading" style="width:100%"><div class="spin"></div>建立示範資料中…</div>');
          await seedDemo();Modal.close();this.renderLogin();toast('已載入示範資料','ok');
          if(SYNC.enabled())Modal.open('是否同步到雲端',`<p class="muted">示範資料已載入本機。若要以本機資料覆蓋雲端，下一步仍會要求管理者 PIN 與文字確認。</p><div class="row"><button class="btn secondary grow" onclick="Modal.close()">暫不同步</button><button class="btn grow" onclick="SYNC.replaceAll()">同步到雲端</button></div>`);
        }});
    }
    $('#loginList').innerHTML='<div class="loading" style="width:100%"><div class="spin"></div>建立示範資料中…</div>';
    try{
      await seedDemo();
      const n=C('profiles').length;
      if(!n) throw new Error('建立完成但找不到帳號（profiles=0）');
      this.renderLogin();
      toast('已載入 '+n+' 個帳號，請選教練登入','ok');
    }catch(err){
      $('#loginList').innerHTML='<div class="warnbox" style="text-align:left">載入示範資料失敗：<br><b>'+esc(err.message)+'</b></div><button class="btn ok block" onclick="App.seedFromLogin()">再試一次</button>';
    }
  },
  async wipeAll(){
    if(!requireAdminRole())return;
    try{await BackupManager.create('清空全部資料前自動備份');}catch(e){return;}
    await this.requireAdminPin({actionName:'清空全部資料',impact:'將清空設定以外的所有正式資料，此動作無法復原。',confirmText:'確認清空',
      onConfirm:async()=>{
        if(SYNC._timer)clearInterval(SYNC._timer);SYNC._timer=null;
        await wipeData();this.stopIdleLock();State.user=null;
        const pin=$('#pinInput');if(pin)pin.value='';
        Modal.close();$('#shell').classList.add('hide');$('#bnav').classList.add('hide');$('#login').classList.remove('hide');this.renderLogin();toast('已清空全部資料','ok');
      }});
  },
  async deleteDemoStudents(){
    if(!requireAdminRole())return;
    const demo=C('students').filter(s=>s.demo===true);
    if(!demo.length){toast('目前沒有示範學員可刪除','warn');return;}
    await this.deleteStudentsByIds(demo.map(s=>s.id),{actionName:'刪除示範學員',confirmText:'刪除示範',backupReason:'刪除示範學員前自動備份',auditAction:'delete_demo_students',
      impact:`將刪除 ${demo.length} 位 demo:true 的示範學員，並從既有分組中移除這些學員。正式匯入學員不會受影響。`});
  },
  async deleteStudentsByIds(ids,options={}){
    if(!requireAdminRole())return;
    const unique=[...new Set(ids)].filter(Boolean);
    const targets=C('students').filter(s=>unique.includes(s.id));
    if(!targets.length){toast('請先選擇要刪除的學員','warn');return;}
    const names=targets.slice(0,8).map(s=>s.name).join('、')+(targets.length>8?'…':'');
    await this.requireAdminPin({actionName:options.actionName||'批量刪除學員',
      impact:options.impact||`將刪除 ${targets.length} 位學員：${names}。此操作會同時從既有分組中移除這些學員。`,
      confirmText:options.confirmText||'確認刪除',
      backupReason:options.backupReason||'批量刪除學員前自動備份',
      onConfirm:async()=>{
        const idset=new Set(targets.map(s=>s.id));
        for(const s of targets)await remove('students',s.id);
        for(const g of C('training_groups')){
          const next=(g.students||[]).filter(id=>!idset.has(id));
          if(next.length!==(g.students||[]).length)await save('training_groups',{...g,students:next});
        }
        await audit(options.auditAction||'delete_students_bulk','students',null,null,{count:targets.length,ids:[...idset]});
        Modal.close();toast('已刪除學員 '+targets.length+' 位','ok');App.go('students','more');
      }});
  },
};

/* ---------- modal helper ---------- */
const Modal={
  open(title,html,onOpen){
    let m=$('#modal'); if(!m){m=document.createElement('div');m.id='modal';document.body.appendChild(m);}
    m.innerHTML=`<div class="m"><h3>${title}<span class="x" onclick="Modal.close()">×</span></h3>${html}</div>`;
    m.onclick=e=>{if(e.target===m)Modal.close();};
    m.onkeydown=e=>{
      const dangerous=!!m.querySelector('[data-danger="1"]');
      if(e.key==='Escape'&&!dangerous){Modal.close();return;}
      if(e.key!=='Tab')return;
      const f=[...m.querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])')].filter(x=>!x.disabled&&x.offsetParent!==null);
      if(!f.length)return;
      const first=f[0],last=f[f.length-1];
      if(e.shiftKey&&document.activeElement===first){last.focus();e.preventDefault();}
      else if(!e.shiftKey&&document.activeElement===last){first.focus();e.preventDefault();}
    };
    if(onOpen)onOpen(m);
    setTimeout(()=>{const first=m.querySelector('input,textarea,select,button');first&&first.focus();},0);
  },
  close(){const m=$('#modal');if(m)m.remove();}
};
</script>

/* 計算某日某班的備課狀態（五步驟完成度＋待辦） */
function planStatus(date,classId){
  const dp=findDaily(date,classId);
  const wd=weekdayOf(date);
  const list=Stats.attendingFor(date,classId);
  const groups=dp?C('training_groups').filter(g=>g.daily_plan_id===dp.id):[];
  const blocks=dp?C('lesson_blocks').filter(b=>b.daily_plan_id===dp.id):[];
  const stageFilled=k=>{const b=blocks.find(x=>x.block_type===k&&!x.training_group_id);if(!b)return false;
    if(k==='review')return !!(b.praise||b.remind||b.homework||b.preview);
    return !!(b.content&&String(b.content).trim());};
  let stagesFilled=['warmup','fitness','apply','review'].filter(stageFilled).length;
  if(groups.length&&blocks.some(b=>b.block_type==='group'&&(b.basic||b.kick||b.goal)))stagesFilled++;
  const val=Grouping.validate(groups.map(g=>({...g,students:[...(g.students||[])]})),list,dp);
  const steps={
    stats:!!dp,
    groups:groups.length>0&&val.unassigned.length===0,
    plan:stagesFilled>=5||(!!dp&&stagesFilled>=4),
    confirm:!!(dp&&(dp.confirms||[]).length>0),
    publish:!!(dp&&['pub','done','lock'].includes(dp.status)),
  };
  const doneCount=Object.values(steps).filter(Boolean).length;
  return {dp,list,groups,blocks,val,steps,stagesFilled,pct:Math.round(doneCount/5*100)};
}
function computeTodos(date,classId){
  const ps=planStatus(date,classId);const t=[];
  if(!ps.dp){t.push({level:'block',title:'尚未建立今日課程',sub:'先確認人數並建立當日備課',view:'stats'});return {todos:t,ps};}
  if(!ps.groups.length)t.push({level:'block',title:'尚未分組',sub:'用智慧分組快速建立組別',view:'groups'});
  ps.val.issues.forEach(i=>{
    const map={unassigned:['warn','有學員尚未分組'],nocoach:['warn','組別缺教練'],dup:['block','學員重複分組'],over:['warn','分組人數超過上限'],conflict:['warn','教練時段衝突']};
    const m=map[i.t]; if(m)t.push({level:m[0],title:m[1],sub:i.msg,view:'groups'});
  });
  if(ps.stagesFilled<5)t.push({level:'info',title:'五階段課程尚未完成',sub:`已完成 ${ps.stagesFilled}/5 段`,view:'plan'});
  if(ps.groups.length&&!ps.steps.confirm)t.push({level:'info',title:'尚有教練未確認',sub:'請教練群共同確認課程',view:'confirm'});
  if(!ps.steps.publish)t.push({level:'info',title:'課程尚未發布',sub:'完成發布前檢查即可發布',view:'publish'});
  const rep=C('post_class_reports').find(r=>r.daily_plan_id===ps.dp.id);
  if(ps.steps.publish&&!rep)t.push({level:'info',title:'課後紀錄未完成',sub:'課後填寫實到與下堂銜接',view:'report'});
  return {todos:t,ps};
}

Views.attListHtml=function(){
  const date=State.ctx.date,classId=State.ctx.classId,wd=weekdayOf(date);
  const roster=Stats.studentsFor(classId,wd);
  const recs=C('attendance_records').filter(a=>a.date===date&&a.class_id===classId);
  const rmap={};recs.forEach(a=>rmap[a.student_id]=a.status);
  const walkins=recs.filter(a=>a.status==='walk_in'&&!roster.some(s=>s.id===a.student_id)).map(a=>C('students').find(s=>s.id===a.student_id)).filter(Boolean);
  let list=[...roster,...walkins];
  const q=(Views._attQ||'').trim(),f=Views._attFilter||'all';
  if(q)list=list.filter(s=>s.name.includes(q));
  if(f==='confirmed')list=list.filter(s=>rmap[s.id]==='confirmed'||rmap[s.id]==='walk_in');
  else if(f==='leave')list=list.filter(s=>rmap[s.id]==='leave');
  else if(f==='unconfirmed')list=list.filter(s=>{const st=rmap[s.id]||'expected';return st!=='confirmed'&&st!=='leave'&&st!=='walk_in';});
  if(!list.length)return '<div class="muted" style="padding:8px 0">沒有符合的學員</div>';
  return list.map(s=>{const st=rmap[s.id]||'expected';const isWalk=walkins.some(w=>w.id===s.id);
    return `<div class="row" style="align-items:center;border-bottom:1px solid var(--line);padding:7px 0;flex-wrap:nowrap">
      <div style="flex:1;min-width:0"><b>${esc(s.name)}</b>${isWalk?' <span class="tag" style="background:#E0F2FE;color:#0369A1">臨時</span>':''}
        <div class="muted">${ageDim(s)}・${levelDim(s)}・${specDim(s)}</div></div>
      <button class="btn xs ${st==='confirmed'||st==='walk_in'?'ok':'g'}" onclick="Views.attSet('${s.id}','${isWalk?'walk_in':'confirmed'}')">到</button>
      <button class="btn xs ${st==='leave'?'warn':'g'}" onclick="Views.attSet('${s.id}','leave')">假</button>
      <button class="btn xs ${st==='absent'?'bad':'g'}" onclick="Views.attSet('${s.id}','absent')">未到</button></div>`;}).join('');
};

Views.attAddWalkIn=function(){
