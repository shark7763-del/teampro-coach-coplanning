<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>TeamPro ж•ҷз·ҙе…ұеҗҢеӮҷиӘІзі»зөұ</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./е…ұеҗҢеӮҷиӘІlogo.png">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  /* ---- design tokens ---- */
  --color-primary-900:#0B1F33; --color-primary-800:#12304A;
  --color-brand-600:#0EA5C6; --color-brand-500:#19B5D1; --color-accent-500:#F97316;
  --color-success:#16A36A; --color-warning:#F59E0B; --color-danger:#DC4C4C; --color-info:#2563EB;
  --color-bg:#F4F7FA; --color-surface:#FFFFFF; --color-surface-soft:#EDF3F7; --color-border:#DCE5EC;
  --color-text:#17212B; --color-text-secondary:#64748B; --color-text-disabled:#94A3B8;
  --radius-sm:8px; --radius-md:12px; --radius-lg:16px; --radius-xl:22px;
  --shadow-card:0 8px 28px rgba(11,31,51,.08); --shadow-floating:0 14px 40px rgba(11,31,51,.14);
  /* ---- aliases so existing components inherit the new system ---- */
  --bg:var(--color-bg); --bg2:var(--color-primary-800); --card:var(--color-surface); --ink:var(--color-text);
  --sub:var(--color-text-secondary); --line:var(--color-border); --brand:var(--color-brand-600); --brand2:var(--color-brand-500);
  --ok:var(--color-success); --warn:var(--color-warning); --bad:var(--color-danger); --amber:var(--color-warning);
  --green:var(--color-success); --red:var(--color-danger); --info:var(--color-info); --accent:var(--color-accent-500);
  --pagew:1440px; --sh:var(--shadow-card); --side-w:248px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--color-bg);color:var(--ink);font-size:15px;line-height:1.55;-webkit-text-size-adjust:100%}
svg{display:inline-block;vertical-align:middle}
button,input,select,textarea{font-family:inherit;font-size:15px}
button{cursor:pointer;border:none;background:none}
a{color:var(--brand);text-decoration:none}
.hide{display:none!important}
/* ---------- login ---------- */
#login{position:fixed;inset:0;background:radial-gradient(1100px 600px at 82% -12%,#12304A,#0B1F33 62%);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;overflow:auto}
#login .box{background:var(--color-surface);border-radius:var(--radius-xl);padding:26px 22px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:440px;box-shadow:var(--shadow-floating)}
#login .brand{display:flex;align-items:center;gap:12px}
#login .brand .mark{width:46px;height:46px;border-radius:13px;background:linear-gradient(140deg,var(--color-brand-600),var(--color-primary-800));display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto}
#login .brand .mark img,#side .side-brand .mark img{width:100%;height:100%;object-fit:contain;border-radius:inherit;display:block;background:#fff}
#login h1{margin:0;font-size:20px;letter-spacing:.3px}
#login .sub{color:var(--sub);margin:3px 0 16px;font-size:13px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#334155}
.field .req{color:var(--color-danger)}.field .opt{color:var(--color-text-disabled);font-weight:500;font-size:12px}
.field .help{font-size:12px;color:var(--sub);margin-top:5px}
.field .err{font-size:12px;color:var(--color-danger);margin-top:5px}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:#fff;outline:none;color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(14,165,198,.18)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:var(--radius-md);font-weight:600;background:var(--color-brand-600);color:#fff;transition:.15s;white-space:nowrap;min-height:44px;border:1px solid transparent}
.btn:hover{filter:brightness(1.05)}
.btn:active{transform:scale(.985)}
.btn.block{width:100%}
.btn.g,.btn.secondary{background:var(--color-surface-soft);color:var(--color-primary-800);border:1px solid var(--line)}
.btn.ghost{background:transparent;color:var(--color-brand-600);border:1px solid transparent}
.btn.ok{background:var(--ok)}.btn.bad,.btn.danger{background:var(--bad)}.btn.warn{background:var(--warn);color:#3a2a00}
.btn.lg{min-height:52px;font-size:16px}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:var(--radius-sm);min-height:36px}
.btn.xs{padding:4px 9px;font-size:12px;border-radius:8px;min-height:0}
.btn[disabled],.btn.disabled{opacity:.5;pointer-events:none}
.btn:focus-visible,.acct:focus-visible,.chip:focus-visible,.nav-item:focus-visible,#bnav button:focus-visible,.iconbtn:focus-visible{outline:3px solid #7DD3E8;outline-offset:2px}
.acct-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.acct{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:var(--radius-md);padding:10px 12px;text-align:left;background:#fff;width:100%;min-height:56px;transition:.15s;cursor:pointer}
.acct:hover{border-color:var(--color-brand-500)}
.acct .av{width:38px;height:38px;border-radius:10px;background:var(--color-surface-soft);color:var(--color-primary-800);font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:15px}
.acct .meta{flex:1;min-width:0}
.acct .meta b{display:block;font-size:15px}
.acct .meta span{font-size:12px;color:var(--sub)}
.acct .recent{font-size:11px;background:#E0F2FE;color:#0369A1;padding:2px 8px;border-radius:20px;white-space:nowrap;font-weight:600}
.acct.sel{border-color:var(--brand);box-shadow:0 0 0 3px rgba(14,165,198,.15)}
.acct.admin .av{background:linear-gradient(140deg,var(--color-brand-600),var(--color-primary-800));color:#fff}
.pin-input{width:100%;text-align:center;font-size:26px;letter-spacing:14px;font-weight:700;padding:12px;border:1px solid var(--line);border-radius:var(--radius-md)}
.login-status{display:flex;align-items:center;gap:8px;justify-content:center;font-size:12px;color:var(--sub);margin-top:14px}
/* ---------- app shell (desktop sidebar + mobile bottom nav) ---------- */
#shell{display:flex;min-height:100vh}
#side{width:var(--side-w);flex:0 0 var(--side-w);background:var(--color-primary-900);color:#cbd5e1;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:14px 12px;gap:8px}
#side .side-brand{display:flex;align-items:center;gap:10px;padding:6px 8px 10px}
#side .side-brand .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(140deg,var(--color-brand-600),var(--color-primary-800));display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto}
#side .side-brand b{color:#fff;font-size:15px;display:block;line-height:1.15}
#side .side-brand small{font-size:11px;color:#8aa0b6}
#sidenav{display:flex;flex-direction:column;gap:4px;overflow-y:auto;flex:1;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--radius-md);color:#cbd5e1;font-weight:600;font-size:14px;min-height:46px;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.on{background:var(--color-brand-600);color:#fff}
.nav-item svg{flex:0 0 auto;stroke:currentColor}
#side .side-foot{border-top:1px solid rgba(255,255,255,.08);padding-top:10px;display:flex;flex-direction:column;gap:10px}
#side .side-foot .who{display:flex;align-items:center;gap:10px;color:#e2e8f0;font-size:13px}
.av{width:34px;height:34px;border-radius:9px;background:var(--color-brand-600);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 auto}
.rolechip{display:inline-block;font-size:10px;background:rgba(255,255,255,.14);padding:1px 7px;border-radius:20px;margin-top:2px;color:#cbd5e1}
#main{flex:1;min-width:0;display:flex;flex-direction:column}
#ctxbar{position:sticky;top:0;z-index:40;background:rgba(11,31,51,.98);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 14px}
#ctxbar .ct-title{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#ctxbar .sp{flex:1}
#ctxbar .av{width:32px;height:32px}
#view{padding:16px 16px 96px;max-width:1440px;width:100%;margin:0 auto}
/* sync pill */
.sync-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;background:var(--color-surface-soft);color:var(--color-text-secondary);border:1px solid var(--line);cursor:pointer}
.sync-pill .d{width:8px;height:8px;border-radius:50%;background:currentColor;flex:0 0 auto}
.sync-pill.ok{background:#E6F6EE;color:#0F7A50;border-color:#B7E4CD}
.sync-pill.bad{background:#FCE9E9;color:#B23636;border-color:#F3C6C6}
.sync-pill.off{background:#EEF2F6;color:#64748B}
.sync-pill.busy{background:#E7F4F8;color:#0E7490}
#ctxbar .sync-pill,#side .sync-pill{background:rgba(255,255,255,.12);color:#cbd5e1;border-color:transparent}
/* bottom nav (mobile) */
#bnav{position:fixed;bottom:0;left:0;right:0;background:var(--color-surface);border-top:1px solid var(--line);display:flex;z-index:45;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 20px rgba(11,31,51,.06)}
#bnav button{flex:1;min-height:68px;padding:8px 2px;font-size:11px;color:var(--sub);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-weight:600}
#bnav button svg{stroke:var(--sub)}
#bnav button.on{color:var(--brand)}
#bnav button.on svg{stroke:var(--brand)}
@media(min-width:1024px){#bnav,#ctxbar{display:none!important}#view{padding:28px 32px 44px}}
@media(max-width:1023px){#side{display:none}#shell{display:block}}
@media(min-width:768px) and (max-width:1023px){#view{padding:22px 24px 96px}}
/* cards */
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--sh)}
.card h3{margin:0 0 10px;font-size:15px;display:flex;align-items:center;gap:8px}
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--sh);cursor:pointer;transition:.15s}
.stat:active{transform:scale(.98)}
.stat .n{font-size:26px;font-weight:800;line-height:1}
.stat .l{font-size:12px;color:var(--sub);margin-top:4px}
.stat .l b{color:var(--brand)}
.sect-title{font-size:13px;font-weight:700;color:var(--sub);margin:18px 2px 8px;text-transform:none}
.hero{background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;border-radius:16px;padding:16px;margin-bottom:14px}
.hero h2{margin:0 0 2px;font-size:18px}
.hero p{margin:0;opacity:.85;font-size:13px}
/* tiles */
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tile{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 12px;text-align:left;box-shadow:var(--sh);display:flex;gap:10px;align-items:center}
.tile .ic{font-size:22px}
.tile b{display:block;font-size:14px}
.tile span{font-size:11px;color:var(--sub)}
/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th,.tbl td{padding:8px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
.tbl th{color:var(--sub);font-weight:600;font-size:12px;background:#f8fafc;position:sticky;top:0}
.tbl tr:active{background:#f8fafc}
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
/* chips / tags */
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--line);background:#fff;color:#475569;cursor:pointer;user-select:none}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.tag{font-size:11px;padding:2px 8px;border-radius:6px;background:#eef2ff;color:#4338ca;font-weight:600}
.tag.age{background:#ecfeff;color:#0e7490}
.tag.belt{background:#fef3c7;color:#92400e}
.tag.spec{background:#f0fdf4;color:#15803d}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
.b-draft{background:#f1f5f9;color:#475569}.b-disc{background:#dbeafe;color:#1d4ed8}
.b-wait{background:#fef3c7;color:#92400e}.b-pub{background:#dcfce7;color:#15803d}
.b-done{background:#e0e7ff;color:#4338ca}.b-lock{background:#fee2e2;color:#991b1b}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.d-g{background:var(--green)}.d-y{background:var(--amber)}.d-r{background:var(--red)}
/* forms */
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.row>.grow{flex:1;min-width:120px}
label.sm{font-size:12px;color:var(--sub);font-weight:600;display:block;margin-bottom:4px}
textarea{resize:vertical;min-height:60px}
.muted{color:var(--sub);font-size:12px}
.empty{text-align:center;padding:30px 16px;color:var(--sub)}
.empty .ic{font-size:36px;opacity:.5}
/* toast */
#toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:90%;max-width:360px}
.tst{background:#0f172a;color:#fff;padding:11px 14px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:pop .2s}
.tst.ok{background:var(--ok)}.tst.bad{background:var(--bad)}.tst.warn{background:var(--warn)}
@keyframes pop{from{opacity:0;transform:translateY(8px)}}
/* modal */
#modal{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:150;display:flex;align-items:flex-end;justify-content:center;padding:0}
#modal .m{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:90vh;overflow:auto;padding:18px}
#modal .m h3{margin:0 0 12px;display:flex;align-items:center}
#modal .m h3 .x{margin-left:auto;font-size:22px;color:var(--sub);cursor:pointer;line-height:1}
/* lesson blocks */
.blk{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.blk .bh{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f8fafc;cursor:pointer}
.blk .bh .t{font-size:14px;font-weight:700}
.blk .bh .m{font-size:11px;color:var(--sub)}
.blk .bh .st{margin-left:auto;font-size:11px}
.blk .bd{padding:12px;border-top:1px solid var(--line)}
.blk.done .bh{background:#f0fdf4}
/* group cards */
.gcard{border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px;background:#fff}
.gcard.drop{border:2px dashed var(--brand);background:#eef2ff}
.gcard .gh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.gcard .gh b{font-size:14px}
.stu{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 9px;border:1px solid var(--line);border-radius:20px;margin:2px;background:#fff;cursor:pointer}
.stu.sel{background:var(--brand);color:#fff;border-color:var(--brand)}
.pool{border:1px dashed var(--line);border-radius:12px;padding:10px;background:#fafbff;min-height:44px}
/* discussion */
.msg{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;background:#fff}
.msg.reply{margin-left:22px;background:#f8fafc}
.msg .mh{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--sub);margin-bottom:4px}
.msg .mh b{color:var(--ink);font-size:13px}
.msg .mb{font-size:14px;white-space:pre-wrap;word-break:break-word}
/* week */
.wk{display:grid;gap:10px}
.wkday{border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px;box-shadow:var(--sh)}
.wkday .wd{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.wkday .wd b{font-size:15px}
.progress{height:6px;background:#eef2ff;border-radius:20px;overflow:hidden;margin-top:6px}
.progress i{display:block;height:100%;background:var(--brand)}
.divider{height:1px;background:var(--line);margin:12px 0}
.kv{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px dashed var(--line);font-size:13px}
.kv:last-child{border-bottom:none}
.kv b{color:var(--sub);font-weight:600}
.warnbox{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px;font-size:13px;color:#92400e;margin:8px 0}
.okbox{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px;font-size:13px;color:#166534;margin:8px 0}
.infobox{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px;font-size:13px;color:#1e40af;margin:8px 0}
.loading{text-align:center;padding:30px;color:var(--sub)}
.spin{width:24px;height:24px;border:3px solid #e2e8f0;border-top-color:var(--brand);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 8px}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:560px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
/* ---------- components v2 ---------- */
.iconbtn{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:var(--radius-md);background:var(--color-surface-soft);color:var(--color-text);flex:0 0 auto}
.iconbtn svg{stroke:currentColor}
.sect-head{display:flex;align-items:center;gap:8px;margin:18px 2px 8px}
.sect-head h3{margin:0;font-size:15px}
.sect-head .sp{flex:1}
/* context bar (in-page, for pickers) */
.ctxrow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;background:var(--color-surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:12px;box-shadow:var(--sh)}
/* stepper */
.stepper{display:none;gap:6px;background:var(--color-surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:10px;box-shadow:var(--sh);overflow-x:auto;margin-bottom:14px}
.stepper .stp{flex:1;min-width:92px;display:flex;flex-direction:column;gap:6px;align-items:center;text-align:center;padding:6px;border-radius:var(--radius-md);cursor:pointer}
.stepper .stp .num{width:30px;height:30px;border-radius:50%;background:var(--color-surface-soft);color:var(--sub);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.stepper .stp.on .num{background:var(--color-brand-600);color:#fff}
.stepper .stp.done .num{background:var(--color-success);color:#fff}
.stepper .stp.warn .num{background:var(--color-warning);color:#fff}
.stepper .stp .lbl{font-size:12px;font-weight:600;color:var(--sub)}
.stepper .stp.on .lbl{color:var(--ink)}
.stepper-m{display:flex;align-items:center;gap:12px;background:var(--color-surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:12px;box-shadow:var(--sh);margin-bottom:14px}
.ring{width:48px;height:48px;border-radius:50%;background:conic-gradient(var(--color-brand-600) calc(var(--p,0)*1%),var(--color-surface-soft) 0);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.ring i{width:37px;height:37px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-style:normal}
.stepper-m .now b{font-size:15px}.stepper-m .now span{font-size:12px;color:var(--sub)}
@media(min-width:768px){.stepper{display:flex}.stepper-m{display:none}}
/* sticky action bar */
.actionbar{position:sticky;bottom:0;background:var(--color-surface);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;margin:16px -16px -96px;box-shadow:0 -6px 18px rgba(11,31,51,.06);z-index:20;align-items:center}
.actionbar .sp{flex:1}
.actionbar .savehint{font-size:12px;color:var(--sub)}
@media(min-width:1024px){.actionbar{margin:18px 0 0;border:1px solid var(--line);border-radius:var(--radius-lg)}}
/* today course card */
.course-card{background:linear-gradient(150deg,var(--color-primary-900),var(--color-primary-800));color:#fff;border-radius:var(--radius-xl);padding:18px;box-shadow:var(--shadow-card)}
.course-card .cc-top{display:flex;align-items:center;gap:14px}
.course-card .cc-top .info{flex:1;min-width:0}
.course-card .cc-top .info h2{margin:0;font-size:18px}
.course-card .cc-top .info p{margin:2px 0 0;font-size:13px;color:#9fb3c8}

<script>
"use strict";
/* =========================================================================
   TeamPro ж•ҷз·ҙе…ұеҗҢеӮҷиӘІзі»зөұ  вҖ”  е–®жӘ” HTML + IndexedDB
   ========================================================================= */
const APP_VERSION='1.1.2-internal';
const DB_NAME='teampro_planner', DB_VER=2;
/* в¬Үв¬Үв¬Ү йғЁзҪІ GAS еҫҢжҠҠ /exec з¶ІеқҖиІјеңЁйҖҷиЈЎпјҢжүҖжңүдәәжү“й–ӢеҗҢдёҖеҖӢз¶ІеқҖе°ұжңғиҮӘеӢ•йӣІз«ҜеҗҢжӯҘгҖӮ
   пјҲд№ҹеҸҜд»Ҙзҷ»е…ҘеҫҢеңЁгҖҢиЁӯе®ҡгҖҚй ҒиІјдёҠпјҢдҪҶиҰҒеӨҡиЈқзҪ®е…ұз”ЁпјҢе»әиӯ°зӣҙжҺҘеҜ«еңЁйҖҷиЈЎеҶҚдёҠжһ¶гҖӮпјү */
const DEFAULT_SYNC_URL='https://script.google.com/macros/s/AKfycbyPf7Qd2LuIsx-P0z-kdrAMxrsqpvonswGHXHnHrrLaT22EWjXXQYOQGUd29SlNc7Lt/exec';
const DATA_STORES=['settings','profiles','students','classes','weekly_plans','daily_plans',
  'training_groups','lesson_blocks','discussions','post_class_reports','course_templates','audit_logs'];
const STORES=[...DATA_STORES,'backups'];

const AGE_GROUPS=['е№је…’','еңӢе°Ҹ','еңӢдёӯ','жҲҗдәә'];
const BELTS=['зҷҪеё¶','й»ғеё¶','й»ғи—Қеё¶','и—Қеё¶','и—Қзҙ…её¶','зҙ…её¶','зҙ…дёҖз·ҡ','зҙ…дәҢз·ҡ','й»‘й ӯ','дёҖж®ө','е…©ж®ө','дёүж®ө','еӣӣж®ө'];
const BELT_ALIASES={'зҙ…й»‘её¶':'й»‘й ӯ','дәҢж®ө':'е…©ж®ө','еӣӣж®өд»ҘдёҠ':'еӣӣж®ө'};
const SPECIALTIES=['еҹәзӨҺ','е“ҒеӢў','е°Қз·ҙ','еҒҘиә«','й»‘её¶','жҜ”иіҪйҒёжүӢ','е°ҡжңӘеҲҶйЎһ'];
const WEEKDAYS=['жҳҹжңҹдёҖ','жҳҹжңҹдәҢ','жҳҹжңҹдёү','жҳҹжңҹеӣӣ','жҳҹжңҹдә”','жҳҹжңҹе…ӯ','жҳҹжңҹж—Ҙ'];
const WD_SHORT=['дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ','ж—Ҙ'];
const BLOCKS=[
  {key:'warmup',  name:'еҒҡж“ҚгҖҒж…ўи·‘',        s:0,  e:10},
  {key:'fitness', name:'зҶұиә«гҖҒеҹәзӨҺй«”иғҪгҖҒйҒҠжҲІ',s:10, e:30},
  {key:'group',   name:'еҲҶзө„иЁ“з·ҙгҖҒеҹәжң¬еӢ•дҪң', s:30, e:60},
  {key:'apply',   name:'жҮүз”ЁгҖҒзө„еҗҲгҖҒжҢ‘жҲ°гҖҒжҜ”иіҪ',s:60, e:85},
  {key:'review',  name:'иӘІзЁӢи¬ӣи©•',          s:85, e:90},
];
const ABILITY_TAGS=['ж•ҸжҚ·','еҸҚжҮү','еҚ”иӘҝ','е№іиЎЎ','ж ёеҝғ','жҹ”и»ҹеәҰ','зҲҶзҷјеҠӣ','еҝғиӮә','жҠҳиҝ”и·‘','й«”иғҪйҒҠжҲІ','еңҳйҡҠйҒҠжҲІ','е°Ҳй …жҡ–иә«'];
const APPLY_TYPES=['жҮүз”Ё','зө„еҗҲ','жҢ‘жҲ°','й—–й—ң','е°Ҹзө„з«¶иіҪ','е“ҒеӢўжј”з·ҙ','иёўйқ¶','ж”»йҳІеҸҚжҮү','жўқд»¶е°Қз·ҙ','жЁЎж“¬жҜ”иіҪ'];
const STATUS=[['draft','иҚүзЁҝ','b-draft'],['disc','иЁҺи«–дёӯ','b-disc'],['wait','еҫ…зўәиӘҚ','b-wait'],
  ['pub','е·Ізҷјеёғ','b-pub'],['done','е·Іе®ҢжҲҗ','b-done'],['lock','е·ІйҺ–е®ҡ','b-lock']];

/* ---------------- IndexedDB tiny layer ---------------- */
const DB={
  _db:null,_openPromise:null,
  open(){return new Promise((res,rej)=>{
    if(DB._db)return res(DB._db);
    if(DB._openPromise)return DB._openPromise.then(res,rej);
    DB._openPromise=new Promise((resolve,reject)=>{
    const rq=indexedDB.open(DB_NAME,DB_VER);
    rq.onupgradeneeded=e=>{const db=e.target.result;
      STORES.forEach(s=>{ if(!db.objectStoreNames.contains(s)) db.createObjectStore(s,{keyPath:'id'}); });};
    rq.onsuccess=e=>{DB._db=e.target.result;DB._db.onclose=()=>{DB._db=null;DB._openPromise=null;};DB._db.onversionchange=()=>{DB._db.close();DB._db=null;DB._openPromise=null;};resolve(DB._db);};
    rq.onerror=e=>{DB._openPromise=null;reject(e.target.error);};
    rq.onblocked=()=>{DB._openPromise=null;reject(new Error('иіҮж–ҷеә«еҚҮзҙҡиў«е…¶д»–еҲҶй Ғйҳ»ж“ӢпјҢи«Ӣй—ңй–үе…¶д»– TeamPro еҲҶй ҒеҫҢйҮҚж–°ж•ҙзҗҶгҖӮ'));};
    });
    DB._openPromise.then(res,rej);
  });},
  _tx(store,mode){if(!DB._db)throw new Error('иіҮж–ҷеә«е°ҡжңӘе°ұз·’пјҢи«ӢйҮҚж–°ж•ҙзҗҶеҫҢеҶҚи©ҰгҖӮ');return DB._db.transaction(store,mode).objectStore(store);},
  all(store){return new Promise((res,rej)=>{const r=DB._tx(store,'readonly').getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});},
  get(store,id){return new Promise((res,rej)=>{const r=DB._tx(store,'readonly').get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
  put(store,obj){return new Promise((res,rej)=>{const r=DB._tx(store,'readwrite').put(obj);r.onsuccess=()=>res(obj);r.onerror=()=>rej(r.error);});},
  del(store,id){return new Promise((res,rej)=>{const r=DB._tx(store,'readwrite').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});},
  clear(store){return new Promise((res,rej)=>{const r=DB._tx(store,'readwrite').clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});},
  async bulk(store,arr){for(const o of arr) await DB.put(store,o);},
};

/* ---------------- utils ---------------- */
const uid=(p='')=>p+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const nl2=s=>esc(s).replace(/\n/g,'<br>');
function toast(msg,type=''){const t=document.createElement('div');t.className='tst '+type;t.textContent=msg;$('#toast').appendChild(t);setTimeout(()=>t.remove(),2600);}
function todayStr(d=new Date()){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekdayOf(dateStr){const d=new Date(dateStr+'T00:00:00');return (d.getDay()+6)%7;} // 0=Mon
function addDays(dateStr,n){const d=new Date(dateStr+'T00:00:00');d.setDate(d.getDate()+n);return todayStr(d);}
function mondayOf(dateStr){return addDays(dateStr,-weekdayOf(dateStr));}
function statusMeta(s){return STATUS.find(x=>x[0]===s)||STATUS[0];}
function badge(s){const m=statusMeta(s);return `<span class="badge ${m[2]}">${m[1]}</span>`;}
// жЁҷжә–еҢ–дёҠиӘІж—Ҙеӯ—дёІ -> ["жҳҹжңҹдёҖ",...]
function normWeekdays(raw){
  if(!raw) return [];
  const map={'дёҖ':0,'дәҢ':1,'дёү':2,'еӣӣ':3,'дә”':4,'е…ӯ':5,'ж—Ҙ':6,'еӨ©':6,'1':0,'2':1,'3':2,'4':3,'5':4,'6':5,'7':6};
  const out=new Set();
  const parts=String(raw).split(/[гҖҒ,пјҢ\/\sе’ҢеҸҠ]+/).filter(Boolean);
  parts.forEach(p=>{p=p.replace(/жҳҹжңҹ|йҖұ|е‘Ё|зҰ®жӢң|жӢң/g,'').trim();
    for(const ch of p){ if(ch in map) out.add(map[ch]); }});
  return [...out].sort((a,b)=>a-b).map(i=>WEEKDAYS[i]);
}
function ageOK(a){return AGE_GROUPS.includes(a);}
function normBelt(b){b=String(b||'').trim();return BELT_ALIASES[b]||b;}
function beltOK(b){return BELTS.includes(normBelt(b));}

/* ---------------- global state ---------------- */
const State={user:null, cache:{}, ctx:{date:todayStr(),classId:null}};
async function reload(store){State.cache[store]=await DB.all(store);return State.cache[store];}
async function reloadAll(){for(const s of STORES) await reload(s);}
async function ensureDbReady(){
  if(!DB._db)await DB.open();
  for(const s of STORES){if(!State.cache[s])State.cache[s]=await DB.all(s);}
}
const C=store=>State.cache[store]||[];
async function save(store,obj){obj.id=obj.id||uid();obj._u=Date.now();await DB.put(store,obj);await reload(store);if(typeof SYNC!=='undefined')SYNC.push(store,obj);return obj;}
async function remove(store,id){await DB.del(store,id);await reload(store);if(typeof SYNC!=='undefined')SYNC.pushDelete(store,id);}
async function audit(action,table,recId,before,after){
  await save('audit_logs',{id:uid(),user_id:State.user?.id,user_name:State.user?.name,action,table_name:table,record_id:recId,before_data:before?JSON.stringify(before).slice(0,500):'',after_data:after?JSON.stringify(after).slice(0,500):'',created_at:Date.now()});
}
function settings(){return C('settings')[0]||DEFAULT_SETTINGS();}
function DEFAULT_SETTINGS(){return{id:'app',dojo:'йӣ„йә’и·ҶжӢійҒ“йӨЁ',logo:'рҹҘӢ',cycle:'',
  limits:{е№је…’:8,еҹәзӨҺ:10,е“ҒеӢў:12,е°Қз·ҙ:10,default:12},
  tiers:{еҲқйҡҺ:['зҷҪеё¶','й»ғеё¶','й»ғи—Қеё¶'],дёӯйҡҺ:['и—Қеё¶','и—Қзҙ…её¶','зҙ…её¶'],й«ҳйҡҺ:['зҙ…дёҖз·ҡ','зҙ…дәҢз·ҡ','й»‘й ӯ','дёҖж®ө','е…©ж®ө','дёүж®ө','еӣӣж®ө']}};}
function dataCounts(){
  const counts={};let total=0;
  DATA_STORES.forEach(s=>{counts[s]=C(s).length;total+=counts[s];});
  return {counts,total};
}
function adminOnlyWarn(){
  toast('еғ…з®ЎзҗҶиҖ…еҸҜд»Ҙеҹ·иЎҢжӯӨж“ҚдҪң','warn');
  return false;
}
function requireAdminRole(){
  return !!(State.user&&State.user.role==='admin')||adminOnlyWarn();
}
const BackupManager={
  async create(reason){
    try{
      const data={};const counts={};let total=0;
      for(const st of DATA_STORES){
        data[st]=await DB.all(st);
        counts[st]=data[st].length;
        total+=counts[st];
      }
      const b={id:uid('bk'),version:APP_VERSION,created_at:Date.now(),reason:reason||'жүӢеӢ•еӮҷд»Ҫ',

      backupReason:'йӮ„еҺҹеүҚиҮӘеӢ•еӮҷд»Ҫ',onConfirm:async()=>{

      }});

      onConfirm:async()=>{await DB.del('backups',id);await reload('backups');toast('е·ІеҲӘйҷӨеӮҷд»Ҫ','ok');Modal.close();App.go('settings','more');}});

/* =========================================================================
   SYNC вҖ”вҖ” GAS йӣІз«ҜеҗҢжӯҘеұӨпјҲеӨҡиЈқзҪ®еҗ„иҮӘжүӢж©ҹе…ұз”ЁеҗҢдёҖд»ҪиіҮж–ҷпјү
   push: жҜҸж¬ЎеӯҳжӘ”еҚіжҷӮдёҠеӮі(дҪҮеҲ—еҗҲжү№)  pull: е®ҡжҷӮ/еҲҮй ҒжҠҠйӣІз«Ҝи®ҠжӣҙжӢүеӣһ  LWW by _u
   ========================================================================= */
const SYNC_REPLACE_TOKEN=Symbol('replaceAllSafeToken');
const SYNC={
  status:'вҖ”',
  lastSuccess:+(localStorage.getItem('tp_sync_success')||0),
  lastError:'',
  _replacing:false,
  url(){try{return (settings().syncUrl||DEFAULT_SYNC_URL||'').trim();}catch(e){return (DEFAULT_SYNC_URL||'').trim();}},
  enabled(){return !!SYNC.url();},
  pendingCount(){return SYNC._q.length;},
  lastPull(){return +(localStorage.getItem('tp_lastpull')||0);},
  setLastPull(v){localStorage.setItem('tp_lastpull',v);},
  async post(payload){
    const res=await fetch(SYNC.url(),{method:'POST',body:JSON.stringify(payload)});
    return await res.json();
  },
  _q:[], _busy:false,
  push(store,obj){if(store==='backups'||!SYNC.enabled())return;SYNC._q.push({store,id:obj.id,json:JSON.stringify(obj),deleted:false});SYNC._flush();App.updateSyncPill?.();},
  pushDelete(store,id){if(store==='backups'||!SYNC.enabled())return;SYNC._q.push({store,id,json:'',deleted:true});SYNC._flush();App.updateSyncPill?.();},
  async _flush(){
    if(SYNC._busy||!SYNC._q.length||!SYNC.enabled())return;
    if(navigator.onLine===false){SYNC.status='з¶Іи·Ҝйӣўз·ҡ';App.updateSyncPill?.();return;}
    SYNC._busy=true;
    SYNC.status='еҗҢжӯҘдёӯ';
    App.updateSyncPill?.();
    const batch=SYNC._q.splice(0,SYNC._q.length);
    try{await SYNC.post({action:'push',records:batch});SYNC.lastSuccess=Date.now();localStorage.setItem('tp_sync_success',SYNC.lastSuccess);SYNC.lastError='';SYNC.status='е·ІеҗҢжӯҘ '+new Date(SYNC.lastSuccess).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}
    catch(e){SYNC._q.unshift(...batch);SYNC.lastError=e.message||String(e);SYNC.status='еҗҢжӯҘеӨұж•—';toast('еҗҢжӯҘеӨұж•—пјҡ'+SYNC.lastError,'warn');setTimeout(()=>SYNC._flush(),4000);}
    SYNC._busy=false;
    App.updateSyncPill?.();
    if(SYNC._q.length)setTimeout(()=>SYNC._flush(),1500);
  },
  async pull(){
    if(!SYNC.enabled())return{changed:0};
    if(navigator.onLine===false){SYNC.status='з¶Іи·Ҝйӣўз·ҡ';App.updateSyncPill?.();return{changed:0,err:'offline'};}
    let r;try{SYNC.status='еҗҢжӯҘдёӯ';App.updateSyncPill?.();r=await SYNC.post({action:'pull',since:SYNC.lastPull()});}
    catch(e){SYNC.lastError=e.message||String(e);SYNC.status='еҗҢжӯҘеӨұж•—';toast('еҗҢжӯҘеӨұж•—пјҡ'+SYNC.lastError,'warn');App.updateSyncPill?.();return{changed:0,err:e.message};}
    if(!r||!r.ok)return{changed:0};
    let changed=0;
    for(const rec of r.records){
      const local=(State.cache[rec.store]||[]).find(x=>x.id===rec.id);
      if(rec.deleted){if(local){await DB.del(rec.store,rec.id);changed++;}continue;}
      let obj;try{obj=JSON.parse(rec.json);}catch(e){continue;}
      if(!local || (obj._u||0)>(local._u||0)){await DB.put(rec.store,obj);changed++;}
    }
    if(changed)await reloadAll();
    SYNC.setLastPull(r.maxSrv||r.srv||SYNC.lastPull());
    SYNC.lastSuccess=Date.now();localStorage.setItem('tp_sync_success',SYNC.lastSuccess);SYNC.lastError='';
    SYNC.status='е·ІеҗҢжӯҘ '+new Date(SYNC.lastSuccess).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    App.updateSyncPill?.();
    return {changed};
  },
  // дё»еёіиҷҹз¬¬дёҖж¬ЎдёҠеӮі / йҮҚзҪ®йӣІз«Ҝпјҡе…ЁйҮҸиҰҶи“ӢпјҲжңғжё…жҺүйӣІз«ҜиҲҠиіҮж–ҷеҶҚеҜ«е…Ҙзӣ®еүҚжң¬ж©ҹпјү
  async _replaceAllUnsafe(token){
    if(token!==SYNC_REPLACE_TOKEN)throw new Error('жңӘйҖҡйҒҺе®үе…Ёй©—иӯү');
    if(!SYNC.enabled())throw new Error('е°ҡжңӘиЁӯе®ҡеҗҢжӯҘз¶ІеқҖ');
    const recs=[];
    for(const s of DATA_STORES)for(const o of C(s))recs.push({store:s,id:o.id,json:JSON.stringify(o),deleted:false});
    const r=await SYNC.post({action:'replaceAll',records:recs});
    SYNC.setLastPull(0); // д№ӢеҫҢ pull жңғйҮҚж–°е°ҚйҪҠ
    SYNC.lastSuccess=Date.now();localStorage.setItem('tp_sync_success',SYNC.lastSuccess);SYNC.lastError='';
    return r;
  },
  async replaceAll(){
    if(!State.user)return toast('и«Ӣе…Ҳзҷ»е…Ҙ','warn');
    if(!requireAdminRole())return;
    if(SYNC._replacing)return;
    const {total}=dataCounts();
    await App.requireAdminPin({actionName:'жң¬ж©ҹиіҮж–ҷиҰҶи“ӢйӣІз«Ҝ',impact:`йҖҷжңғд»Ҙжң¬ж©ҹиіҮж–ҷиҰҶи“ӢйӣІз«ҜпјҢзӣ®еүҚжң¬ж©ҹе…ұжңү ${total} зӯҶиіҮж–ҷгҖӮ`,confirmText:'зўәиӘҚиҰҶи“ӢйӣІз«Ҝ',
      backupReason:'иҰҶи“ӢйӣІз«ҜеүҚиҮӘеӢ•еӮҷд»Ҫ',onConfirm:async()=>{
        SYNC._replacing=true;
        try{
          const r=await SYNC._replaceAllUnsafe(SYNC_REPLACE_TOKEN);
          const count=r.count??total;
          SYNC.status='е·ІеҗҢжӯҘ '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
          toast('йӣІз«ҜиҰҶи“Ӣе®ҢжҲҗпјҡ'+count+' зӯҶпјҢ'+new Date().toLocaleString('zh-TW'),'ok');
          Modal.close();
        }catch(e){SYNC.lastError=e.message||String(e);SYNC.status='еҗҢжӯҘеӨұж•—';toast('дёҠеӮіеӨұж•—пјҡ'+SYNC.lastError,'bad');}
        finally{SYNC._replacing=false;App.updateSyncPill?.();}
      }});
  },
  _timer:null,
  startAuto(){
    if(SYNC._timer)clearInterval(SYNC._timer);
    if(!SYNC.enabled())return;
    SYNC._timer=setInterval(async()=>{
      if(!State.user)return;
      const {changed}=await SYNC.pull();
      if(changed)App.refresh();
    },15000);
  },
  async immediate(){
    if(SYNC._busy)return;
    await SYNC._flush();
    const r=await SYNC.pull();
    if(r.changed)App.refresh();
  },
  bindNetwork(){
    if(SYNC._netBound)return;SYNC._netBound=true;
    window.addEventListener('offline',()=>{SYNC.status='з¶Іи·Ҝйӣўз·ҡ';App.updateSyncPill?.();});
    window.addEventListener('online',async()=>{SYNC.status='еҗҢжӯҘдёӯ';App.updateSyncPill?.();await SYNC._flush();const r=await SYNC.pull();if(r.changed)App.refresh();});
  }
};

const ROLE_LABEL={admin:'з®ЎзҗҶиҖ…',head:'дё»ж•ҷз·ҙ',assistant:'еҠ©ж•ҷ'};

}

<script>
/* =========================================================================
   STATS ENGINE
   ========================================================================= */
const Stats={
  // жҹҗзҸӯеҲҘ жҹҗжҳҹжңҹ(0-6) зҡ„еӯёе“Ў
  studentsFor(classId,weekdayIdx){
    return C('students').filter(s=>{
      if(!s.active) return false;
      if(classId && s.class_id!==classId) return false;
      if(weekdayIdx!=null){
        const wds=(s.weekdays||[]);
        if(!wds.includes(WEEKDAYS[weekdayIdx])) return false;
      }
      return true;
    });
  },
  summary(list){
    const r={total:list.length,age:{},belt:{},spec:{},promo:0,comp:0};
    AGE_GROUPS.forEach(a=>r.age[a]=0); BELTS.forEach(b=>r.belt[b]=0); SPECIALTIES.forEach(s=>r.spec[s]=0);
    list.forEach(s=>{
      if(r.age[s.age_group]!=null)r.age[s.age_group]++;
      const belt=normBelt(s.belt_rank);if(r.belt[belt]!=null)r.belt[belt]++;
      if(r.spec[s.specialty]!=null)r.spec[s.specialty]++;
      if(s.promotion_status)r.promo++;
      if(s.competition_athlete)r.comp++;
    });
    return r;
  },
  coachesAvailable(weekdayIdx){
    return C('profiles').filter(p=>p.active&&(p.role==='head'||p.role==='assistant')&&
      (!p.available_weekdays||!p.available_weekdays.length||p.available_weekdays.includes(WEEKDAYS[weekdayIdx])));
  }
};

/* =========================================================================
   GROUPING ENGINE  вҖ”  з”ўз”ҹеҲҶзө„е»әиӯ°
   ========================================================================= */
const Grouping={
  limit(type){const l=settings().limits;return l[type]||l.default||12;},
  tierOf(belt){belt=normBelt(belt);const t=settings().tiers;for(const k in t){if(t[k].map(normBelt).includes(belt))return k;}return 'еҲқйҡҺ';},
  suggest(list,mode,coachCount){
    // еӣһеӮі {groups:[{name,type,students:[],reason,coachNeed}], notes:[]}
    const notes=[]; let groups=[];
    const mk=(name,type,students,reason)=>({id:uid('g'),name,group_type:type,students:students.map(s=>s.id),
      reason, coachNeed:Math.max(1,Math.ceil(students.length/this.limit(type)))});
    const byKey=(arr,fn)=>{const m={};arr.forEach(s=>{const k=fn(s);(m[k]=m[k]||[]).push(s);});return m;};
    if(mode==='age'){
      const m=byKey(list,s=>s.age_group);
      AGE_GROUPS.forEach(a=>{if(m[a]&&m[a].length)groups.push(mk(a+'зө„','еҹәзӨҺ',m[a],`${a}е…ұжңү ${m[a].length} дәәпјҢдҫқе№ҙйҪЎеұӨзҚЁз«ӢжҲҗзө„гҖӮ`));});
    }else if(mode==='belt'){
      const m=byKey(list,s=>normBelt(s.belt_rank));
      BELTS.forEach(b=>{if(m[b]&&m[b].length)groups.push(mk(b+'зө„','еҹәзӨҺ',m[b],`${b}е…ұжңү ${m[b].length} дәәгҖӮ`));});
    }else if(mode==='poomsae_spar'){
      const p=list.filter(s=>['е“ҒеӢў','й»‘её¶'].includes(s.specialty));
      const sp=list.filter(s=>['е°Қз·ҙ','жҜ”иіҪйҒёжүӢ'].includes(s.specialty));
      const other=list.filter(s=>!['е“ҒеӢў','й»‘её¶','е°Қз·ҙ','жҜ”иіҪйҒёжүӢ'].includes(s.specialty));
      if(p.length)groups.push(mk('е“ҒеӢўзө„','е“ҒеӢў',p,`е“ҒеӢўпјҸй»‘её¶е…ұ ${p.length} дәәгҖӮ`));
      if(sp.length)groups.push(mk('е°Қз·ҙзө„','е°Қз·ҙ',sp,`е°Қз·ҙпјҸжҜ”иіҪйҒёжүӢе…ұ ${sp.length} дәәгҖӮ`));
      if(other.length)groups.push(mk('еҹәзӨҺзө„','еҹәзӨҺ',other,`е…¶йӨҳ ${other.length} дәәжӯёеҹәзӨҺзө„гҖӮ`));
    }else if(mode==='level'){
      const m=byKey(list,s=>this.tierOf(s.belt_rank));
      ['еҲқйҡҺ','дёӯйҡҺ','й«ҳйҡҺ'].forEach(t=>{if(m[t]&&m[t].length)groups.push(mk(t+'зө„','еҹәзӨҺ',m[t],`${t}пјҲ${settings().tiers[t].join('гҖҒ')}пјүе…ұ ${m[t].length} дәәгҖӮ`));});
    }else if(mode==='kids'){
      const kids=list.filter(s=>s.age_group==='е№је…’');
      const rest=list.filter(s=>s.age_group!=='е№је…’');
      if(kids.length)groups.push(mk('е№је…’зө„','е№је…’',kids,`е№је…’е…ұжңү ${kids.length} дәәпјҢе»әиӯ°зҚЁз«ӢжҲҗзө„пјҢе®үжҺ’е°ҲиІ¬ж•ҷз·ҙгҖӮ`));
      if(rest.length)groups.push(mk('дёҖиҲ¬зө„','еҹәзӨҺ',rest,`е…¶йӨҳ ${rest.length} дәәгҖӮ`));
    }else if(mode==='adult'){
      const ad=list.filter(s=>s.age_group==='жҲҗдәә');
      const rest=list.filter(s=>s.age_group!=='жҲҗдәә');
      if(ad.length)groups.push(mk('жҲҗдәәзө„','еҒҘиә«',ad,`жҲҗдәәе…ұжңү ${ad.length} дәәпјҢзҚЁз«ӢжҲҗзө„гҖӮ`));
      if(rest.length)groups.push(mk('йқ’е°‘е№ҙзө„','еҹәзӨҺ',rest,`е…¶йӨҳ ${rest.length} дәәгҖӮ`));
    }else if(mode==='promo'){
      const pr=list.filter(s=>s.promotion_status);
      const rest=list.filter(s=>!s.promotion_status);
      if(pr.length)groups.push(mk('жҷүзҙҡеҠ еј·зө„','еҹәзӨҺ',pr,`жә–еӮҷжҷүзҙҡе…ұ ${pr.length} дәәпјҢйӣҶдёӯеҠ еј·гҖӮ`));
      if(rest.length)groups.push(mk('дёҖиҲ¬зө„','еҹәзӨҺ',rest,`е…¶йӨҳ ${rest.length} дәәгҖӮ`));
    }else if(mode==='comp'){
      const cp=list.filter(s=>s.competition_athlete);
      const rest=list.filter(s=>!s.competition_athlete);
      if(cp.length)groups.push(mk('жҜ”иіҪйҒёжүӢзө„','жҜ”иіҪйҒёжүӢ',cp,`жҜ”иіҪйҒёжүӢе…ұ ${cp.length} дәәпјҢе°Ҳй …еј·еҢ–гҖӮ`));
      if(rest.length)groups.push(mk('дёҖиҲ¬зө„','еҹәзӨҺ',rest,`е…¶йӨҳ ${rest.length} дәәгҖӮ`));
    }else{ // smart з¶ңеҗҲе»әиӯ°пјҡе°Ҳй …>е№ҙйҪЎ>зҙҡеҲҘ
      const spec=byKey(list,s=>{
        if(['е“ҒеӢў','й»‘её¶'].includes(s.specialty))return 'е“ҒеӢў';
        if(['е°Қз·ҙ','жҜ”иіҪйҒёжүӢ'].includes(s.specialty))return 'е°Қз·ҙ';
        if(s.age_group==='е№је…’')return 'е№је…’';
        if(s.age_group==='жҲҗдәә')return 'жҲҗдәә';
        return 'еҹәзӨҺ';
      });
      ['е№је…’','еҹәзӨҺ','е“ҒеӢў','е°Қз·ҙ','жҲҗдәә'].forEach(k=>{
        const arr=spec[k]; if(!arr||!arr.length)return;
        const type=k==='е№је…’'?'е№је…’':(k==='жҲҗдәә'?'еҒҘиә«':k);
        const lim=this.limit(type);
        if(arr.length>lim && (k==='е“ҒеӢў'||k==='е°Қз·ҙ'||k==='еҹәзӨҺ')){
          // дҫқзҙҡеҲҘжӢҶеҲқйҡҺ/йҖІйҡҺ
          const lo=arr.filter(s=>this.tierOf(s.belt_rank)==='еҲқйҡҺ');
          const hi=arr.filter(s=>this.tierOf(s.belt_rank)!=='еҲқйҡҺ');
          if(lo.length)groups.push(mk(k+'пјҲеҲқйҡҺпјү',type,lo,`${k}е…ұ ${arr.length} дәәи¶…йҒҺе»әиӯ°дёҠйҷҗ ${lim}пјҢдҫқзҙҡеҲҘжӢҶзӮәеҲқйҡҺ ${lo.length} дәәгҖӮ`));
          if(hi.length)groups.push(mk(k+'пјҲйҖІйҡҺпјү',type,hi,`${k}йҖІйҡҺ ${hi.length} дәәгҖӮ`));
        }else{
          groups.push(mk(k+'зө„',type,arr,`${k}е…ұ ${arr.length} дәә${k==='е№је…’'?'пјҢе»әиӯ°зҚЁз«ӢжҲҗзө„дёҰе®үжҺ’ 1 дҪҚж•ҷз·ҙ':''}гҖӮ`));
        }
      });
    }
    // ж•ҷз·ҙйңҖжұӮжҸҗйҶ’
    const need=groups.reduce((a,g)=>a+g.coachNeed,0);
    if(coachCount!=null && need>coachCount) notes.push(`жң¬ж¬ЎеҲҶзө„е…ұйңҖ ${need} дҪҚж•ҷз·ҙпјҸеҠ©ж•ҷпјҢдҪҶд»Ҡж—Ҙеғ… ${coachCount} дҪҚеҸҜеҮәеёӯпјҢи«ӢиӘҝж•ҙеҲҶзө„жҲ–иӘІзЁӢжЁЎејҸгҖӮ`);
    groups.forEach(g=>{if(g.students.length>this.limit(g.group_type))notes.push(`гҖҢ${g.name}гҖҚ${g.students.length} дәәи¶…йҒҺе»әиӯ°дёҠйҷҗ ${this.limit(g.group_type)}пјҢе»әиӯ°еҶҚжӢҶеҲҶгҖӮ`);});
    return {groups,notes};
  },
  // й©—иӯүзӣ®еүҚеҲҶзө„
  validate(groups,list){
    const issues=[]; const assigned={};
    groups.forEach(g=>{
      (g.students||[]).forEach(sid=>{
        if(assigned[sid])issues.push({t:'dup',msg:`еӯёе“ЎйҮҚиӨҮеҮәзҸҫеңЁгҖҢ${assigned[sid]}гҖҚиҲҮгҖҢ${g.name}гҖҚ`});
        assigned[sid]=g.name;
      });
      if(!g.coach_id)issues.push({t:'nocoach',msg:`гҖҢ${g.name}гҖҚе°ҡжңӘжҢҮжҙҫж•ҷз·ҙ`});
      if((g.students||[]).length>this.limit(g.group_type))issues.push({t:'over',msg:`гҖҢ${g.name}гҖҚдәәж•ё ${g.students.length} и¶…йҒҺдёҠйҷҗ ${this.limit(g.group_type)}`});
    });
    const un=list.filter(s=>!assigned[s.id]);
    if(un.length)issues.push({t:'unassigned',msg:`жңү ${un.length} дҪҚеӯёе“Ўе°ҡжңӘеҲҶзө„пјҡ${un.slice(0,6).map(s=>s.name).join('гҖҒ')}${un.length>6?'вҖҰ':''}`});
    // еҗҢж•ҷз·ҙеҗҢжҷӮж®өе…©зө„
    const coachMap={};
    groups.forEach(g=>{if(g.coach_id){coachMap[g.coach_id]=(coachMap[g.coach_id]||0)+1;}});
    Object.entries(coachMap).forEach(([cid,n])=>{if(n>1){const c=C('profiles').find(p=>p.id===cid);issues.push({t:'conflict',msg:`ж•ҷз·ҙгҖҢ${c?.name||''}гҖҚеҗҢжҷӮиў«жҢҮжҙҫеҲ° ${n} зө„`});}});
    return {issues,unassigned:un};
  }
};
</script>

  async requireAdminPin(options){
    const opt=options||{};
    if(!State.user||State.user.role!=='admin'){adminOnlyWarn();return false;}
    const admin=C('profiles').find(p=>p.id===State.user.id&&p.role==='admin'&&p.active);
    if(!admin){adminOnlyWarn();return false;}
    return new Promise(resolve=>{
      const id=uid('pin');

        <div class="warnbox" style="margin-top:0"><b>${esc(opt.actionName||'еҚұйҡӘж“ҚдҪң')}</b><br>${esc(opt.impact||'жӯӨж“ҚдҪңеҸҜиғҪиҰҶи“ӢжҲ–еҲӘйҷӨиіҮж–ҷгҖӮ')}</div>

        <div class="field"><label>з®ЎзҗҶиҖ… PIN</label><input id="${id}_pin" type="password" inputmode="numeric" autocomplete="off"><div class="err" id="${id}_err" style="display:none">з®ЎзҗҶиҖ… PIN йҢҜиӘӨпјҢжңӘеҹ·иЎҢд»»дҪ•ж“ҚдҪңгҖӮ</div></div>
        <div class="row"><button class="btn secondary grow" id="${id}_cancel">еҸ–ж¶Ҳ</button><button class="btn danger grow" id="${id}_ok">зўәиӘҚеҹ·иЎҢ</button></div>`,()=>{
          const cancel=$('#'+id+'_cancel'), ok=$('#'+id+'_ok'), pinEl=$('#'+id+'_pin'), txtEl=$('#'+id+'_txt'), err=$('#'+id+'_err');
          const doCancel=()=>{if(pinEl)pinEl.value='';Modal.close();resolve(false);};
          cancel.onclick=doCancel;
          const m=$('#modal');if(m){m.onclick=e=>{if(e.target===m)doCancel();};const x=m.querySelector('.x');if(x)x.onclick=doCancel;}
          ok.onclick=async()=>{
            if(ok.disabled)return;err.style.display='none';
            if(opt.confirmText&&(!txtEl||txtEl.value.trim()!==opt.confirmText)){err.textContent='ж–Үеӯ—зўәиӘҚдёҚдёҖиҮҙпјҢжңӘеҹ·иЎҢд»»дҪ•ж“ҚдҪңгҖӮ';err.style.display='block';return;}
            if(!pinEl||pinEl.value.trim()!==(admin.pin||'1234')){if(pinEl)pinEl.value='';err.textContent='з®ЎзҗҶиҖ… PIN йҢҜиӘӨпјҢжңӘеҹ·иЎҢд»»дҪ•ж“ҚдҪңгҖӮ';err.style.display='block';return;}
            ok.disabled=true;
            try{if(opt.backupReason)await BackupManager.create(opt.backupReason);await opt.onConfirm?.();}
            finally{if(pinEl)pinEl.value='';ok.disabled=false;}
            resolve(true);
          };
          setTimeout(()=>pinEl&&pinEl.focus(),50);
        });
    });
  },

<script>

/* ---------- HOME ---------- */
/* иЁҲз®—жҹҗж—ҘжҹҗзҸӯзҡ„еӮҷиӘІзӢҖж…ӢпјҲдә”жӯҘй©ҹе®ҢжҲҗеәҰпјӢеҫ…иҫҰпјү */
function planStatus(date,classId){
  const dp=findDaily(date,classId);
  const wd=weekdayOf(date);
  const list=Stats.studentsFor(classId,wd);
  const groups=dp?C('training_groups').filter(g=>g.daily_plan_id===dp.id):[];
  const blocks=dp?C('lesson_blocks').filter(b=>b.daily_plan_id===dp.id):[];
  const stageFilled=k=>{const b=blocks.find(x=>x.block_type===k&&!x.training_group_id);if(!b)return false;
    if(k==='review')return !!(b.praise||b.remind||b.homework||b.preview);
    return !!(b.content&&String(b.content).trim());};
  let stagesFilled=['warmup','fitness','apply','review'].filter(stageFilled).length;
  if(groups.length&&blocks.some(b=>b.block_type==='group'&&(b.basic||b.kick||b.goal)))stagesFilled++;
  const val=Grouping.validate(groups.map(g=>({...g,students:[...(g.students||[])]})),list);
  const steps={
    stats:!!dp,
    groups:groups.length>0&&val.unassigned.length===0,
    plan:stagesFilled>=5||(!!dp&&stagesFilled>=4),
    confirm:!!(dp&&(dp.confirms||[]).length>0),
    publish:!!(dp&&['pub','done','lock'].includes(dp.status)),
  };
  const doneCount=Object.values(steps).filter(Boolean).length;
  return {dp,list,groups,blocks,val,steps,stagesFilled,pct:Math.round(doneCount/5*100)};
}
function computeTodos(date,classId){
  const ps=planStatus(date,classId);const t=[];
  if(!ps.dp){t.push({level:'block',title:'е°ҡжңӘе»әз«Ӣд»Ҡж—ҘиӘІзЁӢ',sub:'е…ҲзўәиӘҚдәәж•ёдёҰе»әз«Ӣз•¶ж—ҘеӮҷиӘІ',view:'stats'});return {todos:t,ps};}
  if(!ps.groups.length)t.push({level:'block',title:'е°ҡжңӘеҲҶзө„',sub:'з”Ёжҷәж…§еҲҶзө„еҝ«йҖҹе»әз«Ӣзө„еҲҘ',view:'groups'});
  ps.val.issues.forEach(i=>{
    const map={unassigned:['warn','жңүеӯёе“Ўе°ҡжңӘеҲҶзө„'],nocoach:['warn','зө„еҲҘзјәж•ҷз·ҙ'],dup:['block','еӯёе“ЎйҮҚиӨҮеҲҶзө„'],over:['warn','еҲҶзө„дәәж•ёи¶…йҒҺдёҠйҷҗ'],conflict:['warn','ж•ҷз·ҙжҷӮж®өиЎқзӘҒ']};
    const m=map[i.t]; if(m)t.push({level:m[0],title:m[1],sub:i.msg,view:'groups'});
  });
  if(ps.stagesFilled<5)t.push({level:'info',title:'дә”йҡҺж®өиӘІзЁӢе°ҡжңӘе®ҢжҲҗ',sub:`е·Іе®ҢжҲҗ ${ps.stagesFilled}/5 ж®ө`,view:'plan'});
  if(ps.groups.length&&!ps.steps.confirm)t.push({level:'info',title:'е°ҡжңүж•ҷз·ҙжңӘзўәиӘҚ',sub:'и«Ӣж•ҷз·ҙзҫӨе…ұеҗҢзўәиӘҚиӘІзЁӢ',view:'confirm'});
  if(!ps.steps.publish)t.push({level:'info',title:'иӘІзЁӢе°ҡжңӘзҷјеёғ',sub:'е®ҢжҲҗзҷјеёғеүҚжӘўжҹҘеҚіеҸҜзҷјеёғ',view:'publish'});
  const rep=C('post_class_reports').find(r=>r.daily_plan_id===ps.dp.id);
  if(ps.steps.publish&&!rep)t.push({level:'info',title:'иӘІеҫҢзҙҖйҢ„жңӘе®ҢжҲҗ',sub:'иӘІеҫҢеЎ«еҜ«еҜҰеҲ°иҲҮдёӢе ӮйҠңжҺҘ',view:'report'});
  return {todos:t,ps};
}

function stageFilled(blocks,key){

Views.view_live=function(el){
  ensureClassCtx();

  const start=Date.now();
  el.innerHTML=`<div class="live"><div class="muted">${State.ctx.date}</div><div class="stage" id="liveStage">жә–еӮҷй–Ӣе§Ӣ</div><div class="clock" id="liveClock">00:00</div><div class="nxt" id="liveNext"></div>

    <div class="sect-head"><h3>иӘІзЁӢжҷӮй–“и»ё</h3></div>
    ${BLOCKS.map(bl=>{const b=blocks.find(x=>x.block_type===bl.key&&!x.training_group_id)||{};return `<div class="tcard"><div class="th"><span class="time">${bl.s}-${bl.e}вҖІ</span><span><span class="nm">${bl.name}</span><br><span class="sub">${esc(b.content||b.goal||'')}</span></span></div></div>`;}).join('')}`;
  const tick=()=>{const min=Math.floor((Date.now()-start)/60000), sec=Math.floor((Date.now()-start)/1000)%60;
    const cur=BLOCKS.find(b=>min>=b.s&&min<b.e)||BLOCKS[BLOCKS.length-1];
    $('#liveClock').textContent=String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0');
    $('#liveStage').textContent=cur.name;
    $('#liveNext').textContent=cur.e<90?'дёӢдёҖж®өпјҡ'+(BLOCKS.find(b=>b.s===cur.e)?.name||''):'иӘІзЁӢж”¶е°ҫ';
  };
  tick(); App._liveTimer=setInterval(tick,1000);
};

      <select id="fWd"><option value="">е…ЁйғЁдёҠиӘІж—Ҙ</option>${WEEKDAYS.map((w,i)=>`<option value="${i}">${w}</option>`).join('')}</select>

      <tr><th>е§“еҗҚ</th><th>е№ҙйҪЎ</th><th>зҙҡеҲҘ</th><th>е°Ҳй …</th><th>йҖІеәҰ</th><th>дёҠиӘІж—Ҙ</th><th></th></tr>
      ${list.map(s=>`<tr>
        <td><b>${esc(s.name)}</b>${s.promotion_status?' рҹҺҜ':''}${s.competition_athlete?' рҹҸ…':''}</td>
        <td><span class="tag age">${s.age_group}</span></td>
        <td><span class="tag belt">${normBelt(s.belt_rank)}</span></td>
        <td><span class="tag spec">${s.specialty}</span></td>
        <td class="muted" style="font-size:11px">${[s.current_progress&&('е“ҒеӢў:'+esc(s.current_progress)),s.tech&&('жҠҖиЎ“:'+esc(s.tech))].filter(Boolean).join('<br>')||'вҖ”'}</td>
        <td class="muted">${(s.weekdays||[]).map(w=>WD_SHORT[WEEKDAYS.indexOf(w)]).join('')}</td>
        <td>${can('*')?`<button class="btn xs g" onclick="Views.editStudent('${s.id}')">з·ЁијҜ</button>`:''}</td>
      </tr>`).join('')}
    </table></div><div class="muted" style="margin-top:8px">е…ұ ${list.length} дәә</div></div>`:'<div class="empty"><div class="ic">рҹ‘Ҙ</div>жІ’жңүз¬ҰеҗҲзҡ„еӯёе“Ў</div>';
  };

Views.editStudent=function(id){
  const s=id?C('students').find(x=>x.id===id):{age_group:'еңӢе°Ҹ',belt_rank:'зҷҪеё¶',specialty:'еҹәзӨҺ',weekdays:[]};
  Modal.open(id?'з·ЁијҜеӯёе“Ў':'ж–°еўһеӯёе“Ў',`
    <div class="field"><label>е§“еҗҚ *</label><input id="es_name" value="${esc(s.name||'')}"></div>
    <div class="row">
      <div class="grow field"><label>е№ҙйҪЎеұӨ *</label><select id="es_age">${AGE_GROUPS.map(a=>`<option ${a===s.age_group?'selected':''}>${a}</option>`).join('')}</select></div>
      <div class="grow field"><label>зҙҡеҲҘж®өдҪҚ *</label><select id="es_belt">${BELTS.map(b=>`<option ${b===normBelt(s.belt_rank)?'selected':''}>${b}</option>`).join('')}</select></div>
    </div>
    <div class="row">
      <div class="grow field"><label>е°Ҳй …</label><select id="es_spec">${SPECIALTIES.map(x=>`<option ${x===s.specialty?'selected':''}>${x}</option>`).join('')}</select></div>
      <div class="grow field"><label>зҸӯеҲҘ</label><select id="es_class"><option value="">жңӘжҢҮе®ҡ</option>${C('classes').map(c=>`<option value="${c.id}" ${c.id===s.class_id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>еӣәе®ҡдёҠиӘІж—Ҙ</label><div class="chips" id="es_wd">${WEEKDAYS.map(w=>`<span class="chip ${(s.weekdays||[]).includes(w)?'on':''}" data-w="${w}">${w}</span>`).join('')}</div></div>
    <div class="row">
      <label class="chip ${s.promotion_status?'on':''}" id="es_promo">рҹҺҜ жә–еӮҷжҷүзҙҡ</label>
      <label class="chip ${s.competition_athlete?'on':''}" id="es_comp">рҹҸ… жҜ”иіҪйҒёжүӢ</label>
    </div>
    <div class="row" style="margin-top:10px">
      <div class="grow field"><label>е“ҒеӢўйҖІеәҰ</label><input id="es_prog" value="${esc(s.current_progress||'')}" placeholder="дҫӢпјҡеӨӘжҘөдёҖз« "></div>
      <div class="grow field"><label>жҠҖиЎ“еӢ•дҪң</label><input id="es_tech" value="${esc(s.tech||'')}" placeholder="дҫӢпјҡеүҚиёўгҖҒж—Ӣиёў"></div>
    </div>
    <div class="field"><label>еӮҷиЁ»</label><textarea id="es_notes">${esc(s.notes||'')}</textarea></div>
    <div class="row" style="margin-top:6px">
      <button class="btn block" onclick="Views.saveStudent('${id||''}')">е„Іеӯҳ</button>
      ${id?`<button class="btn bad sm" onclick="Views.delStudent('${id}')">еҲӘйҷӨ</button>`:''}
    </div>`,
    m=>{m.querySelectorAll('#es_wd .chip').forEach(c=>c.onclick=()=>c.classList.toggle('on'));
        ['es_promo','es_comp'].forEach(i=>{$('#'+i).onclick=()=>$('#'+i).classList.toggle('on');});});
};
Views.saveStudent=async function(id){
  const name=$('#es_name').value.trim();
  if(!name){toast('е§“еҗҚеҝ…еЎ«','bad');return;}
  const wd=[...document.querySelectorAll('#es_wd .chip.on')].map(c=>c.dataset.w);
  const clId=$('#es_class').value;
  const old=id?C('students').find(x=>x.id===id):null;
  const obj=Object.assign({},old||{active:true},{
    id:id||uid('st'),name,age_group:$('#es_age').value,belt_rank:$('#es_belt').value,
    specialty:$('#es_spec').value,class_id:clId,weekdays:wd,
    current_progress:$('#es_prog').value.trim(),tech:$('#es_tech').value.trim(),
    notes:$('#es_notes').value.trim(),
    promotion_status:$('#es_promo').classList.contains('on'),
    competition_athlete:$('#es_comp').classList.contains('on'),active:true});
  await save('students',obj); await audit(id?'update':'create','students',obj.id,old,obj);
  Modal.close();toast('е·Іе„Іеӯҳ','ok');App.go('students');
};
Views.delStudent=async function(id){if(!requireAdminRole())return;await App.requireAdminPin({actionName:'еҲӘйҷӨеӯёе“Ў',impact:'е°ҮеҲӘйҷӨжӯӨеӯёе“ЎиіҮж–ҷгҖӮ',confirmText:'зўәиӘҚеҲӘйҷӨ',onConfirm:async()=>{await remove('students',id);await audit('delete','students',id);Modal.close();toast('е·ІеҲӘйҷӨ','ok');App.go('students');}});};
</script>

Views.dlTemplate=function(){
  const rows=[['е§“еҗҚ','е№ҙйҪЎеұӨ','зҙҡеҲҘж®өдҪҚ','е°Ҳй …','еӣәе®ҡдёҠиӘІж—Ҙ','зҸӯеҲҘ','е“ҒеӢўйҖІеәҰ','жҠҖиЎ“еӢ•дҪң','еӮҷиЁ»','жҳҜеҗҰжә–еӮҷжҷүзҙҡ','жҳҜеҗҰзӮәжҜ”иіҪйҒёжүӢ','зӢҖж…Ӣ'],
    ['зҺӢе°ҸжҳҺ','еңӢе°Ҹ','й»ғеё¶','еҹәзӨҺ','дёҖгҖҒдёүгҖҒдә”','йҖұдёҖжҷҡзҸӯ','еӨӘжҘөдёҖз« ','еүҚиёўгҖҒж—Ӣиёў','иӘҚзңҹ','еҗҰ','еҗҰ','е•ҹз”Ё'],
    ['йҷіеӨ§иҸҜ','еңӢдёӯ','и—Қеё¶','е“ҒеӢў','жҳҹжңҹдәҢгҖҒжҳҹжңҹеӣӣ','йҖұдәҢжҷҡзҸӯ','еӨӘжҘөдёүз« ','ж©«иёўгҖҒеҫҢиёў','','жҳҜ','еҗҰ','е•ҹз”Ё'],
    ['жһ—йҳҝжҲҗ','е№је…’','зҷҪеё¶','еҹәзӨҺ','йҖұе…ӯ','йҖұе…ӯдёҠеҚҲзҸӯ','','еҹәжң¬з«ҷе§ҝгҖҒеүҚиёў','йңҖе®¶й•·йҷӘеҗҢ','еҗҰ','еҗҰ','е•ҹз”Ё']];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'еӯёе“ЎеҗҚе–®');
  XLSX.writeFile(wb,'еӯёе“ЎеҗҚе–®зҜ„жң¬.xlsx');
  toast('зҜ„жң¬е·ІдёӢијү','ok');
};
Views._imp=null;
Views.parseImport=function(e){
  const f=e.target.files[0]; if(!f)return;
  const reader=new FileReader();
  $('#impPreview').innerHTML='<div class="loading"><div class="spin"></div>и§ЈжһҗдёӯвҖҰ</div>';
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      Views.validateImport(rows);
    }catch(err){$('#impPreview').innerHTML=`<div class="warnbox">и§ЈжһҗеӨұж•—пјҡ${esc(err.message)}</div>`;}
  };
  reader.readAsBinaryString(f);
};
Views.validateImport=function(rows){
  if(!rows.length){$('#impPreview').innerHTML='<div class="warnbox">жӘ”жЎҲзӮәз©ә</div>';return;}
  const header=rows[0].map(h=>String(h).trim());
  const idx=n=>header.findIndex(h=>h.includes(n));
  const ci={name:idx('е§“еҗҚ'),age:idx('е№ҙйҪЎ'),belt:idx('зҙҡеҲҘ'),spec:idx('е°Ҳй …'),wd:idx('дёҠиӘІж—Ҙ'),cls:idx('зҸӯеҲҘ'),
    prog:idx('йҖІеәҰ'),tech:idx('жҠҖиЎ“'),note:idx('еӮҷиЁ»'),promo:idx('жҷүзҙҡ'),comp:idx('жҜ”иіҪ'),st:idx('зӢҖж…Ӣ')};
  if(ci.name<0){$('#impPreview').innerHTML='<div class="warnbox">жүҫдёҚеҲ°гҖҢе§“еҗҚгҖҚж¬„дҪҚпјҢи«ӢдҪҝз”ЁзҜ„жң¬ж јејҸгҖӮ</div>';return;}
  const classes=C('classes');
  const existing=C('students');
  const parsed=[]; let nNew=0,nUpd=0,nDup=0,nErr=0;
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(r.every(c=>String(c).trim()===''))continue;
    const errs=[]; const g=k=>ci[k]>=0?String(r[ci[k]]).trim():'';
    const name=g('name');
    let age=g('age'),belt=normBelt(g('belt')),spec=g('spec')||'е°ҡжңӘеҲҶйЎһ',wdRaw=g('wd'),clsName=g('cls');
    if(!name)errs.push('е§“еҗҚз©әзҷҪ');
    if(age&&!ageOK(age))errs.push('е№ҙйҪЎеұӨдёҚжӯЈзўәпјҲйҷҗе№је…’/еңӢе°Ҹ/еңӢдёӯ/жҲҗдәәпјү');
    if(!age)errs.push('е№ҙйҪЎеұӨзјәжјҸ');
    if(belt&&!beltOK(belt))errs.push('зҙҡеҲҘж®өдҪҚдёҚеӯҳеңЁ');
    if(!belt)errs.push('зҙҡеҲҘж®өдҪҚзјәжјҸ');
    if(spec&&!SPECIALTIES.includes(spec))errs.push('з„Ўжі•иҫЁиӯҳзҡ„е°Ҳй …');
    const wd=normWeekdays(wdRaw);
    if(wdRaw&&!wd.length)errs.push('дёҠиӘІж—Ҙж јејҸйҢҜиӘӨ');
    let clsId='';
    if(clsName){const c=classes.find(c=>c.name===clsName);if(c)clsId=c.id;else errs.push('зҸӯеҲҘдёҚеӯҳеңЁпјҡ'+clsName);}
    // йҮҚиӨҮпјҲеҗҢеҗҚеҗҢзҸӯпјү
    const dup=existing.find(s=>s.name===name&&s.class_id===clsId&&s.active);
    const obj={id:dup?dup.id:uid('st'),name,age_group:age,belt_rank:belt,specialty:spec,class_id:clsId,
      weekdays:wd,current_progress:g('prog'),tech:g('tech'),notes:g('note'),
      promotion_status:/жҳҜ|Y|yes|1|вң“/i.test(g('promo')),
      competition_athlete:/жҳҜ|Y|yes|1|вң“/i.test(g('comp')),
      active:!/еҒң|еҒңз”Ё|0|inactive/i.test(g('st')),demo:false};
    let kind='new';
    if(errs.length){kind='err';nErr++;}
    else if(dup){kind='dup';nDup++;nUpd++;}
    else nNew++;
    parsed.push({row:i+1,obj,errs,kind});
  }
  Views._imp=parsed;
  $('#impPreview').innerHTML=`
  <div class="card">
    <div class="row">
      <div class="stat" style="cursor:default"><div class="n" style="color:var(--ok)">${nNew}</div><div class="l">ж–°еўһ</div></div>
      <div class="stat" style="cursor:default"><div class="n" style="color:var(--brand)">${nUpd}</div><div class="l">жӣҙж–°/йҮҚиӨҮ</div></div>
      <div class="stat" style="cursor:default"><div class="n" style="color:var(--bad)">${nErr}</div><div class="l">йҢҜиӘӨ</div></div>
    </div>
    ${nErr?'<div class="warnbox">жңү '+nErr+' зӯҶйҢҜиӘӨиіҮж–ҷпјҢйҖҷдәӣе°ҮдёҚжңғеҢҜе…ҘгҖӮи«Ӣдҝ®жӯЈ Excel еҫҢйҮҚж–°дёҠеӮігҖӮ</div>':'<div class="okbox">иіҮж–ҷжӘўжҹҘйҖҡйҒҺпјҢеҸҜзўәиӘҚеҢҜе…ҘгҖӮ</div>'}
    <div class="scroll" style="max-height:340px;overflow:auto;margin-top:8px"><table class="tbl">
      <tr><th>еҲ—</th><th>е§“еҗҚ</th><th>е№ҙйҪЎ</th><th>зҙҡеҲҘ</th><th>е°Ҳй …</th><th>дёҠиӘІж—Ҙ</th><th>зөҗжһң</th></tr>
      ${parsed.map(p=>`<tr style="${p.kind==='err'?'background:#fef2f2':''}">
        <td>${p.row}</td><td>${esc(p.obj.name)}</td><td>${esc(p.obj.age_group)}</td><td>${esc(p.obj.belt_rank)}</td>
        <td>${esc(p.obj.specialty)}</td><td class="muted">${(p.obj.weekdays||[]).map(w=>WD_SHORT[WEEKDAYS.indexOf(w)]).join('')}</td>
        <td>${p.kind==='err'?'<span style="color:var(--bad)">'+esc(p.errs.join('пјӣ'))+'</span>':p.kind==='dup'?'<span class="tag">жӣҙж–°</span>':'<span class="tag spec">ж–°еўһ</span>'}</td>
      </tr>`).join('')}
    </table></div>
    <button class="btn block ${nErr&&nNew+nUpd===0?'':''}" style="margin-top:10px" onclick="Views.commitImport()">вң… зўәиӘҚеҢҜе…Ҙ ${nNew+nUpd} зӯҶпјҲз•ҘйҒҺ ${nErr} зӯҶйҢҜиӘӨпјү</button>
  </div>`;
};
Views.commitImport=async function(){
  const ok=Views._imp.filter(p=>p.kind!=='err');
  if(!ok.length){toast('жІ’жңүеҸҜеҢҜе…Ҙзҡ„иіҮж–ҷ','warn');return;}
  for(const p of ok)await save('students',p.obj);
  await audit('import','students',null,null,{count:ok.length});
  toast('е·ІеҢҜе…Ҙ '+ok.length+' зӯҶ','ok');
  $('#impPreview').innerHTML='<div class="okbox">вң… еҢҜе…Ҙе®ҢжҲҗпјҢе…ұ '+ok.length+' зӯҶгҖӮ</div>';
  Views._imp=null;
};
</script>

<script>

  $('#gResult').innerHTML=`<div style="margin-top:12px">${notesHtml}</div>
    <div class="row" style="margin:8px 0"><button class="btn sm g" onclick="Views.addGroup()">пјӢ ж–°еўһзө„еҲҘ</button>

    <p class="muted">ж“ҚдҪңпјҡй»һеӯёе“ЎеҫҢеҶҚй»һзӣ®жЁҷзө„еҲҘеҚіеҸҜжҗ¬з§»гҖӮ</p>
    ${gs.map((g,gi)=>`<div class="gcard" data-gi="${gi}" ondragover="event.preventDefault();this.classList.add('drop')" ondragleave="this.classList.remove('drop')" ondrop="Views.dropStu(event,${gi})">
      <div class="gh">
        <b contenteditable onblur="Views._groupState.groups[${gi}].name=this.textContent">${esc(g.name)}</b>
        <span class="tag">${g.group_type}</span><span class="muted">${(g.students||[]).length}дәә</span>
        <div style="flex:1"></div>
        <button class="btn xs g" onclick="Views.delGroup(${gi})">вң•</button>
      </div>
      <div class="row" style="margin-bottom:6px">
        <select onchange="Views._groupState.groups[${gi}].coach_id=this.value" class="grow"><option value="">йҒёж•ҷз·ҙ</option>${coaches.map(c=>`<option value="${c.id}" ${c.id===g.coach_id?'selected':''}>${esc(c.name)}(${ROLE_LABEL[c.role]})</option>`).join('')}</select>
        <select onchange="Views._groupState.groups[${gi}].assistant_id=this.value" class="grow"><option value="">йҒёеҠ©ж•ҷ</option>${coaches.filter(c=>c.role==='assistant').map(c=>`<option value="${c.id}" ${c.id===g.assistant_id?'selected':''}>${esc(c.name)}</option>`).join('')}</select>
      </div>
      <div>${(g.students||[]).map(sid=>`<span class="stu ${Views._selStu===sid?'sel':''}" draggable="true" ondragstart="Views._drag='${sid}'" onclick="Views.pickStu('${sid}',${gi})">${esc(stName(sid))}</span>`).join('')||'<span class="muted">пјҲз©әзө„пјү</span>'}</div>
    </div>`).join('')}
    ${val.unassigned.length?`<div class="gcard" data-gi="-1" ondragover="event.preventDefault();this.classList.add('drop')" ondragleave="this.classList.remove('drop')" ondrop="Views.dropStu(event,-1)"><div class="gh"><b>жңӘеҲҶзө„</b><span class="muted">${val.unassigned.length}дәә</span></div>
      <div class="pool">${val.unassigned.map(s=>`<span class="stu ${Views._selStu===s.id?'sel':''}" draggable="true" ondragstart="Views._drag='${s.id}'" onclick="Views.pickStu('${s.id}',-1)">${esc(s.name)}</span>`).join('')}</div></div>`:''}
    <div class="actionbar"><button class="btn secondary" onclick="App.go('stats','plan')">иҝ”еӣһдәәж•ё</button><span class="sp"></span><button class="btn" onclick="Views.saveGroups(true)">е„ІеӯҳдёҰйҖІе…ҘеӮҷиӘІ</button></div>`;
};
Views._selStu=null;Views._drag=null;
Views.pickStu=function(sid,gi){
  if(Views._selStu===sid){Views._selStu=null;Views.reRenderGroups();return;}
  if(Views._selStu){ // е·ІйҒё -> жҗ¬з§»еҲ° gi
    Views.moveStu(Views._selStu,gi);Views._selStu=null;
  }else{Views._selStu=sid;Views.reRenderGroups();}
};
Views.moveStu=function(sid,toGi){
  const gs=Views._groupState.groups;
  gs.forEach(g=>{g.students=(g.students||[]).filter(x=>x!==sid);});
  if(toGi>=0)gs[toGi].students.push(sid);
  Views.reRenderGroups();
};
Views.dropStu=function(e,gi){e.preventDefault();if(Views._drag){Views.moveStu(Views._drag,gi);Views._drag=null;}};
Views.reRenderGroups=function(){const wd=weekdayOf(State.ctx.date);Views.renderGroups(Stats.studentsFor(State.ctx.classId,wd));};
Views.addGroup=function(){Views._groupState.groups.push({id:uid('g'),name:'ж–°зө„еҲҘ',group_type:'еҹәзӨҺ',coach_id:'',assistant_id:'',students:[]});Views.reRenderGroups();};
Views.delGroup=function(gi){Views._groupState.groups.splice(gi,1);Views.reRenderGroups();};
Views.saveGroups=async function(next){
  const wd=weekdayOf(State.ctx.date);
  const list=Stats.studentsFor(State.ctx.classId,wd);
  const val=Grouping.validate(Views._groupState.groups,list);
  let dp=findDaily(State.ctx.date,State.ctx.classId);
  if(!dp)dp=await ensureDaily(State.ctx.date,State.ctx.classId);
  // жё…жҺүиҲҠ group + е…¶ group block
  const oldGs=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
  for(const g of oldGs)await remove('training_groups',g.id);
  for(const g of Views._groupState.groups){
    await save('training_groups',{id:g.id||uid('g'),daily_plan_id:dp.id,name:g.name,group_type:g.group_type,
      coach_id:g.coach_id||'',assistant_id:g.assistant_id||'',target:g.target||'',notes:g.notes||'',students:g.students||[]});
  }
  await audit('save_groups','training_groups',dp.id,null,{count:Views._groupState.groups.length});
  toast(val.issues.length?'е·Іе„ІеӯҳпјҲд»ҚжңүжҸҗйҶ’пјү':'еҲҶзө„е·Іе„Іеӯҳ','ok');
  if(next)App.go('plan','plan');
};
async function ensureDaily(date,classId){
  let dp=findDaily(date,classId);if(dp)return dp;
  const wkStart=mondayOf(date);
  let wp=C('weekly_plans').find(w=>w.week_start===wkStart&&w.class_id===classId);
  if(!wp)wp=await save('weekly_plans',{id:uid('wp'),week_start:wkStart,week_end:addDays(wkStart,6),class_id:classId,weekly_goal:'',status:'draft',created_by:State.user.id,approved_by:''});
  const list=Stats.studentsFor(classId,weekdayOf(date));
  dp=await save('daily_plans',{id:uid('dp'),weekly_plan_id:wp.id,date,class_id:classId,expected_count:list.length,actual_count:null,status:'draft',revision:1,created_by:State.user.id});
  return dp;
}
</script>

<script>
/* ---------- PLAN (жҜҸж—ҘеӮҷиӘІ 90 еҲҶйҗҳ + иЁҺи«–) ---------- */

      <button class="btn" onclick="Views.createPlan()">е»әз«Ӣд»Ҡж—ҘеӮҷиӘІпјҲ${list.length} дәәпјү</button></div>

  const stName=id=>{const s=C('students').find(x=>x.id===id);return s?s.name:'?';};
  const getBlk=(type,gid=null)=>blocks.find(b=>b.block_type===type&&(gid?b.training_group_id===gid:!b.training_group_id));
  body.innerHTML=`
    <div class="card">
      <div class="row"><h3 style="margin:0">${WEEKDAYS[wd]} иӘІзЁӢ ${badge(dp.status)}</h3><div style="flex:1"></div>
        <span class="muted">й җиЁҲ ${dp.expected_count} дәәгғ»${groups.length} зө„гғ»дҝ®иЁӮ v${dp.revision}</span></div>
      <div class="row" style="margin-top:8px">
        ${dp.status==='lock'?'<div class="warnbox" style="margin:0">иӘІзЁӢе·ІйҺ–е®ҡпјҢеҰӮйңҖдҝ®ж”№и«Ӣз”ұз®ЎзҗҶиҖ…и§ЈйҺ–гҖӮ</div>':`
        <button class="btn sm g" onclick="App.go('groups')">рҹ§© иӘҝж•ҙеҲҶзө„</button>
        <button class="btn sm g" onclick="Views.copyPrev()">рҹ“Ӣ иӨҮиЈҪдёҠе Ӯ</button>
        <select class="grow" id="pStatus" onchange="Views.setStatus('${dp.id}',this.value)">${STATUS.filter(s=>s[0]!=='lock').map(s=>`<option value="${s[0]}" ${dp.status===s[0]?'selected':''}>${s[1]}</option>`).join('')}</select>
        ${(can('publish')||can('*'))?`<button class="btn sm ok" onclick="Views.publish('${dp.id}')">рҹ“ў зҷјеёғ</button>`:''}
        ${can('*')?`<button class="btn sm bad" onclick="Views.lockPlan('${dp.id}')">рҹ”’ йҺ–е®ҡ</button>`:''}`}
      </div>
    </div>
    ${BLOCKS.map(bl=>{
      if(bl.key==='group')return Views.renderGroupBlocks(dp,groups,blocks,canEdit,stName);
      const b=getBlk(bl.key)||{};
      return `<div class="blk ${b.done?'done':''}"><div class="bh" onclick="this.parentNode.querySelector('.bd').classList.toggle('hide')">
        <span class="t">${bl.s}вҖ“${bl.e}вҖІ</span><span class="m">${bl.name}</span>
        <span class="st">${b.done?'вң… е®ҢжҲҗ':'в—Ӣ'}</span></div>
        <div class="bd">${Views.blockForm(dp,bl,b,canEdit)}</div></div>`;
    }).join('')}
    <div class="sect-title">рҹ’¬ ж•ҷз·ҙе…ұеҗҢеӮҷиӘІиЁҺи«–е®Ө</div>
    <div class="card" id="discBox"></div>
    <div class="actionbar"><button class="btn secondary" onclick="App.go('groups','plan')">иҝ”еӣһеҲҶзө„</button><span class="sp"></span><button class="btn" onclick="App.go('confirm','plan')">дёӢдёҖжӯҘпјҡж•ҷз·ҙзўәиӘҚ</button></div>`;
  Views.renderDisc(dp);
};
Views.renderGroupBlocks=function(dp,groups,blocks,canEdit,stName){
  return `<div class="blk"><div class="bh" onclick="this.parentNode.querySelector('.bd').classList.toggle('hide')">
    <span class="t">30вҖ“60вҖІ</span><span class="m">еҲҶзө„иЁ“з·ҙгҖҒеҹәжң¬еӢ•дҪң</span><span class="st">${groups.length} зө„</span></div>
    <div class="bd">${groups.length?groups.map(g=>{
      const b=blocks.find(x=>x.block_type==='group'&&x.training_group_id===g.id)||{};

      return `<div class="gcard"><div class="gh"><b>${esc(g.name)}</b><span class="tag">${g.group_type}</span><span class="muted">${(g.students||[]).length}дәәгғ»${coach?esc(coach.name):'жңӘжҢҮжҙҫ'}</span></div>

      <div class="row"><div class="grow"><label class="sm">еҹәжң¬еӢ•дҪң</label><input value="${esc(b.basic||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','basic',this.value)"></div>

      <div class="row" style="margin-top:6px"><div class="grow"><label class="sm">е“ҒеӢў</label><input value="${esc(b.poomsae||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','poomsae',this.value)"></div>
        <div class="grow"><label class="sm">е°Қз·ҙ</label><input value="${esc(b.spar||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','spar',this.value)"></div></div>
      <div class="row" style="margin-top:6px"><div class="grow"><label class="sm">д»Ҡж—Ҙзӣ®жЁҷ</label><input value="${esc(b.goal||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','goal',this.value)"></div>
        <div class="grow"><label class="sm">еёёиҰӢйҢҜиӘӨ/жіЁж„Ҹ</label><input value="${esc(b.commonErr||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','commonErr',this.value)"></div></div>
      `:`<div class="kv"><b>еҹәжң¬еӢ•дҪң</b><span>${esc(b.basic||'вҖ”')}</span></div><div class="kv"><b>зӣ®жЁҷ</b><span>${esc(b.goal||'вҖ”')}</span></div>`}
      </div>`;
    }).join(''):'<div class="empty">е°ҡжңӘеҲҶзө„пјҢ<a onclick="App.go(\'groups\')">еүҚеҫҖеҲҶзө„</a></div>'}
    </div></div>`;
};
Views.blockForm=function(dp,bl,b,canEdit){
  const set=(f,v)=>`onchange="Views.saveBlockField('${dp.id}','${bl.key}',null,'${f}',this.value)"`;
  const coaches=C('profiles').filter(p=>p.active&&p.role!=='assistant');
  if(!canEdit){
    if(bl.key==='review')return `<div class="kv"><b>иЎЁжҸҡ</b><span>${esc(b.praise||'вҖ”')}</span></div><div class="kv"><b>жҸҗйҶ’</b><span>${esc(b.remind||'вҖ”')}</span></div><div class="kv"><b>еӣһе®¶з·ҙзҝ’</b><span>${esc(b.homework||'вҖ”')}</span></div><div class="kv"><b>дёӢж¬Ўй җе‘Ҡ</b><span>${esc(b.preview||'вҖ”')}</span></div>`;

    <label class="sm">йҖІиЎҢж–№ејҸ</label><select ${set('method')}>${['е…Ёй«”дёҖиө·','е№је…’еҲҶй–Ӣ','жҲҗдәәеҲҶй–Ӣ','еҲҶе…©еҚҖ','иҮӘиЁӮ'].map(o=>`<option ${b.method===o?'selected':''}>${o}</option>`).join('')}</select>`;}
  if(bl.key==='fitness'){extra=`<label class="sm">иғҪеҠӣжЁҷзұӨпјҲй»һйҒёпјү</label><div class="chips" id="fitTags">${ABILITY_TAGS.map(t=>`<span class="chip ${(b.tags||[]).includes(t)?'on':''}" onclick="Views.toggleTag('${dp.id}','${t}')">${t}</span>`).join('')}</div>`;}
  if(bl.key==='apply'){extra=`<label class="sm">иӘІзЁӢйЎһеһӢ</label><select ${set('applyType')}><option value="">йҒёж“Ү</option>${APPLY_TYPES.map(o=>`<option ${b.applyType===o?'selected':''}>${o}</option>`).join('')}</select>
    <div class="infobox" style="margin-top:6px">рҹ’Ў йҠңжҺҘ 30вҖ“60вҖІ еҹәжң¬еӢ•дҪңпјҢдҫӢеҰӮгҖҢеүҚиёўжҺҘж—Ӣиёўзө„еҗҲпјӢиёўйқ¶жҢ‘жҲ°гҖҚгҖӮ</div>`;}
  if(bl.key==='review'){
    return `${extra}
      <div class="field"><label class="sm">д»Ҡж—ҘиЎЁжҸҡ</label><input value="${esc(b.praise||'')}" ${set('praise')}></div>
      <div class="field"><label class="sm">д»Ҡж—ҘжҸҗйҶ’</label><input value="${esc(b.remind||'')}" ${set('remind')}></div>
      <div class="field"><label class="sm">еӣһе®¶з·ҙзҝ’</label><input value="${esc(b.homework||'')}" ${set('homework')}></div>
      <div class="field"><label class="sm">дёӢж¬ЎиӘІзЁӢй җе‘Ҡ</label><input value="${esc(b.preview||'')}" ${set('preview')}></div>
      <div class="field"><label class="sm">ж•ҷз·ҙиЈңе……</label><textarea ${set('note')}>${esc(b.note||'')}</textarea></div>
      <label class="chip ${b.done?'on':''}" onclick="Views.toggleDone('${dp.id}','${bl.key}',null)">вң… е·Іе®ҢжҲҗ</label>`;
  }
  return `${extra}
    <div class="field" style="margin-top:6px"><label class="sm">иӘІзЁӢе…§е®№</label><textarea ${set('content')}>${esc(b.content||'')}</textarea></div>
    <div class="row"><div class="grow"><label class="sm">ж•ҷеӯёзӣ®жЁҷ</label><input value="${esc(b.goal||'')}" ${set('goal')}></div>

    <div class="row" style="margin-top:6px"><div class="grow"><label class="sm">жіЁж„ҸдәӢй …</label><input value="${esc(b.safety_notes||'')}" ${set('safety_notes')}></div>

    <label class="chip ${b.done?'on':''}" style="margin-top:8px" onclick="Views.toggleDone('${dp.id}','${bl.key}',null)">вң… е·Іе®ҢжҲҗ</label>`;
};
Views.createPlan=async function(){await ensureDaily(State.ctx.date,State.ctx.classId);
  // иҮӘеӢ•е»әз«Ӣдә”йҡҺж®өе…Ёй«” block
  const dp=findDaily(State.ctx.date,State.ctx.classId);
  for(const bl of BLOCKS){if(bl.key==='group')continue;
    if(!C('lesson_blocks').find(b=>b.daily_plan_id===dp.id&&b.block_type===bl.key&&!b.training_group_id))
      await save('lesson_blocks',{id:uid('lb'),daily_plan_id:dp.id,training_group_id:null,block_type:bl.key,start_minute:bl.s,end_minute:bl.e,content:'',goal:'',equipment:'',safety_notes:'',done:false});
  }
  toast('е·Іе»әз«ӢеӮҷиӘІ','ok');Views.renderPlan();
};
Views.saveBlockField=async function(dpId,type,gid,field,val){
  let b=C('lesson_blocks').find(x=>x.daily_plan_id===dpId&&x.block_type===type&&(gid?x.training_group_id===gid:!x.training_group_id));
  if(!b){const bl=BLOCKS.find(x=>x.key===type);b={id:uid('lb'),daily_plan_id:dpId,training_group_id:gid||null,block_type:type,start_minute:bl.s,end_minute:bl.e};}
  b[field]=val;await save('lesson_blocks',b);
};
Views.toggleTag=async function(dpId,tag){
  let b=C('lesson_blocks').find(x=>x.daily_plan_id===dpId&&x.block_type==='fitness'&&!x.training_group_id)||{id:uid('lb'),daily_plan_id:dpId,training_group_id:null,block_type:'fitness',start_minute:10,end_minute:30,tags:[]};
  b.tags=b.tags||[];const i=b.tags.indexOf(tag);if(i<0)b.tags.push(tag);else b.tags.splice(i,1);
  await save('lesson_blocks',b);Views.renderPlan();
};
Views.toggleDone=async function(dpId,type,gid){
  let b=C('lesson_blocks').find(x=>x.daily_plan_id===dpId&&x.block_type===type&&(gid?x.training_group_id===gid:!x.training_group_id));
  if(!b){const bl=BLOCKS.find(x=>x.key===type);b={id:uid('lb'),daily_plan_id:dpId,training_group_id:gid||null,block_type:type,start_minute:bl.s,end_minute:bl.e};}
  b.done=!b.done;await save('lesson_blocks',b);Views.renderPlan();
};
Views.applyWarmup=async function(dpId){
  await Views.saveBlockField(dpId,'warmup',null,'content','йӣҶеҗҲгҖҒзҰ®зҜҖгҖҒеҒҡж“ҚгҖҒж…ўи·‘ 4 еңҲ');
  await Views.saveBlockField(dpId,'warmup',null,'goal','ж”¶еҝғгҖҒжҡ–иә«');
  toast('е·ІеҘ—з”ЁжЁҷжә–жҡ–иә«','ok');Views.renderPlan();
};
Views.setStatus=async function(dpId,st){const dp=C('daily_plans').find(d=>d.id===dpId);const old={...dp};dp.status=st;await save('daily_plans',dp);await audit('status','daily_plans',dpId,old,dp);toast('зӢҖж…Ӣпјҡ'+statusMeta(st)[1]);};
Views.publish=async function(dpId){if(!can('publish')&&!can('*')){toast('з„Ўж¬Ҡйҷҗзҷјеёғ','bad');return;}const dp=C('daily_plans').find(d=>d.id===dpId);const old={...dp};dp.status='pub';dp.approved_by=State.user.id;await save('daily_plans',dp);await audit('publish','daily_plans',dpId,old,dp);toast('е·Ізҷјеёғ вң…','ok');if($('#planBody'))Views.renderPlan();else App.go(App.view,App.area);};

Views.copyPrev=async function(){
  // жүҫеҗҢзҸӯеҲҘдёҠдёҖеҖӢжңүеӮҷиӘІзҡ„ж—Ҙжңҹ
  const prev=C('daily_plans').filter(d=>d.class_id===State.ctx.classId&&d.date<State.ctx.date).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!prev){toast('жүҫдёҚеҲ°еҸҜиӨҮиЈҪзҡ„дёҠдёҖе ӮиӘІ','warn');return;}
  const dp=await ensureDaily(State.ctx.date,State.ctx.classId);
  // иӨҮиЈҪ blocksпјҲе…Ёй«”йҡҺж®өпјү
  for(const b of C('lesson_blocks').filter(x=>x.daily_plan_id===prev.id&&!x.training_group_id)){
    let cur=C('lesson_blocks').find(x=>x.daily_plan_id===dp.id&&x.block_type===b.block_type&&!x.training_group_id);
    const copy={...b,id:cur?cur.id:uid('lb'),daily_plan_id:dp.id,done:false};await save('lesson_blocks',copy);
  }
  toast('е·ІиӨҮиЈҪдёҠдёҖе ӮиӘІе…§е®№','ok');Views.renderPlan();
