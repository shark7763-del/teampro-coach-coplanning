<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>TeamPro 教練共同備課系統</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0f172a; --bg2:#1e293b; --card:#ffffff; --ink:#0f172a; --sub:#64748b;
  --line:#e2e8f0; --brand:#4f46e5; --brand2:#6366f1; --ok:#16a34a; --warn:#d97706;
  --bad:#dc2626; --amber:#f59e0b; --green:#22c55e; --red:#ef4444; --pagew:1080px;
  --sh:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:#f1f5f9;color:var(--ink);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%}
button,input,select,textarea{font-family:inherit;font-size:15px}
button{cursor:pointer;border:none;background:none}
a{color:var(--brand);text-decoration:none}
.hide{display:none!important}
/* ---------- login ---------- */
#login{position:fixed;inset:0;background:linear-gradient(160deg,#1e293b,#4f46e5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
#login .box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
#login h1{margin:0 0 4px;font-size:22px}
#login .sub{color:var(--sub);margin:0 0 20px;font-size:13px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#334155}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(79,70,229,.12)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:10px;font-weight:600;background:var(--brand);color:#fff;transition:.15s;white-space:nowrap}
.btn:active{transform:scale(.98)}
.btn.block{width:100%}
.btn.g{background:#f1f5f9;color:#334155;border:1px solid var(--line)}
.btn.ok{background:var(--ok)}.btn.bad{background:var(--bad)}.btn.warn{background:var(--warn)}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:8px}
.btn.xs{padding:4px 9px;font-size:12px;border-radius:7px}
.pinrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.pinrow .who{flex:1;min-width:130px;border:1px solid var(--line);border-radius:10px;padding:8px 10px;text-align:left;background:#fff}
.pinrow .who b{display:block;font-size:14px}
.pinrow .who span{font-size:11px;color:var(--sub)}
.pinrow .who.admin{flex:0 0 100%;background:linear-gradient(135deg,#4f46e5,#6366f1);border:2px solid #4f46e5;color:#fff;padding:16px 16px;box-shadow:0 6px 18px rgba(79,70,229,.35)}
.pinrow .who.admin b{font-size:19px}
.pinrow .who.admin span{font-size:12px;color:rgba(255,255,255,.85)}
.pinrow .who.admin.sel{outline:3px solid #c7d2fe}
/* ---------- shell ---------- */
#shell{max-width:var(--pagew);margin:0 auto;padding:0 0 88px}
#top{position:sticky;top:0;z-index:40;background:rgba(15,23,42,.98);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
#top .logo{font-weight:800;font-size:16px;letter-spacing:.5px}
#top .logo small{font-weight:500;opacity:.7;font-size:11px;display:block;letter-spacing:0}
#top .sp{flex:1}
#top .u{font-size:12px;text-align:right;line-height:1.3}
#top .u b{font-size:13px}
.rolechip{display:inline-block;font-size:10px;background:var(--brand2);padding:1px 7px;border-radius:20px;margin-top:2px}
#nav{display:flex;gap:4px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--line);padding:6px 8px;position:sticky;top:47px;z-index:35;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
#nav button{padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;color:var(--sub);white-space:nowrap}
#nav button.on{background:var(--brand);color:#fff}
#view{padding:14px}
/* bottom nav (mobile quick) */
#bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:45;max-width:var(--pagew);margin:0 auto}
#bnav button{flex:1;padding:8px 2px 6px;font-size:10px;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:2px}
#bnav button.on{color:var(--brand)}
#bnav .ic{font-size:18px;line-height:1}
/* cards */
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--sh)}
.card h3{margin:0 0 10px;font-size:15px;display:flex;align-items:center;gap:8px}
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--sh);cursor:pointer;transition:.15s}
.stat:active{transform:scale(.98)}
.stat .n{font-size:26px;font-weight:800;line-height:1}
.stat .l{font-size:12px;color:var(--sub);margin-top:4px}
.stat .l b{color:var(--brand)}
.sect-title{font-size:13px;font-weight:700;color:var(--sub);margin:18px 2px 8px;text-transform:none}
.hero{background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;border-radius:16px;padding:16px;margin-bottom:14px}
.hero h2{margin:0 0 2px;font-size:18px}
.hero p{margin:0;opacity:.85;font-size:13px}
/* tiles */
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tile{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 12px;text-align:left;box-shadow:var(--sh);display:flex;gap:10px;align-items:center}
.tile .ic{font-size:22px}
.tile b{display:block;font-size:14px}
.tile span{font-size:11px;color:var(--sub)}
/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th,.tbl td{padding:8px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
.tbl th{color:var(--sub);font-weight:600;font-size:12px;background:#f8fafc;position:sticky;top:0}
.tbl tr:active{background:#f8fafc}
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
/* chips / tags */
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--line);background:#fff;color:#475569;cursor:pointer;user-select:none}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.tag{font-size:11px;padding:2px 8px;border-radius:6px;background:#eef2ff;color:#4338ca;font-weight:600}
.tag.age{background:#ecfeff;color:#0e7490}
.tag.belt{background:#fef3c7;color:#92400e}
.tag.spec{background:#f0fdf4;color:#15803d}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
.b-draft{background:#f1f5f9;color:#475569}.b-disc{background:#dbeafe;color:#1d4ed8}
.b-wait{background:#fef3c7;color:#92400e}.b-pub{background:#dcfce7;color:#15803d}
.b-done{background:#e0e7ff;color:#4338ca}.b-lock{background:#fee2e2;color:#991b1b}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.d-g{background:var(--green)}.d-y{background:var(--amber)}.d-r{background:var(--red)}
/* forms */
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.row>.grow{flex:1;min-width:120px}
label.sm{font-size:12px;color:var(--sub);font-weight:600;display:block;margin-bottom:4px}
textarea{resize:vertical;min-height:60px}
.muted{color:var(--sub);font-size:12px}
.empty{text-align:center;padding:30px 16px;color:var(--sub)}
.empty .ic{font-size:36px;opacity:.5}
/* toast */
#toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:90%;max-width:360px}
.tst{background:#0f172a;color:#fff;padding:11px 14px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:pop .2s}
.tst.ok{background:var(--ok)}.tst.bad{background:var(--bad)}.tst.warn{background:var(--warn)}
@keyframes pop{from{opacity:0;transform:translateY(8px)}}
/* modal */
#modal{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:150;display:flex;align-items:flex-end;justify-content:center;padding:0}
#modal .m{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:90vh;overflow:auto;padding:18px}
#modal .m h3{margin:0 0 12px;display:flex;align-items:center}
#modal .m h3 .x{margin-left:auto;font-size:22px;color:var(--sub);cursor:pointer;line-height:1}
/* lesson blocks */
.blk{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.blk .bh{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f8fafc;cursor:pointer}
.blk .bh .t{font-size:14px;font-weight:700}
.blk .bh .m{font-size:11px;color:var(--sub)}
.blk .bh .st{margin-left:auto;font-size:11px}
.blk .bd{padding:12px;border-top:1px solid var(--line)}
.blk.done .bh{background:#f0fdf4}
/* group cards */
.gcard{border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px;background:#fff}
.gcard.drop{border:2px dashed var(--brand);background:#eef2ff}
.gcard .gh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.gcard .gh b{font-size:14px}
.stu{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 9px;border:1px solid var(--line);border-radius:20px;margin:2px;background:#fff;cursor:pointer}
.stu.sel{background:var(--brand);color:#fff;border-color:var(--brand)}
.pool{border:1px dashed var(--line);border-radius:12px;padding:10px;background:#fafbff;min-height:44px}
/* discussion */
.msg{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;background:#fff}
.msg.reply{margin-left:22px;background:#f8fafc}
.msg .mh{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--sub);margin-bottom:4px}
.msg .mh b{color:var(--ink);font-size:13px}
.msg .mb{font-size:14px;white-space:pre-wrap;word-break:break-word}
/* week */
.wk{display:grid;gap:10px}
.wkday{border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px;box-shadow:var(--sh)}
.wkday .wd{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.wkday .wd b{font-size:15px}
.progress{height:6px;background:#eef2ff;border-radius:20px;overflow:hidden;margin-top:6px}
.progress i{display:block;height:100%;background:var(--brand)}
.divider{height:1px;background:var(--line);margin:12px 0}
.kv{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px dashed var(--line);font-size:13px}
.kv:last-child{border-bottom:none}
.kv b{color:var(--sub);font-weight:600}
.warnbox{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px;font-size:13px;color:#92400e;margin:8px 0}
.okbox{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px;font-size:13px;color:#166534;margin:8px 0}
.infobox{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px;font-size:13px;color:#1e40af;margin:8px 0}
.loading{text-align:center;padding:30px;color:var(--sub)}
.spin{width:24px;height:24px;border:3px solid #e2e8f0;border-top-color:var(--brand);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 8px}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:560px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
/* ---------- print / PDF ---------- */
#print{display:none}
@media print{
  @page{size:A4 portrait;margin:12mm}
  body{background:#fff;font-size:12px}
  #shell,#login,#bnav,#toast,#modal{display:none!important}
  #print{display:block!important}
  .pg{page-break-after:always}
  .pg:last-child{page-break-after:auto}
  .no-break{page-break-inside:avoid}
  .ptbl{width:100%;border-collapse:collapse;font-size:11px}
  .ptbl th,.ptbl td{border:1px solid #94a3b8;padding:4px 6px;text-align:left;vertical-align:top}
  .ptbl th{background:#e2e8f0}
  .phead{border-bottom:3px solid #4f46e5;padding-bottom:8px;margin-bottom:12px}
  .phead h1{margin:0;font-size:20px}
  .phead .meta{font-size:11px;color:#475569;margin-top:4px}
  .pday{border:1px solid #94a3b8;border-radius:6px;padding:10px;margin-bottom:12px}
  .pday h2{font-size:14px;margin:0 0 6px;background:#4f46e5;color:#fff;padding:5px 8px;border-radius:4px}
}
</style>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="box">
    <h1>🥋 TeamPro 共同備課</h1>
    <p class="sub">道館教練共同備課系統・請選擇身分登入</p>
    <div id="loginList" class="pinrow"></div>
    <div id="loginAuth">
      <div class="field" style="margin-top:16px">
        <label>PIN 密碼</label>
        <input id="pinInput" type="password" inputmode="numeric" placeholder="輸入 4 位數 PIN" maxlength="8">
      </div>
      <button class="btn block" onclick="App.doLogin()">登入</button>
      <p class="muted" style="text-align:center;margin-top:14px">
        預設 PIN 皆為 <b>1234</b>。
      </p>
    </div>
    <button class="btn g block sm" style="margin-top:8px" onclick="App.seedFromLogin()">🎁 載入示範資料（40 學員／一週課程）</button>
    <button class="btn g block sm" style="margin-top:6px" onclick="App.wipeAll()">🗑️ 清空全部資料</button>
  </div>
</div>

<!-- ============ SHELL ============ -->
<div id="shell" class="hide">
  <div id="top">
    <div class="logo">TeamPro<small>共同備課系統</small></div>
    <div class="sp"></div>
    <div class="u"><b id="uName">—</b><br><span class="rolechip" id="uRole">—</span></div>
    <button class="btn g xs" onclick="App.logout()">登出</button>
  </div>
  <div id="nav"></div>
  <div id="view"></div>
</div>
<div id="bnav" class="hide"></div>

<div id="print"></div>
<div id="toast"></div>

<script>
"use strict";
/* =========================================================================
   TeamPro 教練共同備課系統  —  單檔 HTML + IndexedDB
   ========================================================================= */
const DB_NAME='teampro_planner', DB_VER=1;
/* ⬇⬇⬇ 部署 GAS 後把 /exec 網址貼在這裡，所有人打開同一個網址就會自動雲端同步。
   （也可以登入後在「設定」頁貼上，但要多裝置共用，建議直接寫在這裡再上架。） */
const DEFAULT_SYNC_URL='https://script.google.com/macros/s/AKfycbyPf7Qd2LuIsx-P0z-kdrAMxrsqpvonswGHXHnHrrLaT22EWjXXQYOQGUd29SlNc7Lt/exec';
const STORES=['settings','profiles','students','classes','weekly_plans','daily_plans',
  'training_groups','lesson_blocks','discussions','post_class_reports','course_templates','audit_logs'];

const AGE_GROUPS=['幼兒','國小','國中','成人'];
const BELTS=['白帶','黃帶','黃藍帶','藍帶','藍紅帶','紅帶','紅黑帶','一段','二段','三段','四段以上'];
const SPECIALTIES=['基礎','品勢','對練','健身','黑帶','比賽選手','尚未分類'];
const WEEKDAYS=['星期一','星期二','星期三','星期四','星期五','星期六','星期日'];
const WD_SHORT=['一','二','三','四','五','六','日'];
const BLOCKS=[
  {key:'warmup',  name:'做操、慢跑',        s:0,  e:10},
  {key:'fitness', name:'熱身、基礎體能、遊戲',s:10, e:30},
  {key:'group',   name:'分組訓練、基本動作', s:30, e:60},
  {key:'apply',   name:'應用、組合、挑戰、比賽',s:60, e:85},
  {key:'review',  name:'課程講評',          s:85, e:90},
];
const ABILITY_TAGS=['敏捷','反應','協調','平衡','核心','柔軟度','爆發力','心肺','折返跑','體能遊戲','團隊遊戲','專項暖身'];
const APPLY_TYPES=['應用','組合','挑戰','闖關','小組競賽','品勢演練','踢靶','攻防反應','條件對練','模擬比賽'];
const STATUS=[['draft','草稿','b-draft'],['disc','討論中','b-disc'],['wait','待確認','b-wait'],
  ['pub','已發布','b-pub'],['done','已完成','b-done'],['lock','已鎖定','b-lock']];

/* ---------------- IndexedDB tiny layer ---------------- */
const DB={
  _db:null,
  open(){return new Promise((res,rej)=>{
    const rq=indexedDB.open(DB_NAME,DB_VER);
    rq.onupgradeneeded=e=>{const db=e.target.result;
      STORES.forEach(s=>{ if(!db.objectStoreNames.contains(s)) db.createObjectStore(s,{keyPath:'id'}); });};
    rq.onsuccess=e=>{DB._db=e.target.result;res(DB._db);};
    rq.onerror=e=>rej(e.target.error);
  });},
  _tx(store,mode){return DB._db.transaction(store,mode).objectStore(store);},
  all(store){return new Promise((res,rej)=>{const r=DB._tx(store,'readonly').getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});},
  get(store,id){return new Promise((res,rej)=>{const r=DB._tx(store,'readonly').get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
  put(store,obj){return new Promise((res,rej)=>{const r=DB._tx(store,'readwrite').put(obj);r.onsuccess=()=>res(obj);r.onerror=()=>rej(r.error);});},
  del(store,id){return new Promise((res,rej)=>{const r=DB._tx(store,'readwrite').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});},
  clear(store){return new Promise((res,rej)=>{const r=DB._tx(store,'readwrite').clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});},
  async bulk(store,arr){for(const o of arr) await DB.put(store,o);},
};

/* ---------------- utils ---------------- */
const uid=(p='')=>p+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const nl2=s=>esc(s).replace(/\n/g,'<br>');
function toast(msg,type=''){const t=document.createElement('div');t.className='tst '+type;t.textContent=msg;$('#toast').appendChild(t);setTimeout(()=>t.remove(),2600);}
function todayStr(d=new Date()){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekdayOf(dateStr){const d=new Date(dateStr+'T00:00:00');return (d.getDay()+6)%7;} // 0=Mon
function addDays(dateStr,n){const d=new Date(dateStr+'T00:00:00');d.setDate(d.getDate()+n);return todayStr(d);}
function mondayOf(dateStr){return addDays(dateStr,-weekdayOf(dateStr));}
function statusMeta(s){return STATUS.find(x=>x[0]===s)||STATUS[0];}
function badge(s){const m=statusMeta(s);return `<span class="badge ${m[2]}">${m[1]}</span>`;}
// 標準化上課日字串 -> ["星期一",...]
function normWeekdays(raw){
  if(!raw) return [];
  const map={'一':0,'二':1,'三':2,'四':3,'五':4,'六':5,'日':6,'天':6,'1':0,'2':1,'3':2,'4':3,'5':4,'6':5,'7':6};
  const out=new Set();
  const parts=String(raw).split(/[、,，\/\s和及]+/).filter(Boolean);
  parts.forEach(p=>{p=p.replace(/星期|週|周|禮拜|拜/g,'').trim();
    for(const ch of p){ if(ch in map) out.add(map[ch]); }});
  return [...out].sort((a,b)=>a-b).map(i=>WEEKDAYS[i]);
}
function ageOK(a){return AGE_GROUPS.includes(a);}
function beltOK(b){return BELTS.includes(b);}

/* ---------------- global state ---------------- */
const State={user:null, cache:{}, ctx:{date:todayStr(),classId:null}};
async function reload(store){State.cache[store]=await DB.all(store);return State.cache[store];}
async function reloadAll(){for(const s of STORES) await reload(s);}
const C=store=>State.cache[store]||[];
async function save(store,obj){obj.id=obj.id||uid();obj._u=Date.now();await DB.put(store,obj);await reload(store);if(typeof SYNC!=='undefined')SYNC.push(store,obj);return obj;}

/* =========================================================================
   SYNC —— GAS 雲端同步層（多裝置各自手機共用同一份資料）
   push: 每次存檔即時上傳(佇列合批)  pull: 定時/切頁把雲端變更拉回  LWW by _u
   ========================================================================= */
const SYNC={
  status:'—',
  url(){try{return (settings().syncUrl||DEFAULT_SYNC_URL||'').trim();}catch(e){return (DEFAULT_SYNC_URL||'').trim();}},
  enabled(){return !!SYNC.url();},
  lastPull(){return +(localStorage.getItem('tp_lastpull')||0);},
  setLastPull(v){localStorage.setItem('tp_lastpull',v);},
  async post(payload){
    const res=await fetch(SYNC.url(),{method:'POST',body:JSON.stringify(payload)});
    return await res.json();
  },
  _q:[], _busy:false,
  push(store,obj){if(!SYNC.enabled())return;SYNC._q.push({store,id:obj.id,json:JSON.stringify(obj),deleted:false});SYNC._flush();},
  pushDelete(store,id){if(!SYNC.enabled())return;SYNC._q.push({store,id,json:'',deleted:true});SYNC._flush();},
  async _flush(){
    if(SYNC._busy||!SYNC._q.length||!SYNC.enabled())return;
    SYNC._busy=true;
    const batch=SYNC._q.splice(0,SYNC._q.length);
    try{await SYNC.post({action:'push',records:batch});SYNC.status='已同步 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}
    catch(e){SYNC._q.unshift(...batch);SYNC.status='上傳失敗，稍後重試';setTimeout(()=>SYNC._flush(),4000);}
    SYNC._busy=false;
    if(SYNC._q.length)setTimeout(()=>SYNC._flush(),1500);
  },
  async pull(){
    if(!SYNC.enabled())return{changed:0};
    let r;try{r=await SYNC.post({action:'pull',since:SYNC.lastPull()});}catch(e){SYNC.status='連線失敗';return{changed:0,err:e.message};}
    if(!r||!r.ok)return{changed:0};
    let changed=0;
    for(const rec of r.records){
      const local=(State.cache[rec.store]||[]).find(x=>x.id===rec.id);
      if(rec.deleted){if(local){await DB.del(rec.store,rec.id);changed++;}continue;}
      let obj;try{obj=JSON.parse(rec.json);}catch(e){continue;}
      if(!local || (obj._u||0)>(local._u||0)){await DB.put(rec.store,obj);changed++;}
    }
    if(changed)await reloadAll();
    SYNC.setLastPull(r.maxSrv||r.srv||SYNC.lastPull());
    SYNC.status='已更新 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    return {changed};
  },
  // 主帳號第一次上傳 / 重置雲端：全量覆蓋（會清掉雲端舊資料再寫入目前本機）
  async replaceAll(){
    if(!SYNC.enabled())throw new Error('尚未設定同步網址');
    const recs=[];
    for(const s of STORES)for(const o of C(s))recs.push({store:s,id:o.id,json:JSON.stringify(o),deleted:false});
    const r=await SYNC.post({action:'replaceAll',records:recs});
    SYNC.setLastPull(0); // 之後 pull 會重新對齊
    return r;
  },
  _timer:null,
  startAuto(){
    if(SYNC._timer)clearInterval(SYNC._timer);
    if(!SYNC.enabled())return;
    SYNC._timer=setInterval(async()=>{
      if(!State.user)return;
      const {changed}=await SYNC.pull();
      if(changed)App.refresh();
    },15000);
  },
};

/* =========================================================================
   PERMISSIONS
   ========================================================================= */
const ROLE_LABEL={admin:'管理者',head:'主教練',assistant:'助教'};
function can(action){
  const r=State.user?.role;
  const P={
    admin:['*'],
    head:['view','stats','group','plan','discuss','publish','report','assign','template','pdf'],
    assistant:['view','discuss','report','mytasks'],
  };
  const list=P[r]||[];
  return list.includes('*')||list.includes(action);
}

<script>
/* =========================================================================
   STATS ENGINE
   ========================================================================= */
const Stats={
  // 某班別 某星期(0-6) 的學員
  studentsFor(classId,weekdayIdx){
    return C('students').filter(s=>{
      if(!s.active) return false;
      if(classId && s.class_id!==classId) return false;
      if(weekdayIdx!=null){
        const wds=(s.weekdays||[]);
        if(!wds.includes(WEEKDAYS[weekdayIdx])) return false;
      }
      return true;
    });
  },
  summary(list){
    const r={total:list.length,age:{},belt:{},spec:{},promo:0,comp:0};
    AGE_GROUPS.forEach(a=>r.age[a]=0); BELTS.forEach(b=>r.belt[b]=0); SPECIALTIES.forEach(s=>r.spec[s]=0);
    list.forEach(s=>{
      if(r.age[s.age_group]!=null)r.age[s.age_group]++;
      if(r.belt[s.belt_rank]!=null)r.belt[s.belt_rank]++;
      if(r.spec[s.specialty]!=null)r.spec[s.specialty]++;
      if(s.promotion_status)r.promo++;
      if(s.competition_athlete)r.comp++;
    });
    return r;
  },
  coachesAvailable(weekdayIdx){
    return C('profiles').filter(p=>p.active&&(p.role==='head'||p.role==='assistant')&&
      (!p.available_weekdays||!p.available_weekdays.length||p.available_weekdays.includes(WEEKDAYS[weekdayIdx])));
  }
};

/* =========================================================================
   GROUPING ENGINE  —  產生分組建議
   ========================================================================= */
const Grouping={
  limit(type){const l=settings().limits;return l[type]||l.default||12;},
  tierOf(belt){const t=settings().tiers;for(const k in t){if(t[k].includes(belt))return k;}return '初階';},
  suggest(list,mode,coachCount){
    // 回傳 {groups:[{name,type,students:[],reason,coachNeed}], notes:[]}
    const notes=[]; let groups=[];
    const mk=(name,type,students,reason)=>({id:uid('g'),name,group_type:type,students:students.map(s=>s.id),
      reason, coachNeed:Math.max(1,Math.ceil(students.length/this.limit(type)))});
    const byKey=(arr,fn)=>{const m={};arr.forEach(s=>{const k=fn(s);(m[k]=m[k]||[]).push(s);});return m;};
    if(mode==='age'){
      const m=byKey(list,s=>s.age_group);
      AGE_GROUPS.forEach(a=>{if(m[a]&&m[a].length)groups.push(mk(a+'組','基礎',m[a],`${a}共有 ${m[a].length} 人，依年齡層獨立成組。`));});
    }else if(mode==='belt'){
      const m=byKey(list,s=>s.belt_rank);
      BELTS.forEach(b=>{if(m[b]&&m[b].length)groups.push(mk(b+'組','基礎',m[b],`${b}共有 ${m[b].length} 人。`));});
    }else if(mode==='poomsae_spar'){
      const p=list.filter(s=>['品勢','黑帶'].includes(s.specialty));
      const sp=list.filter(s=>['對練','比賽選手'].includes(s.specialty));
      const other=list.filter(s=>!['品勢','黑帶','對練','比賽選手'].includes(s.specialty));
      if(p.length)groups.push(mk('品勢組','品勢',p,`品勢／黑帶共 ${p.length} 人。`));
      if(sp.length)groups.push(mk('對練組','對練',sp,`對練／比賽選手共 ${sp.length} 人。`));
      if(other.length)groups.push(mk('基礎組','基礎',other,`其餘 ${other.length} 人歸基礎組。`));
    }else if(mode==='level'){
      const m=byKey(list,s=>this.tierOf(s.belt_rank));
      ['初階','中階','高階'].forEach(t=>{if(m[t]&&m[t].length)groups.push(mk(t+'組','基礎',m[t],`${t}（${settings().tiers[t].join('、')}）共 ${m[t].length} 人。`));});
    }else if(mode==='kids'){
      const kids=list.filter(s=>s.age_group==='幼兒');
      const rest=list.filter(s=>s.age_group!=='幼兒');
      if(kids.length)groups.push(mk('幼兒組','幼兒',kids,`幼兒共有 ${kids.length} 人，建議獨立成組，安排專責教練。`));
      if(rest.length)groups.push(mk('一般組','基礎',rest,`其餘 ${rest.length} 人。`));
    }else if(mode==='adult'){
      const ad=list.filter(s=>s.age_group==='成人');
      const rest=list.filter(s=>s.age_group!=='成人');
      if(ad.length)groups.push(mk('成人組','健身',ad,`成人共有 ${ad.length} 人，獨立成組。`));
      if(rest.length)groups.push(mk('青少年組','基礎',rest,`其餘 ${rest.length} 人。`));
    }else if(mode==='promo'){
      const pr=list.filter(s=>s.promotion_status);
      const rest=list.filter(s=>!s.promotion_status);
      if(pr.length)groups.push(mk('晉級加強組','基礎',pr,`準備晉級共 ${pr.length} 人，集中加強。`));
      if(rest.length)groups.push(mk('一般組','基礎',rest,`其餘 ${rest.length} 人。`));
    }else if(mode==='comp'){
      const cp=list.filter(s=>s.competition_athlete);
      const rest=list.filter(s=>!s.competition_athlete);
      if(cp.length)groups.push(mk('比賽選手組','比賽選手',cp,`比賽選手共 ${cp.length} 人，專項強化。`));
      if(rest.length)groups.push(mk('一般組','基礎',rest,`其餘 ${rest.length} 人。`));
    }else{ // smart 綜合建議：專項>年齡>級別
      const spec=byKey(list,s=>{
        if(['品勢','黑帶'].includes(s.specialty))return '品勢';
        if(['對練','比賽選手'].includes(s.specialty))return '對練';
        if(s.age_group==='幼兒')return '幼兒';
        if(s.age_group==='成人')return '成人';
        return '基礎';
      });
      ['幼兒','基礎','品勢','對練','成人'].forEach(k=>{
        const arr=spec[k]; if(!arr||!arr.length)return;
        const type=k==='幼兒'?'幼兒':(k==='成人'?'健身':k);
        const lim=this.limit(type);
        if(arr.length>lim && (k==='品勢'||k==='對練'||k==='基礎')){
          // 依級別拆初階/進階
          const lo=arr.filter(s=>this.tierOf(s.belt_rank)==='初階');
          const hi=arr.filter(s=>this.tierOf(s.belt_rank)!=='初階');
          if(lo.length)groups.push(mk(k+'（初階）',type,lo,`${k}共 ${arr.length} 人超過建議上限 ${lim}，依級別拆為初階 ${lo.length} 人。`));
          if(hi.length)groups.push(mk(k+'（進階）',type,hi,`${k}進階 ${hi.length} 人。`));
        }else{
          groups.push(mk(k+'組',type,arr,`${k}共 ${arr.length} 人${k==='幼兒'?'，建議獨立成組並安排 1 位教練':''}。`));
        }
      });
    }
    // 教練需求提醒
    const need=groups.reduce((a,g)=>a+g.coachNeed,0);
    if(coachCount!=null && need>coachCount) notes.push(`本次分組共需 ${need} 位教練／助教，但今日僅 ${coachCount} 位可出席，請調整分組或課程模式。`);
    groups.forEach(g=>{if(g.students.length>this.limit(g.group_type))notes.push(`「${g.name}」${g.students.length} 人超過建議上限 ${this.limit(g.group_type)}，建議再拆分。`);});
    return {groups,notes};
  },
  // 驗證目前分組
  validate(groups,list){
    const issues=[]; const assigned={};
    groups.forEach(g=>{
      (g.students||[]).forEach(sid=>{
        if(assigned[sid])issues.push({t:'dup',msg:`學員重複出現在「${assigned[sid]}」與「${g.name}」`});
        assigned[sid]=g.name;
      });
      if(!g.coach_id)issues.push({t:'nocoach',msg:`「${g.name}」尚未指派教練`});
      if((g.students||[]).length>this.limit(g.group_type))issues.push({t:'over',msg:`「${g.name}」人數 ${g.students.length} 超過上限 ${this.limit(g.group_type)}`});
    });
    const un=list.filter(s=>!assigned[s.id]);
    if(un.length)issues.push({t:'unassigned',msg:`有 ${un.length} 位學員尚未分組：${un.slice(0,6).map(s=>s.name).join('、')}${un.length>6?'…':''}`});
    // 同教練同時段兩組
    const coachMap={};
    groups.forEach(g=>{if(g.coach_id){coachMap[g.coach_id]=(coachMap[g.coach_id]||0)+1;}});
    Object.entries(coachMap).forEach(([cid,n])=>{if(n>1){const c=C('profiles').find(p=>p.id===cid);issues.push({t:'conflict',msg:`教練「${c?.name||''}」同時被指派到 ${n} 組`});}});
    return {issues,unassigned:un};
  }
};
</script>

    await save('discussions',{id:uid('ds'),daily_plan_id:dp.id,training_group_id:null,lesson_block_id:null,
      author_id:'u_head',author_name:'林伊辰教練',message:'幼兒有獨立成組，10–30 分鐘請助教一帶協調遊戲。',parent_id:null,created_at:Date.now()-86400000,reads:['u_admin']});

      author_id:'u_head2',author_name:'林俊傑教練',message:'對練組週末有比賽，60–85 分鐘改成距離與反擊訓練。',parent_id:null,created_at:Date.now()-3600000,reads:[]});
  }
  // 課後紀錄範例（週一）
  const monDp=C('daily_plans').find(d=>d.date===wkStart);

    await save('post_class_reports',{id:uid('pr'),daily_plan_id:monDp.id,training_group_id:null,coach_id:'u_head',

      next_lesson:'下堂課銜接：旋踢連續踢靶、加入後踢入門。',safety_event:'無',good:'學員05、學員18',weak:'學員22 重心',adjust:'幼兒組減 1 人',created_at:Date.now()});

  // 課程模板
  const tpl=[
    {id:uid('tp'),name:'標準暖身（0-10）',category:'warmup',age_groups:['全'],belt_ranks:['全'],duration:10,content:'集合、禮節、做操、慢跑',goal:'收心暖身',equipment:''},
    {id:uid('tp'),name:'敏捷反應體能（10-30）',category:'fitness',age_groups:['國小','國中'],belt_ranks:['全'],duration:20,content:'敏捷梯、反應球、折返跑、核心',goal:'敏捷/核心',equipment:'敏捷梯、反應球'},
    {id:uid('tp'),name:'前踢旋踢挑戰（60-85）',category:'apply',age_groups:['全'],belt_ranks:['白帶','黃帶','黃藍帶'],duration:25,content:'組合踢、踢靶挑戰、小組競賽',goal:'組合應用',equipment:'腳靶'},
  ];
  await DB.bulk('course_templates',tpl);
  await reloadAll();
}
async function wipeData(reloadAfter=true){
  for(const s of STORES) await DB.clear(s);
  if(reloadAfter)await reloadAll();
}
</script>

<script>
/* =========================================================================
   APP  —  router + views
   ========================================================================= */
const App={
  view:'home',
  async boot(){
    await DB.open(); await reloadAll();
    if(SYNC.enabled()){                       // 有雲端就先把資料拉下來再顯示登入
      $('#loginList')&&($('#loginList').innerHTML='<div class="loading" style="width:100%"><div class="spin"></div>連線雲端同步中…</div>');
      try{await SYNC.pull();}catch(e){}
    }
    this.renderLogin();
    SYNC.startAuto();
    const saved=localStorage.getItem('tp_user');
    if(saved){const u=C('profiles').find(p=>p.id===saved&&p.active);if(u){this.enter(u);return;}}
  },
  refresh(){
    // 雲端有新資料時重繪目前頁面；正在打字或開著彈窗就先不打斷
    if($('#modal'))return;
    const ae=document.activeElement;
    if(ae&&/INPUT|TEXTAREA|SELECT/.test(ae.tagName))return;
    if(State.user&&this.view)this.go(this.view);
  },
  renderLogin(){
    const ord={admin:0,head:1,assistant:2};
    const ps=C('profiles').filter(p=>p.active).sort((a,b)=>(ord[a.role]??9)-(ord[b.role]??9)||String(a.name).localeCompare(String(b.name),'zh-Hant'));
    const auth=$('#loginAuth');
    if(!ps.length){
      if(auth)auth.style.display='none';
      $('#loginList').innerHTML='<div style="width:100%;text-align:center"><p class="muted" style="margin:0 0 10px">👋 第一次使用，請先點下面按鈕建立示範資料<br>（40 位學員＋教練帳號＋一週課程）。</p><button class="btn ok block" onclick="App.seedFromLogin()">🎁 開始：建立示範資料</button></div>';
      return;
    }
    if(auth)auth.style.display='';
    $('#loginList').innerHTML=ps.map(p=>{const a=p.role==='admin';
      return `<button class="who${a?' admin':''}" onclick="App.pick('${p.id}')" data-id="${p.id}">
      <b>${a?'👑 ':''}${esc(p.name)}</b><span>${ROLE_LABEL[p.role]}${a?'・點我登入':(p.phone?'・'+esc(p.phone):'')}</span></button>`;}).join('');
    this._pick=null;
  },
  pick(id){this._pick=id;document.querySelectorAll('#loginList .who').forEach(b=>{const on=b.dataset.id===id;b.classList.toggle('sel',on);if(!b.classList.contains('admin'))b.style.borderColor=on?'var(--brand)':'var(--line)';});},
  doLogin(){
    if(!this._pick){toast('請先選擇身分','warn');return;}
    const u=C('profiles').find(p=>p.id===this._pick);
    const pin=$('#pinInput').value.trim();
    if((u.pin||'1234')!==pin){toast('PIN 錯誤','bad');return;}
    localStorage.setItem('tp_user',u.id);
    this.enter(u);
  },
  enter(u){
    State.user=u;
    $('#login').classList.add('hide');
    $('#shell').classList.remove('hide');$('#bnav').classList.remove('hide');
    $('#uName').textContent=u.name;$('#uRole').textContent=ROLE_LABEL[u.role];
    this.buildNav();
    this.go(u.role==='assistant'?'mytasks':'home');
    toast('歡迎回來，'+u.name,'ok');
  },
  logout(){State.user=null;localStorage.removeItem('tp_user');$('#shell').classList.add('hide');$('#bnav').classList.add('hide');$('#login').classList.remove('hide');this.renderLogin();},
  async seedFromLogin(){
    const hasData=C('profiles').length>0;
    if(hasData && !confirm('載入示範資料會清空現有資料，確定？'))return;
    $('#loginList').innerHTML='<div class="loading" style="width:100%"><div class="spin"></div>建立示範資料中…</div>';
    try{
      await seedDemo();
      const n=C('profiles').length;
      if(!n) throw new Error('建立完成但找不到帳號（profiles=0）');
      if(SYNC.enabled()){try{await SYNC.replaceAll();}catch(e){toast('雲端上傳失敗：'+e.message,'warn');}}
      this.renderLogin();
      toast('已載入 '+n+' 個帳號'+(SYNC.enabled()?'並上傳雲端':'')+'，請點上方身分登入','ok');
    }catch(err){
      $('#loginList').innerHTML='<div style="width:100%"><div class="warnbox" style="text-align:left">❌ 載入示範資料失敗：<br><b>'+esc(err.message)+'</b><br><br>請把這行訊息截圖給我。</div><button class="btn ok block" onclick="App.seedFromLogin()">🔄 再試一次</button></div>';
    }
  },
  async wipeAll(){if(!confirm('確定清空全部資料？此動作無法復原。'))return;await wipeData();this.renderLogin();toast('已清空','ok');},

  NAV:[
    ['home','🏠 首頁',['admin','head']],
    ['mytasks','📋 今日任務',['admin','head','assistant']],
    ['stats','📊 今日人數',['admin','head']],
    ['students','👥 學員',['admin','head']],
    ['groups','🧩 分組建議',['admin','head']],
    ['plan','📝 每日備課',['admin','head','assistant']],
    ['week','🗓️ 整週計畫',['admin','head']],
    ['report','✅ 課後紀錄',['admin','head','assistant']],
    ['import','📥 Excel 匯入',['admin']],
    ['classes','🏫 班別',['admin']],
    ['coaches','🧑‍🏫 教練',['admin']],
    ['templates','📚 課程模板',['admin','head']],
    ['pdf','🖨️ PDF 輸出',['admin','head']],
    ['settings','⚙️ 設定',['admin']],
  ],
  buildNav(){
    const r=State.user.role;
    const items=this.NAV.filter(n=>n[2].includes(r));
    $('#nav').innerHTML=items.map(n=>`<button data-v="${n[0]}" onclick="App.go('${n[0]}')">${n[1]}</button>`).join('');
    // bottom nav: 5 primary
    const prim=r==='assistant'?['mytasks','plan','report']:['home','stats','plan','week','pdf'];
    $('#bnav').innerHTML=prim.map(v=>{const n=this.NAV.find(x=>x[0]===v);if(!n)return'';const[ic,...t]=n[1].split(' ');
      return `<button data-b="${v}" onclick="App.go('${v}')"><span class="ic">${ic}</span>${t.join(' ')}</button>`;}).join('');
  },
  go(v){
    if(!can('view')&&v!=='mytasks'){} // baseline
    this.view=v;
    document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
    document.querySelectorAll('#bnav button').forEach(b=>b.classList.toggle('on',b.dataset.b===v));
    window.scrollTo(0,0);
    const fn='view_'+v;
    if(Views[fn])Views[fn]($('#view'));else $('#view').innerHTML='<div class="empty">頁面建置中</div>';
  },
};

/* ---------- modal helper ---------- */
const Modal={
  open(title,html,onOpen){
    let m=$('#modal'); if(!m){m=document.createElement('div');m.id='modal';document.body.appendChild(m);}
    m.innerHTML=`<div class="m"><h3>${title}<span class="x" onclick="Modal.close()">×</span></h3>${html}</div>`;
    m.onclick=e=>{if(e.target===m)Modal.close();};
    if(onOpen)onOpen(m);
  },
  close(){const m=$('#modal');if(m)m.remove();}
};
</script>

<script>

function tile(v,ic,t,sub){return `<button class="tile" onclick="App.go('${v}')"><span class="ic">${ic}</span><span><b>${t}</b><span>${sub}</span></span></button>`;}
function findDaily(date,classId){return C('daily_plans').find(d=>d.date===date&&(!classId||d.class_id===classId));}
function countMyTasks(){
  const uid2=State.user.id, td=todayStr();
  const dps=C('daily_plans').filter(d=>d.date===td);
  let n=0;
  dps.forEach(dp=>{C('training_groups').filter(g=>g.daily_plan_id===dp.id&&(g.coach_id===uid2||g.assistant_id===uid2)).forEach(()=>n++);});
  return n;
}

/* ---------- STATS ---------- */
Views.view_stats=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  const wd=weekdayOf(State.ctx.date);

  <div class="card">

      <div class="grow"><label class="sm">日期</label><input type="date" id="stDate" value="${State.ctx.date}"></div>

    ${AGE_GROUPS.map(a=>`<div class="stat" onclick="Stats.show('age','${a}')"><div class="n">${sm.age[a]}</div><div class="l">${a}</div></div>`).join('')}
    <div class="stat" onclick="Stats.show('promo')"><div class="n">${sm.promo}</div><div class="l"><b>準備晉級</b></div></div>
    <div class="stat" onclick="Stats.show('comp')"><div class="n">${sm.comp}</div><div class="l"><b>比賽選手</b></div></div>
    <div class="stat"><div class="n">${coaches.length}</div><div class="l">今日可出席教練</div></div>
  </div>
  <div class="sect-title">級別 / 段位</div>
  <div class="grid g4">${BELTS.filter(b=>sm.belt[b]).map(b=>`<div class="stat" onclick="Stats.show('belt','${b}')"><div class="n">${sm.belt[b]}</div><div class="l">${b}</div></div>`).join('')||'<div class="muted">無資料</div>'}</div>
  <div class="sect-title">專項</div>

  $('#stDate').onchange=e=>{State.ctx.date=e.target.value;App.go('stats');};
  $('#stClass').onchange=e=>{State.ctx.classId=e.target.value||null;App.go('stats');};
};
Stats.show=function(kind,val){
  const wd=weekdayOf(State.ctx.date);
  let list=Stats.studentsFor(State.ctx.classId,wd);
  let title='名單';
  if(kind==='age'){list=list.filter(s=>s.age_group===val);title=val;}
  else if(kind==='belt'){list=list.filter(s=>s.belt_rank===val);title=val;}
  else if(kind==='spec'){list=list.filter(s=>s.specialty===val);title=val;}
  else if(kind==='promo'){list=list.filter(s=>s.promotion_status);title='準備晉級';}
  else if(kind==='comp'){list=list.filter(s=>s.competition_athlete);title='比賽選手';}
  Modal.open(title+`（${list.length} 人）`,
    `<div class="scroll"><table class="tbl"><tr><th>姓名</th><th>年齡</th><th>級別</th><th>專項</th></tr>
    ${list.map(s=>`<tr><td>${esc(s.name)}</td><td><span class="tag age">${s.age_group}</span></td><td><span class="tag belt">${s.belt_rank}</span></td><td><span class="tag spec">${s.specialty}</span></td></tr>`).join('')}
    </table></div>`);
};
function ensureClassCtx(){if(State.ctx.classId&&!C('classes').find(c=>c.id===State.ctx.classId&&c.active))State.ctx.classId=null;}

/* ---------- STUDENTS ---------- */
Views.view_students=function(el){
  el.innerHTML=`
  <div class="card">
    <div class="row">
      <input class="grow" id="stuSearch" placeholder="🔍 搜尋姓名/備註">
      ${can('*')?'<button class="btn sm" onclick="Views.editStudent()">＋ 新增</button>':''}
    </div>
    <div class="row" style="margin-top:8px">
      <select id="fAge"><option value="">全部年齡</option>${AGE_GROUPS.map(a=>`<option>${a}</option>`).join('')}</select>
      <select id="fBelt"><option value="">全部級別</option>${BELTS.map(b=>`<option>${b}</option>`).join('')}</select>

Views.editStudent=function(id){

      <div class="grow field"><label>技術動作</label><input id="es_tech" value="${esc(s.tech||'')}" placeholder="例：前踢、旋踢"></div>
    </div>
    <div class="field"><label>備註</label><textarea id="es_notes">${esc(s.notes||'')}</textarea></div>
    <div class="row" style="margin-top:6px">
      <button class="btn block" onclick="Views.saveStudent('${id||''}')">儲存</button>
      ${id?`<button class="btn bad sm" onclick="Views.delStudent('${id}')">刪除</button>`:''}
    </div>`,
    m=>{m.querySelectorAll('#es_wd .chip').forEach(c=>c.onclick=()=>c.classList.toggle('on'));

Views.saveStudent=async function(id){

    notes:$('#es_notes').value.trim(),
    promotion_status:$('#es_promo').classList.contains('on'),
    competition_athlete:$('#es_comp').classList.contains('on'),active:true});

Views.delStudent=async function(id){if(!can('*')){toast('無權限','bad');return;}if(!confirm('確定刪除？'))return;await remove('students',id);await audit('delete','students',id);Modal.close();toast('已刪除','ok');App.go('students');};

<script>
/* ---------- IMPORT (Excel) ---------- */
Views.view_import=function(el){
  el.innerHTML=`
  <div class="card">
    <h3>📥 Excel / CSV 學員匯入</h3>
    <p class="muted">必要欄位：姓名、年齡層、級別段位、專項、固定上課日、班別。選填：品勢進度、技術動作、備註、是否準備晉級、是否為比賽選手、狀態。</p>
    <div class="row" style="margin-top:8px">
      <button class="btn g sm" onclick="Views.dlTemplate()">⬇️ 下載 Excel 範本</button>
      <label class="btn sm">📁 選擇檔案<input type="file" id="impFile" accept=".xlsx,.xls,.csv" style="display:none"></label>
    </div>
  </div>
  <div id="impPreview"></div>`;
  $('#impFile').onchange=Views.parseImport;
};
Views.dlTemplate=function(){
  const rows=[['姓名','年齡層','級別段位','專項','固定上課日','班別','品勢進度','技術動作','備註','是否準備晉級','是否為比賽選手','狀態'],
    ['王小明','國小','黃帶','基礎','一、三、五','週一晚班','太極一章','前踢、旋踢','認真','否','否','啟用'],
    ['陳大華','國中','藍帶','品勢','星期二、星期四','週二晚班','太極三章','橫踢、後踢','','是','否','啟用'],
    ['林阿成','幼兒','白帶','基礎','週六','週六上午班','','基本站姿、前踢','需家長陪同','否','否','啟用']];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'學員名單');
  XLSX.writeFile(wb,'學員名單範本.xlsx');
  toast('範本已下載','ok');
};
Views._imp=null;
Views.parseImport=function(e){
  const f=e.target.files[0]; if(!f)return;
  const reader=new FileReader();
  $('#impPreview').innerHTML='<div class="loading"><div class="spin"></div>解析中…</div>';
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      Views.validateImport(rows);
    }catch(err){$('#impPreview').innerHTML=`<div class="warnbox">解析失敗：${esc(err.message)}</div>`;}
  };
  reader.readAsBinaryString(f);
};
Views.validateImport=function(rows){
  if(!rows.length){$('#impPreview').innerHTML='<div class="warnbox">檔案為空</div>';return;}
  const header=rows[0].map(h=>String(h).trim());
  const idx=n=>header.findIndex(h=>h.includes(n));
  const ci={name:idx('姓名'),age:idx('年齡'),belt:idx('級別'),spec:idx('專項'),wd:idx('上課日'),cls:idx('班別'),
    prog:idx('進度'),tech:idx('技術'),note:idx('備註'),promo:idx('晉級'),comp:idx('比賽'),st:idx('狀態')};
  if(ci.name<0){$('#impPreview').innerHTML='<div class="warnbox">找不到「姓名」欄位，請使用範本格式。</div>';return;}
  const classes=C('classes');
  const existing=C('students');
  const parsed=[]; let nNew=0,nUpd=0,nDup=0,nErr=0;
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(r.every(c=>String(c).trim()===''))continue;
    const errs=[]; const g=k=>ci[k]>=0?String(r[ci[k]]).trim():'';
    const name=g('name');
    let age=g('age'),belt=g('belt'),spec=g('spec')||'尚未分類',wdRaw=g('wd'),clsName=g('cls');
    if(!name)errs.push('姓名空白');
    if(age&&!ageOK(age))errs.push('年齡層不正確（限幼兒/國小/國中/成人）');
    if(!age)errs.push('年齡層缺漏');
    if(belt&&!beltOK(belt))errs.push('級別段位不存在');
    if(!belt)errs.push('級別段位缺漏');
    if(spec&&!SPECIALTIES.includes(spec))errs.push('無法辨識的專項');
    const wd=normWeekdays(wdRaw);
    if(wdRaw&&!wd.length)errs.push('上課日格式錯誤');
    let clsId='';
    if(clsName){const c=classes.find(c=>c.name===clsName);if(c)clsId=c.id;else errs.push('班別不存在：'+clsName);}
    // 重複（同名同班）
    const dup=existing.find(s=>s.name===name&&s.class_id===clsId&&s.active);
    const obj={id:dup?dup.id:uid('st'),name,age_group:age,belt_rank:belt,specialty:spec,class_id:clsId,
      weekdays:wd,current_progress:g('prog'),tech:g('tech'),notes:g('note'),
      promotion_status:/是|Y|yes|1|✓/i.test(g('promo')),
      competition_athlete:/是|Y|yes|1|✓/i.test(g('comp')),
      active:!/停|停用|0|inactive/i.test(g('st')),demo:false};
    let kind='new';
    if(errs.length){kind='err';nErr++;}
    else if(dup){kind='dup';nDup++;nUpd++;}
    else nNew++;
    parsed.push({row:i+1,obj,errs,kind});
  }
  Views._imp=parsed;
  $('#impPreview').innerHTML=`
  <div class="card">
    <div class="row">
      <div class="stat" style="cursor:default"><div class="n" style="color:var(--ok)">${nNew}</div><div class="l">新增</div></div>
      <div class="stat" style="cursor:default"><div class="n" style="color:var(--brand)">${nUpd}</div><div class="l">更新/重複</div></div>
      <div class="stat" style="cursor:default"><div class="n" style="color:var(--bad)">${nErr}</div><div class="l">錯誤</div></div>
    </div>
    ${nErr?'<div class="warnbox">有 '+nErr+' 筆錯誤資料，這些將不會匯入。請修正 Excel 後重新上傳。</div>':'<div class="okbox">資料檢查通過，可確認匯入。</div>'}
    <div class="scroll" style="max-height:340px;overflow:auto;margin-top:8px"><table class="tbl">
      <tr><th>列</th><th>姓名</th><th>年齡</th><th>級別</th><th>專項</th><th>上課日</th><th>結果</th></tr>
      ${parsed.map(p=>`<tr style="${p.kind==='err'?'background:#fef2f2':''}">
        <td>${p.row}</td><td>${esc(p.obj.name)}</td><td>${esc(p.obj.age_group)}</td><td>${esc(p.obj.belt_rank)}</td>
        <td>${esc(p.obj.specialty)}</td><td class="muted">${(p.obj.weekdays||[]).map(w=>WD_SHORT[WEEKDAYS.indexOf(w)]).join('')}</td>
        <td>${p.kind==='err'?'<span style="color:var(--bad)">'+esc(p.errs.join('；'))+'</span>':p.kind==='dup'?'<span class="tag">更新</span>':'<span class="tag spec">新增</span>'}</td>
      </tr>`).join('')}
    </table></div>
    <button class="btn block ${nErr&&nNew+nUpd===0?'':''}" style="margin-top:10px" onclick="Views.commitImport()">✅ 確認匯入 ${nNew+nUpd} 筆（略過 ${nErr} 筆錯誤）</button>
  </div>`;
};
Views.commitImport=async function(){
  const ok=Views._imp.filter(p=>p.kind!=='err');
  if(!ok.length){toast('沒有可匯入的資料','warn');return;}
  for(const p of ok)await save('students',p.obj);
  await audit('import','students',null,null,{count:ok.length});
  toast('已匯入 '+ok.length+' 筆','ok');
  $('#impPreview').innerHTML='<div class="okbox">✅ 匯入完成，共 '+ok.length+' 筆。</div>';
  Views._imp=null;
};
</script>
