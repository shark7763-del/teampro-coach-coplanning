<script>
/* ---------- GROUPS (分組建議 + 拖曳/點選調整) ---------- */
Views._groupState=null;
Views.view_groups=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const wd=weekdayOf(State.ctx.date);
  const list=Stats.studentsFor(State.ctx.classId,wd);
  el.innerHTML=`
  <div class="card">
    <div class="row">
      <div class="grow"><label class="sm">日期</label><input type="date" id="gDate" value="${State.ctx.date}"></div>
      <div class="grow"><label class="sm">班別</label><select id="gClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
    </div>
    <p class="muted" style="margin:8px 0 0">${WEEKDAYS[wd]}・共 ${list.length} 人・可出席教練 ${Stats.coachesAvailable(wd).length} 位</p>
    <div class="sect-title" style="margin-top:12px">選擇分組模式</div>
    <div class="chips" id="gModes">
      ${[['smart','智慧綜合建議'],['age','依年齡層'],['belt','依級別段位'],['poomsae_spar','品勢/對練'],['level','初中高階'],['kids','幼兒獨立'],['adult','成人獨立'],['promo','晉級加強'],['comp','比賽選手']].map(m=>`<span class="chip" data-m="${m[0]}">${m[1]}</span>`).join('')}
    </div>
    <button class="btn block" style="margin-top:10px" onclick="Views.genGroups()">🧩 產生分組建議</button>
  </div>
  <div id="gResult"></div>`;
  $('#gDate').onchange=e=>{State.ctx.date=e.target.value;App.go('groups');};
  $('#gClass').onchange=e=>{State.ctx.classId=e.target.value;App.go('groups');};
  let mode='smart';
  document.querySelectorAll('#gModes .chip').forEach(c=>{if(c.dataset.m==='smart')c.classList.add('on');c.onclick=()=>{document.querySelectorAll('#gModes .chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');mode=c.dataset.m;};});
  Views._gMode=()=>mode;
  // 若已存在該日分組，載入
  const dp=findDaily(State.ctx.date,State.ctx.classId);
  if(dp){const gs=C('training_groups').filter(g=>g.daily_plan_id===dp.id);if(gs.length){Views._groupState={groups:gs.map(g=>({...g,students:[...(g.students||[])]})),notes:[]};Views.renderGroups(list);}}
};
Views.genGroups=function(){
  const wd=weekdayOf(State.ctx.date);
  const list=Stats.studentsFor(State.ctx.classId,wd);
  if(!list.length){toast('此日無學員','warn');return;}
  const res=Grouping.suggest(list,Views._gMode(),Stats.coachesAvailable(wd).length);
  Views._groupState={groups:res.groups,notes:res.notes};
  Views.renderGroups(list);
  toast('已產生 '+res.groups.length+' 組','ok');
};
Views.renderGroups=function(list){
  const gs=Views._groupState.groups;
  const val=Grouping.validate(gs,list);
  const coaches=C('profiles').filter(p=>p.active&&(p.role==='head'||p.role==='assistant'));
  const stName=id=>{const s=C('students').find(x=>x.id===id);return s?s.name:'?';};
  const notesHtml=(Views._groupState.notes||[]).map(n=>`<div class="infobox">💡 ${esc(n)}</div>`).join('')
    +(val.issues.map(i=>`<div class="warnbox">⚠️ ${esc(i.msg)}</div>`).join(''))
    +(val.issues.length?'':'<div class="okbox">✅ 分組檢查通過</div>');
  $('#gResult').innerHTML=`<div style="margin-top:12px">${notesHtml}</div>
    <div class="row" style="margin:8px 0"><button class="btn sm g" onclick="Views.addGroup()">＋ 新增組別</button>
      <button class="btn sm ok" onclick="Views.saveGroups()">💾 儲存分組到今日備課</button></div>
    <p class="muted">操作：點學員後再點目標組別即可搬移。</p>
    ${gs.map((g,gi)=>`<div class="gcard" data-gi="${gi}" ondragover="event.preventDefault();this.classList.add('drop')" ondragleave="this.classList.remove('drop')" ondrop="Views.dropStu(event,${gi})">
      <div class="gh">
        <b contenteditable onblur="Views._groupState.groups[${gi}].name=this.textContent">${esc(g.name)}</b>
        <span class="tag">${g.group_type}</span><span class="muted">${(g.students||[]).length}人</span>
        <div style="flex:1"></div>
        <button class="btn xs g" onclick="Views.delGroup(${gi})">✕</button>
      </div>
      <div class="row" style="margin-bottom:6px">
        <select onchange="Views._groupState.groups[${gi}].coach_id=this.value" class="grow"><option value="">選教練</option>${coaches.map(c=>`<option value="${c.id}" ${c.id===g.coach_id?'selected':''}>${esc(c.name)}(${ROLE_LABEL[c.role]})</option>`).join('')}</select>
        <select onchange="Views._groupState.groups[${gi}].assistant_id=this.value" class="grow"><option value="">選助教</option>${coaches.filter(c=>c.role==='assistant').map(c=>`<option value="${c.id}" ${c.id===g.assistant_id?'selected':''}>${esc(c.name)}</option>`).join('')}</select>
      </div>
      <div>${(g.students||[]).map(sid=>`<span class="stu ${Views._selStu===sid?'sel':''}" draggable="true" ondragstart="Views._drag='${sid}'" onclick="Views.pickStu('${sid}',${gi})">${esc(stName(sid))}</span>`).join('')||'<span class="muted">（空組）</span>'}</div>
    </div>`).join('')}
    ${val.unassigned.length?`<div class="gcard" data-gi="-1" ondragover="event.preventDefault();this.classList.add('drop')" ondragleave="this.classList.remove('drop')" ondrop="Views.dropStu(event,-1)"><div class="gh"><b>未分組</b><span class="muted">${val.unassigned.length}人</span></div>
      <div class="pool">${val.unassigned.map(s=>`<span class="stu ${Views._selStu===s.id?'sel':''}" draggable="true" ondragstart="Views._drag='${s.id}'" onclick="Views.pickStu('${s.id}',-1)">${esc(s.name)}</span>`).join('')}</div></div>`:''}`;
};
Views._selStu=null;Views._drag=null;
Views.pickStu=function(sid,gi){
  if(Views._selStu===sid){Views._selStu=null;Views.reRenderGroups();return;}
  if(Views._selStu){ // 已選 -> 搬移到 gi
    Views.moveStu(Views._selStu,gi);Views._selStu=null;
  }else{Views._selStu=sid;Views.reRenderGroups();}
};
Views.moveStu=function(sid,toGi){
  const gs=Views._groupState.groups;
  gs.forEach(g=>{g.students=(g.students||[]).filter(x=>x!==sid);});
  if(toGi>=0)gs[toGi].students.push(sid);
  Views.reRenderGroups();
};
Views.dropStu=function(e,gi){e.preventDefault();if(Views._drag){Views.moveStu(Views._drag,gi);Views._drag=null;}};
Views.reRenderGroups=function(){const wd=weekdayOf(State.ctx.date);Views.renderGroups(Stats.studentsFor(State.ctx.classId,wd));};
Views.addGroup=function(){Views._groupState.groups.push({id:uid('g'),name:'新組別',group_type:'基礎',coach_id:'',assistant_id:'',students:[]});Views.reRenderGroups();};
Views.delGroup=function(gi){Views._groupState.groups.splice(gi,1);Views.reRenderGroups();};
Views.saveGroups=async function(){
  const wd=weekdayOf(State.ctx.date);
  const list=Stats.studentsFor(State.ctx.classId,wd);
  const val=Grouping.validate(Views._groupState.groups,list);
  let dp=findDaily(State.ctx.date,State.ctx.classId);
  if(!dp)dp=await ensureDaily(State.ctx.date,State.ctx.classId);
  // 清掉舊 group + 其 group block
  const oldGs=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
  for(const g of oldGs)await remove('training_groups',g.id);
  for(const g of Views._groupState.groups){
    await save('training_groups',{id:g.id||uid('g'),daily_plan_id:dp.id,name:g.name,group_type:g.group_type,
      coach_id:g.coach_id||'',assistant_id:g.assistant_id||'',target:g.target||'',notes:g.notes||'',students:g.students||[]});
  }
  await audit('save_groups','training_groups',dp.id,null,{count:Views._groupState.groups.length});
  toast(val.issues.length?'已儲存（仍有提醒）':'分組已儲存','ok');
};
async function ensureDaily(date,classId){
  let dp=findDaily(date,classId);if(dp)return dp;
  const wkStart=mondayOf(date);
  let wp=C('weekly_plans').find(w=>w.week_start===wkStart&&w.class_id===classId);
  if(!wp)wp=await save('weekly_plans',{id:uid('wp'),week_start:wkStart,week_end:addDays(wkStart,6),class_id:classId,weekly_goal:'',status:'draft',created_by:State.user.id,approved_by:''});
  const list=Stats.studentsFor(classId,weekdayOf(date));
  dp=await save('daily_plans',{id:uid('dp'),weekly_plan_id:wp.id,date,class_id:classId,expected_count:list.length,actual_count:null,status:'draft',revision:1,created_by:State.user.id});
  return dp;
}
</script>

<script>
/* ---------- PLAN (每日備課 90 分鐘 + 討論) ---------- */
Views.view_plan=async function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const wd=weekdayOf(State.ctx.date);
  el.innerHTML=`
  <div class="card">
    <div class="row">
      <div class="grow"><label class="sm">日期</label><input type="date" id="pDate" value="${State.ctx.date}"></div>
      <div class="grow"><label class="sm">班別</label><select id="pClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
    </div>
  </div>
  <div id="planBody"></div>`;
  $('#pDate').onchange=e=>{State.ctx.date=e.target.value;App.go('plan');};
  $('#pClass').onchange=e=>{State.ctx.classId=e.target.value;App.go('plan');};
  Views.renderPlan();
};
Views.renderPlan=function(){
  const dp=findDaily(State.ctx.date,State.ctx.classId);
  const body=$('#planBody');
  const wd=weekdayOf(State.ctx.date);
  const list=Stats.studentsFor(State.ctx.classId,wd);
  if(!dp){
    body.innerHTML=`<div class="empty"><div class="ic">📝</div>此日尚未建立備課<br><br>
      <button class="btn" onclick="Views.createPlan()">建立今日備課（${list.length} 人）</button></div>
      <div class="sect-title">快速帶入</div>
      <button class="btn g block sm" onclick="Views.copyPrev()">📋 複製上一堂課</button>`;
    return;
  }
  const groups=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
  const blocks=C('lesson_blocks').filter(b=>b.daily_plan_id===dp.id);
  const canEdit=dp.status!=='lock'&&(can('plan')||State.user.role==='head'||can('*'));
  const stName=id=>{const s=C('students').find(x=>x.id===id);return s?s.name:'?';};
  const getBlk=(type,gid=null)=>blocks.find(b=>b.block_type===type&&(gid?b.training_group_id===gid:!b.training_group_id));
  body.innerHTML=`
    <div class="card">
      <div class="row"><h3 style="margin:0">${WEEKDAYS[wd]} 課程 ${badge(dp.status)}</h3><div style="flex:1"></div>
        <span class="muted">預計 ${dp.expected_count} 人・${groups.length} 組・修訂 v${dp.revision}</span></div>
      <div class="row" style="margin-top:8px">
        ${dp.status==='lock'?'<div class="warnbox" style="margin:0">課程已鎖定，如需修改請由管理者解鎖。</div>':`
        <button class="btn sm g" onclick="App.go('groups')">🧩 調整分組</button>
        <button class="btn sm g" onclick="Views.copyPrev()">📋 複製上堂</button>
        <select class="grow" id="pStatus" onchange="Views.setStatus('${dp.id}',this.value)">${STATUS.filter(s=>s[0]!=='lock').map(s=>`<option value="${s[0]}" ${dp.status===s[0]?'selected':''}>${s[1]}</option>`).join('')}</select>
        ${(can('publish')||can('*'))?`<button class="btn sm ok" onclick="Views.publish('${dp.id}')">📢 發布</button>`:''}
        ${can('*')?`<button class="btn sm bad" onclick="Views.lockPlan('${dp.id}')">🔒 鎖定</button>`:''}`}
      </div>
    </div>
    ${BLOCKS.map(bl=>{
      if(bl.key==='group')return Views.renderGroupBlocks(dp,groups,blocks,canEdit,stName);
      const b=getBlk(bl.key)||{};
      return `<div class="blk ${b.done?'done':''}"><div class="bh" onclick="this.parentNode.querySelector('.bd').classList.toggle('hide')">
        <span class="t">${bl.s}–${bl.e}′</span><span class="m">${bl.name}</span>
        <span class="st">${b.done?'✅ 完成':'○'}</span></div>
        <div class="bd">${Views.blockForm(dp,bl,b,canEdit)}</div></div>`;
    }).join('')}
    <div class="sect-title">💬 教練共同備課討論室</div>
    <div class="card" id="discBox"></div>`;
  Views.renderDisc(dp);
};
Views.renderGroupBlocks=function(dp,groups,blocks,canEdit,stName){
  return `<div class="blk"><div class="bh" onclick="this.parentNode.querySelector('.bd').classList.toggle('hide')">
    <span class="t">30–60′</span><span class="m">分組訓練、基本動作</span><span class="st">${groups.length} 組</span></div>
    <div class="bd">${groups.length?groups.map(g=>{
      const b=blocks.find(x=>x.block_type==='group'&&x.training_group_id===g.id)||{};
      const coach=C('profiles').find(p=>p.id===g.coach_id);
      return `<div class="gcard"><div class="gh"><b>${esc(g.name)}</b><span class="tag">${g.group_type}</span><span class="muted">${(g.students||[]).length}人・${coach?esc(coach.name):'未指派'}</span></div>
      <div class="muted" style="margin-bottom:6px">${(g.students||[]).map(stName).join('、')||'（空組）'}</div>
      ${canEdit?`
      <div class="row"><div class="grow"><label class="sm">基本動作</label><input value="${esc(b.basic||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','basic',this.value)"></div>
        <div class="grow"><label class="sm">腿法</label><input value="${esc(b.kick||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','kick',this.value)"></div></div>
      <div class="row" style="margin-top:6px"><div class="grow"><label class="sm">品勢</label><input value="${esc(b.poomsae||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','poomsae',this.value)"></div>
        <div class="grow"><label class="sm">對練</label><input value="${esc(b.spar||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','spar',this.value)"></div></div>
      <div class="row" style="margin-top:6px"><div class="grow"><label class="sm">今日目標</label><input value="${esc(b.goal||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','goal',this.value)"></div>
        <div class="grow"><label class="sm">常見錯誤/注意</label><input value="${esc(b.commonErr||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','commonErr',this.value)"></div></div>
      `:`<div class="kv"><b>基本動作</b><span>${esc(b.basic||'—')}</span></div><div class="kv"><b>目標</b><span>${esc(b.goal||'—')}</span></div>`}
      </div>`;
    }).join(''):'<div class="empty">尚未分組，<a onclick="App.go(\'groups\')">前往分組</a></div>'}
    </div></div>`;
};
Views.blockForm=function(dp,bl,b,canEdit){
  const set=(f,v)=>`onchange="Views.saveBlockField('${dp.id}','${bl.key}',null,'${f}',this.value)"`;
  const coaches=C('profiles').filter(p=>p.active&&p.role!=='assistant');
  if(!canEdit){
    if(bl.key==='review')return `<div class="kv"><b>表揚</b><span>${esc(b.praise||'—')}</span></div><div class="kv"><b>提醒</b><span>${esc(b.remind||'—')}</span></div><div class="kv"><b>回家練習</b><span>${esc(b.homework||'—')}</span></div><div class="kv"><b>下次預告</b><span>${esc(b.preview||'—')}</span></div>`;
    return `<div class="kv"><b>內容</b><span>${esc(b.content||'—')}</span></div><div class="kv"><b>目標</b><span>${esc(b.goal||'—')}</span></div><div class="kv"><b>器材</b><span>${esc(b.equipment||'—')}</span></div>`;
  }
  let extra='';
  if(bl.key==='warmup'){extra=`<button class="btn xs g" style="margin-bottom:6px" onclick="Views.applyWarmup('${dp.id}')">⚡ 一鍵套用標準暖身</button>
    <label class="sm">進行方式</label><select ${set('method')}>${['全體一起','幼兒分開','成人分開','分兩區','自訂'].map(o=>`<option ${b.method===o?'selected':''}>${o}</option>`).join('')}</select>`;}
  if(bl.key==='fitness'){extra=`<label class="sm">能力標籤（點選）</label><div class="chips" id="fitTags">${ABILITY_TAGS.map(t=>`<span class="chip ${(b.tags||[]).includes(t)?'on':''}" onclick="Views.toggleTag('${dp.id}','${t}')">${t}</span>`).join('')}</div>`;}
  if(bl.key==='apply'){extra=`<label class="sm">課程類型</label><select ${set('applyType')}><option value="">選擇</option>${APPLY_TYPES.map(o=>`<option ${b.applyType===o?'selected':''}>${o}</option>`).join('')}</select>
    <div class="infobox" style="margin-top:6px">💡 銜接 30–60′ 基本動作，例如「前踢接旋踢組合＋踢靶挑戰」。</div>`;}
  if(bl.key==='review'){
    return `${extra}
      <div class="field"><label class="sm">今日表揚</label><input value="${esc(b.praise||'')}" ${set('praise')}></div>
      <div class="field"><label class="sm">今日提醒</label><input value="${esc(b.remind||'')}" ${set('remind')}></div>
      <div class="field"><label class="sm">回家練習</label><input value="${esc(b.homework||'')}" ${set('homework')}></div>
      <div class="field"><label class="sm">下次課程預告</label><input value="${esc(b.preview||'')}" ${set('preview')}></div>
      <div class="field"><label class="sm">教練補充</label><textarea ${set('note')}>${esc(b.note||'')}</textarea></div>
      <label class="chip ${b.done?'on':''}" onclick="Views.toggleDone('${dp.id}','${bl.key}',null)">✅ 已完成</label>`;
  }
  return `${extra}
    <div class="field" style="margin-top:6px"><label class="sm">課程內容</label><textarea ${set('content')}>${esc(b.content||'')}</textarea></div>
    <div class="row"><div class="grow"><label class="sm">教學目標</label><input value="${esc(b.goal||'')}" ${set('goal')}></div>
      <div class="grow"><label class="sm">器材</label><input value="${esc(b.equipment||'')}" ${set('equipment')}></div></div>
    <div class="row" style="margin-top:6px"><div class="grow"><label class="sm">注意事項</label><input value="${esc(b.safety_notes||'')}" ${set('safety_notes')}></div>
      <div class="grow"><label class="sm">負責教練</label><select ${set('responsible_coach_id')}><option value="">—</option>${coaches.map(c=>`<option value="${c.id}" ${c.id===b.responsible_coach_id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div></div>
    <label class="chip ${b.done?'on':''}" style="margin-top:8px" onclick="Views.toggleDone('${dp.id}','${bl.key}',null)">✅ 已完成</label>`;
};
Views.createPlan=async function(){await ensureDaily(State.ctx.date,State.ctx.classId);
  // 自動建立五階段全體 block
  const dp=findDaily(State.ctx.date,State.ctx.classId);
  for(const bl of BLOCKS){if(bl.key==='group')continue;
    if(!C('lesson_blocks').find(b=>b.daily_plan_id===dp.id&&b.block_type===bl.key&&!b.training_group_id))
      await save('lesson_blocks',{id:uid('lb'),daily_plan_id:dp.id,training_group_id:null,block_type:bl.key,start_minute:bl.s,end_minute:bl.e,content:'',goal:'',equipment:'',safety_notes:'',done:false});
  }
  toast('已建立備課','ok');Views.renderPlan();
};
Views.saveBlockField=async function(dpId,type,gid,field,val){
  let b=C('lesson_blocks').find(x=>x.daily_plan_id===dpId&&x.block_type===type&&(gid?x.training_group_id===gid:!x.training_group_id));
  if(!b){const bl=BLOCKS.find(x=>x.key===type);b={id:uid('lb'),daily_plan_id:dpId,training_group_id:gid||null,block_type:type,start_minute:bl.s,end_minute:bl.e};}
  b[field]=val;await save('lesson_blocks',b);
};
Views.toggleTag=async function(dpId,tag){
  let b=C('lesson_blocks').find(x=>x.daily_plan_id===dpId&&x.block_type==='fitness'&&!x.training_group_id)||{id:uid('lb'),daily_plan_id:dpId,training_group_id:null,block_type:'fitness',start_minute:10,end_minute:30,tags:[]};
  b.tags=b.tags||[];const i=b.tags.indexOf(tag);if(i<0)b.tags.push(tag);else b.tags.splice(i,1);
  await save('lesson_blocks',b);Views.renderPlan();
};
Views.toggleDone=async function(dpId,type,gid){
  let b=C('lesson_blocks').find(x=>x.daily_plan_id===dpId&&x.block_type===type&&(gid?x.training_group_id===gid:!x.training_group_id));
  if(!b){const bl=BLOCKS.find(x=>x.key===type);b={id:uid('lb'),daily_plan_id:dpId,training_group_id:gid||null,block_type:type,start_minute:bl.s,end_minute:bl.e};}
  b.done=!b.done;await save('lesson_blocks',b);Views.renderPlan();
};
Views.applyWarmup=async function(dpId){
  await Views.saveBlockField(dpId,'warmup',null,'content','集合、禮節、做操、慢跑 4 圈');
  await Views.saveBlockField(dpId,'warmup',null,'goal','收心、暖身');
  toast('已套用標準暖身','ok');Views.renderPlan();
};
Views.setStatus=async function(dpId,st){const dp=C('daily_plans').find(d=>d.id===dpId);const old={...dp};dp.status=st;await save('daily_plans',dp);await audit('status','daily_plans',dpId,old,dp);toast('狀態：'+statusMeta(st)[1]);};
Views.publish=async function(dpId){if(!can('publish')&&!can('*')){toast('無權限發布','bad');return;}const dp=C('daily_plans').find(d=>d.id===dpId);const old={...dp};dp.status='pub';dp.approved_by=State.user.id;await save('daily_plans',dp);await audit('publish','daily_plans',dpId,old,dp);toast('已發布 ✅','ok');Views.renderPlan();};
Views.lockPlan=async function(dpId){if(!confirm('鎖定後只有管理者可修改，確定？'))return;const dp=C('daily_plans').find(d=>d.id===dpId);dp.status='lock';await save('daily_plans',dp);await audit('lock','daily_plans',dpId);toast('已鎖定 🔒');Views.renderPlan();};
Views.copyPrev=async function(){
  // 找同班別上一個有備課的日期
  const prev=C('daily_plans').filter(d=>d.class_id===State.ctx.classId&&d.date<State.ctx.date).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!prev){toast('找不到可複製的上一堂課','warn');return;}
  const dp=await ensureDaily(State.ctx.date,State.ctx.classId);
  // 複製 blocks（全體階段）
  for(const b of C('lesson_blocks').filter(x=>x.daily_plan_id===prev.id&&!x.training_group_id)){
    let cur=C('lesson_blocks').find(x=>x.daily_plan_id===dp.id&&x.block_type===b.block_type&&!x.training_group_id);
    const copy={...b,id:cur?cur.id:uid('lb'),daily_plan_id:dp.id,done:false};await save('lesson_blocks',copy);
  }
  toast('已複製上一堂課內容','ok');Views.renderPlan();
};
/* discussion */
Views.renderDisc=function(dp){
  const box=$('#discBox');if(!box)return;
  const msgs=C('discussions').filter(d=>d.daily_plan_id===dp.id).sort((a,b)=>a.created_at-b.created_at);
  const top=msgs.filter(m=>!m.parent_id);
  const coaches=C('profiles').filter(p=>p.active);
  box.innerHTML=`
    <div class="field"><textarea id="dMsg" placeholder="輸入討論內容，可 @教練姓名…"></textarea>
      <div class="row" style="margin-top:6px"><select id="dBlk" class="grow"><option value="">整體</option>${BLOCKS.map(b=>`<option value="${b.key}">${b.s}-${b.e}′ ${b.name}</option>`).join('')}</select>
      <button class="btn sm" onclick="Views.postDisc('${dp.id}',null)">送出</button></div></div>
    ${top.length?top.map(m=>Views.msgHtml(m,msgs)).join(''):'<div class="empty">尚無討論，開始共同備課吧！</div>'}`;
};
Views.msgHtml=function(m,all){
  const replies=all.filter(x=>x.parent_id===m.id);
  const readCnt=(m.reads||[]).length;
  return `<div class="msg"><div class="mh"><b>${esc(m.author_name)}</b>
    <span>${new Date(m.created_at).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
    ${m.block?`<span class="tag">${BLOCKS.find(b=>b.key===m.block)?.name||''}</span>`:''}
    ${m.edited?'<span class="muted">（已編輯）</span>':''}<span style="flex:1"></span><span class="muted">👁 ${readCnt}</span></div>
    <div class="mb">${nl2(m.message)}</div>
    <div class="row" style="margin-top:4px"><button class="btn xs g" onclick="Views.replyTo('${m.id}')">回覆</button>
      ${m.author_id===State.user.id?`<button class="btn xs g" onclick="Views.editMsg('${m.id}')">編輯</button>`:''}</div>
    ${replies.map(r=>`<div class="msg reply"><div class="mh"><b>${esc(r.author_name)}</b><span>${new Date(r.created_at).toLocaleString('zh-TW',{hour:'2-digit',minute:'2-digit'})}</span></div><div class="mb">${nl2(r.message)}</div></div>`).join('')}`;
};
Views.postDisc=async function(dpId,parentId){
  const msg=$('#dMsg').value.trim();if(!msg){toast('請輸入內容','warn');return;}
  await save('discussions',{id:uid('ds'),daily_plan_id:dpId,training_group_id:null,lesson_block_id:$('#dBlk')?.value||null,block:$('#dBlk')?.value||null,
    author_id:State.user.id,author_name:State.user.name,message:msg,parent_id:parentId,created_at:Date.now(),reads:[State.user.id]});
  const dp=C('daily_plans').find(d=>d.id===dpId);
  Views.renderDisc(dp);toast('已發布留言','ok');
};
Views.replyTo=function(mid){
  Modal.open('回覆留言',`<textarea id="rMsg" placeholder="輸入回覆…"></textarea><button class="btn block" style="margin-top:8px" onclick="Views.doReply('${mid}')">送出回覆</button>`);
};
Views.doReply=async function(mid){
  const parent=C('discussions').find(d=>d.id===mid);const msg=$('#rMsg').value.trim();if(!msg)return;
  await save('discussions',{id:uid('ds'),daily_plan_id:parent.daily_plan_id,parent_id:mid,author_id:State.user.id,author_name:State.user.name,message:msg,created_at:Date.now(),reads:[State.user.id]});
  Modal.close();Views.renderDisc(C('daily_plans').find(d=>d.id===parent.daily_plan_id));
};
Views.editMsg=function(mid){
  const m=C('discussions').find(d=>d.id===mid);
  Modal.open('編輯留言',`<textarea id="eMsg">${esc(m.message)}</textarea><button class="btn block" style="margin-top:8px" onclick="Views.doEditMsg('${mid}')">儲存</button>`);
};
Views.doEditMsg=async function(mid){const m=C('discussions').find(d=>d.id===mid);m.message=$('#eMsg').value.trim();m.edited=true;m.edited_by=State.user.name;await save('discussions',m);Modal.close();Views.renderDisc(C('daily_plans').find(d=>d.id===m.daily_plan_id));};
</script>

<script>
/* ---------- WEEK (整週計畫) ---------- */
Views.view_week=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const wkStart=mondayOf(State.ctx.date);
  el.innerHTML=`
  <div class="card">
    <div class="row">
      <div class="grow"><label class="sm">班別</label><select id="wClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
      <button class="btn sm g" onclick="Views.weekNav(-7)">← 上週</button>
      <button class="btn sm g" onclick="Views.weekNav(7)">下週 →</button>
    </div>
    <p class="muted" style="margin:8px 0 0">週次：${wkStart} ~ ${addDays(wkStart,6)}</p>
    <div class="field" style="margin-top:8px"><label class="sm">本週教學目標</label><input id="wGoal" placeholder="例：前踢與旋踢基本到組合應用"></div>
    <div class="row"><button class="btn sm" onclick="Views.saveWeekGoal()">儲存目標</button>
      <button class="btn sm g" onclick="Views.copyLastWeek()">📋 複製上週</button></div>
  </div>
  <div id="weekAnalysis"></div>
  <div class="wk" id="weekGrid"></div>`;
  $('#wClass').onchange=e=>{State.ctx.classId=e.target.value;App.go('week');};
  const wp=C('weekly_plans').find(w=>w.week_start===wkStart&&w.class_id===State.ctx.classId);
  if(wp)$('#wGoal').value=wp.weekly_goal||'';
  Views.renderWeek(wkStart);
};
Views.weekNav=function(n){State.ctx.date=addDays(mondayOf(State.ctx.date),n);App.go('week');};
Views.renderWeek=function(wkStart){
  const cls=C('classes').find(c=>c.id===State.ctx.classId);
  const activeWd=(cls?.weekdays||WEEKDAYS);
  const grid=$('#weekGrid');
  let analysisTags={};ABILITY_TAGS.forEach(t=>analysisTags[t]=0);let applyN=0,poomN=0,sparN=0;
  grid.innerHTML=WEEKDAYS.map((w,i)=>{
    const date=addDays(wkStart,i);
    const dp=findDaily(date,State.ctx.classId);
    const list=Stats.studentsFor(State.ctx.classId,i);
    const isClassDay=activeWd.includes(w);
    if(dp){
      const blocks=C('lesson_blocks').filter(b=>b.daily_plan_id===dp.id);
      const groups=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
      blocks.forEach(b=>{(b.tags||[]).forEach(t=>{if(analysisTags[t]!=null)analysisTags[t]++;});if(b.block_type==='apply'&&b.applyType)applyN++;if(b.poomsae)poomN++;if(b.spar)sparN++;});
      const filled=blocks.filter(b=>b.content||b.basic||b.praise).length;
      const totalB=4+groups.length;
      const sm=Stats.summary(list);
      return `<div class="wkday"><div class="wd"><b>${w}</b><span class="muted">${date.slice(5)}</span>${badge(dp.status)}<span style="flex:1"></span><button class="btn xs g" onclick="Views.openDay('${date}')">開啟</button></div>
        <div class="muted">預計 ${list.length} 人・${groups.length} 組・幼${sm.age.幼兒}/小${sm.age.國小}/中${sm.age.國中}/成${sm.age.成人}</div>
        <div class="progress"><i style="width:${totalB?Math.round(filled/totalB*100):0}%"></i></div>
        <div class="row" style="margin-top:6px"><button class="btn xs g" onclick="Views.copyToClass('${dp.id}')">複製到其他班</button>${filled<totalB?'<span class="tag" style="background:#fef3c7;color:#92400e">未完成備課</span>':''}</div>
      </div>`;
    }
    return `<div class="wkday" style="${isClassDay?'':'opacity:.5'}"><div class="wd"><b>${w}</b><span class="muted">${date.slice(5)}</span>${isClassDay?'<span class="badge b-draft">未建立</span>':'<span class="muted">非上課日</span>'}</div>
      ${isClassDay?`<div class="muted">預計 ${list.length} 人</div><button class="btn xs" style="margin-top:6px" onclick="Views.openDay('${date}')">建立備課</button>`:''}</div>`;
  }).join('');
  // 分析提醒
  const miss=ABILITY_TAGS.filter(t=>['柔軟度','平衡','協調'].includes(t)&&!analysisTags[t]);
  $('#weekAnalysis').innerHTML=`<div class="card"><h3>📈 本週課程分析</h3>
    <div class="chips">${['敏捷','核心','爆發力'].map(t=>`<span class="tag">${t} ${analysisTags[t]||0} 次</span>`).join('')}
      <span class="tag spec">品勢 ${poomN}</span><span class="tag spec">對練 ${sparN}</span><span class="tag">挑戰/比賽 ${applyN}</span></div>
    ${miss.length?`<div class="warnbox">⚠️ 本週較少安排：${miss.join('、')}，建議補強。</div>`:'<div class="okbox">✅ 能力面向分布均衡。</div>'}
  </div>`;
};
Views.openDay=function(date){State.ctx.date=date;App.go('plan');};
Views.saveWeekGoal=async function(){
  const wkStart=mondayOf(State.ctx.date);
  let wp=C('weekly_plans').find(w=>w.week_start===wkStart&&w.class_id===State.ctx.classId);
  if(!wp)wp=await save('weekly_plans',{id:uid('wp'),week_start:wkStart,week_end:addDays(wkStart,6),class_id:State.ctx.classId,status:'draft',created_by:State.user.id});
  wp.weekly_goal=$('#wGoal').value.trim();await save('weekly_plans',wp);toast('已儲存本週目標','ok');
};
Views.copyLastWeek=async function(){
  const wkStart=mondayOf(State.ctx.date);const prevStart=addDays(wkStart,-7);
  const prevDps=C('daily_plans').filter(d=>d.class_id===State.ctx.classId&&d.date>=prevStart&&d.date<wkStart);
  if(!prevDps.length){toast('上週無課程可複製','warn');return;}
  for(const pd of prevDps){
    const newDate=addDays(pd.date,7);
    const dp=await ensureDaily(newDate,State.ctx.classId);
    for(const b of C('lesson_blocks').filter(x=>x.daily_plan_id===pd.id&&!x.training_group_id)){
      let cur=C('lesson_blocks').find(x=>x.daily_plan_id===dp.id&&x.block_type===b.block_type&&!x.training_group_id);
      await save('lesson_blocks',{...b,id:cur?cur.id:uid('lb'),daily_plan_id:dp.id,done:false});
    }
  }
  toast('已複製上週課程','ok');App.go('week');
};
Views.copyToClass=function(dpId){
  const others=C('classes').filter(c=>c.active&&c.id!==State.ctx.classId);
  if(!others.length){toast('沒有其他班別','warn');return;}
  Modal.open('複製到其他班別',`<div class="field"><label>目標班別</label><select id="cpCls">${others.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select></div>
    <button class="btn block" onclick="Views.doCopyToClass('${dpId}')">複製</button>`);
};
Views.doCopyToClass=async function(dpId){
  const src=C('daily_plans').find(d=>d.id===dpId);const tgtCls=$('#cpCls').value;
  const dp=await ensureDaily(src.date,tgtCls);
  for(const b of C('lesson_blocks').filter(x=>x.daily_plan_id===src.id&&!x.training_group_id))
    await save('lesson_blocks',{...b,id:uid('lb'),daily_plan_id:dp.id,done:false});
  Modal.close();toast('已複製到其他班','ok');
};

/* ---------- MY TASKS (助教/教練) ---------- */
Views.view_mytasks=function(el){
  const td=todayStr();State.ctx.date=td;
  const myGroups=[];
  C('daily_plans').filter(d=>d.date===td).forEach(dp=>{
    C('training_groups').filter(g=>g.daily_plan_id===dp.id&&(g.coach_id===State.user.id||g.assistant_id===State.user.id)).forEach(g=>myGroups.push({dp,g}));
  });
  const cls=id=>C('classes').find(c=>c.id===id);
  el.innerHTML=`<div class="hero"><h2>📋 我的今日任務</h2><p>${WEEKDAYS[weekdayOf(td)]}・${td}・${State.user.name}</p></div>
  ${myGroups.length?myGroups.map(({dp,g})=>{
    const c=cls(dp.class_id);const gblk=C('lesson_blocks').find(b=>b.daily_plan_id===dp.id&&b.block_type==='group'&&b.training_group_id===g.id)||{};
    const apply=C('lesson_blocks').find(b=>b.daily_plan_id===dp.id&&b.block_type==='apply'&&!b.training_group_id)||{};
    const stName=id=>{const s=C('students').find(x=>x.id===id);return s?s.name:'?';};
    return `<div class="card"><h3>🧩 ${esc(g.name)} <span class="tag">${g.group_type}</span></h3>
      <div class="kv"><b>班別</b><span>${esc(c?.name||'')} ${c?.start_time||''}</span></div>
      <div class="kv"><b>人數</b><span>${(g.students||[]).length} 人</span></div>
      <div class="kv"><b>學員</b><span style="text-align:right">${(g.students||[]).map(stName).join('、')||'—'}</span></div>
      <div class="divider"></div>
      <div class="kv"><b>30–60′ 基本動作</b><span>${esc(gblk.basic||'—')}</span></div>
      <div class="kv"><b>腿法/品勢</b><span>${esc([gblk.kick,gblk.poomsae].filter(Boolean).join('/')||'—')}</span></div>
      <div class="kv"><b>今日目標</b><span>${esc(gblk.goal||g.target||'—')}</span></div>
      <div class="kv"><b>60–85′ 應用</b><span>${esc(apply.content||'—')}</span></div>
      <div class="kv"><b>器材</b><span>${esc(apply.equipment||gblk.equipment||'—')}</span></div>
      <div class="kv"><b>注意事項</b><span>${esc(gblk.commonErr||apply.safety_notes||'—')}</span></div>
      <div class="row" style="margin-top:10px">
        <button class="btn sm g" onclick="toast('已標記閱讀','ok')">👀 我已閱讀</button>
        <button class="btn sm" onclick="Views.gotoReport('${dp.id}','${g.id}')">📝 填寫回報</button>
      </div></div>`;
  }).join(''):'<div class="empty"><div class="ic">☕</div>今天沒有指派給你的任務<br><span class="muted">主教練分組並指派後會顯示在這裡</span></div>'}
  <div class="sect-title">今日課程討論</div><div class="card" id="myDisc"></div>`;
  const td2=todayStr();const dps=C('daily_plans').filter(d=>d.date===td2).map(d=>d.id);
  const msgs=C('discussions').filter(m=>dps.includes(m.daily_plan_id)&&!m.parent_id).sort((a,b)=>b.created_at-a.created_at).slice(0,5);
  $('#myDisc').innerHTML=msgs.length?msgs.map(m=>`<div class="kv"><b>${esc(m.author_name)}</b><span style="text-align:right;flex:1">${esc(m.message).slice(0,50)}</span></div>`).join(''):'<div class="empty">今日無討論</div>';
};
Views.gotoReport=function(dpId,gid){const dp=C('daily_plans').find(d=>d.id===dpId);State.ctx.date=dp.date;State.ctx.classId=dp.class_id;Views._reportGroup=gid;App.go('report');};

/* ---------- REPORT (課後紀錄) ---------- */
Views._reportGroup=null;
Views.view_report=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const dp=findDaily(State.ctx.date,State.ctx.classId);
  el.innerHTML=`<div class="card"><div class="row">
    <div class="grow"><label class="sm">日期</label><input type="date" id="rDate" value="${State.ctx.date}"></div>
    <div class="grow"><label class="sm">班別</label><select id="rClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
  </div></div><div id="reportBody"></div>`;
  $('#rDate').onchange=e=>{State.ctx.date=e.target.value;App.go('report');};
  $('#rClass').onchange=e=>{State.ctx.classId=e.target.value;App.go('report');};
  const body=$('#reportBody');
  if(!dp){body.innerHTML='<div class="empty"><div class="ic">✅</div>此日尚無備課，無法填寫課後紀錄</div>';return;}
  const groups=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
  const opts=[{id:'',name:'全班（整體）'}].concat(groups.map(g=>({id:g.id,name:g.name})));
  const gid=Views._reportGroup!=null?Views._reportGroup:'';
  const rep=C('post_class_reports').find(r=>r.daily_plan_id===dp.id&&(r.training_group_id||'')===(gid||''))||{};
  body.innerHTML=`<div class="card"><h3>📝 課後紀錄</h3>
    <div class="field"><label class="sm">負責組別</label><select id="rGroup" onchange="Views._reportGroup=this.value;App.go('report')">${opts.map(o=>`<option value="${o.id}" ${o.id===gid?'selected':''}>${o.name}</option>`).join('')}</select></div>
    <div class="row"><div class="grow field"><label class="sm">實到人數</label><input type="number" id="r_actual" value="${rep.completion_percentage!=null?(rep.actual||''):''}" placeholder="${dp.expected_count}"></div>
      <div class="grow field"><label class="sm">課程完成度</label><select id="r_status">${['完成','部分完成','未完成'].map(o=>`<option ${rep.completion_status===o?'selected':''}>${o}</option>`).join('')}</select></div></div>
    <div class="field"><label class="sm">完成百分比：<span id="rPctLbl">${rep.completion_percentage||80}%</span></label><input type="range" id="r_pct" min="0" max="100" value="${rep.completion_percentage||80}" oninput="document.getElementById('rPctLbl').textContent=this.value+'%'"></div>
    <div class="field"><label class="sm">未完成原因</label><input id="r_reason" value="${esc(rep.reason||'')}"></div>
    <div class="field"><label class="sm">學員整體反應</label><textarea id="r_feedback">${esc(rep.feedback||'')}</textarea></div>
    <div class="row"><div class="grow field"><label class="sm">表現較好</label><input id="r_good" value="${esc(rep.good||'')}"></div>
      <div class="grow field"><label class="sm">需要補強</label><input id="r_weak" value="${esc(rep.weak||'')}"></div></div>
    <div class="field"><label class="sm">需調整的分組</label><input id="r_adjust" value="${esc(rep.adjust||'')}"></div>
    <div class="field"><label class="sm">⭐ 下堂課銜接內容（會自動出現在下次備課）</label><textarea id="r_next">${esc(rep.next_lesson||'')}</textarea></div>
    <div class="row"><div class="grow field"><label class="sm">安全事件</label><input id="r_safety" value="${esc(rep.safety_event||'無')}"></div>
      <div class="grow field"><label class="sm">傷勢狀況</label><input id="r_injury" value="${esc(rep.injury||'無')}"></div></div>
    <div class="field"><label class="sm">教練補充</label><textarea id="r_note">${esc(rep.note||'')}</textarea></div>
    <button class="btn block" onclick="Views.saveReport('${dp.id}','${gid}','${rep.id||''}')">儲存課後紀錄</button>
  </div>
  ${Views.prevNextHint(dp)}`;
};
Views.prevNextHint=function(dp){
  const prev=C('daily_plans').filter(d=>d.class_id===dp.class_id&&d.date<dp.date).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!prev)return '';
  const rep=C('post_class_reports').find(r=>r.daily_plan_id===prev.id&&r.next_lesson);
  if(!rep||!rep.next_lesson)return '';
  return `<div class="infobox">📎 上一堂（${prev.date}）銜接內容：<b>${esc(rep.next_lesson)}</b></div>`;
};
Views.saveReport=async function(dpId,gid,repId){
  const obj={id:repId||uid('pr'),daily_plan_id:dpId,training_group_id:gid||null,coach_id:State.user.id,
    actual:$('#r_actual').value?+$('#r_actual').value:null,
    completion_status:$('#r_status').value,completion_percentage:+$('#r_pct').value,
    reason:$('#r_reason').value.trim(),feedback:$('#r_feedback').value.trim(),
    good:$('#r_good').value.trim(),weak:$('#r_weak').value.trim(),adjust:$('#r_adjust').value.trim(),
    next_lesson:$('#r_next').value.trim(),safety_event:$('#r_safety').value.trim(),injury:$('#r_injury').value.trim(),
    note:$('#r_note').value.trim(),created_at:Date.now()};
  await save('post_class_reports',obj);
  // 回寫實到人數
  const dp=C('daily_plans').find(d=>d.id===dpId);if(obj.actual!=null){dp.actual_count=obj.actual;await save('daily_plans',dp);}
  await audit('report','post_class_reports',obj.id,null,obj);
  toast('課後紀錄已儲存','ok');
};

/* ---------- TEMPLATES ---------- */
Views.view_templates=function(el){
  const ts=C('course_templates');
  el.innerHTML=`<div class="card"><div class="row"><h3 style="margin:0">📚 課程模板</h3><div style="flex:1"></div>${can('template')||can('*')?'<button class="btn sm" onclick="Views.editTpl()">＋ 新增</button>':''}</div></div>
  <div class="grid g2" style="margin-top:12px">${ts.map(t=>`<div class="card"><h3>${esc(t.name)}</h3>
    <div class="kv"><b>階段</b><span>${BLOCKS.find(b=>b.key===t.category)?.name||t.category}</span></div>
    <div class="kv"><b>時長</b><span>${t.duration}′</span></div>
    <div class="kv"><b>內容</b><span style="text-align:right">${esc(t.content)}</span></div>
    <div class="kv"><b>目標</b><span>${esc(t.goal||'—')}</span></div>
    ${can('*')?`<button class="btn g sm" style="margin-top:6px" onclick="Views.editTpl('${t.id}')">編輯</button>`:''}
  </div>`).join('')||'<div class="empty">尚無模板</div>'}</div>`;
};
Views.editTpl=function(id){
  const t=id?C('course_templates').find(x=>x.id===id):{category:'fitness',duration:20};
  Modal.open(id?'編輯模板':'新增模板',`
    <div class="field"><label>名稱 *</label><input id="tp_name" value="${esc(t.name||'')}"></div>
    <div class="row"><div class="grow field"><label>階段</label><select id="tp_cat">${BLOCKS.map(b=>`<option value="${b.key}" ${b.key===t.category?'selected':''}>${b.name}</option>`).join('')}</select></div>
      <div class="grow field"><label>時長(分)</label><input type="number" id="tp_dur" value="${t.duration||20}"></div></div>
    <div class="field"><label>內容</label><textarea id="tp_content">${esc(t.content||'')}</textarea></div>
    <div class="field"><label>目標</label><input id="tp_goal" value="${esc(t.goal||'')}"></div>
    <div class="field"><label>器材</label><input id="tp_eq" value="${esc(t.equipment||'')}"></div>
    <div class="row"><button class="btn block" onclick="Views.saveTpl('${id||''}')">儲存</button>${id?`<button class="btn bad sm" onclick="Views.delTpl('${id}')">刪除</button>`:''}</div>`);
};
Views.saveTpl=async function(id){const name=$('#tp_name').value.trim();if(!name){toast('名稱必填','bad');return;}
  await save('course_templates',{id:id||uid('tp'),name,category:$('#tp_cat').value,duration:+$('#tp_dur').value,content:$('#tp_content').value.trim(),goal:$('#tp_goal').value.trim(),equipment:$('#tp_eq').value.trim(),age_groups:[],belt_ranks:[]});
  Modal.close();toast('已儲存','ok');App.go('templates');};
Views.delTpl=async function(id){if(!confirm('刪除模板？'))return;await remove('course_templates',id);Modal.close();App.go('templates');};
</script>

<script>
/* ---------- PDF (列印) ---------- */
Views.view_pdf=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const wkStart=mondayOf(State.ctx.date);
  el.innerHTML=`<div class="card"><h3>🖨️ PDF 週課程計畫輸出</h3>
    <div class="row"><div class="grow"><label class="sm">班別</label><select id="pdfClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
      <div class="grow"><label class="sm">週次(任一日)</label><input type="date" id="pdfDate" value="${State.ctx.date}"></div></div>
    <div class="field" style="margin-top:8px"><label class="sm">版本</label><div class="chips" id="pdfVer">
      <span class="chip on" data-v="full">完整管理版</span><span class="chip" data-v="coach">教練現場執行版</span></div></div>
    <p class="muted">週次：${wkStart} ~ ${addDays(wkStart,6)}。使用瀏覽器列印，中文字型由系統原生渲染，不會亂碼；於列印視窗選「另存為 PDF」即可下載。</p>
    <button class="btn block" onclick="Views.buildPDF()">📄 產生預覽並列印 / 存 PDF</button>
  </div>
  <div class="card"><h3>預覽</h3><div id="pdfPrev" style="border:1px solid var(--line);border-radius:10px;padding:12px;max-height:60vh;overflow:auto;font-size:12px"></div></div>`;
  $('#pdfClass').onchange=e=>{State.ctx.classId=e.target.value;App.go('pdf');};
  $('#pdfDate').onchange=e=>{State.ctx.date=e.target.value;App.go('pdf');};
  let ver='full';document.querySelectorAll('#pdfVer .chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('#pdfVer .chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');ver=c.dataset.v;Views._pdfVer=ver;Views.previewPDF();});
  Views._pdfVer='full';Views.previewPDF();
};
Views.buildPDFHtml=function(ver){
  const s=settings();const cls=C('classes').find(c=>c.id===State.ctx.classId);
  const wkStart=mondayOf(State.ctx.date);const wkEnd=addDays(wkStart,6);
  const wp=C('weekly_plans').find(w=>w.week_start===wkStart&&w.class_id===State.ctx.classId);
  const stName=id=>{const st=C('students').find(x=>x.id===id);return st?st.name:'';};
  let days='';
  WEEKDAYS.forEach((w,i)=>{
    const date=addDays(wkStart,i);const dp=findDaily(date,State.ctx.classId);
    if(!dp)return;
    const list=Stats.studentsFor(State.ctx.classId,i);const sm=Stats.summary(list);
    const groups=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
    const blocks=C('lesson_blocks').filter(b=>b.daily_plan_id===dp.id);
    const gb=(type)=>blocks.find(b=>b.block_type===type&&!b.training_group_id)||{};
    const warm=gb('warmup'),fit=gb('fitness'),app=gb('apply'),rev=gb('review');
    const coachName=id=>{const c=C('profiles').find(p=>p.id===id);return c?c.name:'—';};
    const groupRows=groups.map(g=>{const b=blocks.find(x=>x.block_type==='group'&&x.training_group_id===g.id)||{};
      return `<tr><td><b>${esc(g.name)}</b><br>${esc(coachName(g.coach_id))}</td>
        <td>${(g.students||[]).length}人${ver==='full'?'<br>'+(g.students||[]).map(stName).join('、'):''}</td>
        <td>${esc([b.basic&&('基本:'+b.basic),b.kick&&('腿法:'+b.kick),b.poomsae&&('品勢:'+b.poomsae),b.spar&&('對練:'+b.spar)].filter(Boolean).join('；')||'—')}</td>
        <td>${esc(b.goal||g.target||'—')}</td></tr>`;}).join('');
    days+=`<div class="pday no-break">
      <h2>${w}（${date}）　預計 ${list.length} 人　${cls?.start_time||''}-${cls?.end_time||''}</h2>
      ${ver==='full'?`<div style="font-size:11px;margin-bottom:4px">年齡：幼兒${sm.age.幼兒}／國小${sm.age.國小}／國中${sm.age.國中}／成人${sm.age.成人}　｜　級別：${BELTS.filter(b=>sm.belt[b]).map(b=>b+sm.belt[b]).join(' ')}</div>`:''}
      <table class="ptbl"><tr><th style="width:14%">時段</th><th>內容</th><th style="width:20%">目標/器材</th></tr>
        <tr><td>0–10′ 做操慢跑</td><td>${esc(warm.content||'集合、禮節、做操、慢跑')}</td><td>${esc(warm.goal||'暖身')}</td></tr>
        <tr><td>10–30′ 熱身體能</td><td>${esc(fit.content||'')} ${(fit.tags||[]).map(t=>'['+t+']').join('')}</td><td>${esc(fit.equipment||'')}</td></tr>
        <tr><td colspan="3" style="background:#eef2ff"><b>30–60′ 分組訓練</b></td></tr>
        ${groupRows||'<tr><td colspan="3">（未分組）</td></tr>'}
        <tr><td>60–85′ 應用挑戰</td><td>${esc(app.applyType?('['+app.applyType+'] '):'')}${esc(app.content||'')}</td><td>${esc(app.equipment||'')}</td></tr>
        <tr><td>85–90′ 講評</td><td>${esc([rev.praise&&('表揚:'+rev.praise),rev.remind&&('提醒:'+rev.remind),rev.homework&&('作業:'+rev.homework),rev.preview&&('預告:'+rev.preview)].filter(Boolean).join('；')||'—')}</td><td></td></tr>
      </table>
      ${ver==='full'?`<div style="font-size:11px;margin-top:4px">注意事項：${esc([warm.safety_notes,app.safety_notes].filter(Boolean).join('；')||'—')}　｜　課後紀錄：實到＿＿人　完成度＿＿＿</div>`:''}
    </div>`;
  });
  if(!days)days='<p>本週此班別尚無任何備課資料。</p>';
  return `<div class="pg">
    <div class="phead"><h1>${esc(s.logo)} ${esc(s.dojo)}　${ver==='full'?'週課程計畫（完整管理版）':'週課程計畫（教練現場執行版）'}</h1>
      <div class="meta">班別：${esc(cls?.name||'')}　｜　訓練週期：${wkStart} ~ ${wkEnd}　｜　產出：${todayStr()}　｜　產出人：${esc(State.user.name)}</div>
      ${ver==='full'&&wp?.weekly_goal?`<div class="meta" style="margin-top:4px">本週教學目標：${esc(wp.weekly_goal)}</div>`:''}</div>
    ${days}
    ${ver==='full'?`<div style="margin-top:12px;font-size:11px">教練討論結論：______________________________　核准人：____________　日期：____________</div>`:''}
  </div>`;
};
Views.previewPDF=function(){$('#pdfPrev').innerHTML='<div class="ppreview">'+Views.buildPDFHtml(Views._pdfVer)+'</div>';
  // 讓預覽套用列印表格樣式
  $('#pdfPrev').querySelectorAll('.ptbl').forEach(t=>{t.style.width='100%';t.style.borderCollapse='collapse';t.querySelectorAll('th,td').forEach(c=>{c.style.border='1px solid #94a3b8';c.style.padding='4px 6px';c.style.fontSize='11px';c.style.verticalAlign='top';});t.querySelectorAll('th').forEach(c=>c.style.background='#e2e8f0');});
  $('#pdfPrev').querySelectorAll('.pday h2').forEach(h=>{h.style.background='#4f46e5';h.style.color='#fff';h.style.padding='4px 8px';h.style.borderRadius='4px';h.style.fontSize='13px';});
  $('#pdfPrev').querySelectorAll('.pday').forEach(d=>{d.style.border='1px solid #94a3b8';d.style.borderRadius='6px';d.style.padding='8px';d.style.marginBottom='10px';});
  $('#pdfPrev').querySelectorAll('.phead').forEach(h=>{h.style.borderBottom='3px solid #4f46e5';h.style.paddingBottom='6px';h.style.marginBottom='10px';});
};
Views.buildPDF=function(){
  const s=settings();const wkStart=mondayOf(State.ctx.date);
  document.title=`${s.dojo}_週課程計畫_${wkStart}至${addDays(wkStart,6)}`;
  $('#print').innerHTML=Views.buildPDFHtml(Views._pdfVer);
  window.print();
  setTimeout(()=>{document.title='TeamPro 教練共同備課系統';},1000);
};

/* ---------- SETTINGS ---------- */
Views.view_settings=function(el){
  const s=settings();
  el.innerHTML=`<div class="card"><h3>⚙️ 系統設定</h3>
    <div class="row"><div class="grow field"><label class="sm">道館名稱</label><input id="se_dojo" value="${esc(s.dojo)}"></div>
      <div class="grow field"><label class="sm">Logo（emoji）</label><input id="se_logo" value="${esc(s.logo)}"></div></div>
    <div class="sect-title">分組人數上限（每位教練）</div>
    <div class="row">
      <div class="grow field"><label class="sm">幼兒</label><input type="number" id="lim_kid" value="${s.limits.幼兒}"></div>
      <div class="grow field"><label class="sm">基礎</label><input type="number" id="lim_base" value="${s.limits.基礎}"></div>
      <div class="grow field"><label class="sm">品勢</label><input type="number" id="lim_poom" value="${s.limits.品勢}"></div>
      <div class="grow field"><label class="sm">對練</label><input type="number" id="lim_spar" value="${s.limits.對練}"></div>
    </div>
    <div class="sect-title">能力分組級別（可調整）</div>
    ${['初階','中階','高階'].map(t=>`<div class="field"><label class="sm">${t}</label><div class="chips" id="tier_${t}">${BELTS.map(b=>`<span class="chip ${s.tiers[t].includes(b)?'on':''}" data-b="${b}" onclick="this.classList.toggle('on')">${b}</span>`).join('')}</div></div>`).join('')}
    <button class="btn block" onclick="Views.saveSettings()">儲存設定</button>
  </div>
  <div class="card"><h3>☁️ 多裝置雲端同步</h3>
    <p class="muted">各教練各自手機共用同一份資料時使用。先依 <b>apps-script/Code.gs</b> 部署後端，取得 /exec 網址貼在下方。（建議直接寫進程式碼的 <b>DEFAULT_SYNC_URL</b> 再上架，這樣每支手機打開同一網址即自動同步。）</p>
    <div class="field"><label class="sm">同步後端網址（GAS /exec）</label><input id="se_sync" value="${esc(s.syncUrl||'')}" placeholder="https://script.google.com/macros/s/.../exec"></div>
    <div class="row"><button class="btn sm" onclick="Views.saveSyncUrl()">儲存並測試連線</button>
      <button class="btn sm ok" onclick="Views.cloudUpload()">⬆️ 上傳本機到雲端（主帳號首次）</button>
      <button class="btn sm g" onclick="Views.cloudDownload()">⬇️ 從雲端下載到本機</button></div>
    <p class="muted" id="syncStat" style="margin-top:8px">狀態：${SYNC.enabled()?'已啟用（'+esc(SYNC.status)+'）':'未啟用（單機）'}</p>
  </div>
  <div class="card"><h3>資料管理</h3>
    <div class="row"><button class="btn g sm" onclick="Views.exportData()">⬇️ 匯出備份(JSON)</button>
      <label class="btn g sm">⬆️ 匯入備份<input type="file" id="impBackup" accept=".json" style="display:none"></label>
      <button class="btn warn sm" onclick="App.seedFromLogin()">重載示範資料</button>
      <button class="btn bad sm" onclick="App.wipeAll()">清空全部</button></div>
    <p class="muted" style="margin-top:8px">學員 ${C('students').length}・帳號 ${C('profiles').length}・班別 ${C('classes').length}・週計畫 ${C('weekly_plans').length}・稽核 ${C('audit_logs').length}</p>
  </div>
  <div class="card"><h3>稽核紀錄（最近 20 筆）</h3><div class="scroll"><table class="tbl"><tr><th>時間</th><th>使用者</th><th>動作</th><th>表</th></tr>
    ${C('audit_logs').sort((a,b)=>b.created_at-a.created_at).slice(0,20).map(a=>`<tr><td class="muted">${new Date(a.created_at).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</td><td>${esc(a.user_name||'')}</td><td>${esc(a.action)}</td><td>${esc(a.table_name||'')}</td></tr>`).join('')||'<tr><td colspan=4 class="muted">無</td></tr>'}
  </table></div></div>`;
  $('#impBackup').onchange=Views.importData;
};
Views.saveSettings=async function(){
  const s=settings();
  s.dojo=$('#se_dojo').value.trim()||'道館';s.logo=$('#se_logo').value.trim()||'🥋';
  s.limits={幼兒:+$('#lim_kid').value,基礎:+$('#lim_base').value,品勢:+$('#lim_poom').value,對練:+$('#lim_spar').value,default:12};
  ['初階','中階','高階'].forEach(t=>{s.tiers[t]=[...document.querySelectorAll('#tier_'+t+' .chip.on')].map(x=>x.dataset.b);});
  s.id='app';await save('settings',s);toast('設定已儲存','ok');
};
Views.saveSyncUrl=async function(){
  const s=settings();s.syncUrl=$('#se_sync').value.trim();s.id='app';await save('settings',s);
  if(!SYNC.enabled()){$('#syncStat').textContent='狀態：未啟用（單機）';toast('已清除同步網址','ok');return;}
  $('#syncStat').textContent='狀態：測試連線中…';
  try{const r=await fetch(SYNC.url());const j=await r.json();
    if(j&&j.ok){$('#syncStat').textContent='狀態：✅ 連線成功，同步已啟用';toast('雲端連線成功','ok');SYNC.startAuto();}
    else throw new Error('回應異常');
  }catch(e){$('#syncStat').textContent='狀態：❌ 連線失敗（'+esc(e.message)+'）請確認網址與部署權限「任何人」';toast('連線失敗','bad');}
};
Views.cloudUpload=async function(){
  if(!SYNC.enabled()){toast('請先儲存同步網址','warn');return;}
  if(!confirm('會把「雲端資料整個覆蓋成這台裝置目前的資料」，第一次由主帳號做即可。確定？'))return;
  $('#syncStat').textContent='狀態：上傳中…';
  try{const r=await SYNC.replaceAll();$('#syncStat').textContent='狀態：✅ 已上傳 '+r.count+' 筆到雲端';toast('已上傳雲端','ok');}
  catch(e){$('#syncStat').textContent='狀態：❌ 上傳失敗（'+esc(e.message)+'）';toast('上傳失敗','bad');}
};
Views.cloudDownload=async function(){
  if(!SYNC.enabled()){toast('請先儲存同步網址','warn');return;}
  $('#syncStat').textContent='狀態：下載中…';
  SYNC.setLastPull(0);
  try{const {changed}=await SYNC.pull();$('#syncStat').textContent='狀態：✅ 已從雲端更新 '+changed+' 筆';toast('已從雲端下載','ok');App.go('settings');}
  catch(e){$('#syncStat').textContent='狀態：❌ 下載失敗（'+esc(e.message)+'）';toast('下載失敗','bad');}
};
Views.exportData=async function(){
  const data={};for(const st of STORES)data[st]=C(st);
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='TeamPro備課備份_'+todayStr()+'.json';a.click();
  toast('已匯出備份','ok');
};
Views.importData=function(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=async ev=>{try{const data=JSON.parse(ev.target.result);
    if(!confirm('匯入將覆蓋現有資料，確定？'))return;
    await wipeData(false);
    for(const st of STORES){if(data[st])await DB.bulk(st,data[st]);}
    await reloadAll();toast('已匯入備份','ok');App.go('settings');
  }catch(err){toast('匯入失敗：'+err.message,'bad');}};
  r.readAsText(f);
};

/* ---------- BOOT ---------- */
window.addEventListener('DOMContentLoaded',()=>App.boot());
</script>
