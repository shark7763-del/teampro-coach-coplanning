/* discussion */
Views.renderDisc=function(dp){
  const box=$('#discBox');if(!box)return;
  const msgs=C('discussions').filter(d=>d.daily_plan_id===dp.id).sort((a,b)=>a.created_at-b.created_at);
  let top=msgs.filter(m=>!m.parent_id);
  const f=Views._discFilter||'all';
  if(f==='mine')top=top.filter(m=>m.author_id===State.user.id||String(m.message||'').includes(State.user.name));
  else if(f==='unread')top=top.filter(m=>!(m.reads||[]).includes(State.user.id));
  box.innerHTML=`
    <div class="chips" style="margin-bottom:10px">${[['all','е…ЁйғЁ'],['unread','жңӘи®Җ'],['mine','иҲҮжҲ‘жңүй—ң']].map(x=>`<span class="chip ${f===x[0]?'on':''}" onclick="Views._discFilter='${x[0]}';Views.renderDisc(C('daily_plans').find(d=>d.id==='${dp.id}'))">${x[1]}</span>`).join('')}</div>
    <div class="field"><textarea id="dMsg" placeholder="ијёе…ҘиЁҺи«–е…§е®№пјҢеҸҜ @ж•ҷз·ҙе§“еҗҚвҖҰ" aria-label="иЁҺи«–е…§е®№"></textarea>
      <div class="row" style="margin-top:6px"><select id="dBlk" class="grow" aria-label="е°ҚжҮүйҡҺж®ө"><option value="">ж•ҙй«”</option>${BLOCKS.map(b=>`<option value="${b.key}">${b.s}-${b.e}вҖІ ${b.name}</option>`).join('')}</select>
      <button class="btn sm" onclick="Views.postDisc('${dp.id}',null)">${svg('send',16)} йҖҒеҮә</button></div></div>
    ${top.length?top.map(m=>Views.msgHtml(m,msgs)).join(''):'<div class="empty">е°ҡз„ЎиЁҺи«–пјҢй–Ӣе§Ӣе…ұеҗҢеӮҷиӘІеҗ§пјҒ</div>'}`;
};
Views.msgHtml=function(m,all){
  const replies=all.filter(x=>x.parent_id===m.id);
  const readCnt=(m.reads||[]).length;
  return `<div class="msg"><div class="mh"><b>${esc(m.author_name)}</b>
    <span>${new Date(m.created_at).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
    ${m.block?`<span class="tag">${BLOCKS.find(b=>b.key===m.block)?.name||''}</span>`:''}
    ${m.edited?'<span class="muted">пјҲе·Із·ЁијҜпјү</span>':''}<span style="flex:1"></span><span class="muted">рҹ‘Ғ ${readCnt}</span></div>
    <div class="mb">${nl2(m.message)}</div>
    <div class="row" style="margin-top:4px"><button class="btn xs g" onclick="Views.replyTo('${m.id}')">еӣһиҰҶ</button>
      ${m.author_id===State.user.id?`<button class="btn xs g" onclick="Views.editMsg('${m.id}')">з·ЁијҜ</button>`:''}</div>
    ${replies.map(r=>`<div class="msg reply"><div class="mh"><b>${esc(r.author_name)}</b><span>${new Date(r.created_at).toLocaleString('zh-TW',{hour:'2-digit',minute:'2-digit'})}</span></div><div class="mb">${nl2(r.message)}</div></div>`).join('')}`;
};
Views.postDisc=async function(dpId,parentId){
  const msg=$('#dMsg').value.trim();if(!msg){toast('и«Ӣијёе…Ҙе…§е®№','warn');return;}
  await save('discussions',{id:uid('ds'),daily_plan_id:dpId,training_group_id:null,lesson_block_id:$('#dBlk')?.value||null,block:$('#dBlk')?.value||null,
    author_id:State.user.id,author_name:State.user.name,message:msg,parent_id:parentId,created_at:Date.now(),reads:[State.user.id]});
  const dp=C('daily_plans').find(d=>d.id===dpId);
  Views.renderDisc(dp);toast('е·Ізҷјеёғз•ҷиЁҖ','ok');
};
Views.replyTo=function(mid){
  Modal.open('еӣһиҰҶз•ҷиЁҖ',`<textarea id="rMsg" placeholder="ијёе…ҘеӣһиҰҶвҖҰ"></textarea><button class="btn block" style="margin-top:8px" onclick="Views.doReply('${mid}')">йҖҒеҮәеӣһиҰҶ</button>`);
};
Views.doReply=async function(mid){
  const parent=C('discussions').find(d=>d.id===mid);const msg=$('#rMsg').value.trim();if(!msg)return;
  await save('discussions',{id:uid('ds'),daily_plan_id:parent.daily_plan_id,parent_id:mid,author_id:State.user.id,author_name:State.user.name,message:msg,created_at:Date.now(),reads:[State.user.id]});
  Modal.close();Views.renderDisc(C('daily_plans').find(d=>d.id===parent.daily_plan_id));
};
Views.editMsg=function(mid){
  const m=C('discussions').find(d=>d.id===mid);
  Modal.open('з·ЁијҜз•ҷиЁҖ',`<textarea id="eMsg">${esc(m.message)}</textarea><button class="btn block" style="margin-top:8px" onclick="Views.doEditMsg('${mid}')">е„Іеӯҳ</button>`);
};
Views.doEditMsg=async function(mid){const m=C('discussions').find(d=>d.id===mid);m.message=$('#eMsg').value.trim();m.edited=true;m.edited_by=State.user.name;await save('discussions',m);Modal.close();Views.renderDisc(C('daily_plans').find(d=>d.id===m.daily_plan_id));};
</script>

<script>
/* ---------- WEEK (ж•ҙйҖұиЁҲз•«) ---------- */
Views.view_week=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const wkStart=mondayOf(State.ctx.date);
  el.innerHTML=`
  <div class="card">
    <div class="row">
      <div class="grow"><label class="sm">зҸӯеҲҘ</label><select id="wClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
      <button class="btn sm g" onclick="Views.weekNav(-7)">вҶҗ дёҠйҖұ</button>
      <button class="btn sm g" onclick="Views.weekNav(7)">дёӢйҖұ вҶ’</button>
    </div>
    <p class="muted" style="margin:8px 0 0">йҖұж¬Ўпјҡ${wkStart} ~ ${addDays(wkStart,6)}</p>
    <div class="field" style="margin-top:8px"><label class="sm">жң¬йҖұж•ҷеӯёзӣ®жЁҷ</label><input id="wGoal" placeholder="дҫӢпјҡеүҚиёўиҲҮж—Ӣиёўеҹәжң¬еҲ°зө„еҗҲжҮүз”Ё"></div>
    <div class="row"><button class="btn sm" onclick="Views.saveWeekGoal()">е„Іеӯҳзӣ®жЁҷ</button>
      <button class="btn sm g" onclick="Views.copyLastWeek()">рҹ“Ӣ иӨҮиЈҪдёҠйҖұ</button></div>
  </div>
  <div id="weekAnalysis"></div>
  <div class="wk" id="weekGrid"></div>`;
  $('#wClass').onchange=e=>{State.ctx.classId=e.target.value;App.go('week');};
  const wp=C('weekly_plans').find(w=>w.week_start===wkStart&&w.class_id===State.ctx.classId);
  if(wp)$('#wGoal').value=wp.weekly_goal||'';
  Views.renderWeek(wkStart);
};
Views.weekNav=function(n){State.ctx.date=addDays(mondayOf(State.ctx.date),n);App.go('week');};
Views.renderWeek=function(wkStart){
  const cls=C('classes').find(c=>c.id===State.ctx.classId);
  const activeWd=(cls?.weekdays||WEEKDAYS);
  const grid=$('#weekGrid');
  let analysisTags={};ABILITY_TAGS.forEach(t=>analysisTags[t]=0);let applyN=0,poomN=0,sparN=0;
  grid.innerHTML=WEEKDAYS.map((w,i)=>{
    const date=addDays(wkStart,i);
    const dp=findDaily(date,State.ctx.classId);
    const list=Stats.studentsFor(State.ctx.classId,i);
    const isClassDay=activeWd.includes(w);
    if(dp){
      const blocks=C('lesson_blocks').filter(b=>b.daily_plan_id===dp.id);
      const groups=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
      blocks.forEach(b=>{(b.tags||[]).forEach(t=>{if(analysisTags[t]!=null)analysisTags[t]++;});if(b.block_type==='apply'&&b.applyType)applyN++;if(b.poomsae)poomN++;if(b.spar)sparN++;});
      const filled=blocks.filter(b=>b.content||b.basic||b.praise).length;
      const totalB=4+groups.length;
      const sm=Stats.summary(list);
      return `<div class="wkday"><div class="wd"><b>${w}</b><span class="muted">${date.slice(5)}</span>${badge(dp.status)}<span style="flex:1"></span><button class="btn xs g" onclick="Views.openDay('${date}')">й–Ӣе•ҹ</button></div>
        <div class="muted">й җиЁҲ ${list.length} дәәгғ»${groups.length} зө„гғ»е№ј${sm.age.е№је…’}/е°Ҹ${sm.age.еңӢе°Ҹ}/дёӯ${sm.age.еңӢдёӯ}/жҲҗ${sm.age.жҲҗдәә}</div>
        <div class="progress"><i style="width:${totalB?Math.round(filled/totalB*100):0}%"></i></div>
        <div class="row" style="margin-top:6px"><button class="btn xs g" onclick="Views.copyToClass('${dp.id}')">иӨҮиЈҪеҲ°е…¶д»–зҸӯ</button>${filled<totalB?'<span class="tag" style="background:#fef3c7;color:#92400e">жңӘе®ҢжҲҗеӮҷиӘІ</span>':''}</div>
      </div>`;
    }
    return `<div class="wkday" style="${isClassDay?'':'opacity:.5'}"><div class="wd"><b>${w}</b><span class="muted">${date.slice(5)}</span>${isClassDay?'<span class="badge b-draft">жңӘе»әз«Ӣ</span>':'<span class="muted">йқһдёҠиӘІж—Ҙ</span>'}</div>
      ${isClassDay?`<div class="muted">й җиЁҲ ${list.length} дәә</div><button class="btn xs" style="margin-top:6px" onclick="Views.openDay('${date}')">е»әз«ӢеӮҷиӘІ</button>`:''}</div>`;
  }).join('');
  // еҲҶжһҗжҸҗйҶ’
  const miss=ABILITY_TAGS.filter(t=>['жҹ”и»ҹеәҰ','е№іиЎЎ','еҚ”иӘҝ'].includes(t)&&!analysisTags[t]);
  $('#weekAnalysis').innerHTML=`<div class="card"><h3>рҹ“Ҳ жң¬йҖұиӘІзЁӢеҲҶжһҗ</h3>
    <div class="chips">${['ж•ҸжҚ·','ж ёеҝғ','зҲҶзҷјеҠӣ'].map(t=>`<span class="tag">${t} ${analysisTags[t]||0} ж¬Ў</span>`).join('')}
      <span class="tag spec">е“ҒеӢў ${poomN}</span><span class="tag spec">е°Қз·ҙ ${sparN}</span><span class="tag">жҢ‘жҲ°/жҜ”иіҪ ${applyN}</span></div>
    ${miss.length?`<div class="warnbox">вҡ пёҸ жң¬йҖұијғе°‘е®үжҺ’пјҡ${miss.join('гҖҒ')}пјҢе»әиӯ°иЈңеј·гҖӮ</div>`:'<div class="okbox">вң… иғҪеҠӣйқўеҗ‘еҲҶеёғеқҮиЎЎгҖӮ</div>'}
  </div>`;
};
Views.openDay=function(date){State.ctx.date=date;App.go('plan');};
Views.saveWeekGoal=async function(){
  const wkStart=mondayOf(State.ctx.date);
  let wp=C('weekly_plans').find(w=>w.week_start===wkStart&&w.class_id===State.ctx.classId);
  if(!wp)wp=await save('weekly_plans',{id:uid('wp'),week_start:wkStart,week_end:addDays(wkStart,6),class_id:State.ctx.classId,status:'draft',created_by:State.user.id});
  wp.weekly_goal=$('#wGoal').value.trim();await save('weekly_plans',wp);toast('е·Іе„Іеӯҳжң¬йҖұзӣ®жЁҷ','ok');
};
Views.copyLastWeek=async function(){
  const wkStart=mondayOf(State.ctx.date);const prevStart=addDays(wkStart,-7);
  const prevDps=C('daily_plans').filter(d=>d.class_id===State.ctx.classId&&d.date>=prevStart&&d.date<wkStart);
  if(!prevDps.length){toast('дёҠйҖұз„ЎиӘІзЁӢеҸҜиӨҮиЈҪ','warn');return;}
  for(const pd of prevDps){
    const newDate=addDays(pd.date,7);
    const dp=await ensureDaily(newDate,State.ctx.classId);
    for(const b of C('lesson_blocks').filter(x=>x.daily_plan_id===pd.id&&!x.training_group_id)){
      let cur=C('lesson_blocks').find(x=>x.daily_plan_id===dp.id&&x.block_type===b.block_type&&!x.training_group_id);
      await save('lesson_blocks',{...b,id:cur?cur.id:uid('lb'),daily_plan_id:dp.id,done:false});
    }
  }
  toast('е·ІиӨҮиЈҪдёҠйҖұиӘІзЁӢ','ok');App.go('week');
};
Views.copyToClass=function(dpId){
  const others=C('classes').filter(c=>c.active&&c.id!==State.ctx.classId);
  if(!others.length){toast('жІ’жңүе…¶д»–зҸӯеҲҘ','warn');return;}
  Modal.open('иӨҮиЈҪеҲ°е…¶д»–зҸӯеҲҘ',`<div class="field"><label>зӣ®жЁҷзҸӯеҲҘ</label><select id="cpCls">${others.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select></div>
    <button class="btn block" onclick="Views.doCopyToClass('${dpId}')">иӨҮиЈҪ</button>`);
};
Views.doCopyToClass=async function(dpId){
  const src=C('daily_plans').find(d=>d.id===dpId);const tgtCls=$('#cpCls').value;
  const dp=await ensureDaily(src.date,tgtCls);
  for(const b of C('lesson_blocks').filter(x=>x.daily_plan_id===src.id&&!x.training_group_id))
    await save('lesson_blocks',{...b,id:uid('lb'),daily_plan_id:dp.id,done:false});
  Modal.close();toast('е·ІиӨҮиЈҪеҲ°е…¶д»–зҸӯ','ok');
};

/* ---------- MY TASKS (еҠ©ж•ҷ/ж•ҷз·ҙ) ---------- */

  const td=todayStr();State.ctx.date=td;
  const myGroups=[];
  C('daily_plans').filter(d=>d.date===td).forEach(dp=>{

  ${myGroups.length?myGroups.map(({dp,g})=>{

      <div class="kv"><b>зҸӯеҲҘ</b><span>${esc(c?.name||'')} ${c?.start_time||''}</span></div>
      <div class="kv"><b>дәәж•ё</b><span>${(g.students||[]).length} дәә</span></div>
      <div class="kv"><b>еӯёе“Ў</b><span style="text-align:right">${(g.students||[]).map(stName).join('гҖҒ')||'вҖ”'}</span></div>
      <div class="divider"></div>
      <div class="kv"><b>30вҖ“60вҖІ еҹәжң¬еӢ•дҪң</b><span>${esc(gblk.basic||'вҖ”')}</span></div>
      <div class="kv"><b>и…ҝжі•/е“ҒеӢў</b><span>${esc([gblk.kick,gblk.poomsae].filter(Boolean).join('/')||'вҖ”')}</span></div>
      <div class="kv"><b>д»Ҡж—Ҙзӣ®жЁҷ</b><span>${esc(gblk.goal||g.target||'вҖ”')}</span></div>
      <div class="kv"><b>60вҖ“85вҖІ жҮүз”Ё</b><span>${esc(apply.content||'вҖ”')}</span></div>
      <div class="kv"><b>еҷЁжқҗ</b><span>${esc(apply.equipment||gblk.equipment||'вҖ”')}</span></div>
      <div class="kv"><b>жіЁж„ҸдәӢй …</b><span>${esc(gblk.commonErr||apply.safety_notes||'вҖ”')}</span></div>
      <div class="row" style="margin-top:10px">
        <button class="btn sm g" onclick="toast('е·ІжЁҷиЁҳй–ұи®Җ','ok')">рҹ‘Җ жҲ‘е·Ій–ұи®Җ</button>
        <button class="btn sm" onclick="Views.gotoReport('${dp.id}','${g.id}')">рҹ“қ еЎ«еҜ«еӣһе ұ</button>
      </div></div>`;
  }).join(''):'<div class="empty"><div class="ic">вҳ•</div>д»ҠеӨ©жІ’жңүжҢҮжҙҫзөҰдҪ зҡ„д»»еӢҷ<br><span class="muted">дё»ж•ҷз·ҙеҲҶзө„дёҰжҢҮжҙҫеҫҢжңғйЎҜзӨәеңЁйҖҷиЈЎ</span></div>'}
  <div class="sect-title">д»Ҡж—ҘиӘІзЁӢиЁҺи«–</div><div class="card" id="myDisc"></div>`;

  const msgs=C('discussions').filter(m=>dps.includes(m.daily_plan_id)&&!m.parent_id).sort((a,b)=>b.created_at-a.created_at).slice(0,5);
  $('#myDisc').innerHTML=msgs.length?msgs.map(m=>`<div class="kv"><b>${esc(m.author_name)}</b><span style="text-align:right;flex:1">${esc(m.message).slice(0,50)}</span></div>`).join(''):'<div class="empty">д»Ҡж—Ҙз„ЎиЁҺи«–</div>';
};
Views.gotoReport=function(dpId,gid){const dp=C('daily_plans').find(d=>d.id===dpId);State.ctx.date=dp.date;State.ctx.classId=dp.class_id;Views._reportGroup=gid;App.go('report');};

/* ---------- REPORT (иӘІеҫҢзҙҖйҢ„) ---------- */
Views._reportGroup=null;
Views.view_report=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const dp=findDaily(State.ctx.date,State.ctx.classId);
  el.innerHTML=`<div class="card"><div class="row">
    <div class="grow"><label class="sm">ж—Ҙжңҹ</label><input type="date" id="rDate" value="${State.ctx.date}"></div>
    <div class="grow"><label class="sm">зҸӯеҲҘ</label><select id="rClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>

Views.prevNextHint=function(dp){
  const prev=C('daily_plans').filter(d=>d.class_id===dp.class_id&&d.date<dp.date).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!prev)return '';
  const rep=C('post_class_reports').find(r=>r.daily_plan_id===prev.id&&r.next_lesson);
  if(!rep||!rep.next_lesson)return '';
  return `<div class="infobox">рҹ“Һ дёҠдёҖе ӮпјҲ${prev.date}пјүйҠңжҺҘе…§е®№пјҡ<b>${esc(rep.next_lesson)}</b></div>`;
};
Views.saveReport=async function(dpId,gid,repId){
  const obj={id:repId||uid('pr'),daily_plan_id:dpId,training_group_id:gid||null,coach_id:State.user.id,
    actual:$('#r_actual').value?+$('#r_actual').value:null,
    completion_status:$('#r_status').value,completion_percentage:+$('#r_pct').value,
    reason:$('#r_reason').value.trim(),feedback:$('#r_feedback').value.trim(),
    good:$('#r_good').value.trim(),weak:$('#r_weak').value.trim(),adjust:$('#r_adjust').value.trim(),
    next_lesson:$('#r_next').value.trim(),safety_event:$('#r_safety').value.trim(),injury:$('#r_injury').value.trim(),
    note:$('#r_note').value.trim(),created_at:Date.now()};
  await save('post_class_reports',obj);
  // еӣһеҜ«еҜҰеҲ°дәәж•ё
  const dp=C('daily_plans').find(d=>d.id===dpId);if(obj.actual!=null){dp.actual_count=obj.actual;await save('daily_plans',dp);}
  await audit('report','post_class_reports',obj.id,null,obj);
  toast('иӘІеҫҢзҙҖйҢ„е·Іе„Іеӯҳ','ok');
};

        <td>${esc(b.goal||g.target||'вҖ”')}</td></tr>`;}).join('');

        <tr><td>10вҖ“30вҖІ зҶұиә«й«”иғҪ</td><td>${esc(fit.content||'')} ${(fit.tags||[]).map(t=>'['+t+']').join('')}</td><td>${esc(fit.equipment||'')}</td></tr>

  return `<div class="pg">
    <div class="phead"><h1>${esc(s.logo)} ${esc(s.dojo)}гҖҖ${ver==='full'?'йҖұиӘІзЁӢиЁҲз•«пјҲе®Ңж•ҙз®ЎзҗҶзүҲпјү':'йҖұиӘІзЁӢиЁҲз•«пјҲж•ҷз·ҙзҸҫе ҙеҹ·иЎҢзүҲпјү'}</h1>

    ${['еҲқйҡҺ','дёӯйҡҺ','й«ҳйҡҺ'].map(t=>`<div class="field"><label class="sm">${t}</label><div class="chips" id="tier_${t}">${BELTS.map(b=>`<span class="chip ${s.tiers[t].includes(b)?'on':''}" data-b="${b}" onclick="this.classList.toggle('on')">${b}</span>`).join('')}</div></div>`).join('')}

  </div>
  <div class="card"><h3>вҳҒпёҸ еӨҡиЈқзҪ®йӣІз«ҜеҗҢжӯҘ</h3>
    <p class="muted">еҗ„ж•ҷз·ҙеҗ„иҮӘжүӢж©ҹе…ұз”ЁеҗҢдёҖд»ҪиіҮж–ҷжҷӮдҪҝз”ЁгҖӮе…Ҳдҫқ <b>apps-script/Code.gs</b> йғЁзҪІеҫҢз«ҜпјҢеҸ–еҫ— /exec з¶ІеқҖиІјеңЁдёӢж–№гҖӮпјҲе»әиӯ°зӣҙжҺҘеҜ«йҖІзЁӢејҸзўјзҡ„ <b>DEFAULT_SYNC_URL</b> еҶҚдёҠжһ¶пјҢйҖҷжЁЈжҜҸж”ҜжүӢж©ҹжү“й–ӢеҗҢдёҖз¶ІеқҖеҚіиҮӘеӢ•еҗҢжӯҘгҖӮпјү</p>
    <div class="field"><label class="sm">еҗҢжӯҘеҫҢз«Ҝз¶ІеқҖпјҲGAS /execпјү</label><input id="se_sync" value="${esc(s.syncUrl||'')}" placeholder="https://script.google.com/macros/s/.../exec"></div>
    <div class="row"><button class="btn sm" onclick="Views.saveSyncUrl()">е„ІеӯҳдёҰжё¬и©ҰйҖЈз·ҡ</button>
      <button class="btn sm g" id="syncNowBtn" onclick="Views.syncNow()">з«ӢеҚіеҗҢжӯҘ</button>
      <button class="btn sm ok" onclick="Views.cloudUpload()">в¬ҶпёҸ дёҠеӮіжң¬ж©ҹеҲ°йӣІз«ҜпјҲдё»еёіиҷҹйҰ–ж¬Ўпјү</button>
      <button class="btn sm g" onclick="Views.cloudDownload()">в¬ҮпёҸ еҫһйӣІз«ҜдёӢијүеҲ°жң¬ж©ҹ</button></div>
    <div class="grid g2" style="margin-top:10px">
      <div class="kv"><b>зӢҖж…Ӣ</b><span id="syncStat">${esc(App.syncText()[1])}</span></div>
      <div class="kv"><b>жңҖеҫҢжҲҗеҠҹеҗҢжӯҘ</b><span>${esc(syncLast)}</span></div>
      <div class="kv"><b>еҫ…еҗҢжӯҘ</b><span>${SYNC.pendingCount()} зӯҶ</span></div>
      <div class="kv"><b>жңҖеҫҢйҢҜиӘӨ</b><span>${esc(SYNC.lastError||'вҖ”')}</span></div>
    </div>
  </div>
  <div class="card"><h3>иіҮж–ҷз®ЎзҗҶ</h3>
    <div class="row"><button class="btn g sm" onclick="Views.exportData()">в¬ҮпёҸ еҢҜеҮәеӮҷд»Ҫ(JSON)</button>
      <label class="btn g sm">в¬ҶпёҸ еҢҜе…ҘеӮҷд»Ҫ<input type="file" id="impBackup" accept=".json" style="display:none"></label>
      <button class="btn warn sm" onclick="App.seedFromLogin()">йҮҚијүзӨәзҜ„иіҮж–ҷ</button>
      <button class="btn bad sm" onclick="App.wipeAll()">жё…з©әе…ЁйғЁ</button></div>
    <p class="muted" style="margin-top:8px">еӯёе“Ў ${C('students').length}гғ»еёіиҷҹ ${C('profiles').length}гғ»зҸӯеҲҘ ${C('classes').length}гғ»йҖұиЁҲз•« ${C('weekly_plans').length}гғ»зЁҪж ё ${C('audit_logs').length}</p>
  </div>
  <div class="card"><h3>еӮҷд»ҪиҲҮйӮ„еҺҹ</h3>
    <p class="muted">жңҖеӨҡдҝқз•ҷжңҖиҝ‘ 10 д»Ҫжң¬ж©ҹеӮҷд»ҪгҖӮеҚұйҡӘж“ҚдҪңеүҚжңғиҮӘеӢ•е»әз«ӢеӮҷд»ҪгҖӮ</p>
    <div class="kv"><b>жӯЈејҸиіҮж–ҷзёҪзӯҶж•ё</b><span>${counts.total}</span></div>
    <div class="scroll"><table class="tbl"><tr><th>жҷӮй–“</th><th>еҺҹеӣ </th><th>е»әз«ӢиҖ…</th><th>зӯҶж•ё</th><th>ж“ҚдҪң</th></tr>
      ${backups.map(b=>`<tr><td class="muted">${new Date(b.created_at).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</td><td>${esc(b.reason)}</td><td>${esc(b.created_by?.name||'вҖ”')}</td><td>${b.total_count||0}</td><td><button class="btn xs g" onclick="BackupManager.download('${b.id}')">дёӢијү</button> <button class="btn xs warn" onclick="BackupManager.restore('${b.id}')">йӮ„еҺҹ</button> <button class="btn xs bad" onclick="BackupManager.remove('${b.id}')">еҲӘйҷӨ</button></td></tr>`).join('')||'<tr><td colspan=5 class="muted">е°ҡз„ЎеӮҷд»Ҫ</td></tr>'}
    </table></div>
  </div>
  <div class="card"><h3>зЁҪж ёзҙҖйҢ„пјҲжңҖиҝ‘ 20 зӯҶпјү</h3><div class="scroll"><table class="tbl"><tr><th>жҷӮй–“</th><th>дҪҝз”ЁиҖ…</th><th>еӢ•дҪң</th><th>иЎЁ</th></tr>
    ${C('audit_logs').sort((a,b)=>b.created_at-a.created_at).slice(0,20).map(a=>`<tr><td class="muted">${new Date(a.created_at).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</td><td>${esc(a.user_name||'')}</td><td>${esc(a.action)}</td><td>${esc(a.table_name||'')}</td></tr>`).join('')||'<tr><td colspan=4 class="muted">з„Ў</td></tr>'}
  </table></div></div>`;
  $('#impBackup').onchange=Views.importData;
};
Views.saveSettings=async function(){
  if(!requireAdminRole())return;
  const s=settings();
  s.dojo=$('#se_dojo').value.trim()||'йҒ“йӨЁ';s.logo=$('#se_logo').value.trim()||'рҹҘӢ';
  s.limits={е№је…’:+$('#lim_kid').value,еҹәзӨҺ:+$('#lim_base').value,е“ҒеӢў:+$('#lim_poom').value,е°Қз·ҙ:+$('#lim_spar').value,default:12};
  ['еҲқйҡҺ','дёӯйҡҺ','й«ҳйҡҺ'].forEach(t=>{s.tiers[t]=[...document.querySelectorAll('#tier_'+t+' .chip.on')].map(x=>x.dataset.b);});
  s.id='app';await save('settings',s);toast('иЁӯе®ҡе·Іе„Іеӯҳ','ok');
};
Views.saveSyncUrl=async function(){
  if(!requireAdminRole())return;
  const s=settings();s.syncUrl=$('#se_sync').value.trim();s.id='app';await save('settings',s);
  if(!SYNC.enabled()){$('#syncStat').textContent='зӢҖж…ӢпјҡжңӘе•ҹз”ЁпјҲе–®ж©ҹпјү';toast('е·Іжё…йҷӨеҗҢжӯҘз¶ІеқҖ','ok');return;}
  $('#syncStat').textContent='зӢҖж…Ӣпјҡжё¬и©ҰйҖЈз·ҡдёӯвҖҰ';
  try{const r=await fetch(SYNC.url());const j=await r.json();
    if(j&&j.ok){$('#syncStat').textContent='зӢҖж…Ӣпјҡвң… йҖЈз·ҡжҲҗеҠҹпјҢеҗҢжӯҘе·Іе•ҹз”Ё';toast('йӣІз«ҜйҖЈз·ҡжҲҗеҠҹ','ok');SYNC.startAuto();}
    else throw new Error('еӣһжҮүз•°еёё');
  }catch(e){$('#syncStat').textContent='зӢҖж…ӢпјҡвқҢ йҖЈз·ҡеӨұж•—пјҲ'+esc(e.message)+'пјүи«ӢзўәиӘҚз¶ІеқҖиҲҮйғЁзҪІж¬ҠйҷҗгҖҢд»»дҪ•дәәгҖҚ';toast('йҖЈз·ҡеӨұж•—','bad');}
};
Views.cloudUpload=async function(){
  if(!SYNC.enabled()){toast('и«Ӣе…Ҳе„ІеӯҳеҗҢжӯҘз¶ІеқҖ','warn');return;}
  $('#syncStat').textContent='зӢҖж…ӢпјҡдёҠеӮідёӯвҖҰ';
  try{await SYNC.replaceAll();$('#syncStat').textContent='зӢҖж…Ӣпјҡ'+App.syncText()[1];}
  catch(e){$('#syncStat').textContent='зӢҖж…ӢпјҡвқҢ дёҠеӮіеӨұж•—пјҲ'+esc(e.message)+'пјү';toast('дёҠеӮіеӨұж•—','bad');}
};
Views.syncNow=async function(){
  if(!SYNC.enabled()){toast('и«Ӣе…Ҳе„ІеӯҳеҗҢжӯҘз¶ІеқҖ','warn');return;}
  const btn=$('#syncNowBtn');if(btn&&btn.disabled)return;if(btn)btn.disabled=true;
  try{await SYNC.immediate();toast('еҗҢжӯҘе®ҢжҲҗ','ok');App.go('settings','more');}
  finally{if(btn)btn.disabled=false;}
};
Views.cloudDownload=async function(){
  if(!SYNC.enabled()){toast('и«Ӣе…Ҳе„ІеӯҳеҗҢжӯҘз¶ІеқҖ','warn');return;}
  $('#syncStat').textContent='зӢҖж…ӢпјҡдёӢијүдёӯвҖҰ';
  SYNC.setLastPull(0);
  try{const {changed}=await SYNC.pull();$('#syncStat').textContent='зӢҖж…Ӣпјҡвң… е·ІеҫһйӣІз«Ҝжӣҙж–° '+changed+' зӯҶ';toast('е·ІеҫһйӣІз«ҜдёӢијү','ok');App.go('settings');}
  catch(e){$('#syncStat').textContent='зӢҖж…ӢпјҡвқҢ дёӢијүеӨұж•—пјҲ'+esc(e.message)+'пјү';toast('дёӢијүеӨұж•—','bad');}
};
Views.exportData=async function(){
  const data={version:APP_VERSION,exported_at:Date.now(),stores:{}};for(const st of DATA_STORES)data.stores[st]=C(st);
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='TeamProеӮҷиӘІеӮҷд»Ҫ_'+todayStr()+'.json';a.click();
  toast('е·ІеҢҜеҮәеӮҷд»Ҫ','ok');
};
Views.importData=function(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=async ev=>{try{const data=JSON.parse(ev.target.result);
    if(!requireAdminRole())return;
    const stores=data.stores||data;
    await App.requireAdminPin({actionName:'еҢҜе…Ҙ JSON иҰҶи“ӢиіҮж–ҷ',impact:'е°Үд»ҘйҒёеҸ–зҡ„ JSON жӘ”иҰҶи“Ӣзӣ®еүҚжң¬ж©ҹжӯЈејҸиіҮж–ҷгҖӮ',confirmText:'зўәиӘҚеҢҜе…Ҙ',
      backupReason:'JSON еҢҜе…ҘеүҚиҮӘеӢ•еӮҷд»Ҫ',onConfirm:async()=>{
        await wipeData(false);
        for(const st of DATA_STORES){if(stores[st])await DB.bulk(st,stores[st]);}
        await reloadAll();Modal.close();toast('е·ІеҢҜе…ҘеӮҷд»Ҫ','ok');App.go('settings','more');
      }});
  }catch(err){toast('еҢҜе…ҘеӨұж•—пјҡ'+err.message,'bad');}};
  r.readAsText(f);
};

/* ---------- BOOT ---------- */
window.addEventListener('DOMContentLoaded',()=>App.boot());
if('serviceWorker' in navigator && location.protocol!=='file:'){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
