    <p class="muted">確認後會記錄在此課程，發布前可檢查尚未確認的人員。</p>
    ${ids.length?ids.map(id=>{const p=C('profiles').find(x=>x.id===id);const on=confirms.some(c=>c.user_id===id);
      return `<div class="confirm-coach"><div class="av">${esc(initials(p?.name||''))}</div><div class="grow"><b>${esc(p?.name||id)}</b><br><span class="muted">${on?'已確認':'尚未確認'}</span></div>${on?svg('check',20):''}</div>`;}).join(''):'<div class="empty">尚未指派教練，請先完成分組。</div>'}
    <button class="btn block" onclick="Views.confirmPlan('${dp.id}')">${svg('check',18)} 我已確認</button>
  </div>
  <div class="actionbar"><button class="btn secondary" onclick="App.go('plan','plan')">返回備課</button><span class="sp"></span><button class="btn" onclick="App.go('publish','plan')">下一步：發布</button></div>`;
};
Views.confirmPlan=async function(dpId){
  const dp=C('daily_plans').find(d=>d.id===dpId); dp.confirms=dp.confirms||[];
  if(!dp.confirms.some(c=>c.user_id===State.user.id))dp.confirms.push({user_id:State.user.id,name:State.user.name,at:Date.now()});
  if(dp.status==='draft')dp.status='wait';
  await save('daily_plans',dp); toast('已確認','ok'); App.go('confirm','plan');
};
Views.view_publish=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active); if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const dp=findDaily(State.ctx.date,State.ctx.classId);
  const issues=publishIssues(dp);
  el.innerHTML=`<div class="ctxrow" style="margin-bottom:14px">
    <div class="grow"><label class="sm">日期</label><input type="date" id="pbDate" value="${State.ctx.date}"></div>
    <div class="grow"><label class="sm">班別</label><select id="pbClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
  </div>
  <div class="card"><h3>發布前檢查</h3>
    ${issues.length?issues.map(x=>`<div class="chk">${svg('alert',18)}<span>${esc(x)}</span></div>`).join(''):`<div class="chk">${svg('check',18)}<span>必要項目已完成，可以發布給教練現場使用。</span></div>`}
    <button class="btn block ${issues.length?'warn':'ok'}" ${!dp?'disabled':''} onclick="Views.publishFromFlow('${dp?.id||''}',${issues.length})">${issues.length?'仍要發布':'發布今日課程'}</button>
  </div>
  <div class="actionbar"><button class="btn secondary" onclick="App.go('coachtasks','plan')">上一步</button><span class="sp"></span><button class="btn ok" onclick="App.go('report','plan')">下一步：課後紀錄</button></div>`;
  $('#pbDate').onchange=e=>{State.ctx.date=e.target.value;App.go('publish','plan');};
  $('#pbClass').onchange=e=>{State.ctx.classId=e.target.value;App.go('publish','plan');};
};
Views.publishFromFlow=async function(dpId,hasIssues){
  if(hasIssues&&!confirm('仍有未完成或需注意的項目，確定要發布？'))return;
  await Views.publish(dpId); App.go('publish','plan');
};
/* ---------- 上課模式（大字大鈕；只顯示現場需要的，不含任何管理功能 §四） ---------- */
Views.view_live=function(el){
  ensureClassCtx();
  const dp=findDaily(State.ctx.date,State.ctx.classId);
  if(!dp){el.innerHTML='<div class="empty">尚未建立今日課程，無法進入現場模式。<br><br><button class="btn" onclick="App.go(\'classinfo\',\'plan\')">前往備課</button></div>';return;}
  const cl=C('classes').find(c=>c.id===State.ctx.classId);
  const blocks=C('lesson_blocks').filter(b=>b.daily_plan_id===dp.id);
  const groups=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
  if(App._liveIdx==null){App._liveIdx=0;App._liveStart=Date.now();App._liveDur=(BLOCKS[0].e-BLOCKS[0].s)*60;}
  const idx=App._liveIdx,bl=BLOCKS[idx];
  const sb=blocks.find(b=>b.block_type===bl.key&&!b.training_group_id)||{};
  const coach=id=>{const p=C('profiles').find(x=>x.id===id);return p?p.name:'—';};
  const focus=bl.key==='group'
    ? (groups.length?groups.map(g=>{const gb=blocks.find(x=>x.block_type==='group'&&x.training_group_id===g.id)||{};return `<div class="kv"><b>${esc(g.name)}（${esc(coach(g.coach_id))}）</b><span>${esc([gb.basic,gb.kick].filter(Boolean).join('・')||g.target||'—')}</span></div>`;}).join(''):'<div class="muted">尚未分組</div>')
    : `<div class="kv"><b>內容</b><span>${esc(sb.content||[sb.praise,sb.remind].filter(Boolean).join('；')||'—')}</span></div>`;
  el.innerHTML=`
  <div class="live"><div class="nxt">第 ${idx+1}/5 階段・${cl?esc(cl.name):''}</div>
    <div class="stage">${bl.s}–${bl.e}′　${esc(bl.name)}</div>
    <div class="clock" id="liveClock" aria-live="polite">--:--</div>
    <div class="nxt">${idx<4?'下一段：'+BLOCKS[idx+1].name:'最後一段'}　｜　負責：${esc(coach(sb.responsible_coach_id))}</div></div>
  <div class="card" style="margin-top:12px"><div class="sect-head" style="margin-top:0"><h3>本階段重點</h3></div>
    ${focus}<div class="kv"><b>器材</b><span>${esc(sb.equipment||'—')}</span></div>
    <div class="kv"><b>安全提醒</b><span>${esc(sb.safety_notes||'—')}</span></div></div>
  <div class="live-btns">
    <button class="btn ok" onclick="Views.liveDone()">完成本階段</button>
    <button class="btn" onclick="Views.liveStep(1)">提前下一階段</button>
    <button class="btn secondary" onclick="Views.liveExtend(1)">延長 1 分鐘</button>
    <button class="btn secondary" onclick="Views.liveExtend(5)">延長 5 分鐘</button>
    <button class="btn secondary" onclick="Views.liveStep(-1)">上一階段</button>
    <button class="btn secondary" onclick="Views.liveGroups()">查看分組</button>
  </div>
  <button class="btn danger block" style="margin-top:10px" onclick="Views.liveNote('${dp.id}','傷勢')">發生傷勢 / 安全事件</button>
  <button class="btn secondary block" style="margin-top:6px" onclick="Views.liveNote('${dp.id}','')">臨時紀錄現場狀況</button>
  <button class="btn ghost block" style="margin-top:6px" onclick="App.go('report','plan')">結束上課 → 課後紀錄</button>`;
  App._liveDur=App._liveDur||(bl.e-bl.s)*60;
  const tick=()=>{const cE=document.getElementById('liveClock');if(!cE){clearInterval(App._liveTimer);return;}
    let left=App._liveDur-Math.floor((Date.now()-App._liveStart)/1000),over=false;if(left<0){over=true;left=-left;}
    cE.textContent=(over?'+':'')+String(Math.floor(left/60)).padStart(2,'0')+':'+String(left%60).padStart(2,'0');
    cE.style.color=over?'var(--color-accent-500)':'';};
  tick();App._liveTimer=setInterval(tick,1000);
};
Views.liveStep=function(d){App._liveIdx=Math.max(0,Math.min(4,(App._liveIdx||0)+d));App._liveStart=Date.now();App._liveDur=(BLOCKS[App._liveIdx].e-BLOCKS[App._liveIdx].s)*60;App.go('live','today');};
Views.liveExtend=function(min){App._liveDur=(App._liveDur||0)+min*60;toast('本階段延長 '+min+' 分鐘','ok');};
Views.liveDone=async function(){const dp=findDaily(State.ctx.date,State.ctx.classId);const bl=BLOCKS[App._liveIdx||0];if(dp&&bl.key!=='group')await Views.saveBlockField(dp.id,bl.key,null,'done',true);toast('已完成本階段','ok');Views.liveStep(1);};
Views.liveGroups=function(){const dp=findDaily(State.ctx.date,State.ctx.classId);const groups=dp?C('training_groups').filter(g=>g.daily_plan_id===dp.id):[];const stName=id=>{const s=C('students').find(x=>x.id===id);return s?esc(s.name):'';};const coach=id=>{const p=C('profiles').find(x=>x.id===id);return p?esc(p.name):'—';};Modal.open('今日分組',groups.length?groups.map(g=>`<div class="card" style="margin-bottom:8px;box-shadow:none"><b>${esc(g.name)}（${coach(g.coach_id)}）</b><div class="muted" style="margin-top:4px">${(g.students||[]).map(stName).join('、')||'—'}</div></div>`).join(''):'<div class="empty">尚未分組</div>');};
Views.liveNote=function(dpId,kind){Modal.open(kind==='傷勢'?'紀錄傷勢 / 安全事件':'紀錄現場狀況',`${kind!=='傷勢'?`<div class="chips" style="margin-bottom:10px">${['人數異動','器材問題','課程延遲','學員不適','臨時調整'].map(t=>`<span class="chip" onclick="var i=document.getElementById('lnMsg');i.value=(i.value?i.value+'；':'')+'${t}'">${t}</span>`).join('')}</div>`:''}<textarea id="lnMsg" placeholder="描述…" aria-label="現場狀況"></textarea><button class="btn ${kind==='傷勢'?'danger':''} block" style="margin-top:8px" onclick="Views.saveLiveNote('${dpId}','${kind}')">送出</button>`);};
Views.saveLiveNote=async function(dpId,kind){const msg=$('#lnMsg').value.trim();if(!msg){toast('請輸入內容','warn');return;}await save('discussions',{id:uid('ds'),daily_plan_id:dpId,author_id:State.user.id,author_name:State.user.name+'（現場）',message:(kind==='傷勢'?'【傷勢/安全】':'【現場】')+msg,parent_id:null,created_at:Date.now(),reads:[State.user.id]});Modal.close();toast(kind==='傷勢'?'已紀錄傷勢事件':'現場狀況已紀錄','ok');};

/* ---------- STUDENTS ---------- */
Views.view_students=function(el){
  Views._studentSelected=Views._studentSelected||new Set();
  el.innerHTML=`
  <div class="card">
    <div class="row">
      <input class="grow" id="stuSearch" placeholder="🔍 搜尋姓名/備註">
      ${can('*')?'<button class="btn sm" onclick="Views.editStudent()">＋ 新增</button>':''}
      ${can('*')&&C('students').some(s=>s.demo===true)?'<button class="btn bad sm" onclick="App.deleteDemoStudents()">刪除示範學員</button>':''}
    </div>
    <div class="row" style="margin-top:8px">
      <select id="fAge"><option value="">全部年齡</option>${AGE_GROUPS.map(a=>`<option>${a}</option>`).join('')}</select>
      <select id="fBelt"><option value="">全部級別</option>${BELTS.map(b=>`<option>${b}</option>`).join('')}</select>
      <select id="fSpec"><option value="">全部專項</option>${SPECIALTIES.map(s=>`<option>${s}</option>`).join('')}</select>
      <select id="fClass"><option value="">全部班別</option>${C('classes').map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select>
      <select id="fWd"><option value="">全部上課日</option>${WEEKDAYS.map((w,i)=>`<option value="${i}">${w}</option>`).join('')}</select>
    </div>
  </div>
  <div id="stuList"></div>`;
  const render=()=>{
    const q=$('#stuSearch').value.trim(), fa=$('#fAge').value,fb=$('#fBelt').value,fs=$('#fSpec').value,fc=$('#fClass').value,fw=$('#fWd').value;
    let list=C('students').filter(s=>s.active);
    if(q)list=list.filter(s=>(s.name+s.notes).includes(q));
    if(fa)list=list.filter(s=>s.age_group===fa);
    if(fb)list=list.filter(s=>normBelt(s.belt_rank)===fb);
    if(fs)list=list.filter(s=>s.specialty===fs);
    if(fc)list=list.filter(s=>s.class_id===fc);
    if(fw!=='')list=list.filter(s=>(s.weekdays||[]).includes(WEEKDAYS[+fw]));
    const selected=[...Views._studentSelected].filter(id=>C('students').some(s=>s.id===id&&s.active));
    Views._studentSelected=new Set(selected);
    $('#stuList').innerHTML=list.length?`<div class="card" style="margin-top:12px">
      ${can('*')?`<div class="row" style="margin-bottom:8px"><button class="btn xs g" onclick="Views.selectVisibleStudents()">全選目前篩選 ${list.length} 人</button><button class="btn xs g" onclick="Views.clearStudentSelection()">清除選取</button><button id="bulkDelBtn" class="btn xs bad ${selected.length?'':'disabled'}" onclick="Views.deleteSelectedStudents()">刪除選取 ${selected.length} 人</button></div>`:''}
      <div class="scroll"><table class="tbl">
      <tr>${can('*')?'<th style="width:34px">選</th>':''}<th>姓名</th><th>年齡</th><th>級別</th><th>專項</th><th>進度</th><th>上課日</th><th></th></tr>
      ${list.map(s=>`<tr>
        ${can('*')?`<td><input type="checkbox" class="stuChk" data-id="${s.id}" ${Views._studentSelected.has(s.id)?'checked':''} onchange="Views.toggleStudentSelection('${s.id}',this.checked)"></td>`:''}
        <td><b>${esc(s.name)}</b>${s.promotion_status?' 🎯':''}${s.competition_athlete?' 🏅':''}</td>
        <td><span class="tag age">${s.age_group}</span></td>
        <td><span class="tag belt">${normBelt(s.belt_rank)}</span></td>
        <td><span class="tag spec">${s.specialty}</span></td>
        <td class="muted" style="font-size:11px">${[s.current_progress&&('品勢:'+esc(s.current_progress)),s.tech&&('技術:'+esc(s.tech))].filter(Boolean).join('<br>')||'—'}</td>
        <td class="muted">${(s.weekdays||[]).map(w=>WD_SHORT[WEEKDAYS.indexOf(w)]).join('')}</td>
        <td>${can('*')?`<button class="btn xs g" onclick="Views.editStudent('${s.id}')">編輯</button>`:''}</td>
      </tr>`).join('')}
    </table></div><div class="muted" style="margin-top:8px">共 ${list.length} 人${can('*')?`・已選 ${selected.length} 人`:''}</div></div>`:'<div class="empty"><div class="ic">👥</div>沒有符合的學員</div>';
    Views._studentVisibleIds=list.map(s=>s.id);
  };
  ['stuSearch','fAge','fBelt','fSpec','fClass','fWd'].forEach(id=>{const e=$('#'+id);e.oninput=render;e.onchange=render;});
  render();
};
Views.toggleStudentSelection=function(id,on){Views._studentSelected=Views._studentSelected||new Set();if(on)Views._studentSelected.add(id);else Views._studentSelected.delete(id);const btn=$('#bulkDelBtn');if(btn){const n=Views._studentSelected.size;btn.textContent='刪除選取 '+n+' 人';btn.classList.toggle('disabled',!n);}};
Views.selectVisibleStudents=function(){Views._studentSelected=Views._studentSelected||new Set();(Views._studentVisibleIds||[]).forEach(id=>Views._studentSelected.add(id));Views.view_students($('#view'));};
Views.clearStudentSelection=function(){Views._studentSelected=new Set();Views.view_students($('#view'));};
Views.deleteSelectedStudents=async function(){const ids=[...(Views._studentSelected||new Set())];if(!ids.length){toast('請先勾選學員','warn');return;}await App.deleteStudentsByIds(ids,{actionName:'批量刪除學員',confirmText:'確認刪除',backupReason:'批量刪除學員前自動備份',auditAction:'delete_students_bulk'});Views._studentSelected=new Set();};
Views.editStudent=function(id){
  const s=id?C('students').find(x=>x.id===id):{age_group:'國小',belt_rank:'白帶',specialty:'基礎',weekdays:[]};
  Modal.open(id?'編輯學員':'新增學員',`
    <div class="field"><label>姓名 *</label><input id="es_name" value="${esc(s.name||'')}"></div>
    <div class="row">
      <div class="grow field"><label>年齡層 *</label><select id="es_age">${AGE_GROUPS.map(a=>`<option ${a===s.age_group?'selected':''}>${a}</option>`).join('')}</select></div>
      <div class="grow field"><label>級別段位 *</label><select id="es_belt">${BELTS.map(b=>`<option ${b===normBelt(s.belt_rank)?'selected':''}>${b}</option>`).join('')}</select></div>
    </div>
    <div class="row">
      <div class="grow field"><label>專項</label><select id="es_spec">${SPECIALTIES.map(x=>`<option ${x===s.specialty?'selected':''}>${x}</option>`).join('')}</select></div>
      <div class="grow field"><label>班別</label><select id="es_class"><option value="">未指定</option>${C('classes').map(c=>`<option value="${c.id}" ${c.id===s.class_id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>固定上課日</label><div class="chips" id="es_wd">${WEEKDAYS.map(w=>`<span class="chip ${(s.weekdays||[]).includes(w)?'on':''}" data-w="${w}">${w}</span>`).join('')}</div></div>
    <div class="row">
      <label class="chip ${s.promotion_status?'on':''}" id="es_promo">🎯 準備晉級</label>
      <label class="chip ${s.competition_athlete?'on':''}" id="es_comp">🏅 比賽選手</label>
    </div>
    <div class="row" style="margin-top:10px">
      <div class="grow field"><label>品勢進度</label><input id="es_prog" value="${esc(s.current_progress||'')}" placeholder="例：太極一章"></div>
      <div class="grow field"><label>技術動作</label><input id="es_tech" value="${esc(s.tech||'')}" placeholder="例：前踢、旋踢"></div>
    </div>
    <div class="field"><label>備註</label><textarea id="es_notes">${esc(s.notes||'')}</textarea></div>
    <div class="row" style="margin-top:6px">
      <button class="btn block" onclick="Views.saveStudent('${id||''}')">儲存</button>
      ${id?`<button class="btn bad sm" onclick="Views.delStudent('${id}')">刪除</button>`:''}
    </div>`,
    m=>{m.querySelectorAll('#es_wd .chip').forEach(c=>c.onclick=()=>c.classList.toggle('on'));
        ['es_promo','es_comp'].forEach(i=>{$('#'+i).onclick=()=>$('#'+i).classList.toggle('on');});});
};
Views.saveStudent=async function(id){
  const name=$('#es_name').value.trim();
  if(!name){toast('姓名必填','bad');return;}
  const wd=[...document.querySelectorAll('#es_wd .chip.on')].map(c=>c.dataset.w);
  const clId=$('#es_class').value;
  const old=id?C('students').find(x=>x.id===id):null;
  const obj=Object.assign({},old||{active:true},{
    id:id||uid('st'),name,age_group:$('#es_age').value,belt_rank:$('#es_belt').value,
    specialty:$('#es_spec').value,class_id:clId,weekdays:wd,
    current_progress:$('#es_prog').value.trim(),tech:$('#es_tech').value.trim(),
    notes:$('#es_notes').value.trim(),
    promotion_status:$('#es_promo').classList.contains('on'),
    competition_athlete:$('#es_comp').classList.contains('on'),active:true});
  await save('students',obj); await audit(id?'update':'create','students',obj.id,old,obj);
  Modal.close();toast('已儲存','ok');App.go('students');
};
Views.delStudent=async function(id){if(!requireAdminRole())return;await App.requireAdminPin({actionName:'刪除學員',impact:'將刪除此學員資料。',confirmText:'確認刪除',onConfirm:async()=>{await remove('students',id);await audit('delete','students',id);Modal.close();toast('已刪除','ok');App.go('students');}});};
</script>

<script>
/* ---------- IMPORT (Excel) ---------- */
Views.view_import=function(el){
  el.innerHTML=`
  <div class="card">
    <h3>📥 Excel / CSV 學員匯入</h3>
    <p class="muted">必要欄位：姓名、年齡層、級別段位、專項、固定上課日、班別。選填：品勢進度、技術動作、備註、是否準備晉級、是否為比賽選手、狀態。</p>
    <div class="row" style="margin-top:8px">
      <button class="btn g sm" onclick="Views.dlTemplate()">⬇️ 下載 Excel 範本</button>
      <label class="btn sm">📁 選擇檔案<input type="file" id="impFile" accept=".xlsx,.xls,.csv" style="display:none"></label>
    </div>
  </div>
  <div id="impPreview"></div>`;
  $('#impFile').onchange=Views.parseImport;
};
Views.dlTemplate=function(){
  const rows=[['姓名','年齡層','級別段位','專項','固定上課日','班別','品勢進度','技術動作','備註','是否準備晉級','是否為比賽選手','狀態'],
    ['王小明','國小','黃帶','基礎','一、二、三、四、五','健身班','太極一章','前踢、旋踢','認真','否','否','啟用'],
    ['陳大華','國中','藍帶','比賽選手','一、二、三、四、五','選手班','太極三章','橫踢、後踢','','是','是','啟用'],
    ['林阿成','幼兒','白帶','基礎','六','週六健身班','','基本站姿、前踢','需家長陪同','否','否','啟用']];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'學員名單');
  XLSX.writeFile(wb,'學員名單範本.xlsx');
  toast('範本已下載','ok');
};
Views._imp=null;
Views.parseImport=function(e){
  const f=e.target.files[0]; if(!f)return;
  const reader=new FileReader();
  $('#impPreview').innerHTML='<div class="loading"><div class="spin"></div>解析中…</div>';
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      Views.validateImport(rows);
    }catch(err){$('#impPreview').innerHTML=`<div class="warnbox">解析失敗：${esc(err.message)}</div>`;}
  };
  reader.readAsBinaryString(f);
};
Views.validateImport=function(rows){
  if(!rows.length){$('#impPreview').innerHTML='<div class="warnbox">檔案為空</div>';return;}
  const header=rows[0].map(h=>String(h).trim());
  const idx=n=>header.findIndex(h=>h.includes(n));
  const ci={name:idx('姓名'),age:idx('年齡'),belt:idx('級別'),spec:idx('專項'),wd:idx('上課日'),cls:idx('班別'),
    prog:idx('進度'),tech:idx('技術'),note:idx('備註'),promo:idx('晉級'),comp:idx('比賽'),st:idx('狀態')};
  if(ci.name<0){$('#impPreview').innerHTML='<div class="warnbox">找不到「姓名」欄位，請使用範本格式。</div>';return;}
  const classes=C('classes');
  const existing=C('students');
  const parsed=[]; let nNew=0,nUpd=0,nDup=0,nErr=0;
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(r.every(c=>String(c).trim()===''))continue;
    const errs=[]; const g=k=>ci[k]>=0?String(r[ci[k]]).trim():'';
    const name=g('name');
    let age=g('age'),belt=normBelt(g('belt')),spec=g('spec')||'尚未分類',wdRaw=g('wd'),clsName=g('cls');
    if(!name)errs.push('姓名空白');
    if(age&&!ageOK(age))errs.push('年齡層不正確（限幼兒/國小/國中/成人）');
    if(!age)errs.push('年齡層缺漏');
    if(belt&&!beltOK(belt))errs.push('級別段位不存在');
    if(!belt)errs.push('級別段位缺漏');
    if(spec&&!SPECIALTIES.includes(spec))errs.push('無法辨識的專項');
    const wd=normWeekdays(wdRaw);
    if(wdRaw&&!wd.length)errs.push('上課日格式錯誤');
    let clsId='';
    if(clsName){const c=classes.find(c=>c.name===clsName);if(c)clsId=c.id;else errs.push('班別不存在：'+clsName);}
    // 重複（同名同班）
    const dup=existing.find(s=>s.name===name&&s.class_id===clsId&&s.active);
    const obj={id:dup?dup.id:uid('st'),name,age_group:age,belt_rank:belt,specialty:spec,class_id:clsId,
      weekdays:wd,current_progress:g('prog'),tech:g('tech'),notes:g('note'),
      promotion_status:/是|Y|yes|1|✓/i.test(g('promo')),
      competition_athlete:/是|Y|yes|1|✓/i.test(g('comp')),
      active:!/停|停用|0|inactive/i.test(g('st')),demo:false};
    let kind='new';
    if(errs.length){kind='err';nErr++;}
    else if(dup){kind='dup';nDup++;nUpd++;}
    else nNew++;
    parsed.push({row:i+1,obj,errs,kind});
  }
  Views._imp=parsed;
  $('#impPreview').innerHTML=`
  <div class="card">
    <div class="row">
      <div class="stat" style="cursor:default"><div class="n" style="color:var(--ok)">${nNew}</div><div class="l">新增</div></div>
      <div class="stat" style="cursor:default"><div class="n" style="color:var(--brand)">${nUpd}</div><div class="l">更新/重複</div></div>
      <div class="stat" style="cursor:default"><div class="n" style="color:var(--bad)">${nErr}</div><div class="l">錯誤</div></div>
    </div>
    ${nErr?'<div class="warnbox">有 '+nErr+' 筆錯誤資料，這些將不會匯入。請修正 Excel 後重新上傳。</div>':'<div class="okbox">資料檢查通過，可確認匯入。</div>'}
    <div class="scroll" style="max-height:340px;overflow:auto;margin-top:8px"><table class="tbl">
      <tr><th>列</th><th>姓名</th><th>年齡</th><th>級別</th><th>專項</th><th>上課日</th><th>結果</th></tr>
      ${parsed.map(p=>`<tr style="${p.kind==='err'?'background:#fef2f2':''}">
        <td>${p.row}</td><td>${esc(p.obj.name)}</td><td>${esc(p.obj.age_group)}</td><td>${esc(p.obj.belt_rank)}</td>
        <td>${esc(p.obj.specialty)}</td><td class="muted">${(p.obj.weekdays||[]).map(w=>WD_SHORT[WEEKDAYS.indexOf(w)]).join('')}</td>
        <td>${p.kind==='err'?'<span style="color:var(--bad)">'+esc(p.errs.join('；'))+'</span>':p.kind==='dup'?'<span class="tag">更新</span>':'<span class="tag spec">新增</span>'}</td>
      </tr>`).join('')}
    </table></div>
    <button class="btn block ${nErr&&nNew+nUpd===0?'':''}" style="margin-top:10px" onclick="Views.commitImport()">✅ 確認匯入 ${nNew+nUpd} 筆（略過 ${nErr} 筆錯誤）</button>
  </div>`;
};
Views.commitImport=async function(){
  const ok=Views._imp.filter(p=>p.kind!=='err');
  if(!ok.length){toast('沒有可匯入的資料','warn');return;}
  for(const p of ok)await save('students',p.obj);
  await audit('import','students',null,null,{count:ok.length});
  toast('已匯入 '+ok.length+' 筆','ok');
  $('#impPreview').innerHTML='<div class="okbox">✅ 匯入完成，共 '+ok.length+' 筆。</div>';
  Views._imp=null;
};
</script>

Views.editClass=function(id){

    m=>{m.querySelectorAll('#ec_wd .chip').forEach(x=>x.onclick=()=>x.classList.toggle('on'));

Views.saveClass=async function(id){
  const name=$('#ec_name').value.trim();if(!name){toast('名稱必填','bad');return;}
  const wd=[...document.querySelectorAll('#ec_wd .chip.on')].map(x=>x.dataset.w);

    class_type:$('#ec_type').value,duration_minutes:+$('#ec_dur').value||90,
    start_time:$('#ec_s').value,end_time:$('#ec_e').value,weekdays:wd,
    seasonal,active_from:seasonal?$('#ec_from').value:'',active_until:seasonal?$('#ec_until').value:'',
    active:$('#ec_act').classList.contains('on'),updated_at:Date.now()}));

Views.delClass=async function(id){if(!requireAdminRole())return;await App.requireAdminPin({actionName:'刪除班別',impact:'刪除班別不會刪除學員，但會影響班別選單。',confirmText:'確認刪除',onConfirm:async()=>{await remove('classes',id);Modal.close();App.go('classes');}});};
Views.dupClass=async function(id){const c=C('classes').find(x=>x.id===id);if(!c)return;await save('classes',{...c,id:uid('cl'),name:c.name+'（複製）',created_at:Date.now(),updated_at:Date.now()});toast('已複製班別','ok');App.go('classes');};
Views.toggleClassActive=async function(id){const c=C('classes').find(x=>x.id===id);if(!c)return;await save('classes',{...c,active:c.active===false,updated_at:Date.now()});toast(c.active===false?'已啟用':'已停用','ok');App.go('classes');};

/* ---------- 班別季節性 / 雄麒預設班別 ---------- */
// 該班別在指定日期是否應出現在「今日班表」（啟用中 + 若季節性則落在啟用區間內）
function classActiveOn(c,dateStr){
  if(!c||c.active===false)return false;
  if(c.seasonal){
    if(c.active_from&&dateStr<c.active_from)return false;
    if(c.active_until&&dateStr>c.active_until)return false;
  }
  return true;
}
// 建立雄麒預設班別（冪等：依名稱+上課日+起訖時間判重，不覆蓋已修改過的班別）
async function applyHsiungchiPresets(){
  const now=Date.now();let added=0,exists=0,failed=0;const existing=C('classes');
  for(const def of HSIUNGCHI_PRESETS){
    try{
      const weekdays=def.jsdays.map(jsdayToWeekday);
      const dup=existing.find(c=>c.name===def.name&&c.start_time===def.start_time&&c.end_time===def.end_time
        &&JSON.stringify((c.weekdays||[]).slice().sort())===JSON.stringify(weekdays.slice().sort()));
      if(dup){exists++;continue;}
      await save('classes',{id:uid('cl'),name:def.name,class_type:def.class_type,weekdays,
        start_time:def.start_time,end_time:def.end_time,duration_minutes:def.duration_minutes,
        active:true,seasonal:!!def.seasonal,active_from:def.active_from||'',active_until:def.active_until||'',
        default_theme:'',default_intensity:'中',default_grouping_mode:'smart',default_coach_ids:[],
        created_at:now,updated_at:now});
      added++;
    }catch(e){failed++;}
  }
  return {added,exists,failed};
}
Views.createPresets=async function(){
  const r=await applyHsiungchiPresets();
  toast(`雄麒預設班別：新增 ${r.added}・已存在 ${r.exists}・失敗 ${r.failed}`,r.failed?'warn':'ok');
  App.go('classes');
};

<script>
/* ---------- GROUPS (分組建議 + 拖曳/點選調整) ---------- */
Views._groupState=null;
Views.view_groups=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const wd=weekdayOf(State.ctx.date);
  const list=Stats.attendingFor(State.ctx.date,State.ctx.classId);
  el.innerHTML=`
  <div class="card">
    <div class="row">
      <div class="grow"><label class="sm">日期</label><input type="date" id="gDate" value="${State.ctx.date}"></div>
      <div class="grow"><label class="sm">班別</label><select id="gClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
    </div>
    <p class="muted" style="margin:8px 0 0">${WEEKDAYS[wd]}・共 ${list.length} 人・可出席教練 ${Stats.coachesAvailable(wd).length} 位</p>
    <div class="sect-title" style="margin-top:12px">選擇分組模式</div>
    <div class="chips" id="gModes">
      ${[['smart','智慧綜合建議'],['age','依年齡層'],['belt','依級別段位'],['poomsae_spar','品勢/對練'],['level','初中高階'],['kids','幼兒獨立'],['adult','成人獨立'],['promo','晉級加強'],['comp','比賽選手']].map(m=>`<span class="chip" data-m="${m[0]}">${m[1]}</span>`).join('')}
    </div>
    <button class="btn block" style="margin-top:10px" onclick="Views.genGroups()">🧩 產生分組建議</button>
  </div>
  <div id="gResult"></div>`;
  $('#gDate').onchange=e=>{State.ctx.date=e.target.value;App.go('groups');};
  $('#gClass').onchange=e=>{State.ctx.classId=e.target.value;App.go('groups');};
  let mode='smart';
  document.querySelectorAll('#gModes .chip').forEach(c=>{if(c.dataset.m==='smart')c.classList.add('on');c.onclick=()=>{document.querySelectorAll('#gModes .chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');mode=c.dataset.m;};});
  Views._gMode=()=>mode;
  // 若已存在該日分組，載入
  const dp=findDaily(State.ctx.date,State.ctx.classId);
  if(dp){const gs=C('training_groups').filter(g=>g.daily_plan_id===dp.id);if(gs.length){Views._groupState={groups:gs.map(g=>({...g,students:[...(g.students||[])]})),notes:[]};Views.renderGroups(list);}}
};
Views.genGroups=function(){
  const wd=weekdayOf(State.ctx.date);
  const list=Stats.attendingFor(State.ctx.date,State.ctx.classId);
  if(!list.length){toast('此日無學員','warn');return;}
  const res=Grouping.suggest(list,Views._gMode(),Stats.coachesAvailable(wd).length);
  Views._groupState={groups:res.groups,notes:res.notes};
  Views.renderGroups(list);
  toast('已產生 '+res.groups.length+' 組','ok');
};
Views.renderGroups=function(list){
  const gs=Views._groupState.groups;
  const val=Grouping.validate(gs,list);
  const coaches=C('profiles').filter(p=>p.active&&(p.role==='head'||p.role==='assistant'));
  const stName=id=>{const s=C('students').find(x=>x.id===id);return s?s.name:'?';};
  const notesHtml=(Views._groupState.notes||[]).map(n=>`<div class="infobox">💡 ${esc(n)}</div>`).join('')
    +(val.issues.map(i=>`<div class="warnbox">⚠️ ${esc(i.msg)}</div>`).join(''))
    +(val.issues.length?'':'<div class="okbox">✅ 分組檢查通過</div>');
  $('#gResult').innerHTML=`<div style="margin-top:12px">${notesHtml}</div>
    <div class="row" style="margin:8px 0"><button class="btn sm g" onclick="Views.addGroup()">＋ 新增組別</button>
      <button class="btn sm ok" onclick="Views.saveGroups()">💾 儲存分組到今日備課</button></div>
    <p class="muted">操作：點學員後再點目標組別即可搬移。</p>
    ${gs.map((g,gi)=>`<div class="gcard" data-gi="${gi}" ondragover="event.preventDefault();this.classList.add('drop')" ondragleave="this.classList.remove('drop')" ondrop="Views.dropStu(event,${gi})">
      <div class="gh">
        <b contenteditable onblur="Views._groupState.groups[${gi}].name=this.textContent">${esc(g.name)}</b>
        <span class="tag">${g.group_type}</span><span class="muted">${(g.students||[]).length}人</span>
        <div style="flex:1"></div>
        <button class="btn xs g" onclick="Views.delGroup(${gi})">✕</button>
      </div>
      <div class="row" style="margin-bottom:6px">
        <select onchange="Views._groupState.groups[${gi}].coach_id=this.value" class="grow"><option value="">選教練</option>${coaches.map(c=>`<option value="${c.id}" ${c.id===g.coach_id?'selected':''}>${esc(c.name)}(${ROLE_LABEL[c.role]})</option>`).join('')}</select>
        <select onchange="Views._groupState.groups[${gi}].assistant_id=this.value" class="grow"><option value="">選助教</option>${coaches.filter(c=>c.role==='assistant').map(c=>`<option value="${c.id}" ${c.id===g.assistant_id?'selected':''}>${esc(c.name)}</option>`).join('')}</select>
      </div>
      <div>${(g.students||[]).map(sid=>`<span class="stu ${Views._selStu===sid?'sel':''}" draggable="true" ondragstart="Views._drag='${sid}'" onclick="Views.pickStu('${sid}',${gi})">${esc(stName(sid))}</span>`).join('')||'<span class="muted">（空組）</span>'}</div>
    </div>`).join('')}
    ${val.unassigned.length?`<div class="gcard" data-gi="-1" ondragover="event.preventDefault();this.classList.add('drop')" ondragleave="this.classList.remove('drop')" ondrop="Views.dropStu(event,-1)"><div class="gh"><b>未分組</b><span class="muted">${val.unassigned.length}人</span></div>
      <div class="pool">${val.unassigned.map(s=>`<span class="stu ${Views._selStu===s.id?'sel':''}" draggable="true" ondragstart="Views._drag='${s.id}'" onclick="Views.pickStu('${s.id}',-1)">${esc(s.name)}</span>`).join('')}</div></div>`:''}
    <div class="actionbar"><button class="btn secondary" onclick="App.go('stats','plan')">返回人數</button><span class="sp"></span><button class="btn" onclick="Views.saveGroups(true)">儲存並進入備課</button></div>`;
};
Views._selStu=null;Views._drag=null;
Views.pickStu=function(sid,gi){
  if(Views._selStu===sid){Views._selStu=null;Views.reRenderGroups();return;}
  if(Views._selStu){ // 已選 -> 搬移到 gi
    Views.moveStu(Views._selStu,gi);Views._selStu=null;
  }else{Views._selStu=sid;Views.reRenderGroups();}
};
Views.moveStu=function(sid,toGi){
  const gs=Views._groupState.groups;
  gs.forEach(g=>{g.students=(g.students||[]).filter(x=>x!==sid);});
  if(toGi>=0)gs[toGi].students.push(sid);
  Views.reRenderGroups();
};
Views.dropStu=function(e,gi){e.preventDefault();if(Views._drag){Views.moveStu(Views._drag,gi);Views._drag=null;}};
Views.reRenderGroups=function(){const wd=weekdayOf(State.ctx.date);Views.renderGroups(Stats.attendingFor(State.ctx.date,State.ctx.classId));};
Views.addGroup=function(){Views._groupState.groups.push({id:uid('g'),name:'新組別',group_type:'基礎',coach_id:'',assistant_id:'',students:[]});Views.reRenderGroups();};
Views.delGroup=function(gi){Views._groupState.groups.splice(gi,1);Views.reRenderGroups();};
Views.saveGroups=async function(next){
  const wd=weekdayOf(State.ctx.date);
  const list=Stats.attendingFor(State.ctx.date,State.ctx.classId);
  let dp=findDaily(State.ctx.date,State.ctx.classId);
  const val=Grouping.validate(Views._groupState.groups,list,dp);
  const team=Grouping.coachTeam(Views._groupState.groups,dp);
  if(team.size>MAX_COACHES_PER_CLASS)toast(`提醒：本堂課有 ${team.size} 位教練，超過建議上限 ${MAX_COACHES_PER_CLASS} 位（仍可儲存）`,'warn');
  if(!dp)dp=await ensureDaily(State.ctx.date,State.ctx.classId);
  // 清掉舊 group + 其 group block
  const oldGs=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
  for(const g of oldGs)await remove('training_groups',g.id);
  for(const g of Views._groupState.groups){
    await save('training_groups',{id:g.id||uid('g'),daily_plan_id:dp.id,name:g.name,group_type:g.group_type,
      coach_id:g.coach_id||'',assistant_id:g.assistant_id||'',target:g.target||'',notes:g.notes||'',students:g.students||[]});
  }
  await audit('save_groups','training_groups',dp.id,null,{count:Views._groupState.groups.length});
  toast(val.issues.length?'已儲存（仍有提醒）':'分組已儲存','ok');
  if(next)App.go('plan','plan');
};
async function ensureDaily(date,classId){
  let dp=findDaily(date,classId);if(dp)return dp;
  const wkStart=mondayOf(date);
  let wp=C('weekly_plans').find(w=>w.week_start===wkStart&&w.class_id===classId);
  if(!wp)wp=await save('weekly_plans',{id:uid('wp'),week_start:wkStart,week_end:addDays(wkStart,6),class_id:classId,weekly_goal:'',status:'draft',created_by:State.user.id,approved_by:''});
  const list=Stats.studentsFor(classId,weekdayOf(date));
  dp=await save('daily_plans',{id:uid('dp'),weekly_plan_id:wp.id,date,class_id:classId,expected_count:list.length,actual_count:null,status:'draft',revision:1,created_by:State.user.id});
  return dp;
}
</script>

<script>
/* ---------- QUICK PLAN ---------- */
Views.view_quickplan=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  el.innerHTML=`<div class="card"><h3 style="margin-top:0">快速備課</h3>
    <div class="row"><div class="grow field"><label class="sm">班級</label><select id="qClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
      <div class="grow field"><label class="sm">日期</label><input type="date" id="qDate" value="${State.ctx.date}"></div></div>
    <div class="field"><label class="sm">今日主目標</label><select id="qGoal">${['基本動作穩定','腿法速度與準確度','品勢路線與節奏','對練反應與距離','晉級考重點','比賽選手強化'].map(x=>`<option>${x}</option>`).join('')}</select></div>
    <div class="row"><div class="grow field"><label class="sm">分組方式</label><select id="qGroup"><option value="level">白帶 / 中色帶 / 高色帶</option><option value="smart">系統智慧分組</option><option value="custom">自訂分組（保留既有分組）</option></select></div>
      <div class="grow field"><label class="sm">課程強度</label><select id="qIntensity">${['低','中','高'].map(x=>`<option>${x}</option>`).join('')}</select></div></div>
    <div class="grid g2">
      <button class="tile" onclick="Views.quickCopyPrev()">${svg('clipboard',22)}<span><b>複製上一堂課</b><span>用最近一次同班內容</span></span></button>
      <button class="tile" onclick="Views.quickCopyLastWeek()">${svg('calendar',22)}<span><b>複製上週同一天</b><span>保留週期銜接</span></span></button>
      <button class="tile" onclick="Views.quickApplyTemplate()">${svg('database',22)}<span><b>套用館內模板</b><span>帶入常用課程</span></span></button>
      <button class="tile" onclick="Views.quickCarryUnfinished()">${svg('clock',22)}<span><b>帶入未完成內容</b><span>依課後紀錄銜接</span></span></button>
    </div>
    <button class="btn block lg" style="margin-top:12px" onclick="Views.generateQuickPlan()">產生五階段初稿</button>
  </div>
  <div class="card"><h3 style="margin-top:0">初稿內容</h3><div id="quickPreview" class="muted">選擇條件後產生課程初稿。</div></div>`;
  $('#qClass').onchange=e=>{State.ctx.classId=e.target.value;};
  $('#qDate').onchange=e=>{State.ctx.date=e.target.value;};
};
Views.quickContext=function(){
  const classId=$('#qClass')?.value||State.ctx.classId,date=$('#qDate')?.value||State.ctx.date,wd=weekdayOf(date);
  return {classId,date,wd,goal:$('#qGoal')?.value||'基本動作穩定',groupMode:$('#qGroup')?.value||'level',intensity:$('#qIntensity')?.value||'中',
    list:Stats.studentsFor(classId,wd),coaches:Stats.coachesAvailable(wd)};
};
Views.quickPreview=function(text){const box=$('#quickPreview');if(box)box.innerHTML=`<pre class="codebox">${esc(text)}</pre>`;};
Views.generateQuickPlan=async function(){
  const q=Views.quickContext();if(!q.classId){toast('請先選擇班級','warn');return;}
  const dp=await ensureDaily(q.date,q.classId);
  if(q.groupMode!=='custom'){
    const sug=Grouping.suggest(q.list,q.groupMode==='level'?'level':'smart',q.coaches.length).groups;
    const old=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
    for(const g of old)await remove('training_groups',g.id);
    for(let i=0;i<sug.length;i++){
      const coach=q.coaches[i%Math.max(1,q.coaches.length)];
      await save('training_groups',{...sug[i],daily_plan_id:dp.id,coach_id:coach?.id||'',assistant_id:'',target:q.goal});
    }
  }
  const groups=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
  const weak=Views.quickWeakStudents(q.classId);
  const equip=q.intensity==='高'?'踢靶、角錐、敏捷梯、護具':'踢靶、角錐、水壺';
  const drafts={
    warmup:{content:`集合禮節、關節活動、慢跑與動態伸展（${q.intensity}強度）`,goal:'收心、提升體溫',equipment:'碼表',safety_notes:'確認場地乾燥，提醒補水。'},
    fitness:{content:`反應遊戲、核心與折返跑，銜接今日主目標：${q.goal}`,goal:'建立身體控制與專注',equipment:'角錐、敏捷梯',safety_notes:'幼兒降低碰撞風險。'},
    apply:{content:`分組成果挑戰：${q.goal} 的組合應用與小組競賽`,goal:'把基本動作轉成可執行任務',equipment:equip,safety_notes:'對練距離與護具檢查。'},
    review:{praise:'點名表揚專注與互助',remind:weak.length?`下次加強：${weak.slice(0,6).join('、')}`:'提醒回家練習今日主目標',homework:`每天 3 分鐘練習 ${q.goal}`,preview:'下堂課延伸今日未完成內容',done:false}
  };
  for(const bl of BLOCKS.filter(b=>b.key!=='group')){
    let cur=C('lesson_blocks').find(b=>b.daily_plan_id===dp.id&&b.block_type===bl.key&&!b.training_group_id);
    await save('lesson_blocks',{...(cur||{id:uid('lb')}),daily_plan_id:dp.id,training_group_id:null,block_type:bl.key,start_minute:bl.s,end_minute:bl.e,done:false,...drafts[bl.key]});
  }
  for(const g of groups){
    let cur=C('lesson_blocks').find(b=>b.daily_plan_id===dp.id&&b.block_type==='group'&&b.training_group_id===g.id);
    await save('lesson_blocks',{...(cur||{id:uid('lb')}),daily_plan_id:dp.id,training_group_id:g.id,block_type:'group',start_minute:30,end_minute:60,
      basic:q.goal,kick:g.group_type==='對練'?'攻防步伐與反應':'前踢、旋踢準確度',poomsae:g.group_type==='品勢'?'指定品勢段落':'依級別複習',spar:g.group_type==='對練'?'條件對練':'距離控制遊戲',
      goal:`${g.name} 完成 ${q.goal}`,commonErr:'抬頭、重心、收腳',done:false});
  }
  await save('discussions',{id:uid('ds'),daily_plan_id:dp.id,author_id:State.user.id,author_name:State.user.name,message:`快速備課已產生：主目標 ${q.goal}；器材 ${equip}；安全提醒已帶入。`,created_at:Date.now(),reads:[State.user.id]});
  Views.quickPreview(`已建立 ${groups.length} 組與五階段初稿\n助教任務：協助器材、幼兒安全距離、記錄需加強學生\n需加強學生：${weak.join('、')||'無'}\n器材：${equip}`);
  toast('快速備課初稿已完成','ok');
};
Views.quickWeakStudents=function(classId){
  const plans=C('daily_plans').filter(d=>d.class_id===classId).sort((a,b)=>b.date.localeCompare(a.date));
  const names=[];
  for(const dp of plans.slice(0,4)){
    C('post_class_reports').filter(r=>r.daily_plan_id===dp.id&&(r.weak||r.adjust)).forEach(r=>names.push(...String(r.weak||r.adjust||'').split(/[、,，\s]+/).filter(Boolean)));
  }
  return [...new Set(names)].slice(0,10);
};
Views.copyPlanBlocks=async function(fromPlan,toPlan){
  if(!fromPlan||!toPlan)return false;
  for(const b of C('lesson_blocks').filter(x=>x.daily_plan_id===fromPlan.id&&!x.training_group_id)){
    let cur=C('lesson_blocks').find(x=>x.daily_plan_id===toPlan.id&&x.block_type===b.block_type&&!x.training_group_id);
    const copy={...b,id:cur?cur.id:uid('lb'),daily_plan_id:toPlan.id,done:false};await save('lesson_blocks',copy);
  }
  return true;
};
Views.quickCopyPrev=async function(){
  const q=Views.quickContext();const prev=C('daily_plans').filter(d=>d.class_id===q.classId&&d.date<q.date).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!prev){toast('找不到可複製的上一堂課','warn');return;}
  const dp=await ensureDaily(q.date,q.classId);await Views.copyPlanBlocks(prev,dp);toast('已複製上一堂課內容','ok');App.go('plan','plan');
};
Views.quickCopyLastWeek=async function(){
  const q=Views.quickContext();const prev=C('daily_plans').find(d=>d.class_id===q.classId&&d.date===addDays(q.date,-7));
  if(!prev){toast('找不到上週同一天課程','warn');return;}
  const dp=await ensureDaily(q.date,q.classId);await Views.copyPlanBlocks(prev,dp);toast('已複製上週同一天課程','ok');App.go('plan','plan');
};
Views.quickApplyTemplate=async function(){
  const q=Views.quickContext(),dp=await ensureDaily(q.date,q.classId),tpls=C('course_templates');
  for(const t of tpls.slice(0,5)){
    const bl=BLOCKS.find(b=>b.key===t.category)||BLOCKS[1];
    let cur=C('lesson_blocks').find(b=>b.daily_plan_id===dp.id&&b.block_type===bl.key&&!b.training_group_id);
    await save('lesson_blocks',{...(cur||{id:uid('lb')}),daily_plan_id:dp.id,training_group_id:null,block_type:bl.key,start_minute:bl.s,end_minute:bl.e,content:t.content,goal:t.goal,equipment:t.equipment,done:false});
  }
  toast('已套用館內模板','ok');App.go('plan','plan');
};
Views.quickCarryUnfinished=async function(){
  const q=Views.quickContext(),dp=await ensureDaily(q.date,q.classId),prev=C('daily_plans').filter(d=>d.class_id===q.classId&&d.date<q.date).sort((a,b)=>b.date.localeCompare(a.date))[0];
  const rep=prev&&C('post_class_reports').find(r=>r.daily_plan_id===prev.id&&r.next_lesson);
  if(!rep)return toast('找不到上一堂未完成銜接內容','warn');
  let cur=C('lesson_blocks').find(b=>b.daily_plan_id===dp.id&&b.block_type==='apply'&&!b.training_group_id);
  await save('lesson_blocks',{...(cur||{id:uid('lb')}),daily_plan_id:dp.id,training_group_id:null,block_type:'apply',start_minute:60,end_minute:85,content:rep.next_lesson,goal:'完成上次未完成內容',done:false});
  toast('已帶入未完成內容','ok');App.go('plan','plan');
};
</script>

<script>
/* ---------- PLAN (每日備課 90 分鐘 + 討論) ---------- */
Views.view_plan=async function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const wd=weekdayOf(State.ctx.date);
  el.innerHTML=`
  <div class="card">
    <div class="row">
      <div class="grow"><label class="sm">日期</label><input type="date" id="pDate" value="${State.ctx.date}"></div>
      <div class="grow"><label class="sm">班別</label><select id="pClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
    </div>
  </div>
  <div id="planBody"></div>`;
  $('#pDate').onchange=e=>{State.ctx.date=e.target.value;App.go('plan');};
  $('#pClass').onchange=e=>{State.ctx.classId=e.target.value;App.go('plan');};
  Views.renderPlan();
};
Views.renderPlan=function(){
  const dp=findDaily(State.ctx.date,State.ctx.classId);
  const body=$('#planBody');
  const wd=weekdayOf(State.ctx.date);
  const list=Stats.attendingFor(State.ctx.date,State.ctx.classId);
  if(!dp){
    body.innerHTML=`<div class="empty"><div class="ic">📝</div>此日尚未建立備課<br><br>
      <button class="btn" onclick="Views.createPlan()">建立今日備課（${list.length} 人）</button></div>
      <div class="sect-title">快速帶入</div>
      <button class="btn g block sm" onclick="Views.copyPrev()">📋 複製上一堂課</button>`;
    return;
  }
  touchEditLock(dp.id);
  const otherLock=currentEditLock(dp.id);
  const groups=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
  const blocks=C('lesson_blocks').filter(b=>b.daily_plan_id===dp.id);
  const canEdit=dp.status!=='lock'&&(can('plan')||State.user.role==='head'||can('*'));
  const stName=id=>{const s=C('students').find(x=>x.id===id);return s?s.name:'?';};
  const getBlk=(type,gid=null)=>blocks.find(b=>b.block_type===type&&(gid?b.training_group_id===gid:!b.training_group_id));
  body.innerHTML=`
    <div class="card">
      <div class="row"><h3 style="margin:0">${WEEKDAYS[wd]} 課程 ${badge(dp.status)}</h3><div style="flex:1"></div>
        <span class="muted">預計 ${dp.expected_count} 人・${groups.length} 組・修訂 v${dp.revision}</span></div>
      ${otherLock?`<div class="warnbox" style="margin-top:8px">目前 ${esc(otherLock.user_name)} 也正在編輯此課程。若超過 10 分鐘無活動，編輯狀態會自動失效。</div>`:''}
      <div class="row" style="margin-top:8px">
        ${dp.status==='lock'?'<div class="warnbox" style="margin:0">課程已鎖定，如需修改請由管理者解鎖。</div>':`
        <button class="btn sm g" onclick="App.go('groups')">🧩 調整分組</button>
        <button class="btn sm g" onclick="Views.copyPrev()">📋 複製上堂</button>
        <select class="grow" id="pStatus" onchange="Views.setStatus('${dp.id}',this.value)">${STATUS.filter(s=>s[0]!=='lock').map(s=>`<option value="${s[0]}" ${dp.status===s[0]?'selected':''}>${s[1]}</option>`).join('')}</select>
        ${(can('publish')||can('*'))?`<button class="btn sm ok" onclick="Views.publish('${dp.id}')">📢 發布</button>`:''}
        ${can('*')?`<button class="btn sm bad" onclick="Views.lockPlan('${dp.id}')">🔒 鎖定</button>`:''}`}
      </div>
    </div>
    ${BLOCKS.map(bl=>{
      if(bl.key==='group')return Views.renderGroupBlocks(dp,groups,blocks,canEdit,stName);
      const b=getBlk(bl.key)||{};
      return `<div class="blk ${b.done?'done':''}"><div class="bh" onclick="this.parentNode.querySelector('.bd').classList.toggle('hide')">
        <span class="t">${bl.s}–${bl.e}′</span><span class="m">${bl.name}</span>
        <span class="st">${b.done?'✅ 完成':'○'}</span></div>
        <div class="bd">${Views.blockForm(dp,bl,b,canEdit)}</div></div>`;
    }).join('')}
    <div class="sect-title">💬 教練共同備課討論室</div>
    <div class="card" id="discBox"></div>
    <div class="actionbar"><button class="btn secondary" onclick="App.go('groups','plan')">返回分組</button><span class="sp"></span><button class="btn" onclick="App.go('confirm','plan')">下一步：教練確認</button></div>`;
  Views.renderDisc(dp);
};
Views.renderGroupBlocks=function(dp,groups,blocks,canEdit,stName){
  return `<div class="blk"><div class="bh" onclick="this.parentNode.querySelector('.bd').classList.toggle('hide')">
    <span class="t">30–60′</span><span class="m">分組訓練、基本動作</span><span class="st">${groups.length} 組</span></div>
    <div class="bd">${groups.length?groups.map(g=>{
      const b=blocks.find(x=>x.block_type==='group'&&x.training_group_id===g.id)||{};
      const coach=C('profiles').find(p=>p.id===g.coach_id);
      return `<div class="gcard"><div class="gh"><b>${esc(g.name)}</b><span class="tag">${g.group_type}</span><span class="muted">${(g.students||[]).length}人・${coach?esc(coach.name):'未指派'}</span></div>
      <div class="muted" style="margin-bottom:6px">${(g.students||[]).map(stName).join('、')||'（空組）'}</div>
      ${canEdit?`
      <div class="row"><div class="grow"><label class="sm">基本動作</label><input value="${esc(b.basic||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','basic',this.value)"></div>
        <div class="grow"><label class="sm">腿法</label><input value="${esc(b.kick||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','kick',this.value)"></div></div>
      <div class="row" style="margin-top:6px"><div class="grow"><label class="sm">品勢</label><input value="${esc(b.poomsae||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','poomsae',this.value)"></div>
        <div class="grow"><label class="sm">對練</label><input value="${esc(b.spar||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','spar',this.value)"></div></div>
      <div class="row" style="margin-top:6px"><div class="grow"><label class="sm">今日目標</label><input value="${esc(b.goal||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','goal',this.value)"></div>
        <div class="grow"><label class="sm">常見錯誤/注意</label><input value="${esc(b.commonErr||'')}" onchange="Views.saveBlockField('${dp.id}','group','${g.id}','commonErr',this.value)"></div></div>
      `:`<div class="kv"><b>基本動作</b><span>${esc(b.basic||'—')}</span></div><div class="kv"><b>目標</b><span>${esc(b.goal||'—')}</span></div>`}
      </div>`;
    }).join(''):'<div class="empty">尚未分組，<a onclick="App.go(\'groups\')">前往分組</a></div>'}
    </div></div>`;
};
Views.blockForm=function(dp,bl,b,canEdit){
  const set=(f,v)=>`onchange="Views.saveBlockField('${dp.id}','${bl.key}',null,'${f}',this.value)"`;
  const coaches=C('profiles').filter(p=>p.active&&p.role!=='assistant');
  if(!canEdit){
    if(bl.key==='review')return `<div class="kv"><b>表揚</b><span>${esc(b.praise||'—')}</span></div><div class="kv"><b>提醒</b><span>${esc(b.remind||'—')}</span></div><div class="kv"><b>回家練習</b><span>${esc(b.homework||'—')}</span></div><div class="kv"><b>下次預告</b><span>${esc(b.preview||'—')}</span></div>`;
    return `<div class="kv"><b>內容</b><span>${esc(b.content||'—')}</span></div><div class="kv"><b>目標</b><span>${esc(b.goal||'—')}</span></div><div class="kv"><b>器材</b><span>${esc(b.equipment||'—')}</span></div>`;
  }
  let extra='';
  if(bl.key==='warmup'){extra=`<button class="btn xs g" style="margin-bottom:6px" onclick="Views.applyWarmup('${dp.id}')">⚡ 一鍵套用標準暖身</button>
    <label class="sm">進行方式</label><select ${set('method')}>${['全體一起','幼兒分開','成人分開','分兩區','自訂'].map(o=>`<option ${b.method===o?'selected':''}>${o}</option>`).join('')}</select>`;}
  if(bl.key==='fitness'){extra=`${Views.warmupPanel(dp,b)}<label class="sm">能力標籤（點選）</label><div class="chips" id="fitTags">${ABILITY_TAGS.map(t=>`<span class="chip ${(b.tags||[]).includes(t)?'on':''}" onclick="Views.toggleTag('${dp.id}','${t}')">${t}</span>`).join('')}</div>`;}
  if(bl.key==='apply'){extra=`<label class="sm">課程類型</label><select ${set('applyType')}><option value="">選擇</option>${APPLY_TYPES.map(o=>`<option ${b.applyType===o?'selected':''}>${o}</option>`).join('')}</select>
    <div class="infobox" style="margin-top:6px">💡 銜接 30–60′ 基本動作，例如「前踢接旋踢組合＋踢靶挑戰」。</div>`;}
  if(bl.key==='review'){
    return `${extra}
      <div class="field"><label class="sm">今日表揚</label><input value="${esc(b.praise||'')}" ${set('praise')}></div>
      <div class="field"><label class="sm">今日提醒</label><input value="${esc(b.remind||'')}" ${set('remind')}></div>
      <div class="field"><label class="sm">回家練習</label><input value="${esc(b.homework||'')}" ${set('homework')}></div>
      <div class="field"><label class="sm">下次課程預告</label><input value="${esc(b.preview||'')}" ${set('preview')}></div>
      <div class="field"><label class="sm">教練補充</label><textarea ${set('note')}>${esc(b.note||'')}</textarea></div>
      <label class="chip ${b.done?'on':''}" onclick="Views.toggleDone('${dp.id}','${bl.key}',null)">✅ 已完成</label>`;
  }
  return `${extra}
    <div class="field" style="margin-top:6px"><label class="sm">課程內容</label><textarea ${set('content')}>${esc(b.content||'')}</textarea></div>
    <div class="row"><div class="grow"><label class="sm">教學目標</label><input value="${esc(b.goal||'')}" ${set('goal')}></div>
      <div class="grow"><label class="sm">器材</label><input value="${esc(b.equipment||'')}" ${set('equipment')}></div></div>
    <div class="row" style="margin-top:6px"><div class="grow"><label class="sm">注意事項</label><input value="${esc(b.safety_notes||'')}" ${set('safety_notes')}></div>
      <div class="grow"><label class="sm">負責教練</label><select ${set('responsible_coach_id')}><option value="">—</option>${coaches.map(c=>`<option value="${c.id}" ${c.id===b.responsible_coach_id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div></div>
    <label class="chip ${b.done?'on':''}" style="margin-top:8px" onclick="Views.toggleDone('${dp.id}','${bl.key}',null)">✅ 已完成</label>`;
};
Views.createPlan=async function(){await ensureDaily(State.ctx.date,State.ctx.classId);
  // 自動建立五階段全體 block
  const dp=findDaily(State.ctx.date,State.ctx.classId);
  for(const bl of BLOCKS){if(bl.key==='group')continue;
    if(!C('lesson_blocks').find(b=>b.daily_plan_id===dp.id&&b.block_type===bl.key&&!b.training_group_id))
      await save('lesson_blocks',{id:uid('lb'),daily_plan_id:dp.id,training_group_id:null,block_type:bl.key,start_minute:bl.s,end_minute:bl.e,content:'',goal:'',equipment:'',safety_notes:'',done:false});
  }
  toast('已建立備課','ok');Views.renderPlan();
};
Views.saveBlockField=async function(dpId,type,gid,field,val){
  let b=C('lesson_blocks').find(x=>x.daily_plan_id===dpId&&x.block_type===type&&(gid?x.training_group_id===gid:!x.training_group_id));
  if(!b){const bl=BLOCKS.find(x=>x.key===type);b={id:uid('lb'),daily_plan_id:dpId,training_group_id:gid||null,block_type:type,start_minute:bl.s,end_minute:bl.e};}
  b[field]=val;await save('lesson_blocks',b);
};
Views.toggleTag=async function(dpId,tag){
  let b=C('lesson_blocks').find(x=>x.daily_plan_id===dpId&&x.block_type==='fitness'&&!x.training_group_id)||{id:uid('lb'),daily_plan_id:dpId,training_group_id:null,block_type:'fitness',start_minute:10,end_minute:30,tags:[]};
  b.tags=b.tags||[];const i=b.tags.indexOf(tag);if(i<0)b.tags.push(tag);else b.tags.splice(i,1);
  await save('lesson_blocks',b);Views.renderPlan();
};
Views.toggleDone=async function(dpId,type,gid){
  let b=C('lesson_blocks').find(x=>x.daily_plan_id===dpId&&x.block_type===type&&(gid?x.training_group_id===gid:!x.training_group_id));
  if(!b){const bl=BLOCKS.find(x=>x.key===type);b={id:uid('lb'),daily_plan_id:dpId,training_group_id:gid||null,block_type:type,start_minute:bl.s,end_minute:bl.e};}
  b.done=!b.done;await save('lesson_blocks',b);Views.renderPlan();
};
Views.applyWarmup=async function(dpId){
  await Views.saveBlockField(dpId,'warmup',null,'content','集合、禮節、做操、慢跑 4 圈');
  await Views.saveBlockField(dpId,'warmup',null,'goal','收心、暖身');
  toast('已套用標準暖身','ok');Views.renderPlan();
};
Views.setStatus=async function(dpId,st){const dp=C('daily_plans').find(d=>d.id===dpId);const old={...dp};dp.status=st;await save('daily_plans',dp);await audit('status','daily_plans',dpId,old,dp);toast('狀態：'+statusMeta(st)[1]);};
Views.publish=async function(dpId){if(!can('publish')&&!can('*')){toast('無權限發布','bad');return;}const dp=C('daily_plans').find(d=>d.id===dpId);const old={...dp};dp.status='pub';dp.approved_by=State.user.id;await save('daily_plans',dp);await audit('publish','daily_plans',dpId,old,dp);toast('已發布 ✅','ok');if($('#planBody'))Views.renderPlan();else App.go(App.view,App.area);};
Views.lockPlan=async function(dpId){if(!requireAdminRole())return;await App.requireAdminPin({actionName:'鎖定課程',impact:'鎖定後只有管理者可修改此課程。',confirmText:'確認鎖定',onConfirm:async()=>{const dp=C('daily_plans').find(d=>d.id===dpId);dp.status='lock';await save('daily_plans',dp);await audit('lock','daily_plans',dpId);Modal.close();toast('已鎖定 🔒');Views.renderPlan();}});};
Views.copyPrev=async function(){
  // 找同班別上一個有備課的日期
  const prev=C('daily_plans').filter(d=>d.class_id===State.ctx.classId&&d.date<State.ctx.date).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!prev){toast('找不到可複製的上一堂課','warn');return;}
  const dp=await ensureDaily(State.ctx.date,State.ctx.classId);
  // 複製 blocks（全體階段）
  for(const b of C('lesson_blocks').filter(x=>x.daily_plan_id===prev.id&&!x.training_group_id)){
    let cur=C('lesson_blocks').find(x=>x.daily_plan_id===dp.id&&x.block_type===b.block_type&&!x.training_group_id);
    const copy={...b,id:cur?cur.id:uid('lb'),daily_plan_id:dp.id,done:false};await save('lesson_blocks',copy);
  }
  toast('已複製上一堂課內容','ok');Views.renderPlan();
};
/* discussion */
Views.renderDisc=function(dp){
  const box=$('#discBox');if(!box)return;
  const msgs=C('discussions').filter(d=>d.daily_plan_id===dp.id).sort((a,b)=>a.created_at-b.created_at);
  let top=msgs.filter(m=>!m.parent_id);
  const f=Views._discFilter||'all';
  if(f==='mine')top=top.filter(m=>m.author_id===State.user.id||String(m.message||'').includes(State.user.name));
  else if(f==='unread')top=top.filter(m=>!(m.reads||[]).includes(State.user.id));
  box.innerHTML=`
    <div class="chips" style="margin-bottom:10px">${[['all','全部'],['unread','未讀'],['mine','與我有關']].map(x=>`<span class="chip ${f===x[0]?'on':''}" onclick="Views._discFilter='${x[0]}';Views.renderDisc(C('daily_plans').find(d=>d.id==='${dp.id}'))">${x[1]}</span>`).join('')}</div>
    <div class="field"><textarea id="dMsg" placeholder="輸入討論內容，可 @教練姓名…" aria-label="討論內容"></textarea>
      <div class="row" style="margin-top:6px"><select id="dBlk" class="grow" aria-label="對應階段"><option value="">整體</option>${BLOCKS.map(b=>`<option value="${b.key}">${b.s}-${b.e}′ ${b.name}</option>`).join('')}</select>
      <button class="btn sm" onclick="Views.postDisc('${dp.id}',null)">${svg('send',16)} 送出</button></div></div>
    ${top.length?top.map(m=>Views.msgHtml(m,msgs)).join(''):'<div class="empty">尚無討論，開始共同備課吧！</div>'}`;
};
Views.msgHtml=function(m,all){
  const replies=all.filter(x=>x.parent_id===m.id);
  const readCnt=(m.reads||[]).length;
  return `<div class="msg"><div class="mh"><b>${esc(m.author_name)}</b>
    <span>${new Date(m.created_at).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
    ${m.block?`<span class="tag">${BLOCKS.find(b=>b.key===m.block)?.name||''}</span>`:''}
    ${m.edited?'<span class="muted">（已編輯）</span>':''}<span style="flex:1"></span><span class="muted">👁 ${readCnt}</span></div>
    <div class="mb">${nl2(m.message)}</div>
    <div class="row" style="margin-top:4px"><button class="btn xs g" onclick="Views.replyTo('${m.id}')">回覆</button>
      ${m.author_id===State.user.id?`<button class="btn xs g" onclick="Views.editMsg('${m.id}')">編輯</button>`:''}</div>
    ${replies.map(r=>`<div class="msg reply"><div class="mh"><b>${esc(r.author_name)}</b><span>${new Date(r.created_at).toLocaleString('zh-TW',{hour:'2-digit',minute:'2-digit'})}</span></div><div class="mb">${nl2(r.message)}</div></div>`).join('')}`;
};
Views.postDisc=async function(dpId,parentId){
  const msg=$('#dMsg').value.trim();if(!msg){toast('請輸入內容','warn');return;}
  await save('discussions',{id:uid('ds'),daily_plan_id:dpId,training_group_id:null,lesson_block_id:$('#dBlk')?.value||null,block:$('#dBlk')?.value||null,
    author_id:State.user.id,author_name:State.user.name,message:msg,parent_id:parentId,created_at:Date.now(),reads:[State.user.id]});
  const dp=C('daily_plans').find(d=>d.id===dpId);
  Views.renderDisc(dp);toast('已發布留言','ok');
};
Views.replyTo=function(mid){
  Modal.open('回覆留言',`<textarea id="rMsg" placeholder="輸入回覆…"></textarea><button class="btn block" style="margin-top:8px" onclick="Views.doReply('${mid}')">送出回覆</button>`);
};
Views.doReply=async function(mid){
  const parent=C('discussions').find(d=>d.id===mid);const msg=$('#rMsg').value.trim();if(!msg)return;
  await save('discussions',{id:uid('ds'),daily_plan_id:parent.daily_plan_id,parent_id:mid,author_id:State.user.id,author_name:State.user.name,message:msg,created_at:Date.now(),reads:[State.user.id]});
  Modal.close();Views.renderDisc(C('daily_plans').find(d=>d.id===parent.daily_plan_id));
};
Views.editMsg=function(mid){
  const m=C('discussions').find(d=>d.id===mid);
  Modal.open('編輯留言',`<textarea id="eMsg">${esc(m.message)}</textarea><button class="btn block" style="margin-top:8px" onclick="Views.doEditMsg('${mid}')">儲存</button>`);
};
Views.doEditMsg=async function(mid){const m=C('discussions').find(d=>d.id===mid);m.message=$('#eMsg').value.trim();m.edited=true;m.edited_by=State.user.name;await save('discussions',m);Modal.close();Views.renderDisc(C('daily_plans').find(d=>d.id===m.daily_plan_id));};
</script>

<script>
/* ---------- WEEK (整週計畫) ---------- */
Views.view_week=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const wkStart=mondayOf(State.ctx.date);
  el.innerHTML=`
  <div class="card">
    <div class="row">
      <div class="grow"><label class="sm">班別</label><select id="wClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
      <button class="btn sm g" onclick="Views.weekNav(-7)">← 上週</button>
      <button class="btn sm g" onclick="Views.weekNav(7)">下週 →</button>
    </div>
    <p class="muted" style="margin:8px 0 0">週次：${wkStart} ~ ${addDays(wkStart,6)}</p>
    <div class="field" style="margin-top:8px"><label class="sm">本週教學目標</label><input id="wGoal" placeholder="例：前踢與旋踢基本到組合應用"></div>
    <div class="row"><button class="btn sm" onclick="Views.saveWeekGoal()">儲存目標</button>
      <button class="btn sm g" onclick="Views.copyLastWeek()">📋 複製上週</button></div>
  </div>
  <div id="weekAnalysis"></div>
  <div class="wk" id="weekGrid"></div>`;
  $('#wClass').onchange=e=>{State.ctx.classId=e.target.value;App.go('week');};
  const wp=C('weekly_plans').find(w=>w.week_start===wkStart&&w.class_id===State.ctx.classId);
  if(wp)$('#wGoal').value=wp.weekly_goal||'';
  Views.renderWeek(wkStart);
};
Views.weekNav=function(n){State.ctx.date=addDays(mondayOf(State.ctx.date),n);App.go('week');};
Views.renderWeek=function(wkStart){
  const cls=C('classes').find(c=>c.id===State.ctx.classId);
  const activeWd=(cls?.weekdays||WEEKDAYS);
  const grid=$('#weekGrid');
  let analysisTags={};ABILITY_TAGS.forEach(t=>analysisTags[t]=0);let applyN=0,poomN=0,sparN=0;
  grid.innerHTML=WEEKDAYS.map((w,i)=>{
    const date=addDays(wkStart,i);
    const dp=findDaily(date,State.ctx.classId);
    const list=Stats.studentsFor(State.ctx.classId,i);
    const isClassDay=activeWd.includes(w);
    if(dp){
      const blocks=C('lesson_blocks').filter(b=>b.daily_plan_id===dp.id);
      const groups=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
      blocks.forEach(b=>{(b.tags||[]).forEach(t=>{if(analysisTags[t]!=null)analysisTags[t]++;});if(b.block_type==='apply'&&b.applyType)applyN++;if(b.poomsae)poomN++;if(b.spar)sparN++;});
      const filled=blocks.filter(b=>b.content||b.basic||b.praise).length;
      const totalB=4+groups.length;
      const sm=Stats.summary(list);
      return `<div class="wkday"><div class="wd"><b>${w}</b><span class="muted">${date.slice(5)}</span>${badge(dp.status)}<span style="flex:1"></span><button class="btn xs g" onclick="Views.openDay('${date}')">開啟</button></div>
        <div class="muted">預計 ${list.length} 人・${groups.length} 組・幼${sm.age.幼兒}/小${sm.age.國小}/中${sm.age.國中}/成${sm.age.成人}</div>
        <div class="progress"><i style="width:${totalB?Math.round(filled/totalB*100):0}%"></i></div>
        <div class="row" style="margin-top:6px"><button class="btn xs g" onclick="Views.copyToClass('${dp.id}')">複製到其他班</button>${filled<totalB?'<span class="tag" style="background:#fef3c7;color:#92400e">未完成備課</span>':''}</div>
      </div>`;
    }
    return `<div class="wkday" style="${isClassDay?'':'opacity:.5'}"><div class="wd"><b>${w}</b><span class="muted">${date.slice(5)}</span>${isClassDay?'<span class="badge b-draft">未建立</span>':'<span class="muted">非上課日</span>'}</div>
      ${isClassDay?`<div class="muted">預計 ${list.length} 人</div><button class="btn xs" style="margin-top:6px" onclick="Views.openDay('${date}')">建立備課</button>`:''}</div>`;
  }).join('');
  // 分析提醒
  const miss=ABILITY_TAGS.filter(t=>['柔軟度','平衡','協調'].includes(t)&&!analysisTags[t]);
  $('#weekAnalysis').innerHTML=`<div class="card"><h3>📈 本週課程分析</h3>
    <div class="chips">${['敏捷','核心','爆發力'].map(t=>`<span class="tag">${t} ${analysisTags[t]||0} 次</span>`).join('')}
      <span class="tag spec">品勢 ${poomN}</span><span class="tag spec">對練 ${sparN}</span><span class="tag">挑戰/比賽 ${applyN}</span></div>
    ${miss.length?`<div class="warnbox">⚠️ 本週較少安排：${miss.join('、')}，建議補強。</div>`:'<div class="okbox">✅ 能力面向分布均衡。</div>'}
  </div>`;
};
Views.openDay=function(date){State.ctx.date=date;App.go('plan');};
Views.saveWeekGoal=async function(){
  const wkStart=mondayOf(State.ctx.date);
  let wp=C('weekly_plans').find(w=>w.week_start===wkStart&&w.class_id===State.ctx.classId);
  if(!wp)wp=await save('weekly_plans',{id:uid('wp'),week_start:wkStart,week_end:addDays(wkStart,6),class_id:State.ctx.classId,status:'draft',created_by:State.user.id});
  wp.weekly_goal=$('#wGoal').value.trim();await save('weekly_plans',wp);toast('已儲存本週目標','ok');
};
Views.copyLastWeek=async function(){
  const wkStart=mondayOf(State.ctx.date);const prevStart=addDays(wkStart,-7);
  const prevDps=C('daily_plans').filter(d=>d.class_id===State.ctx.classId&&d.date>=prevStart&&d.date<wkStart);
  if(!prevDps.length){toast('上週無課程可複製','warn');return;}
  for(const pd of prevDps){
    const newDate=addDays(pd.date,7);
    const dp=await ensureDaily(newDate,State.ctx.classId);
    for(const b of C('lesson_blocks').filter(x=>x.daily_plan_id===pd.id&&!x.training_group_id)){
      let cur=C('lesson_blocks').find(x=>x.daily_plan_id===dp.id&&x.block_type===b.block_type&&!x.training_group_id);
      await save('lesson_blocks',{...b,id:cur?cur.id:uid('lb'),daily_plan_id:dp.id,done:false});
    }
  }
  toast('已複製上週課程','ok');App.go('week');
};
Views.copyToClass=function(dpId){
  const others=C('classes').filter(c=>c.active&&c.id!==State.ctx.classId);
  if(!others.length){toast('沒有其他班別','warn');return;}
  Modal.open('複製到其他班別',`<div class="field"><label>目標班別</label><select id="cpCls">${others.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select></div>
    <button class="btn block" onclick="Views.doCopyToClass('${dpId}')">複製</button>`);
};
Views.doCopyToClass=async function(dpId){
  const src=C('daily_plans').find(d=>d.id===dpId);const tgtCls=$('#cpCls').value;
  const dp=await ensureDaily(src.date,tgtCls);
  for(const b of C('lesson_blocks').filter(x=>x.daily_plan_id===src.id&&!x.training_group_id))
    await save('lesson_blocks',{...b,id:uid('lb'),daily_plan_id:dp.id,done:false});
  Modal.close();toast('已複製到其他班','ok');
};

/* ---------- MY TASKS (助教/教練) ---------- */
Views.view_mytasks=function(el){
  const td=todayStr();State.ctx.date=td;
  const myGroups=[];
  C('daily_plans').filter(d=>d.date===td).forEach(dp=>{
    C('training_groups').filter(g=>g.daily_plan_id===dp.id&&(g.coach_id===State.user.id||g.assistant_id===State.user.id)).forEach(g=>myGroups.push({dp,g}));
  });
  const cls=id=>C('classes').find(c=>c.id===id);
  el.innerHTML=`<div class="hero"><h2>📋 我的今日任務</h2><p>${WEEKDAYS[weekdayOf(td)]}・${td}・${State.user.name}</p></div>
  ${myGroups.length?myGroups.map(({dp,g})=>{
    const c=cls(dp.class_id);const gblk=C('lesson_blocks').find(b=>b.daily_plan_id===dp.id&&b.block_type==='group'&&b.training_group_id===g.id)||{};
    const apply=C('lesson_blocks').find(b=>b.daily_plan_id===dp.id&&b.block_type==='apply'&&!b.training_group_id)||{};
    const stName=id=>{const s=C('students').find(x=>x.id===id);return s?s.name:'?';};
    return `<div class="card"><h3>🧩 ${esc(g.name)} <span class="tag">${g.group_type}</span></h3>
      <div class="kv"><b>班別</b><span>${esc(c?.name||'')} ${c?.start_time||''}</span></div>
      <div class="kv"><b>人數</b><span>${(g.students||[]).length} 人</span></div>
      <div class="kv"><b>學員</b><span style="text-align:right">${(g.students||[]).map(stName).join('、')||'—'}</span></div>
      <div class="divider"></div>
      <div class="kv"><b>30–60′ 基本動作</b><span>${esc(gblk.basic||'—')}</span></div>
      <div class="kv"><b>腿法/品勢</b><span>${esc([gblk.kick,gblk.poomsae].filter(Boolean).join('/')||'—')}</span></div>
      <div class="kv"><b>今日目標</b><span>${esc(gblk.goal||g.target||'—')}</span></div>
      <div class="kv"><b>60–85′ 應用</b><span>${esc(apply.content||'—')}</span></div>
      <div class="kv"><b>器材</b><span>${esc(apply.equipment||gblk.equipment||'—')}</span></div>
      <div class="kv"><b>注意事項</b><span>${esc(gblk.commonErr||apply.safety_notes||'—')}</span></div>
      <div class="row" style="margin-top:10px">
        <button class="btn sm g" onclick="toast('已標記閱讀','ok')">👀 我已閱讀</button>
        <button class="btn sm" onclick="Views.gotoReport('${dp.id}','${g.id}')">📝 填寫回報</button>
      </div></div>`;
  }).join(''):'<div class="empty"><div class="ic">☕</div>今天沒有指派給你的任務<br><span class="muted">主教練分組並指派後會顯示在這裡</span></div>'}
  <div class="sect-title">今日課程討論</div><div class="card" id="myDisc"></div>`;
  const td2=todayStr();const dps=C('daily_plans').filter(d=>d.date===td2).map(d=>d.id);
  const msgs=C('discussions').filter(m=>dps.includes(m.daily_plan_id)&&!m.parent_id).sort((a,b)=>b.created_at-a.created_at).slice(0,5);
  $('#myDisc').innerHTML=msgs.length?msgs.map(m=>`<div class="kv"><b>${esc(m.author_name)}</b><span style="text-align:right;flex:1">${esc(m.message).slice(0,50)}</span></div>`).join(''):'<div class="empty">今日無討論</div>';
};
Views.gotoReport=function(dpId,gid){const dp=C('daily_plans').find(d=>d.id===dpId);State.ctx.date=dp.date;State.ctx.classId=dp.class_id;Views._reportGroup=gid;App.go('report');};

/* ---------- REPORT (課後紀錄) ---------- */
Views._reportGroup=null;
Views.view_report=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const dp=findDaily(State.ctx.date,State.ctx.classId);
  el.innerHTML=`<div class="card"><div class="row">
    <div class="grow"><label class="sm">日期</label><input type="date" id="rDate" value="${State.ctx.date}"></div>
    <div class="grow"><label class="sm">班別</label><select id="rClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
  </div></div><div id="reportBody"></div>`;
  $('#rDate').onchange=e=>{State.ctx.date=e.target.value;App.go('report');};
  $('#rClass').onchange=e=>{State.ctx.classId=e.target.value;App.go('report');};
  const body=$('#reportBody');
  if(!dp){body.innerHTML='<div class="empty"><div class="ic">✅</div>此日尚無備課，無法填寫課後紀錄</div>';return;}
  const groups=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
  const opts=[{id:'',name:'全班（整體）'}].concat(groups.map(g=>({id:g.id,name:g.name})));
  const gid=Views._reportGroup!=null?Views._reportGroup:'';
  const rep=C('post_class_reports').find(r=>r.daily_plan_id===dp.id&&(r.training_group_id||'')===(gid||''))||{};
  body.innerHTML=`<div class="card"><h3>📝 課後紀錄</h3>
    <div class="field"><label class="sm">負責組別</label><select id="rGroup" onchange="Views._reportGroup=this.value;App.go('report')">${opts.map(o=>`<option value="${o.id}" ${o.id===gid?'selected':''}>${o.name}</option>`).join('')}</select></div>
    <div class="row"><div class="grow field"><label class="sm">實到人數</label><input type="number" id="r_actual" value="${rep.completion_percentage!=null?(rep.actual||''):''}" placeholder="${dp.expected_count}"></div>
      <div class="grow field"><label class="sm">課程完成度</label><select id="r_status">${['完成','部分完成','未完成'].map(o=>`<option ${rep.completion_status===o?'selected':''}>${o}</option>`).join('')}</select></div></div>
    <div class="field"><label class="sm">完成百分比：<span id="rPctLbl">${rep.completion_percentage||80}%</span></label><input type="range" id="r_pct" min="0" max="100" value="${rep.completion_percentage||80}" oninput="document.getElementById('rPctLbl').textContent=this.value+'%'"></div>
    <div class="field"><label class="sm">未完成原因</label><input id="r_reason" value="${esc(rep.reason||'')}"></div>
    <div class="field"><label class="sm">學員整體反應</label><textarea id="r_feedback">${esc(rep.feedback||'')}</textarea></div>
    <div class="row"><div class="grow field"><label class="sm">表現較好</label><input id="r_good" value="${esc(rep.good||'')}"></div>
      <div class="grow field"><label class="sm">需要補強</label><input id="r_weak" value="${esc(rep.weak||'')}"></div></div>
    <div class="field"><label class="sm">需調整的分組</label><input id="r_adjust" value="${esc(rep.adjust||'')}"></div>
    <div class="field"><label class="sm">⭐ 下堂課銜接內容（會自動出現在下次備課）</label><textarea id="r_next">${esc(rep.next_lesson||'')}</textarea></div>
    <div class="row"><div class="grow field"><label class="sm">安全事件</label><input id="r_safety" value="${esc(rep.safety_event||'無')}"></div>
      <div class="grow field"><label class="sm">傷勢狀況</label><input id="r_injury" value="${esc(rep.injury||'無')}"></div></div>
    <div class="field"><label class="sm">教練補充</label><textarea id="r_note">${esc(rep.note||'')}</textarea></div>
    <button class="btn block" onclick="Views.saveReport('${dp.id}','${gid}','${rep.id||''}')">儲存課後紀錄</button>
  </div>
  ${Views.prevNextHint(dp)}`;
};
Views.prevNextHint=function(dp){
  const prev=C('daily_plans').filter(d=>d.class_id===dp.class_id&&d.date<dp.date).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!prev)return '';
  const rep=C('post_class_reports').find(r=>r.daily_plan_id===prev.id&&r.next_lesson);
  if(!rep||!rep.next_lesson)return '';
  return `<div class="infobox">📎 上一堂（${prev.date}）銜接內容：<b>${esc(rep.next_lesson)}</b></div>`;
};
Views.saveReport=async function(dpId,gid,repId){
  const obj={id:repId||uid('pr'),daily_plan_id:dpId,training_group_id:gid||null,coach_id:State.user.id,
    actual:$('#r_actual').value?+$('#r_actual').value:null,
    completion_status:$('#r_status').value,completion_percentage:+$('#r_pct').value,
    reason:$('#r_reason').value.trim(),feedback:$('#r_feedback').value.trim(),
    good:$('#r_good').value.trim(),weak:$('#r_weak').value.trim(),adjust:$('#r_adjust').value.trim(),
    next_lesson:$('#r_next').value.trim(),safety_event:$('#r_safety').value.trim(),injury:$('#r_injury').value.trim(),
    note:$('#r_note').value.trim(),created_at:Date.now()};
  await save('post_class_reports',obj);
  // 回寫實到人數
  const dp=C('daily_plans').find(d=>d.id===dpId);if(obj.actual!=null){dp.actual_count=obj.actual;await save('daily_plans',dp);}
  await audit('report','post_class_reports',obj.id,null,obj);
  toast('課後紀錄已儲存','ok');
};

    <div class="kv"><b>階段</b><span>${BLOCKS.find(b=>b.key===t.category)?.name||t.category}</span></div>
    <div class="kv"><b>時長</b><span>${t.duration}′</span></div>
    <div class="kv"><b>內容</b><span style="text-align:right">${esc(t.content)}</span></div>
    <div class="kv"><b>目標</b><span>${esc(t.goal||'—')}</span></div>
    ${can('*')?`<button class="btn g sm" style="margin-top:6px" onclick="Views.editTpl('${t.id}')">編輯</button>`:''}
