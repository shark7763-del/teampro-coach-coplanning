Views.editTpl=function(id){
  const t=id?C('course_templates').find(x=>x.id===id):{category:'fitness',duration:20};
  Modal.open(id?'編輯模板':'新增模板',`
    <div class="field"><label>名稱 *</label><input id="tp_name" value="${esc(t.name||'')}"></div>
    <div class="row"><div class="grow field"><label>階段</label><select id="tp_cat">${BLOCKS.map(b=>`<option value="${b.key}" ${b.key===t.category?'selected':''}>${b.name}</option>`).join('')}</select></div>
      <div class="grow field"><label>時長(分)</label><input type="number" id="tp_dur" value="${t.duration||20}"></div></div>
    <div class="field"><label>內容</label><textarea id="tp_content">${esc(t.content||'')}</textarea></div>
    <div class="field"><label>目標</label><input id="tp_goal" value="${esc(t.goal||'')}"></div>
    <div class="field"><label>器材</label><input id="tp_eq" value="${esc(t.equipment||'')}"></div>
    <div class="row"><button class="btn block" onclick="Views.saveTpl('${id||''}')">儲存</button>${id?`<button class="btn bad sm" onclick="Views.delTpl('${id}')">刪除</button>`:''}</div>`);
};
Views.saveTpl=async function(id){const name=$('#tp_name').value.trim();if(!name){toast('名稱必填','bad');return;}
  await save('course_templates',{id:id||uid('tp'),name,category:$('#tp_cat').value,duration:+$('#tp_dur').value,content:$('#tp_content').value.trim(),goal:$('#tp_goal').value.trim(),equipment:$('#tp_eq').value.trim(),age_groups:[],belt_ranks:[]});
  Modal.close();toast('已儲存','ok');App.go('templates');};
Views.delTpl=async function(id){if(!requireAdminRole())return;await App.requireAdminPin({actionName:'刪除課程模板',impact:'將刪除此課程模板。',confirmText:'確認刪除',onConfirm:async()=>{await remove('course_templates',id);Modal.close();App.go('templates');}});};
</script>

<script>
/* ---------- PDF (列印) ---------- */
Views.view_pdf=function(el){
  ensureClassCtx();
  const cls=C('classes').filter(c=>c.active);
  if(!State.ctx.classId&&cls.length)State.ctx.classId=cls[0].id;
  const wkStart=mondayOf(State.ctx.date);
  el.innerHTML=`<div class="card"><h3>🖨️ PDF 週課程計畫輸出</h3>
    <div class="row"><div class="grow"><label class="sm">班別</label><select id="pdfClass">${cls.map(c=>`<option value="${c.id}" ${c.id===State.ctx.classId?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
      <div class="grow"><label class="sm">週次(任一日)</label><input type="date" id="pdfDate" value="${State.ctx.date}"></div></div>
    <div class="field" style="margin-top:8px"><label class="sm">版本</label><div class="chips" id="pdfVer">
      <span class="chip on" data-v="full">完整管理版</span><span class="chip" data-v="coach">教練現場執行版</span></div></div>
    <p class="muted">週次：${wkStart} ~ ${addDays(wkStart,6)}。使用瀏覽器列印，中文字型由系統原生渲染，不會亂碼；於列印視窗選「另存為 PDF」即可下載。</p>
    <button class="btn block" onclick="Views.buildPDF()">📄 產生預覽並列印 / 存 PDF</button>
  </div>
  <div class="card"><h3>預覽</h3><div id="pdfPrev" style="border:1px solid var(--line);border-radius:10px;padding:12px;max-height:60vh;overflow:auto;font-size:12px"></div></div>`;
  $('#pdfClass').onchange=e=>{State.ctx.classId=e.target.value;App.go('pdf');};
  $('#pdfDate').onchange=e=>{State.ctx.date=e.target.value;App.go('pdf');};
  let ver='full';document.querySelectorAll('#pdfVer .chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('#pdfVer .chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');ver=c.dataset.v;Views._pdfVer=ver;Views.previewPDF();});
  Views._pdfVer='full';Views.previewPDF();
};
Views.buildPDFHtml=function(ver){
  const s=settings();const cls=C('classes').find(c=>c.id===State.ctx.classId);
  const wkStart=mondayOf(State.ctx.date);const wkEnd=addDays(wkStart,6);
  const wp=C('weekly_plans').find(w=>w.week_start===wkStart&&w.class_id===State.ctx.classId);
  const stName=id=>{const st=C('students').find(x=>x.id===id);return st?st.name:'';};
  let days='';
  WEEKDAYS.forEach((w,i)=>{
    const date=addDays(wkStart,i);const dp=findDaily(date,State.ctx.classId);
    if(!dp)return;
    const list=Stats.studentsFor(State.ctx.classId,i);const sm=Stats.summary(list);
    const groups=C('training_groups').filter(g=>g.daily_plan_id===dp.id);
    const blocks=C('lesson_blocks').filter(b=>b.daily_plan_id===dp.id);
    const gb=(type)=>blocks.find(b=>b.block_type===type&&!b.training_group_id)||{};
    const warm=gb('warmup'),fit=gb('fitness'),app=gb('apply'),rev=gb('review');
    const coachName=id=>{const c=C('profiles').find(p=>p.id===id);return c?c.name:'—';};
    const groupRows=groups.map(g=>{const b=blocks.find(x=>x.block_type==='group'&&x.training_group_id===g.id)||{};
      return `<tr><td><b>${esc(g.name)}</b><br>${esc(coachName(g.coach_id))}</td>
        <td>${(g.students||[]).length}人${ver==='full'?'<br>'+(g.students||[]).map(stName).join('、'):''}</td>
        <td>${esc([b.basic&&('基本:'+b.basic),b.kick&&('腿法:'+b.kick),b.poomsae&&('品勢:'+b.poomsae),b.spar&&('對練:'+b.spar)].filter(Boolean).join('；')||'—')}</td>
        <td>${esc(b.goal||g.target||'—')}</td></tr>`;}).join('');
    days+=`<div class="pday no-break">
      <h2>${w}（${date}）　預計 ${list.length} 人　${cls?.start_time||''}-${cls?.end_time||''}</h2>
      ${ver==='full'?`<div style="font-size:11px;margin-bottom:4px">年齡：幼兒${sm.age.幼兒}／國小${sm.age.國小}／國中${sm.age.國中}／成人${sm.age.成人}　｜　級別：${BELTS.filter(b=>sm.belt[b]).map(b=>b+sm.belt[b]).join(' ')}</div>`:''}
      <table class="ptbl"><tr><th style="width:14%">時段</th><th>內容</th><th style="width:20%">目標/器材</th></tr>
        <tr><td>0–10′ 做操慢跑</td><td>${esc(warm.content||'集合、禮節、做操、慢跑')}</td><td>${esc(warm.goal||'暖身')}</td></tr>
        <tr><td>10–30′ 熱身體能</td><td>${(fit.warmups&&fit.warmups.length)?esc(fit.warmups.map(w=>w.name+' '+(w.minutes||0)+'分').join('、'))+'　':''}${esc(fit.content||'')} ${(fit.tags||[]).map(t=>'['+t+']').join('')}</td><td>${esc(fit.equipment||'')}</td></tr>
        <tr><td colspan="3" style="background:#eef2ff"><b>30–60′ 分組訓練</b></td></tr>
        ${groupRows||'<tr><td colspan="3">（未分組）</td></tr>'}
        <tr><td>60–85′ 應用挑戰</td><td>${esc(app.applyType?('['+app.applyType+'] '):'')}${esc(app.content||'')}</td><td>${esc(app.equipment||'')}</td></tr>
        <tr><td>85–90′ 講評</td><td>${esc([rev.praise&&('表揚:'+rev.praise),rev.remind&&('提醒:'+rev.remind),rev.homework&&('作業:'+rev.homework),rev.preview&&('預告:'+rev.preview)].filter(Boolean).join('；')||'—')}</td><td></td></tr>
      </table>
      ${ver==='full'?`<div style="font-size:11px;margin-top:4px">注意事項：${esc([warm.safety_notes,app.safety_notes].filter(Boolean).join('；')||'—')}　｜　課後紀錄：實到＿＿人　完成度＿＿＿</div>`:''}
    </div>`;
  });
  if(!days)days='<p>本週此班別尚無任何備課資料。</p>';
  return `<div class="pg">
    <div class="phead"><h1>${esc(s.logo)} ${esc(s.dojo)}　${ver==='full'?'週課程計畫（完整管理版）':'週課程計畫（教練現場執行版）'}</h1>
      <div class="meta">班別：${esc(cls?.name||'')}　｜　訓練週期：${wkStart} ~ ${wkEnd}　｜　產出：${todayStr()}　｜　產出人：${esc(State.user.name)}</div>
      ${ver==='full'&&wp?.weekly_goal?`<div class="meta" style="margin-top:4px">本週教學目標：${esc(wp.weekly_goal)}</div>`:''}</div>
    ${days}
    ${ver==='full'?`<div style="margin-top:12px;font-size:11px">教練討論結論：______________________________　核准人：____________　日期：____________</div>`:''}
  </div>`;
};
Views.previewPDF=function(){$('#pdfPrev').innerHTML='<div class="ppreview">'+Views.buildPDFHtml(Views._pdfVer)+'</div>';
  // 讓預覽套用列印表格樣式
  $('#pdfPrev').querySelectorAll('.ptbl').forEach(t=>{t.style.width='100%';t.style.borderCollapse='collapse';t.querySelectorAll('th,td').forEach(c=>{c.style.border='1px solid #94a3b8';c.style.padding='4px 6px';c.style.fontSize='11px';c.style.verticalAlign='top';});t.querySelectorAll('th').forEach(c=>c.style.background='#e2e8f0');});
  $('#pdfPrev').querySelectorAll('.pday h2').forEach(h=>{h.style.background='#4f46e5';h.style.color='#fff';h.style.padding='4px 8px';h.style.borderRadius='4px';h.style.fontSize='13px';});
  $('#pdfPrev').querySelectorAll('.pday').forEach(d=>{d.style.border='1px solid #94a3b8';d.style.borderRadius='6px';d.style.padding='8px';d.style.marginBottom='10px';});
  $('#pdfPrev').querySelectorAll('.phead').forEach(h=>{h.style.borderBottom='3px solid #4f46e5';h.style.paddingBottom='6px';h.style.marginBottom='10px';});
};
Views.buildPDF=function(){
  const s=settings();const wkStart=mondayOf(State.ctx.date);
  document.title=`${s.dojo}_週課程計畫_${wkStart}至${addDays(wkStart,6)}`;
  $('#print').innerHTML=Views.buildPDFHtml(Views._pdfVer);
  window.print();
  setTimeout(()=>{document.title='TeamPro 教練共同備課系統';},1000);
};

  const s=settings();
  const counts=dataCounts();
  const backups=BackupManager.list();
  const outbox=C('sync_outbox').slice().sort((a,b)=>(b.updated_at||b.created_at||0)-(a.updated_at||a.created_at||0));
  const conflicts=C('sync_conflicts').filter(c=>c.status!=='resolved').sort((a,b)=>(b.created_at||0)-(a.created_at||0));
  const syncLast=SYNC.lastSuccess?new Date(SYNC.lastSuccess).toLocaleString('zh-TW'):'—';
  el.innerHTML=`<div class="card"><h3>⚙️ 系統設定</h3>
    <div class="kv"><b>版本</b><span>${APP_VERSION}</span></div>
    <div class="row"><div class="grow field"><label class="sm">道館名稱</label><input id="se_dojo" value="${esc(s.dojo)}"></div>
      <div class="grow field"><label class="sm">Logo（emoji）</label><input id="se_logo" value="${esc(s.logo)}"></div></div>
    <div class="sect-title">分組人數上限（每位教練）</div>

Views.saveSettings=async function(){

  s.limits={幼兒:+$('#lim_kid').value,基礎:+$('#lim_base').value,品勢:+$('#lim_poom').value,對練:+$('#lim_spar').value,default:12};
  ['初階','中階','高階'].forEach(t=>{s.tiers[t]=[...document.querySelectorAll('#tier_'+t+' .chip.on')].map(x=>x.dataset.b);});

Views.saveSyncUrl=async function(){
  if(!requireAdminRole())return;
  const s=settings();s.syncUrl=$('#se_sync').value.trim();s.id='app';await save('settings',s);
  if(!SYNC.enabled()){$('#syncStat').textContent='狀態：未啟用（單機）';toast('已清除同步網址','ok');return;}
  $('#syncStat').textContent='狀態：測試連線中…';
  try{const r=await fetch(SYNC.url());const j=await r.json();
    if(j&&j.ok){$('#syncStat').textContent='狀態：✅ 連線成功，同步已啟用';toast('雲端連線成功','ok');SYNC.startAuto();}
    else throw new Error('回應異常');
  }catch(e){$('#syncStat').textContent='狀態：❌ 連線失敗（'+esc(e.message)+'）請確認網址與部署權限「任何人」';toast('連線失敗','bad');}
};
Views.cloudUpload=async function(){
  if(!SYNC.enabled()){toast('請先儲存同步網址','warn');return;}
  $('#syncStat').textContent='狀態：上傳中…';
  try{await SYNC.replaceAll();$('#syncStat').textContent='狀態：'+App.syncText()[1];}

Views.syncNow=async function(){

Views.exportData=async function(){
  const data={version:APP_VERSION,exported_at:Date.now(),stores:{}};for(const st of DATA_STORES)data.stores[st]=C(st);

Views.importData=function(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=async ev=>{try{const data=JSON.parse(ev.target.result);
    if(!requireAdminRole())return;
    const stores=data.stores||data;
    await App.requireAdminPin({actionName:'匯入 JSON 覆蓋資料',impact:'將以選取的 JSON 檔覆蓋目前本機正式資料。',confirmText:'確認匯入',
      backupReason:'JSON 匯入前自動備份',onConfirm:async()=>{
        await wipeData(false);
        for(const st of DATA_STORES){if(stores[st])await DB.bulk(st,stores[st]);}
        await reloadAll();Modal.close();toast('已匯入備份','ok');App.go('settings','more');
      }});
  }catch(err){toast('匯入失敗：'+err.message,'bad');}};
  r.readAsText(f);
};

async function ensureWarmupDefaults(){
  const have=new Set(C('warmup_library').map(w=>w.id));const now=Date.now();let n=0;
  for(let i=0;i<WARMUP_DEFAULTS.length;i++){const d=WARMUP_DEFAULTS[i];if(have.has(d.id))continue;
    await save('warmup_library',Object.assign({category:'自訂',default_minutes:6,min_minutes:3,max_minutes:15,intensity:'中',
      suitable_age_groups:[],suitable_levels:[],suitable_class_types:[],recommended_group_size:0,equipment:'',space_requirement:'',
      instructions:'',safety_notes:'',easier_version:'',harder_version:'',coach_cues:'',tabata:null,
      favorite:false,usage_count:0,last_used_at:0,active:true,sort_order:i,created_by:null,created_at:now,updated_at:now},d));n++;}
  return n;
}
const Warmup={
  all(){return C('warmup_library').filter(w=>w.active!==false);},
  byCategory(cat){const a=this.all();return(!cat||cat==='全部')?a:a.filter(w=>w.category===cat);},
  recommend(ct){return this.all().slice().sort((a,b)=>{
    const fa=a.favorite?1:0,fb=b.favorite?1:0;if(fa!==fb)return fb-fa;
    const ta=(a.suitable_class_types||[]).includes(ct)?1:0,tb=(b.suitable_class_types||[]).includes(ct)?1:0;if(ta!==tb)return tb-ta;
    if((b.last_used_at||0)!==(a.last_used_at||0))return (b.last_used_at||0)-(a.last_used_at||0);
    if((b.usage_count||0)!==(a.usage_count||0))return (b.usage_count||0)-(a.usage_count||0);
    return (a.sort_order||0)-(b.sort_order||0);});},
};
function getFitBlock(dpId){let b=C('lesson_blocks').find(x=>x.daily_plan_id===dpId&&x.block_type==='fitness'&&!x.training_group_id);

Views.wSetMin=async function(dpId,i,val){const b=getFitBlock(dpId);if(b.warmups[i]){b.warmups[i].minutes=Math.max(0,+val||0);await save('lesson_blocks',b);Views.renderPlan();}};
Views.wRemove=async function(dpId,i){const b=getFitBlock(dpId);b.warmups.splice(i,1);await save('lesson_blocks',b);Views.renderPlan();};
Views.wAutoBalance=async function(dpId){const b=getFitBlock(dpId);const ws=b.warmups;if(!ws.length)return;const target=(b.end_minute||30)-(b.start_minute||10);const each=Math.max(1,Math.floor(target/ws.length));let rem=target-each*ws.length;ws.forEach((w,i)=>w.minutes=each+(i<rem?1:0));await save('lesson_blocks',b);Views.renderPlan();};

/* ========================================================================
   首次使用設定精靈（§六）—— 4 步：道館 → 班別 → 教練團 → 學員
   只新增、不覆蓋既有資料；完成後自動以新管理者登入並進入今日工作台
   ======================================================================== */
const Setup={
  st:null,
  start(){this.st={step:1,dojo:{name:'雄麒跆拳道館',logo:'🥋',addr:'',dur:90},
    classes:HSIUNGCHI_PRESETS.map(p=>p.name),adminName:'',adminPin:'1234',coaches:[]};this.render();},
  cancel(){App.renderLogin();},
  go(n){this.st.step=Math.max(1,Math.min(4,n));this.render();},
  render(){
    const s=this.st,box=$('#loginList'),auth=$('#loginAuth');if(auth)auth.style.display='none';
    const prog=`<div class="muted" style="margin-bottom:10px">首次設定精靈　第 ${s.step}/4 步</div>`;
    const nav=(back,next,label)=>`<div class="row" style="margin-top:14px">${back?`<button class="btn secondary" onclick="Setup.go(${s.step-1})">上一步</button>`:`<button class="btn ghost" onclick="Setup.cancel()">取消</button>`}<span style="flex:1"></span>${next?`<button class="btn" onclick="${next}">${label||'下一步'}</button>`:''}</div>`;
    let html='';
    if(s.step===1)html=`${prog}<h3 style="margin:0 0 10px">道館資料</h3>
      <div class="field"><label>道館名稱 <span class="req">*</span></label><input id="su_name" value="${esc(s.dojo.name)}"></div>
      <div class="row"><div class="grow field"><label>Logo（emoji）</label><input id="su_logo" value="${esc(s.dojo.logo)}"></div>
        <div class="grow field"><label>預設課程長度(分)</label><input id="su_dur" type="number" value="${s.dojo.dur}"></div></div>
      <div class="field"><label>地址 <span class="opt">選填</span></label><input id="su_addr" value="${esc(s.dojo.addr)}"></div>${nav(false,'Setup.saveStep1()')}`;
    else if(s.step===2)html=`${prog}<h3 style="margin:0 0 6px">選擇班別</h3><p class="muted" style="margin:0 0 8px">勾選要建立的雄麒預設班別，稍後可在班別管理調整。</p>
      <div class="acct-list">${HSIUNGCHI_PRESETS.map(p=>`<label class="acct" style="cursor:pointer"><input type="checkbox" data-cn="${esc(p.name)}" ${s.classes.includes(p.name)?'checked':''} style="width:auto;flex:0 0 auto"><div class="meta"><b>${esc(p.name)}</b><span>${p.jsdays.map(jsdayToWeekday).map(w=>WD_SHORT[WEEKDAYS.indexOf(w)]).join('、')}　${p.start_time}-${p.end_time}（${p.duration_minutes}分）</span></div></label>`).join('')}</div>${nav(true,'Setup.saveStep2()')}`;
    else if(s.step===3)html=`${prog}<h3 style="margin:0 0 6px">建立管理者與教練團</h3><p class="muted" style="margin:0 0 8px">先建立你（管理者）的帳號；教練/助教可在這裡先加，或稍後在教練管理新增。</p>
      <div class="field"><label>你的姓名（管理者）<span class="req">*</span></label><input id="su_admin" value="${esc(s.adminName)}" placeholder="例：楊復傑教練"></div>
      <div class="field"><label>PIN 密碼</label><input id="su_pin" value="${esc(s.adminPin)}"></div>
      <div class="muted" style="margin-bottom:6px">已加入教練：${s.coaches.map(c=>esc(c.name)+'('+ROLE_LABEL[c.role]+')').join('、')||'（尚無）'}</div>
      <div class="row"><input id="su_cname" placeholder="教練/助教姓名" class="grow"><select id="su_crole" style="flex:0 0 auto">${Object.entries(ROLE_LABEL).filter(([k])=>k!=='admin').map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select><button class="btn sm secondary" onclick="Setup.addCoach()">＋加入</button></div>${nav(true,'Setup.saveStep3()')}`;
    else html=`${prog}<h3 style="margin:0 0 6px">學員名單</h3><p class="muted" style="margin:0 0 8px">選一種方式（都可稍後調整）。</p>
      <button class="btn secondary block" style="margin-bottom:8px" onclick="Setup.finish('demo')">載入示範學員（30 位，快速體驗）</button>
      <button class="btn secondary block" style="margin-bottom:8px" onclick="Views.dlTemplate()">下載 Excel 範本（之後匯入）</button>
      <button class="btn block" onclick="Setup.finish('empty')">完成設定，稍後自行新增學員</button>${nav(true,'')}`;
    box.innerHTML=html;
  },
  saveStep1(){const n=$('#su_name').value.trim();if(!n){toast('道館名稱必填','bad');return;}this.st.dojo={name:n,logo:$('#su_logo').value.trim()||'🥋',dur:+$('#su_dur').value||90,addr:$('#su_addr').value.trim()};this.go(2);},
  saveStep2(){this.st.classes=[...document.querySelectorAll('#loginList input[type=checkbox]')].filter(x=>x.checked).map(x=>x.dataset.cn);if(!this.st.classes.length){toast('請至少選一個班別','warn');return;}this.go(3);},
  addCoach(){const n=$('#su_cname').value.trim();if(!n)return;this.st.coaches.push({name:n,role:$('#su_crole').value,pin:'1234'});this.render();},
  saveStep3(){const n=$('#su_admin').value.trim();if(!n){toast('請填管理者姓名','bad');return;}this.st.adminName=n;this.st.adminPin=$('#su_pin').value.trim()||'1234';this.go(4);},
  async finish(mode){
    const s=this.st;
    await save('settings',Object.assign(DEFAULT_SETTINGS(),{id:'app',dojo:s.dojo.name,logo:s.dojo.logo,addr:s.dojo.addr,default_duration:s.dojo.dur}));
    const clIdOrder=['cl_summer','cl_fitness','cl_athlete','cl_sat','cl_black'];const created=[];
    for(let i=0;i<HSIUNGCHI_PRESETS.length;i++){const p=HSIUNGCHI_PRESETS[i];if(!s.classes.includes(p.name))continue;
      const dup=C('classes').find(c=>c.name===p.name);
      if(dup){created.push(dup.id);continue;}
      const id=C('classes').find(c=>c.id===clIdOrder[i])?uid('cl'):clIdOrder[i];
      await save('classes',{id,name:p.name,class_type:p.class_type,weekdays:p.jsdays.map(jsdayToWeekday),start_time:p.start_time,end_time:p.end_time,duration_minutes:p.duration_minutes,active:true,seasonal:!!p.seasonal,active_from:p.active_from||'',active_until:p.active_until||'',default_grouping_mode:'smart',default_coach_ids:[],created_at:Date.now(),updated_at:Date.now()});
      created.push(id);
    }
    const admin=await save('profiles',{id:uid('u'),name:s.adminName,role:'admin',pin:s.adminPin,active:true,specialties:[],available_weekdays:WEEKDAYS.slice(0,7)});
    for(const c of s.coaches)await save('profiles',{id:uid('u'),name:c.name,role:c.role,pin:c.pin||'1234',active:true,specialties:[],available_weekdays:WEEKDAYS.slice(0,7)});
    if(mode==='demo')await Setup.makeDemoStudents(created);
    await ensureWarmupDefaults();
    if(SYNC.enabled()){try{await SYNC.replaceAll();}catch(e){}}
    toast('基礎設定已完成，現在可以建立第一堂課','ok');
    localStorage.setItem('tp_user',admin.id);
    App.enter(admin);
  },
  async makeDemoStudents(classIds){
    if(!classIds||!classIds.length)return;
    const fnm=['宥','子','品','承','宸','語','梓','詠','冠','宇','昱','家','思','若','芯','柏','俊','奕','睿','翊'];
    const lnm=['廷','安','妤','翰','希','恩','睿','辰','宏','彤','綺','豪','嘉','瑄','宸','霖','蓉','榕','傑','琪'];
    for(let i=0;i<30;i++){const age=AGE_GROUPS[i<5?0:i<16?1:i<25?2:3];const belt=BELTS[i%BELTS.length];
      const cl=classIds[i%classIds.length];const clsObj=C('classes').find(c=>c.id===cl);
      const spec=age==='幼兒'?'基礎':(i%5===0?'品勢':i%5===1?'對練':age==='成人'?'健身':'基礎');
      await save('students',{id:uid('st'),name:'學員'+String(i+1).padStart(2,'0')+fnm[i%fnm.length]+lnm[i%lnm.length],age_group:age,belt_rank:belt,specialty:spec,class_id:cl,weekdays:clsObj?clsObj.weekdays:[],active:true,promotion_status:i%9===0,competition_athlete:spec==='比賽選手',current_progress:'',tech:'',notes:''});
    }
  }
};

/* ---------- BOOT ---------- */
window.addEventListener('DOMContentLoaded',()=>App.boot());
if('serviceWorker' in navigator && location.protocol!=='file:'){
  window.addEventListener('load',async()=>{
    try{
      const reg=await navigator.serviceWorker.register('./sw.js');
      let refreshing=false;
      navigator.serviceWorker.addEventListener('controllerchange',()=>{if(refreshing)return;refreshing=true;location.reload();});
      const showUpdate=worker=>{
        if(!worker)return;
        Modal.open('系統已有新版本',`
          <p class="muted">新版本已下載完成。更新前系統會確認待同步資料已寫入本機永久佇列。</p>
          <div class="kv"><b>目前版本</b><span>${APP_VERSION}</span></div>
          <div class="kv"><b>待同步</b><span>${SYNC.pendingCount()} 筆</span></div>
          <div class="row"><button class="btn secondary grow" onclick="Modal.close()">稍後</button><button class="btn grow" onclick="App.applyPwaUpdate()">立即更新</button></div>`);
        App._waitingWorker=worker;
      };
      if(reg.waiting)showUpdate(reg.waiting);
      reg.addEventListener('updatefound',()=>{
        const worker=reg.installing;
        worker&&worker.addEventListener('statechange',()=>{if(worker.state==='installed'&&navigator.serviceWorker.controller)showUpdate(worker);});
      });
      navigator.serviceWorker.addEventListener('message',e=>{
        if(e.data&&e.data.type==='APP_UPDATED')toast('已更新至 '+(e.data.version||APP_VERSION),'ok');
      });
    }catch(e){}
  });
}
